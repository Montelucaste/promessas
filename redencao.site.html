 frase[1437] = "“Ó Senhor Deus, será que rejeitaste completamente o povo de Judá? Será que detestas o povo de Sião? Por que nos feriste tanto, que não podemos ser curados? Nós esperamos a paz, mas nada de bom aconteceu; pensamos que íamos ser curados, mas o que veio foi o terror. (Jeremias 14:19)";
 frase[1438] = "— Não entre numa casa onde tenha gente chorando. Não fique triste, nem chore por causa de ninguém. Pois eu não abençoarei mais esse povo com a minha paz; não os amarei mais, nem terei pena deles. Sou eu, o Senhor, quem está falando. (Jeremias 16:5)";
 frase[1439] = "“Descendentes do meu servo Jacó, não tenham medo! Povo de Israel, não fique assustado! Eu os libertarei dessa terra distante, da terra onde vocês são prisioneiros. Os descendentes de Jacó voltarão e viverão em paz; viverão em segurança, e ninguém fará com que fiquem com medo. Sou eu, o Senhor, quem está falando. (Jeremias 30:10)";
 frase[1440] = "“Descendentes do meu servo Jacó, não tenham medo! Povo de Israel, não fique assustado! Eu os livrarei dessa terra distante, da terra onde vocês são prisioneiros. Vocês voltarão e viverão em paz; viverão em segurança, e ninguém fará com que fiquem com medo. (Jeremias 46:27)";
 frase[1441] = "Das ovelhas dos pastos de Israel, entreguem uma de cada duzentas. — Vocês trarão as ofertas de cereais, os animais para serem completamente queimados e os animais para as ofertas de paz a fim de que assim os pecados de vocês sejam perdoados. Eu, o Senhor Deus, ordeno isso. (Ezequiel 45:15)";
 frase[1442] = "O rei irá do pátio de fora para o salão do portão e ficará ao lado do portão. Enquanto isso, os sacerdotes oferecerão os sacrifícios que serão completamente queimados e também as ofertas de paz. Ali o rei deverá prestar culto e depois sair. O portão deverá ficar aberto até a tarde. (Ezequiel 46:2)";
 frase[1443] = "— Quando o rei tiver vontade de dar uma oferta ao Senhor, seja uma oferta que deverá ser completamente queimada ou uma oferta de paz, o portão do leste que dá para o pátio de dentro será aberto para ele. Ele fará a oferta do mesmo modo que faz no sábado, e, depois que ele sair, o portão deverá ser fechado. (Ezequiel 46:12)";
 frase[1444] = "Depois de alguns anos, o rei do Egito e o rei da Síria farão um acordo, e o rei do Egito dará a sua filha em casamento ao rei da Síria, para garantir a paz entre as duas nações. Porém o plano fracassará, pois ela, o marido, o filho e os empregados serão todos assassinados. (Daniel 11:6)";
 frase[1445] = "— Naquele dia, farei um acordo com os animais selvagens, com as aves e com as cobras, para que não ataquem a minha amada. Quebrarei as armas de guerra, os arcos e as espadas; não haverá mais guerra, e o meu povo viverá em paz e segurança. (Oseias 2:18)";
 frase[1446] = "Vejam! Pelas montanhas vem um mensageiro que traz boas notícias, notícias de paz. Povo de Judá, faça as suas festas e ofereça a Deus aquilo que você prometeu. O país de vocês nunca mais será invadido por gente má; eles foram completamente destruídos. (Naum 1:15)";
 frase[1447] = "É ele que vai reconstruir o Templo e receber as honrarias que pertencem a um rei. Ele vai sentar no seu trono e reinar. Um sacerdote se sentará no seu próprio trono, e haverá uma paz perfeita entre ‘O Ramo Novo’ e esse sacerdote.”(Zacarias 6:13)";
 frase[1448] = "Essa mensagem foi a mesma que o Senhor Deus tinha dado antes por meio dos profetas antigos, quando Jerusalém estava em paz e tinha muitos moradores. E o mesmo acontecia nas cidades ao redor e nas cidades da região sul e nas planícies de Judá. (Zacarias 7:7)";
 frase[1449] = "Ele acabará com os carros de guerra de Israel e com a cavalaria de Jerusalém; os arcos e as flechas serão destruídos. Ele fará com que as nações vivam em paz; o seu reino irá de um mar a outro, e desde o rio Eufrates até os fins da terra. (Zacarias 9:10)";
 frase[1450] = "Depois que Paulo foi chamado, Tértulo começou a acusação, dizendo: — Excelentíssimo Senhor Governador, o seu governo nos tem trazido um longo tempo de paz, e graças à sua sábia administração muitas reformas necessárias estão sendo feitas para o bem deste povo. (Atos 24:2)";
 frase[1451] = "Por isso eu escrevo a todos vocês que estão em Roma, todos vocês a quem Deus ama e a quem tem chamado para serem o seu próprio povo. Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (Romanos 1:7)";
 frase[1452] = "Porém, se o marido não cristão ou a esposa não cristã quiser o divórcio, então que se divorcie. Nesses casos o marido cristão ou a esposa cristã está livre para fazer como quiser, pois Deus chamou vocês para viverem em paz. (1Coríntios 7:15)";
 frase[1453] = "Portanto, por meio do Filho, Deus resolveu trazer o Universo de volta para si mesmo. Ele trouxe a paz por meio da morte do seu Filho na cruz e assim trouxe de volta para si mesmo todas as coisas, tanto na terra como no céu. (Colossenses 1:20)";
 frase[1454] = "Eu, Paulo, e Silas, e Timóteo escrevemos esta carta aos irmãos da igreja da cidade de Tessalônica, a vocês que estão unidos com Deus, o Pai, e com o Senhor Jesus Cristo. Que a graça e a paz estejam com vocês! (1Tessalonicenses 1:1)";
 frase[1455] = "Que Deus, que nos dá a paz, faça com que vocês sejam completamente dedicados a ele. E que ele conserve o espírito, a alma e o corpo de vocês livres de toda mancha, para o dia em que vier o nosso Senhor Jesus Cristo. (1Tessalonicenses 5:23)";
 frase[1456] = "Abraão lhe deu a décima parte de tudo o que ele havia tomado dos inimigos na batalha. O nome de Melquisedeque quer dizer primeiramente “Rei da Justiça”. E, porque ele era rei de Salém , o seu nome também quer dizer “Rei da Paz”. (Hebreus 7:2)";
 frase[1457] = "Vocês foram escolhidos de acordo com o propósito de Deus, o Pai. E pelo Espírito de Deus vocês foram feitos um povo dedicado a ele a fim de obedecerem a Jesus Cristo e ficarem purificados pelo seu sangue. Que vocês tenham, mais e mais, a graça e a paz de Deus! (1Pedro 1:2)";
 frase[1458] = "Eu, João, escrevo às sete igrejas que estão na província da Ásia. Que a graça e a paz lhes sejam dadas da parte de Deus, aquele que é, que era e que há de vir; da parte dos sete espíritos que estão diante do seu trono(Apocalipse 1:4)";
 frase[1459] = "Pelo contrário, queríamos que fosse um sinal para nós, e para vocês, e para os nossos descendentes depois de nós. Seria um sinal para adorarmos o Senhor com as nossas ofertas a serem completamente queimadas, com sacrifícios de animais e com ofertas de paz. Isso foi feito para evitar que um dia os seus descendentes venham a dizer aos nossos: “Vocês não têm nenhuma ligação com o Senhor.”(Josué 22:27)";
 frase[1460] = "— Além disso, você sabe o que Joabe, cuja mãe é Zeruia, me fez. Ele matou os dois comandantes do exército de Israel, isto é, Abner, filho de Ner, e Amasa, filho de Jéter. Você sabe como, em tempo de paz, ele os matou para vingar as mortes que eles haviam causado em tempo de guerra. Joabe matou homens inocentes, e agora eu sou o responsável pelo que ele fez e estou sofrendo as consequências. (1Reis 2:5)";
 frase[1461] = "Em favor de toda a nação de Israel, o rei terá o dever de apresentar os animais que serão completamente queimados, as ofertas de cereais e as ofertas de vinho. Ele fará isso nas Festas da Lua Nova, nos sábados e em todas as outras festas. O rei apresentará as ofertas para tirar pecados, as ofertas de cereais, as ofertas a serem completamente queimadas e as ofertas de paz para que os pecados do povo de Israel sejam perdoados. (Ezequiel 45:17)";
 frase[1462] = "Deus ressuscitou o nosso Senhor Jesus, que, por causa da sua morte na cruz, é o Grande Pastor do rebanho. E é por meio do sangue de Jesus que a aliança eterna é selada. Que o Deus de paz lhes dê tudo de bom que vocês precisam para fazer a sua vontade. E que ele, por meio de Jesus Cristo, faça em nós tudo o que lhe agrada. E a Cristo seja dada a glória para todo o sempre! Amém! (Hebreus 13:20)";
 frase[1463] = "Se os inimigos do meu povo querem a minha proteção, então que façam as pazes comigo, sim, que façam as pazes comigo.”(Isaías 27:5)";
 frase[1464] = "“Jó, faça as pazes com Deus, deixe de tratá-lo como inimigo, e assim ele dará a você tudo o que há de bom. (Jó 22:21)";
 frase[1465] = "Porém, se ela se separar, que não case de novo ou então que faça as pazes com o marido. E que o homem não se divorcie da sua esposa. (1Coríntios 7:11)";
 frase[1466] = "Ele fará com que pais e filhos façam as pazes para que eu não venha castigar o país e destruí-lo completamente. (Malaquias 4:6)";
 frase[1467] = "deixe a sua oferta ali, na frente do altar, e vá logo fazer as pazes com o seu irmão. Depois volte e ofereça a sua oferta a Deus. (Mateus 5:24)";
 frase[1468] = "Ele será mandado por Deus como mensageiro e será forte e poderoso como o profeta Elias. Ele fará com que pais e filhos façam as pazes e que os desobedientes voltem a andar no caminho direito. E conseguirá preparar o povo de Israel para a vinda do Senhor. (Lucas 1:17)";
 frase[1469] = "O rei Herodes estava com muita raiva dos moradores das cidades de Tiro e de Sidom. Então eles formaram um grupo e foram falar com Herodes. Primeiro conseguiram o apoio de Blasto, que era um alto funcionário do palácio. Aí pediram ao rei Herodes que fizesse as pazes com eles, pois os alimentos que a região deles recebia vinham do país do rei. (Atos 12:20)";
 frase[1470] = "Procure sempre parecer feliz e satisfeito. (Eclesiastes 9:8)";
 frase[1471] = "Feliz a nação que tem tudo isso! Feliz o povo cujo Deus é o Senhor! (Salmos 144:15)";
 frase[1472] = "Elas lhe darão vida, uma vida agradável e feliz. (Provérbios 3:22)";
 frase[1473] = "feliz com o mundo e contente com a raça humana. (Provérbios 8:31)";
 frase[1474] = "Essa famosa cidade, que era feliz, agora está completamente abandonada. (Jeremias 49:25)";
 frase[1475] = "Feliz aquele que o Senhor não acusa de cometer pecado!”(Romanos 4:8)";
 frase[1476] = "e Leia disse: — Como sou feliz! Agora as mulheres dirão que sou feliz. Por isso o menino se chamará Aser . (Gênesis 30:13)";
 frase[1477] = "Feliz a nação que tem o Senhor como o seu Deus! Feliz o povo que Deus escolheu para ser dele! (Salmos 33:12)";
 frase[1478] = "Como sou feliz por causa das tuas promessas, tão feliz como alguém que encontra um grande tesouro! (Salmos 119:162)";
 frase[1479] = "A mais feliz das mulheres é Jael, a mulher de Héber, o queneu. Ela é a mais feliz das mulheres que vivem em barracas. (Juízes 5:24)";
 frase[1480] = "“Alguns homens levam uma vida feliz e tranquila e morrem ricos,(Jó 21:23)";
 frase[1481] = "Feliz aquele cujas maldades Deus perdoa e cujos pecados ele apaga! (Salmos 32:1)";
 frase[1482] = "Feliz o povo que te adora com canções e que vive na luz da tua presença! (Salmos 89:15)";
 frase[1483] = "Feliz aquele que teme a Deus, o Senhor, e vive de acordo com a sua vontade! (Salmos 128:1)";
 frase[1484] = "Babilônia, você será destruída! Feliz aquele que fizer com você o mesmo que você fez conosco —(Salmos 137:8)";
 frase[1485] = "Feliz é a pessoa que acha a sabedoria e que consegue compreender as coisas,(Provérbios 3:13)";
 frase[1486] = "Portanto, alegre-se com a sua mulher, seja feliz com a moça com quem você casou,(Provérbios 5:18)";
 frase[1487] = "Desprezar os outros é pecado, mas aquele que faz o bem aos pobres é feliz. (Provérbios 14:21)";
 frase[1488] = "Quem presta atenção no que lhe ensinam terá sucesso; quem confia no Senhor será feliz. (Provérbios 16:20)";
 frase[1489] = "Quem teme o Senhor terá uma vida longa, feliz e tranquila. (Provérbios 19:23)";
 frase[1490] = "Meu filho, se você se tornar sábio, eu ficarei muito feliz. (Provérbios 23:15)";
 frase[1491] = "O pai que tem um filho correto e sábio ficará muito feliz e se orgulhará dele. (Provérbios 23:24)";
 frase[1492] = "Quem teme o Senhor é feliz, mas quem se revolta contra ele cairá na desgraça. (Provérbios 28:14)";
 frase[1493] = "Feliz aquele empregado que estiver fazendo isso quando o patrão chegar! (Mateus 24:46)";
 frase[1494] = "Feliz aquele empregado que estiver fazendo isso quando o patrão chegar! (Lucas 12:43)";
 frase[1495] = "Davi disse: “Feliz aquele cujas maldades Deus perdoa e cujos pecados ele apaga! (Romanos 4:7)";
 frase[1496] = "Todo o povo estava feliz, e a cidade de Jerusalém ficou calma depois que Atalia foi morta no palácio. (2Reis 11:20)";
 frase[1497] = "“Feliz é aquele a quem Deus corrige! Por isso, não despreze o castigo do Deus Todo-Poderoso. (Jó 5:17)";
 frase[1498] = "Por causa de ti eu me alegrarei e ficarei feliz. Cantarei louvores a ti, ó Deus Altíssimo. (Salmos 9:2)";
 frase[1499] = "Por isso o meu coração está feliz e alegre, e eu, um ser mortal, me sinto bem seguro,(Salmos 16:9)";
 frase[1500] = "Ó Senhor Deus, o rei está muito feliz porque lhe deste força; está muito contente porque o tornaste vitorioso. (Salmos 21:1)";
 frase[1501] = "Feliz aquele que o Senhor Deus não acusa de fazer coisas más e que não age com falsidade! (Salmos 32:2)";
 frase[1502] = "Procure descobrir, por você mesmo, como o Senhor Deus é bom. Feliz aquele que encontra segurança nele! (Salmos 34:8)";
 frase[1503] = "Ó Senhor Deus, os teus feitos poderosos me tornam feliz! Eu canto de alegria pelas coisas que fazes. (Salmos 92:4)";
 frase[1504] = "Aleluia! Feliz aquele que teme a Deus, o Senhor, que tem prazer em obedecer aos seus mandamentos! (Salmos 112:1)";
 frase[1505] = "Feliz aquele que tem pena dos outros e empresta generosamente e que dirige os seus negócios com honestidade! (Salmos 112:5)";
 frase[1506] = "Feliz o homem que tem muitas dessas flechas! Ele não será derrotado quando enfrentar os seus inimigos no tribunal. (Salmos 127:5)";
 frase[1507] = "Se você for assim, ganhará o suficiente para viver, será feliz, e tudo dará certo para você. (Salmos 128:2)";
 frase[1508] = "Feliz aquele que recebe ajuda do Deus de Jacó, aquele que põe a sua esperança no Senhor, seu Deus,(Salmos 146:5)";
 frase[1509] = "Estava ao seu lado como arquiteta e era a sua fonte diária de alegria, sempre feliz na sua presença —(Provérbios 8:30)";
 frase[1510] = "Seja sábio, meu filho; então eu serei feliz e saberei dar uma boa resposta a quem me criticar. (Provérbios 27:11)";
 frase[1511] = "Um país sem a orientação de Deus é um país sem ordem. Quem guarda a lei de Deus é feliz. (Provérbios 29:18)";
 frase[1512] = "enquanto ficamos esperando o dia feliz em que aparecerá a glória do nosso grande Deus e Salvador Jesus Cristo. (Tito 2:13)";
 frase[1513] = "Feliz é aquele que nas aflições continua fiel! Porque, depois de sair aprovado dessas aflições, receberá como prêmio a vida que Deus promete aos que o amam. (Tiago 1:12)";
 frase[1514] = "Porém ela respondia: — Não me chamem de Noemi, a Feliz. Chamem de Mara , a Amargurada, porque o Deus Todo-Poderoso me deu muita amargura. (Rute 1:20)";
 frase[1515] = "O povo deu de boa vontade ofertas a Deus, o Senhor, e eles ficaram alegres porque havia sido dado tanto. O rei Davi também ficou muito feliz. (1Crônicas 29:9)";
 frase[1516] = "Então eu me alegrarei por causa do que o Senhor Deus tem feito; ficarei feliz porque ele me salvou da morte. (Salmos 35:9)";
 frase[1517] = "Feliz aquele que confia em Deus, o Senhor, que não vai atrás dos ídolos, nem se junta com os que adoram falsos deuses! (Salmos 40:4)";
 frase[1518] = "Faze-me ouvir outra vez os sons de alegria e de felicidade; e, ainda que tenhas me esmagado e quebrado, eu serei feliz de novo. (Salmos 51:8)";
 frase[1519] = "Fazes a terra produzir o vinho, que deixa a gente feliz; o azeite, que alegra; e o pão, que dá forças. (Salmos 104:15)";
 frase[1520] = "Ele faz com que a mulher que não tem filhos seja respeitada no seu lar e a torna feliz, dando-lhe filhos. Aleluia! (Salmos 113:9)";
 frase[1521] = "amorosa como uma corça, graciosa como uma cabra selvagem. Que ela cerque você com o seu amor, e que os seus encantos sempre o façam feliz! (Provérbios 5:19)";
 frase[1522] = "Aquele que me ouve será feliz: aquele que fica todos os dias na minha porta, esperando na entrada da minha casa. (Provérbios 8:34)";
 frase[1523] = "Consegui tudo o que desejei. Não neguei a mim mesmo nenhum tipo de prazer. Eu me sentia feliz com o meu trabalho, e essa era a minha recompensa. (Eclesiastes 2:10)";
 frase[1524] = "Então entendi que nesta vida tudo o que a pessoa pode fazer é procurar ser feliz e viver o melhor que puder. (Eclesiastes 3:12)";
 frase[1525] = "Então direi a mim mesmo: ‘Homem feliz! Você tem tudo de bom que precisa para muitos anos. Agora descanse, coma, beba e alegre-se.’ ”(Lucas 12:19)";
 frase[1526] = "Abraão, o pai de vocês, ficou alegre ao ver o tempo da minha vinda. Ele viu esse tempo e ficou feliz. (João 8:56)";
 frase[1527] = "Por isso o meu coração está feliz, e as minhas palavras são palavras de alegria; e eu, um ser mortal, vou descansar cheio de esperança,(Atos 2:26)";
 frase[1528] = "— Rei Agripa, eu me sinto muito feliz em poder estar hoje diante do senhor para me defender de tudo o que os judeus me acusam. (Atos 26:2)";
 frase[1529] = "E especialmente feliz porque o senhor conhece muito bem todos os costumes e questões dos judeus. Portanto, peço que o senhor me escute com paciência. (Atos 26:3)";
 frase[1530] = "Porém ela será mais feliz se ficar como está. Essa é a minha opinião, e eu acho que também tenho o Espírito de Deus. (1Coríntios 7:40)";
 frase[1531] = "Eu fiquei muito feliz quando soube que alguns dos seus filhos vivem de acordo com a verdade, como o Pai nos mandou viver. (2João 1:4)";
 frase[1532] = "“Escutem! Eu venho como um ladrão. Feliz aquele que vigia e toma conta da sua roupa, a fim de não andar nu e não ficar envergonhado em público!”(Apocalipse 16:15)";
 frase[1533] = "Agora, se o que vocês fizeram hoje com Gideão e a sua família foi sincero e honesto, então sejam felizes com Abimeleque, e que ele seja feliz com vocês! (Juízes 9:19)";
 frase[1534] = "Quando saí daqui, eu tinha tudo, mas o Senhor me fez voltar sem nada. Então, por que me chamar de Feliz, se o Deus Todo-Poderoso me fez sofrer e me deu tanta aflição?(Rute 1:21)";
 frase[1535] = "Então Ana orou assim: O Senhor Deus encheu o meu coração de alegria; por causa do que ele fez, eu ando de cabeça erguida. Estou rindo dos meus inimigos e me sinto feliz, pois Deus me ajudou. (1Samuel 2:1)";
 frase[1536] = "Hamã saiu do banquete alegre e feliz da vida. Porém, quando chegou perto da entrada do palácio, ele encontrou Mordecai ali e ficou furioso porque Mordecai não se curvou diante dele, nem fez qualquer outro sinal de respeito. (Ester 5:9)";
 frase[1537] = "a fim de que eu, na presença do povo de Jerusalém, possa me levantar para anunciar o motivo por que te louvo e dizer que sou feliz porque me salvaste da morte. (Salmos 9:14)";
 frase[1538] = "O Senhor é a minha força e o meu escudo; com todo o coração eu confio nele. O Senhor me ajuda; por isso, o meu coração está feliz, e eu canto hinos em seu louvor. (Salmos 28:7)";
 frase[1539] = "Jovem, aproveite a sua mocidade e seja feliz enquanto é moço. Faça tudo o que quiser e siga os desejos do seu coração. Mas lembre de uma coisa: Deus o julgará por tudo o que você fizer. (Eclesiastes 11:9)";
 frase[1540] = "Como a macieira entre as árvores da floresta, assim é o meu amado entre os outros homens. Eu me sinto feliz nos seus braços, e os seus carinhos são doces para mim. (Cântico dos Cânticos 2:3)";
 frase[1541] = "Depois de tanto sofrimento, ele será feliz; por causa da sua dedicação, ele ficará completamente satisfeito. O meu servo não tem pecado, mas ele sofrerá o castigo que muitos merecem, e assim os pecados deles serão perdoados. (Isaías 53:11)";
 frase[1542] = "Assim como um moço casa com a sua noiva, também aquele que a construiu casará com você; assim como o noivo fica feliz com a noiva, também o seu Deus se alegrará com você. (Isaías 62:5)";
 frase[1543] = "Ela correrá atrás dos seus amantes, mas não os alcançará; irá procurá-los, mas não os encontrará. Então dirá: “Vou voltar para o meu marido, pois, quando vivia com ele, eu era mais feliz do que agora.”(Oseias 2:7)";
 frase[1544] = "— O Reino do Céu é como um tesouro escondido num campo, que certo homem acha e esconde de novo. Fica tão feliz, que vende tudo o que tem, e depois volta, e compra o campo. (Mateus 13:44)";
 frase[1545] = "Jesus afirmou: — Simão, filho de João, você é feliz porque esta verdade não foi revelada a você por nenhum ser humano, mas veio diretamente do meu Pai, que está no céu. (Mateus 16:17)";
 frase[1546] = "Quando Jesus acabou de dizer isso, uma mulher que estava no meio da multidão gritou para ele: — Como é feliz a mulher que pôs o senhor no mundo e o amamentou! (Lucas 11:27)";
 frase[1547] = "— Mas Abraão respondeu: “Meu filho, lembre que você recebeu na sua vida todas as coisas boas, porém Lázaro só recebeu o que era mau. E agora ele está feliz aqui, enquanto você está sofrendo. (Lucas 16:25)";
 frase[1548] = "Em tudo tenho mostrado a vocês que é trabalhando assim que podemos ajudar os necessitados. Lembrem das palavras do Senhor Jesus: “É mais feliz quem dá do que quem recebe.”(Atos 20:35)";
 frase[1549] = "Mas guarde entre você mesmo e Deus o que você crê a respeito desse assunto. Feliz a pessoa que não é condenada pela consciência quando faz o que acha que deve fazer! (Romanos 14:22)";
 frase[1550] = "Foi por isso que escrevi aquela carta . O motivo foi que eu não queria ir e ser entristecido pelas próprias pessoas que deveriam me alegrar. Pois eu tenho a certeza de que, quando estou feliz, vocês todos também estão. (2Coríntios 2:3)";
 frase[1551] = "Meus queridos irmãos, sinto muitas saudades de vocês. Vocês me fazem tão feliz, e eu me orgulho muito de vocês! Portanto, continuem todos firmes, vivendo unidos com o Senhor. (Filipenses 4:1)";
 frase[1552] = "Agora eu me sinto feliz pelo que tenho sofrido por vocês. Pois o que eu sofro no meu corpo pela Igreja, que é o corpo de Cristo, está ajudando a completar os sofrimentos de Cristo em favor dela. (Colossenses 1:24)";
 frase[1553] = "Feliz quem lê este livro, e felizes aqueles que ouvem as palavras desta mensagem profética e obedecem ao que está escrito neste livro! Pois está perto o tempo em que todas essas coisas acontecerão. (Apocalipse 1:3)";
 frase[1554] = "Mas ele me respondeu: “A minha graça é tudo o que você precisa, pois o meu poder é mais forte quando você está fraco.” Portanto, eu me sinto muito feliz em me gabar das minhas fraquezas, para que assim a proteção do poder de Cristo esteja comigo. (2Coríntios 12:9)";
 frase[1555] = "— Um homem que tenha casado há pouco tempo ficará livre por um ano do serviço militar e de qualquer outro serviço público. Ele tem o direito de ficar em casa um ano, fazendo com que a sua esposa se sinta feliz. (Deuteronômio 24:5)";
 frase[1556] = "Povo de Israel, como você é feliz! Não há ninguém como você, o povo que o Senhor Deus salvou. Ele é o seu escudo e a sua espada, para dar proteção e vitória a você. Israel, os seus inimigos se ajoelharão pedindo misericórdia, e você tomará posse das suas terras. (Deuteronômio 33:29)";
 frase[1557] = "O senhor odeia os que o amam e ama aqueles que o odeiam. E mostrou que os seus oficiais e os seus soldados não valem nada para o senhor. Eu estou vendo agora que o senhor ficaria muito feliz se hoje Absalão estivesse vivo e todos nós estivéssemos mortos. (2Samuel 19:6)";
 frase[1558] = "Naquele dia foram oferecidos muitos sacrifícios, e o povo estava muito contente e feliz, pois Deus os havia enchido de alegria. As mulheres e as crianças também entraram na festa, e o barulho que o povo fazia podia ser ouvido de longe. (Neemias 12:43)";
 frase[1559] = "Aí a mulher dele e todos os amigos deram a seguinte sugestão: — Mande fazer uma forca de uns vinte metros de altura e amanhã de manhã peça ao rei que mande enforcar Mordecai. Então você poderá ir felizcom o rei ao banquete. Hamã gostou da ideia e mandou construir a forca. (Ester 5:14)";
 frase[1560] = "mas eu amo somente uma, aquela que é perfeita como uma pomba. Ela é filha única e a querida da sua mãe. Todas as mulheres olham para a minha amada e dizem que ela é feliz; rainhas e concubinas a elogiam e dizem:(Cântico dos Cânticos 6:9)";
 frase[1561] = "E não foi somente a chegada dele que nos animou, mas também a informação dada por ele de que vocês o animaram. Ele contou que vocês estão com saudade de mim e disse que estão muito tristes e estão prontos para me defender. Por isso agora estou mais feliz ainda. (2Coríntios 7:7)";
 frase[1562] = "Vocês querem aproveitar a vida? Querem viver muito e ser felizes?(Salmos 34:12)";
 frase[1563] = "E felizes são aqueles que não abandonam a sua fé em mim! (Mateus 11:6)";
 frase[1564] = "E felizes são as pessoas que não duvidam de mim! (Lucas 7:23)";
 frase[1565] = "Felizes são os que obedecem às leis a respeito do sábado! Felizes os que não praticam o que é mau!”(Isaías 56:2)";
 frase[1566] = "— Felizes são vocês que agora têm fome, pois vão ter fartura. — Felizes são vocês que agora choram, pois vão rir. (Lucas 6:21)";
 frase[1567] = "Eles ficam muito alegres e felizes quando por fim descem para a sepultura. (Jó 3:22)";
 frase[1568] = "Deste a vitória aos seus inimigos e fizeste com que eles ficassem felizes. (Salmos 89:42)";
 frase[1569] = "Felizes são aqueles que vivem uma vida correta, aqueles que sempre fazem o que é certo! (Salmos 106:3)";
 frase[1570] = "Felizes os que não praticam o mal, os que andam nos caminhos de Deus! (Salmos 119:3)";
 frase[1571] = "Como são felizes os filhos de um pai honesto e direito! (Provérbios 20:7)";
 frase[1572] = "Quando viram a estrela, eles ficaram muito alegres e felizes. (Mateus 2:10)";
 frase[1573] = "Já que vocês conhecem esta verdade, serão felizes se a praticarem. (João 13:17)";
 frase[1574] = "Meus irmãos, sintam-se felizes quando passarem por todo tipo de aflições. (Tiago 1:2)";
 frase[1575] = "se não, ele ficará irado logo, e vocês morrerão. Felizes são aqueles que buscam a proteção de Deus! (Salmos 2:12)";
 frase[1576] = "Felizes são os que moram na tua casa, sempre cantando louvores a ti! (Salmos 84:4)";
 frase[1577] = "Ó Senhor Todo-Poderoso, como são felizes aqueles que confiam em ti! (Salmos 84:12)";
 frase[1578] = "Ó Senhor Deus, felizes são aqueles que tu ensinas, aqueles a quem ensinas a tua lei! (Salmos 94:12)";
 frase[1579] = "Felizes são os que não podem ser acusados de nada, que vivem de acordo com a lei de Deus, o Senhor! (Salmos 119:1)";
 frase[1580] = "Felizes os que guardam os mandamentos de Deus e lhe obedecem de todo o coração! (Salmos 119:2)";
 frase[1581] = "Os que se tornam sábios são felizes, e a sabedoria lhes dará vida. (Provérbios 3:18)";
 frase[1582] = "Venha, vamos amar a noite toda. Passaremos momentos felizes nos braços um do outro. (Provérbios 7:18)";
 frase[1583] = "“Agora, moços, escutem! Façam o que eu digo e serão felizes. (Provérbios 8:32)";
 frase[1584] = "Quando se faz justiça, os bons ficam felizes, porém os maus ficam apavorados. (Provérbios 21:15)";
 frase[1585] = "Por isso, cheguei a esta conclusão: aqueles que morreram são mais felizes do que os que continuam vivos. (Eclesiastes 4:2)";
 frase[1586] = "Porém mais felizes do que todos são aqueles que ainda não nasceram e que ainda não viram as injustiças que há neste mundo. (Eclesiastes 4:3)";
 frase[1587] = "Felizes aqueles que continuarem fiéis a Deus por mil trezentos e trinta e cinco dias! (Daniel 12:12)";
 frase[1588] = "— Felizes as pessoas que choram, pois Deus as consolará. (Mateus 5:4)";
 frase[1589] = "— Felizes as pessoas humildes, pois receberão o que Deus tem prometido. (Mateus 5:5)";
 frase[1590] = "— Felizes as pessoas que têm o coração puro, pois elas verão a Deus. (Mateus 5:8)";
 frase[1591] = "— Felizes são vocês quando os insultam, perseguem e dizem todo tipo de calúnia contra vocês por serem meus seguidores. (Mateus 5:11)";
 frase[1592] = "Mas Jesus respondeu: — Mais felizes são aqueles que ouvem a mensagem de Deus e obedecem a ela. (Lucas 11:28)";
 frase[1593] = "Obedeçam a essa lei e façam o que o Senhor Deus acha certo, e assim vocês e os seus descendentes serão felizes. (Deuteronômio 12:25)";
 frase[1594] = "Como são felizes as suas esposas! Que sorte têm os seus servidores, que estão sempre ao seu lado e têm o privilégio de ouvir os seus sábios provérbios! (1Reis 10:8)";
 frase[1595] = "Todos estavam felizes, e a cidade ficou calma, pois Atalia tinha sido morta. (2Crônicas 23:21)";
 frase[1596] = "Felizes são aqueles que ajudam os pobres, pois o Senhor Deus os ajudará quando estiverem em dificuldades! (Salmos 41:1)";
 frase[1597] = "Mas os bons ficam contentes e felizes na sua presença e, cheios de alegria, cantam hinos. (Salmos 68:3)";
 frase[1598] = "Felizes são aqueles que de ti recebem forças e que desejam andar pelas estradas que levam ao monte Sião! (Salmos 84:5)";
 frase[1599] = "Os maus são apanhados na armadilha dos seus próprios pecados, mas os honestos andam livres e felizes. (Provérbios 29:6)";
 frase[1600] = "Felizes são as pessoas honestas, pois tudo dará certo para elas, e elas ficarão satisfeitas com aquilo que ganharem com o seu trabalho! (Isaías 3:10)";
 frase[1601] = "Todos vocês serão felizes; terão muita água para as suas plantações e pastos seguros para os seus jumentos e o seu gado. (Isaías 32:20)";
 frase[1602] = "Aqueles que morreram na guerra foram mais felizes do que os que morreram depois, porque estes foram se acabando devagarinho por não terem nada para comer. (Lamentações 4:9)";
 frase[1603] = "Todos os povos dirão que vocês são felizes, pois vocês vivem numa terra boa e rica. Eu, o Senhor Todo-Poderoso, estou falando. (Malaquias 3:12)";
 frase[1604] = "— Felizes as pessoas que sabem que são espiritualmente pobres, pois o Reino do Céu é delas. (Mateus 5:3)";
 frase[1605] = "— Felizes as pessoas que têm fome e sede de fazer a vontade de Deus, pois ele as deixará completamente satisfeitas. (Mateus 5:6)";
 frase[1606] = "— Felizes as pessoas que têm misericórdia dos outros, pois Deus terá misericórdia delas. (Mateus 5:7)";
 frase[1607] = "— Felizes as pessoas que trabalham pela paz, pois Deus as tratará como seus filhos. (Mateus 5:9)";
 frase[1608] = "Jesus continuou, dizendo: — Mas vocês, como são felizes! Pois os seus olhos veem, e os seus ouvidos ouvem. (Mateus 13:16)";
 frase[1609] = "Jesus olhou para os seus discípulos e disse: — Felizes são vocês, os pobres, pois o Reino de Deus é de vocês. (Lucas 6:20)";
 frase[1610] = "— Felizes são vocês quando os odiarem, rejeitarem, insultarem e disserem que vocês são maus por serem seguidores do Filho do Homem. (Lucas 6:22)";
 frase[1611] = "Então Jesus virou-se para os discípulos e disse só para eles: — Felizes são as pessoas que podem ver o que vocês estão vendo! (Lucas 10:23)";
 frase[1612] = "Eles serão felizes se o patrão os encontrar alertas, mesmo que chegue à meia-noite ou até mais tarde. (Lucas 12:38)";
 frase[1613] = "Porque chegarão os dias em que todos vão dizer: “Felizes as mulheres que nunca tiveram filhos, que nunca deram à luz e que nunca amamentaram!”(Lucas 23:29)";
 frase[1614] = "— Você creu porque me viu? — disse Jesus. — Felizes são os que não viram, mas assim mesmo creram! (João 20:29)";
 frase[1615] = "E como vocês estavam felizes! Eu posso afirmar que, se pudessem, vocês teriam arrancado os seus próprios olhos para me dar! O que foi que aconteceu?(Gálatas 4:15)";
 frase[1616] = "— Escutem! — diz Jesus. — Eu venho logo! Felizes os que obedecem às palavras proféticas deste livro! (Apocalipse 22:7)";
 frase[1617] = "Felizes são aqueles que não se deixam levar pelos conselhos dos maus, que não seguem o exemplo dos que não querem saber de Deus e que não se juntam com os que zombam de tudo o que é sagrado! (Salmos 1:1)";
 frase[1618] = "Portanto, obedeçam a todas as suas leis que eu lhes estou dando hoje. Assim vocês e os seus descendentes serão felizes e viverão muitos anos na terra que o Senhor, nosso Deus, lhes está dando para sempre. (Deuteronômio 4:40)";
 frase[1619] = "Obedeçam fielmente a todas essas leis que eu estou dando a vocês e façam tudo o que o Senhor, nosso Deus, acha bom e certo; assim vocês e os seus descendentes serão felizes para sempre. (Deuteronômio 12:28)";
 frase[1620] = "O povo de Judá e de Israel era tão numeroso como os grãos de areia da praia do mar; eles comiam, bebiam e eram muito felizes. (1Reis 4:20)";
 frase[1621] = "Queira Deus que de Jerusalém venha a vitória para Israel! Como ficarão felizes e alegres os descendentes de Jacó quando o Senhor fizer com que eles prosperem de novo! (Salmos 14:7)";
 frase[1622] = "Os pobres comerão da carne dos sacrifícios e ficarão satisfeitos; aqueles que adoram o Senhor o louvarão. Que sejam sempre prósperos e felizes! (Salmos 22:26)";
 frase[1623] = "Não deixes que os meus inimigos, aqueles mentirosos, se alegrem com a minha derrota! Não permitas que os que me odeiam sem motivo fiquem rindo, felizes, por causa da minha desgraça! (Salmos 35:19)";
 frase[1624] = "Queira Deus que de Jerusalém venha a vitória para Israel! Como ficarão felizes e alegres os descendentes de Jacó quando Deus os fizer prosperar de novo! (Salmos 53:6)";
 frase[1625] = "Como são felizes aqueles que tu escolhes, aqueles que trazes para viverem no teu Templo! Nós ficaremos contentes com as coisas boas da tua casa, com as bênçãos do teu santo Templo. (Salmos 65:4)";
 frase[1626] = "Ele dá aos abandonados um lar onde eles podem viver e solta os prisioneiros para que vivam livres e felizes. Mas os que se revoltam contra ele terão de morar numa terra deserta. (Salmos 68:6)";
 frase[1627] = "No entanto, o Senhor continua esperando porque ele quer ser bondoso e ter compaixão de vocês; pois ele é Deus que faz o que é direito. Felizes são aqueles que põem a sua esperança nele! (Isaías 30:18)";
 frase[1628] = "Espinheiros e mato crescerão na terra do meu povo. Chorem por causa da cidade que era tão alegre, por causa das casas que estavam cheias de pessoas felizes! (Isaías 32:13)";
 frase[1629] = "Aqueles a quem o Senhor salvar voltarão para casa, voltarão cantando para Jerusalém e ali viverão felizes para sempre. A alegria e a felicidade os acompanharão, e não haverá mais tristeza nem choro. (Isaías 35:10)";
 frase[1630] = "Aqueles a quem o Senhor salvar voltarão para casa, voltarão cantando para Jerusalém e ali viverão felizes para sempre. A alegria e a felicidade os acompanharão, e não haverá mais tristeza nem choro. (Isaías 51:11)";
 frase[1631] = "Se me obedecerem, eu serei uma fonte de alegria para vocês e farei com que vençam todas as dificuldades; e vocês serão felizes na terra que eu dei ao seu antepassado Jacó. Eu, o Senhor, falei.”(Isaías 58:14)";
 frase[1632] = "A vergonha e a desgraça que vocês passaram eram duas vezes mais do que mereciam; mas agora vocês viverão no seu país, onde receberão o dobro de riquezas e serão felizes para sempre. (Isaías 61:7)";
 frase[1633] = "Portanto, o Senhor Deus diz: “Aqueles que me servem terão comida e bebida, mas vocês passarão fome e sede; eles serão felizes, mas vocês serão humilhados;(Isaías 65:13)";
 frase[1634] = "Alegrem-se, fiquem felizes para sempre com aquilo que eu vou criar; pois vou encher de alegria a cidade de Jerusalém e vou dar muita felicidade ao seu povo. (Isaías 65:18)";
 frase[1635] = "O Senhor Deus diz: — Povo de Babilônia, vocês levaram todas as riquezas da minha nação. Vocês agora estão alegres e felizes, andando soltos como um bezerro no pasto ou rinchando como um cavalo bravo. (Jeremias 50:11)";
 frase[1636] = "É fácil notar que os orgulhosos são felizes, e a gente vê que tudo dá certo para os maus; quando põem o Senhor à prova, eles não são castigados.”(Malaquias 3:15)";
 frase[1637] = "— Felizes as pessoas que sofrem perseguições por fazerem a vontade de Deus, pois o Reino do Céu é delas. (Mateus 5:10)";
 frase[1638] = "Fiquem alegres e felizes, pois uma grande recompensa está guardada no céu para vocês. Porque foi assim mesmo que perseguiram os profetas que viveram antes de vocês. (Mateus 5:12)";
 frase[1639] = "Fiquem felizes e muito alegres quando isso acontecer, pois uma grande recompensa está guardada no céu para vocês. Pois os antepassados dessas pessoas fizeram essas mesmas coisas com os profetas. (Lucas 6:23)";
 frase[1640] = "Um dos que estavam à mesa ouviu isso e disse para Jesus: — Felizes os que irão sentar-se à mesa no Reino de Deus! (Lucas 14:15)";
 frase[1641] = "Não estamos querendo mandar na sua fé, pois vocês estão firmes na fé. Pelo contrário, queremos trabalhar com vocês para que vocês sejam mais felizes ainda. (2Coríntios 1:24)";
 frase[1642] = "E nós achamos que eles foram felizes por terem suportado o sofrimento com paciência. Vocês têm ouvido a respeito da paciência de Jó e sabem como no final Deus o abençoou. Porque o Senhor é cheio de bondade e de misericórdia. (Tiago 5:11)";
 frase[1643] = "Como dizem as Escrituras Sagradas: “Quem quiser gozar a vida e ter dias felizes não fale coisas más e não conte mentiras. (1Pedro 3:10)";
 frase[1644] = "Como vocês serão felizes se tiverem de sofrer por fazerem o que é certo! Não tenham medo de ninguém, nem fiquem preocupados. (1Pedro 3:14)";
 frase[1645] = "Vocês serão felizes se forem insultados por serem seguidores de Cristo, porque isso quer dizer que o glorioso Espírito de Deus veio sobre vocês. (1Pedro 4:14)";
 frase[1646] = "Os povos da terra ficarão felizes com a morte dessas duas testemunhas. Vão comemorar e mandar presentes uns aos outros porque esses dois profetas trouxeram muito sofrimento para a humanidade. (Apocalipse 11:10)";
 frase[1647] = "Fiquemos alegres e felizes! Louvemos a sua glória! Porque chegou a hora da festa de casamento do Cordeiro, e a noiva já se preparou para recebê-lo. (Apocalipse 19:7)";
 frase[1648] = "Então o anjo me disse: — Escreva isto: “Felizes os que foram convidados para a festa de casamento do Cordeiro!” E o anjo disse ainda: — São essas as verdadeiras palavras de Deus. (Apocalipse 19:9)";
 frase[1649] = "Felizes e abençoadas as pessoas que forem incluídas nessa primeira ressurreição, pois a segunda morte não tem poder sobre elas! Serão sacerdotes de Deus e de Cristo e reinarão com ele durante os mil anos. (Apocalipse 20:6)";
 frase[1650] = "Felizes as pessoas que lavam as suas roupas, pois assim terão o direito de comer a fruta da árvore da vida e de entrar na cidade pelos seus portões! (Apocalipse 22:14)";
 frase[1651] = "No oitavo dia Salomão mandou o povo para casa. Todos pediram as bênçãos de Deus para ele e foram embora, felizes por causa de todas as coisas boas que o Senhor Deus tinha dado ao seu servo Davi e ao seu povo de Israel. (1Reis 8:66)";
 frase[1652] = "No outro dia, o dia vinte e três do sétimo mês, o rei mandou o povo para casa. Todos foram embora felizes e alegres por causa de todas as coisas boas que o Senhor Deus tinha dado a Davi, a Salomão e ao seu povo de Israel. (2Crônicas 7:10)";
 frase[1653] = "Quando penso no passado, sinto dor no coração. Eu lembro quando ia com a multidão à casa de Deus. Eu guiava o povo, e todos íamos caminhando juntos, felizes, cantando e louvando a Deus. (Salmos 42:4)";
 frase[1654] = "Leve-me com você! Vamos depressa! Seja o meu rei e leve-me para o seu quarto. Ó rei, ficaremos alegres e felizes por sua causa e cantaremos o seu amor, que é mais agradável do que o vinho. Não é sem razão que o amam, ó rei! (Cântico dos Cânticos 1:4)";
 frase[1655] = "Mas vocês cantarão de alegria como fazem nas noites das festas sagradas; vocês ficarão felizes como os que, ao som da música de flautas, sobem o monte sagrado para adorar o Senhor, o forte protetor de Israel. (Isaías 30:29)";
 frase[1656] = "eu os levarei ao meu monte santo, e vocês ficarão felizes na minha casa de oração. Eu aceitarei os sacrifícios e as ofertas que vocês apresentarem no meu altar. Pois a minha casa será chamada de ‘Casa de Oração’ para todos os povos. (Isaías 56:7)";
 frase[1657] = "Felizes aqueles empregados que o patrão encontra acordados e preparados! Eu afirmo a vocês que isto é verdade: o próprio patrão se preparará para servi-los, mandará que se sentem à mesa e ele mesmo os servirá. (Lucas 12:37)";
 frase[1658] = "Em todas as cidades do reino onde foi lida a ordem do rei, os judeus ficaram felizes, e se alegraram, e comemoraram com festas e banquetes. Além disso, entre os vários povos do reino muitos se tornaram judeus, pois agora estavam com medo deles. (Ester 8:17)";
 frase[1659] = "Então ouvi uma voz do céu, que disse: — Escreva isto: felizes as pessoas que desde agora morrem no serviço do Senhor! — Sim, isso é verdade! — responde o Espírito de Deus. — Elas descansarão do seu duro trabalho porque levarão consigo o resultado dos seus serviços. (Apocalipse 14:13)";
 frase[1660] = "Não se preocupem com nada, mas em todas as orações peçam a Deus o que vocês precisam e orem sempre com o coração agradecido. (Filipenses 4:6)";
 frase[1661] = "Eles arriscaram a sua vida por mim. Sou muito agradecido a eles; e não somente eu, mas também todas as igrejas dos que não são judeus. (Romanos 16:4)";
 frase[1662] = "devolva-a ao dono antes do pôr do sol, para que a use como cobertor. Ele ficará agradecido, e você terá feito aquilo que o Senhor, nosso Deus, acha certo. (Deuteronômio 24:13)";
 frase[1663] = "O número de pessoas que um rei governa é muito grande; no entanto, quando deixa de ser rei, ninguém é agradecido pelo que ele fez. É tudo ilusão, é tudo como correr atrás do vento. (Eclesiastes 4:16)";
 frase[1664] = "Se eu agradeço a Deus o alimento que como, por que é que sou criticado, se já o agradeci a Deus?”(1Coríntios 10:30)";
 frase[1665] = "Agora, nosso Deus, nós te agradecemos e louvamos o teu nome glorioso. (1Crônicas 29:13)";
 frase[1666] = "Somos muito agradecidos por tudo aquilo que temos recebido em todas as ocasiões e em todos os lugares. (Atos 24:3)";
 frase[1667] = "Sempre que penso em vocês, eu agradeço ao meu Deus. (Filipenses 1:3)";
 frase[1668] = "Então eu te agradecerei em público; eu te louvarei no meio da multidão. (Salmos 35:18)";
 frase[1669] = "Que eles agradeçam ao Senhor o seu amor e as coisas maravilhosas que fez por eles! (Salmos 107:8)";
 frase[1670] = "Que eles agradeçam ao Senhor o seu amor e as coisas maravilhosas que fez por eles! (Salmos 107:15)";
 frase[1671] = "Que eles agradeçam ao Senhor o seu amor e as coisas maravilhosas que fez por eles! (Salmos 107:21)";
 frase[1672] = "Que eles agradeçam ao Senhor o seu amor e as coisas maravilhosas que fez por eles! (Salmos 107:31)";
 frase[1673] = "Ajoelhou-se aos pés de Jesus e lhe agradeceu. (Lucas 17:16)";
 frase[1674] = "Eu agradeço a Deus porque falo em línguas estranhas muito mais do que vocês. (1Coríntios 14:18)";
 frase[1675] = "Ó Senhor, aceita a minha oração de agradecimento e ensina-me os teus mandamentos! (Salmos 119:108)";
 frase[1676] = "Por acaso o empregado merece agradecimento porque obedeceu às suas ordens?(Lucas 17:9)";
 frase[1677] = "Eu sempre agradeço ao meu Deus por causa da graça que ele tem dado a vocês por meio de Cristo Jesus. (1Coríntios 1:4)";
 frase[1678] = "Mas agradeçamos a Deus, que nos dá a vitória por meio do nosso Senhor Jesus Cristo! (1Coríntios 15:57)";
 frase[1679] = "Agradeçamos a Deus o presente que ele nos dá, um presente que palavras não podem descrever. (2Coríntios 9:15)";
 frase[1680] = "não paro de agradecer a Deus por causa de vocês. Eu sempre lembro de vocês nas minhas orações. (Efésios 1:16)";
 frase[1681] = "Em nome do nosso Senhor Jesus Cristo, agradeçam sempre todas as coisas a Deus, o Pai. (Efésios 5:20)";
 frase[1682] = "E assim podemos dar graças a Deus por vocês. Agradecemos a alegria que temos diante do nosso Deus por causa de vocês. (1Tessalonicenses 3:9)";
 frase[1683] = "Meu caro Filemom, sempre que eu oro, lembro de você e agradeço ao meu Deus(Filemom 1:4)";
 frase[1684] = "Da mesma boca saem palavras tanto de agradecimento como de maldição. Meus irmãos, isso não deve ser assim. (Tiago 3:10)";
 frase[1685] = "O fariseu ficou de pé e orou sozinho, assim: “Ó Deus, eu te agradeço porque não sou avarento, nem desonesto, nem imoral como as outras pessoas. Agradeço-te também porque não sou como este cobrador de impostos. (Lucas 18:11)";
 frase[1686] = "Agradeço a Cristo Jesus, o nosso Senhor, que me tem dado forças para cumprir a minha missão. Eu lhe agradeço porque ele achou que eu era merecedor e porque me escolheu para servi-lo. (1Timóteo 1:12)";
 frase[1687] = "Por isso sejamos agradecidos, pois já recebemos um Reino que não pode ser abalado. Sejamos agradecidos e adoremos a Deus de um modo que o agrade, com respeito e temor. (Hebreus 12:28)";
 frase[1688] = "e sejam agradecidos a Deus em todas as ocasiões. Isso é o que Deus quer de vocês por estarem unidos com Cristo Jesus. (1Tessalonicenses 5:18)";
 frase[1689] = "E tudo o que vocês fizerem ou disserem, façam em nome do Senhor Jesus e por meio dele agradeçam a Deus, o Pai. (Colossenses 3:17)";
 frase[1690] = "E também não foram agradecidos à família de Gideão por tudo de bom que ele havia feito para o povo de Israel. (Juízes 8:35)";
 frase[1691] = "Agradeçam a Deus, o Senhor, anunciem a sua grandeza e contem às nações as coisas que ele fez. (1Crônicas 16:8)";
 frase[1692] = "eu lhe dava roupas quentes, feitas com a lã das minhas próprias ovelhas, e ele me agradecia do fundo do coração. (Jó 31:20)";
 frase[1693] = "Eu, porém, agradecerei a Deus a sua justiça e cantarei louvores ao Senhor, o Deus Altíssimo. (Salmos 7:17)";
 frase[1694] = "Agradeçam a Deus, o Senhor, anunciem a sua grandeza e contem às nações as coisas que ele fez. (Salmos 105:1)";
 frase[1695] = "Ó Senhor Deus, eu te agradeço de todo o coração; diante de todos os deuses eu canto hinos de louvor a ti. (Salmos 138:1)";
 frase[1696] = "No mundo dos mortos, ninguém te agradece, ninguém louva o teu nome; os que estão ali não confiam na tua fidelidade. (Isaías 38:18)";
 frase[1697] = "Então tiraram a pedra. Jesus olhou para o céu e disse: — Pai, eu te agradeço porque me ouviste. (João 11:41)";
 frase[1698] = "Tudo isso aconteceu para o bem de vocês, a fim de que a graça de Deus alcance um número cada vez maior de pessoas, e estas façam mais orações de agradecimento, para a glória de Deus. (2Coríntios 4:15)";
 frase[1699] = "Agradecemos muito a Deus porque pôs no coração de Tito o mesmo desejo que nós temos de ajudar vocês. (2Coríntios 8:16)";
 frase[1700] = "Ele fará com que vocês sejam sempre ricos para que possam dar com generosidade. E assim muitos agradecerão a Deus a oferta que vocês estão mandando por meio de nós. (2Coríntios 9:11)";
 frase[1701] = "Tudo o que Deus criou é bom, e, portanto, nada deve ser rejeitado. Que tudo seja recebido com uma oração de agradecimento(1Timóteo 4:4)";
 frase[1702] = "Todas as vezes que lembro de você nas minhas orações, de dia e de noite, eu agradeço a Deus, a quem sirvo com a consciência limpa, como também os meus antepassados serviram. (2Timóteo 1:3)";
 frase[1703] = "Usamos a língua tanto para agradecer ao Senhor e Pai como para amaldiçoar as pessoas, que foram criadas parecidas com Deus. (Tiago 3:9)";
 frase[1704] = "Se algum de vocês está sofrendo, ore. Se alguém está contente, cante hinos de agradecimento. (Tiago 5:13)";
 frase[1705] = "Mas, se alguém sofrer por ser cristão, não fique envergonhado, mas agradeça a Deus o fato de ser chamado por esse nome. (1Pedro 4:16)";
 frase[1706] = "Cada vez que os quatro seres vivos cantavam hinos de glória, honra e agradecimento ao que está sentado no trono e que vive para todo o sempre,(Apocalipse 4:9)";
 frase[1707] = "E que a paz que Cristo dá dirija vocês nas suas decisões, pois foi para essa paz que Deus os chamou a fim de formarem um só corpo. E sejam agradecidos. (Colossenses 3:15)";
 frase[1708] = "Além disso, com essa oferta de paz feita para agradecer a Deus, a pessoa oferecerá pão feito com fermento. (Levítico 7:13)";
 frase[1709] = "Deus foi bondoso com Ezequias, mas ele não lhe agradeceu, pois era orgulhoso. Por isso, Deus ficou irado com ele, com o povo de Judá e com os moradores de Jerusalém. (2Crônicas 32:25)";
 frase[1710] = "Desde a época do rei Davi e de Asafe, o músico, muito tempo atrás, os músicos haviam dirigido os hinos de louvor e de agradecimento a Deus. (Neemias 12:46)";
 frase[1711] = "Entrem pelos portões do Templo com ações de graças, entrem nos seus pátios com louvor. Louvem a Deus e sejam agradecidos a ele. (Salmos 100:4)";
 frase[1712] = "Naquela noite, Daniel teve uma visão, e nela Deus mostrou o que o sonho queria dizer. Então Daniel agradeceu a Deus,(Daniel 2:19)";
 frase[1713] = "Ó Deus dos meus antepassados, eu te agradeço e te louvo, pois me deste sabedoria e poder. Tu respondeste à nossa oração, nos mostrando o que o rei quer saber.”(Daniel 2:23)";
 frase[1714] = "Portanto, eu, o rei Nabucodonosor, agradeço ao Rei do céu e lhe dou louvor e glória. Tudo o que ele faz é certo e justo, e ele pode humilhar qualquer pessoa orgulhosa. (Daniel 4:37)";
 frase[1715] = "Naquela ocasião Jesus disse: — Ó Pai, Senhor do céu e da terra, eu te agradeço porque tens mostrado às pessoas sem instrução aquilo que escondeste dos sábios e dos instruídos! (Mateus 11:25)";
 frase[1716] = "Em seguida, pegou o cálice de vinho e agradeceu a Deus. Depois passou o cálice aos discípulos, dizendo: — Bebam todos vocês(Mateus 26:27)";
 frase[1717] = "Em seguida, pegou o cálice de vinho e agradeceu a Deus. Depois passou o cálice aos discípulos, e todos beberam do vinho. (Marcos 14:23)";
 frase[1718] = "Então ele deu um pulo, ficou de pé e começou a andar. Depois entrou no pátio do Templo com eles, andando, pulando e agradecendo a Deus. (Atos 3:8)";
 frase[1719] = "Eles sabem quem Deus é, mas não lhe dão a glória que ele merece e não lhe são agradecidos. Pelo contrário, os seus pensamentos se tornaram tolos, e a sua mente vazia está coberta de escuridão. (Romanos 1:21)";
 frase[1720] = "Se você dá graças a Deus em línguas estranhas, como é que uma pessoa simples, que estiver na reunião, poderá dizer “amém” à oração de agradecimento que você fez? Ela não vai conseguir entender nada do que você está dizendo. (1Coríntios 14:16)";
 frase[1721] = "enquanto vocês nos ajudam, orando por nós. Assim Deus responderá às muitas orações feitas em nosso favor e nos abençoará; e muitos lhe agradecerão as bênçãos que ele nos dará. (2Coríntios 1:11)";
 frase[1722] = "Agradeçamos ao Deus e Pai do nosso Senhor Jesus Cristo, pois ele nos tem abençoado por estarmos unidos com Cristo, dando-nos todos os dons espirituais do mundo celestial. (Efésios 1:3)";
 frase[1723] = "E agradeçam, com alegria, ao Pai, que os tornou capazes de participar daquilo que ele guardou no Reino da luz para o seu povo. (Colossenses 1:12)";
 frase[1724] = "Uns cantavam louvores e agradeciam ao Senhor, e os outros respondiam. Eles diziam: “O Senhor é bom, e o seu amor pelo povo de Israel dura para sempre!” E todo o povo gritava bem alto e louvava o Senhor porque a construção do seu novo Templo já havia começado. (Esdras 3:11)";
 frase[1725] = "O rei disse: — Depois de passados os sete anos, eu olhei para o céu, e o meu juízo voltou. Aí agradeci ao Deus Altíssimo e dei louvor e glória àquele que vive para sempre. Eu disse: “O poder do Altíssimo é eterno; o seu reino não terá fim. (Daniel 4:34)";
 frase[1726] = "Os irmãos de Roma tinham recebido a notícia da nossa chegada e foram se encontrar conosco nos povoados de Praça de Ápio e de Três Vendas. Ao ver esses irmãos, Paulo agradeceu a Deus e se animou. (Atos 28:15)";
 frase[1727] = "Quem dá mais valor a certo dia faz isso para honrar o Senhor. E também quem come de tudo faz isso para honrar o Senhor, pois agradece a Deus o alimento. E quem evita comer certas coisas faz isso para honrar o Senhor e dá graças a Deus. (Romanos 14:6)";
 frase[1728] = "Essas pessoas ensinam que é errado casar e que é errado comer certos alimentos. Mas Deus criou esses alimentos para que aqueles que creem e conhecem a verdade os comam depois de terem feito uma oração de agradecimento. (1Timóteo 4:3)";
 frase[1729] = "Os seis filhos de Jedutum: Gedalias, Zeri, Jesaías, Simei, Hasabias e Matitias. Dirigidos pelo seu pai, eles anunciavam a mensagem de Deus, acompanhados por música de liras, e cantavam louvores e agradecimentos a Deus, o Senhor. (1Crônicas 25:3)";
 frase[1730] = "Matanias, filho de Mica e neto de Zabdi, descendente de Asafe. Ele dirigia o coro do Templo no cântico da oração de agradecimento; Baquebuquias, que era o ajudante de Matanias; Abda, filho de Samua e neto de Galal, que era descendente de Jedutum. (Neemias 11:17)";
 frase[1731] = "Naquele momento, pelo poder do Espírito Santo, Jesus ficou muito alegre e disse: — Ó Pai, Senhor do céu e da terra, eu te agradeço porque tens mostrado às pessoas sem instrução aquilo que escondeste dos sábios e dos instruídos. Sim, ó Pai, tu tiveste prazer em fazer isso. (Lucas 10:21)";
 frase[1732] = "Se é assim, onde está a minha esperança? Há alguém que possa ver esperança para mim?(Jó 17:15)";
 frase[1733] = "Mas a esperança volta quando penso no seguinte:(Lamentações 3:21)";
 frase[1734] = "Devemos nos curvar, humildes, pois ainda pode haver esperança. (Lamentações 3:29)";
 frase[1735] = "E todos os povos vão pôr nele a sua esperança.”(Mateus 12:21)";
 frase[1736] = "E, porque temos essa esperança, agimos com toda a confiança. (2Coríntios 3:12)";
 frase[1737] = "Quando o perverso morre, a sua esperança morre com ele; a esperança dos maus dá em nada. (Provérbios 11:7)";
 frase[1738] = "Quem ama nunca desiste, porém suporta tudo com fé, esperança e paciência. (1Coríntios 13:7)";
 frase[1739] = "a paciência traz a aprovação de Deus, e essa aprovação cria a esperança. (Romanos 5:4)";
 frase[1740] = "Deus dá esperança aos fracos e tapa a boca dos maus. (Jó 5:16)";
 frase[1741] = "Onde estão as minhas forças para resistir? Por que viver, se não há esperança?(Jó 6:11)";
 frase[1742] = "Aquelas que vêm de Temá e de Sabá procuram esses ribeirões, cheias de esperança,(Jó 6:19)";
 frase[1743] = "porém, quando chegam, todos ficam desapontados, e a sua esperança morre ali. (Jó 6:20)";
 frase[1744] = "Assim acontece com os que esquecem de Deus; assim dá em nada a esperança dos maus. (Jó 8:13)";
 frase[1745] = "Você viverá seguro e cheio de esperança; Deus o protegerá, e você dormirá tranquilo. (Jó 11:18)";
 frase[1746] = "“Para uma árvore há esperança; se for cortada, brota de novo e torna a viver. (Jó 14:7)";
 frase[1747] = "Que esperança terão os ateus quando Deus lhes tirar a vida?(Jó 27:8)";
 frase[1748] = "Eu sorria para aqueles que tinham perdido a esperança; o meu rosto alegre lhes dava coragem. (Jó 29:24)";
 frase[1749] = "Os pobres não serão esquecidos para sempre, e os necessitados não perderão para sempre a esperança. (Salmos 9:18)";
 frase[1750] = "Sejam fortes e tenham coragem, todos vocês que põem a sua esperança em Deus, o Senhor! (Salmos 31:24)";
 frase[1751] = "Ele fica perto dos que estão desanimados e salva os que perderam a esperança. (Salmos 34:18)";
 frase[1752] = "E agora, Senhor, o que posso esperar? A minha esperança está em ti. (Salmos 39:7)";
 frase[1753] = "Somente em Deus eu encontro paz e nele ponho a minha esperança. (Salmos 62:5)";
 frase[1754] = "Ó Senhor, meu Deus, em ti ponho a minha esperança; desde jovem tenho confiado em ti. (Salmos 71:5)";
 frase[1755] = "Eu sempre porei a minha esperança em ti e te louvarei mais e mais. (Salmos 71:14)";
 frase[1756] = "Estavam com fome e com sede e haviam perdido toda a esperança. (Salmos 107:5)";
 frase[1757] = "Ajuda-me a falar sempre a verdade, pois a minha esperança está nos teus julgamentos. (Salmos 119:43)";
 frase[1758] = "Povo de Israel, ponha a sua esperança em Deus, o Senhor, agora e sempre! (Salmos 131:3)";
 frase[1759] = "mas, sim, as pessoas que o temem e põem a sua esperança no seu amor. (Salmos 147:11)";
 frase[1760] = "A esperança dos bons traz alegria, mas os planos dos maus dão em nada. (Provérbios 10:28)";
 frase[1761] = "Assim, o seu futuro será brilhante, e você não perderá a esperança. (Provérbios 23:18)";
 frase[1762] = "Há mais esperança para um tolo do que para uma pessoa que fala sem pensar. (Provérbios 29:20)";
 frase[1763] = "Ele se escondeu do seu povo, mas eu confio nele e nele ponho a minha esperança. (Isaías 8:17)";
 frase[1764] = "Não tenho muito tempo de vida, e a minha esperança no Senhor acabou. (Lamentações 3:18)";
 frase[1765] = "O melhor é ter esperança e aguardar em silêncio a ajuda do Senhor. (Lamentações 3:26)";
 frase[1766] = "com a esperança de que eu mesmo seja ressuscitado da morte para a vida. (Filipenses 3:11)";
 frase[1767] = "Que Deus, que nos dá essa esperança, encha vocês de alegria e de paz, por meio da fé que vocês têm nele, a fim de que a esperança de vocês aumente pelo poder do Espírito Santo! (Romanos 15:13)";
 frase[1768] = "Abraão teve fé e esperança, mesmo quando não havia motivo para ter esperança, e por isso ele se tornou “o pai de muitas nações”. Como dizem as Escrituras: “Os seus descendentes serão muitos.”(Romanos 4:18)";
 frase[1769] = "Pois foi por meio da esperança que fomos salvos. Mas, se já estamos vendo aquilo que esperamos, então isso não é mais uma esperança. Pois quem é que fica esperando por alguma coisa que está vendo?(Romanos 8:24)";
 frase[1770] = "Portanto, agora existem estas três coisas: a fé, a esperança e o amor. Porém a maior delas é o amor. (1Coríntios 13:13)";
 frase[1771] = "Que a esperança que vocês têm os mantenha alegres; aguentem com paciência os sofrimentos e orem sempre. (Romanos 12:12)";
 frase[1772] = "O seu temor a Deus não lhe dá confiança? A sua vida correta não o enche de esperança?(Jó 4:6)";
 frase[1773] = "Os meus dias passam mais depressa do que a lançadeira do tecelão e vão embora sem deixar esperança. (Jó 7:6)";
 frase[1774] = "Não tenho mais esperança, pois Deus me matará; mas assim mesmo defenderei a minha causa diante dele. (Jó 13:15)";
 frase[1775] = "Ele não tem esperança de escapar da escuridão da morte, pois um punhal está pronto para matá-lo. (Jó 15:22)";
 frase[1776] = "Ele me atacou por todos os lados até acabar comigo e arrancou pelas raízes a minha esperança. (Jó 19:10)";
 frase[1777] = "Nós pomos a nossa esperança em Deus, o Senhor; ele é a nossa ajuda e o nosso escudo. (Salmos 33:20)";
 frase[1778] = "Ó Senhor Deus, que o teu amor nos acompanhe, pois nós pomos em ti a nossa esperança! (Salmos 33:22)";
 frase[1779] = "Apesar disso, eu ponho a minha esperança em ti, ó Senhor; tu, Senhor meu Deus, me responderás. (Salmos 38:15)";
 frase[1780] = "Lembra da promessa que fizeste a mim, este teu servo, a promessa que tem sido a minha esperança. (Salmos 119:49)";
 frase[1781] = "Aqueles que te temem se alegram quando me veem porque a minha esperança está na tua palavra. (Salmos 119:74)";
 frase[1782] = "Ó Deus, estou aflito, esperando que tu me livres dos meus inimigos; eu ponho a minha esperança na tua palavra. (Salmos 119:81)";
 frase[1783] = "Tu és o meu esconderijo e o meu escudo; eu ponho a minha esperança na tua promessa. (Salmos 119:114)";
 frase[1784] = "Dá-me forças, como prometeste, e eu continuarei vivo; não permitas que eu fique desiludido com a minha esperança. (Salmos 119:116)";
 frase[1785] = "Antes do nascer do sol, eu clamo pedindo ajuda, pois a minha esperança está na tua promessa. (Salmos 119:147)";
 frase[1786] = "Todos os seres vivos olham para ele com esperança, e ele dá alimento a todos no tempo certo. (Salmos 145:15)";
 frase[1787] = "Feliz aquele que recebe ajuda do Deus de Jacó, aquele que põe a sua esperança no Senhor, seu Deus,(Salmos 146:5)";
 frase[1788] = "A esperança adiada faz o coração ficar doente, mas o desejo realizado enche o coração de vida. (Provérbios 13:12)";
 frase[1789] = "A vontade de viver mantém a vida de um doente, mas, se ele desanima, não existe mais esperança. (Provérbios 18:14)";
 frase[1790] = "Não existe ninguém para cuidar de você. Não há remédio para as suas feridas, não há esperança de cura. (Jeremias 30:13)";
 frase[1791] = "Há esperança para você no futuro; os seus filhos voltarão para casa. Sou eu, o Senhor, quem está falando. (Jeremias 31:17)";
 frase[1792] = "Eu e os meus acusadores temos esta mesma esperança em Deus: todos vão ressuscitar, tanto os bons como os maus. (Atos 24:15)";
 frase[1793] = "E agora estou aqui sendo julgado porque tenho esperança na promessa que Deus fez aos nossos antepassados. (Atos 26:6)";
 frase[1794] = "Se a nossa esperança em Cristo só vale para esta vida, nós somos as pessoas mais infelizes deste mundo. (1Coríntios 15:19)";
 frase[1795] = "Portanto, digo que nós , que fomos os primeiros a pôr a nossa esperança em Cristo, louvemos a glória de Deus. (Efésios 1:12)";
 frase[1796] = "Há um só corpo, e um só Espírito, e uma só esperança, para a qual Deus chamou vocês. (Efésios 4:4)";
 frase[1797] = "Eu, Paulo, apóstolo de Cristo Jesus por ordem de Deus, o nosso Salvador, e de Cristo Jesus, a nossa esperança,(1Timóteo 1:1)";
 frase[1798] = "Guardemos firmemente a esperança da fé que professamos, pois podemos confiar que Deus cumprirá as suas promessas. (Hebreus 10:23)";
 frase[1799] = "E todo aquele que tem essa esperança em Cristo purifica-se a si mesmo, assim como Cristo é puro. (1João 3:3)";
 frase[1800] = "Só eu conheço os planos que tenho para vocês: prosperidade e não desgraça e um futuro cheio de esperança. Sou eu, o Senhor, quem está falando. (Jeremias 29:11)";
 frase[1801] = "Essa esperança não nos deixa decepcionados, pois Deus derramou o seu amor no nosso coração, por meio do Espírito Santo, que ele nos deu. (Romanos 5:5)";
 frase[1802] = "Porém os maus olharão em redor desesperados e não acharão lugar para onde fugir; para eles a morte será a única esperança.”(Jó 11:20)";
 frase[1803] = "e assim como as águas escavam as pedras, e as correntezas levam a terra, assim tu acabas com aesperança do ser humano. (Jó 14:19)";
 frase[1804] = "Ponham a sua esperança no Senhor e obedeçam aos seus mandamentos. Ele lhes dará a honra de possuírem a Terra Prometida, e vocês verão os maus serem destruídos. (Salmos 37:34)";
 frase[1805] = "Os maus veem isso e ficam com raiva; olham com ódio e se acabam. A esperança dos maus dá em nada. (Salmos 112:10)";
 frase[1806] = "Povo de Israel, ponha a sua esperança em Deus, o Senhor, porque o seu amor é fiel, e ele sempre está disposto a salvar. (Salmos 130:7)";
 frase[1807] = "assim também a sabedoria é boa para a sua alma. Se você a conseguir, terá um bom futuro e não perderá aesperança. (Provérbios 24:14)";
 frase[1808] = "Mas, enquanto se vive neste mundo, existe alguma esperança; porque é melhor ser um cão vivo do que um leão morto. (Eclesiastes 9:4)";
 frase[1809] = "Ó Senhor, nós seguimos o caminho das tuas leis e em ti pomos a nossa esperança; o nosso maior desejo é conhecer-te e pensar em ti. (Isaías 26:8)";
 frase[1810] = "O Senhor me disse: — Homem mortal, o povo de Israel é como esses ossos. Dizem que estão secos, sem esperança e sem futuro. (Ezequiel 37:11)";
 frase[1811] = "Eu, porém, ponho a minha esperança em Deus, o Senhor, e confio firmemente que ele me salvará. O meu Deus me atenderá. (Miqueias 7:7)";
 frase[1812] = "Prisioneiros, voltem para a sua fortaleza; voltem todos os que ainda têm esperança. Pois vou lhes dar duas vezes mais bênçãos do que os castigos que vocês receberam. (Zacarias 9:12)";
 frase[1813] = "E a nossa esperança era que fosse ele quem iria libertar o povo de Israel. Porém já faz três dias que tudo isso aconteceu. (Lucas 24:21)";
 frase[1814] = "Por isso o meu coração está feliz, e as minhas palavras são palavras de alegria; e eu, um ser mortal, vou descansar cheio de esperança,(Atos 2:26)";
 frase[1815] = "Durante muitos dias não pudemos ver o sol nem as estrelas, e o vento continuava soprando forte. Finalmente perdemos toda a esperança de nos salvarmos. (Atos 27:20)";
 frase[1816] = "Pois o Universo se tornou inútil, não pela sua própria vontade, mas porque Deus quis que fosse assim. Porém existe esta esperança:(Romanos 8:20)";
 frase[1817] = "E também Isaías diz: “Virá um descendente do rei Davi, filho de Jessé; ele aparecerá para governar os que não são judeus, e eles terão esperança nele.”(Romanos 15:12)";
 frase[1818] = "Irmãos, queremos que vocês saibam a verdade a respeito dos que já morreram, para que não fiquem tristes como ficam aqueles que não têm esperança. (1Tessalonicenses 4:13)";
 frase[1819] = "É por isso que lutamos e trabalhamos muito, pois temos posto a nossa esperança no Deus vivo, que é o Salvador de todos, especialmente dos que creem. (1Timóteo 4:10)";
 frase[1820] = "A verdadeira viúva, aquela que não tem ninguém para cuidar dela, põe a sua esperança em Deus e ora, de dia e de noite, pedindo a ajuda dele. (1Timóteo 5:5)";
 frase[1821] = "que se baseia na esperança de recebermos a vida eterna. Deus, que não mente, nos prometeu essa vida, antes da criação do mundo,(Tito 1:2)";
 frase[1822] = "Pois a lei não podia aperfeiçoar nada. Mas agora Deus nos deu uma esperança melhor, por meio da qual chegamos perto dele. (Hebreus 7:19)";
 frase[1823] = "Portanto, estejam prontos para agir. Continuem alertas e ponham toda a sua esperança na bênção que será dada a vocês quando Jesus Cristo for revelado. (1Pedro 1:13)";
 frase[1824] = "Por meio dele vocês creem em Deus, que o ressuscitou e lhe deu glória. Assim a fé e a esperança que vocês têm estão firmadas em Deus. (1Pedro 1:21)";
 frase[1825] = "Quando foi insultado, não respondeu com insultos. Quando sofreu, não ameaçou, mas pôs a sua esperançaem Deus, o justo Juiz. (1Pedro 2:23)";
 frase[1826] = "Aos que têm riquezas neste mundo ordene que não sejam orgulhosos e que não ponham a sua esperança nessas riquezas, pois elas não dão segurança nenhuma. Que eles ponham a sua esperança em Deus, que nos dá todas as coisas em grande quantidade, para o nosso prazer! (1Timóteo 6:17)";
 frase[1827] = "Voltem para casa porque já estou muito velha para casar de novo. Pois, ainda que eu tivesse esperança de casar outra vez ou mesmo que casasse esta noite e chegasse a ter filhos,(Rute 1:12)";
 frase[1828] = "Deixarei vivo apenas um dos seus descendentes, que será meu sacerdote. Mas ele ficará cego e perderá toda a esperança. E todos os seus outros descendentes morrerão de morte violenta. (1Samuel 2:33)";
 frase[1829] = "Ó rei, eu vim falar com o senhor agora porque o povo me ameaçou. Aí eu pensei: “Vou falar com o rei, pois tenho a esperança de que ele atenda o meu pedido.”(2Samuel 14:15)";
 frase[1830] = "Então Secanias, filho de Jeiel, da família de Elão, disse a Esdras: — Nós pecamos contra o nosso Deus, casando com mulheres estrangeiras de nações pagãs. Porém mesmo assim ainda há esperança para o povo de Israel. (Esdras 10:2)";
 frase[1831] = "Por que estou tão triste? Por que estou tão aflito? Eu porei a minha esperança em Deus e ainda o louvarei. Ele é o meu Salvador e o meu Deus. (Salmos 42:5)";
 frase[1832] = "Por que estou tão triste? Por que estou tão aflito? Eu porei a minha esperança em Deus e ainda o louvarei. Ele é o meu Salvador e o meu Deus. (Salmos 42:11)";
 frase[1833] = "Por que estou tão triste? Por que estou tão aflito? Eu porei a minha esperança em Deus e ainda o louvarei. Ele é o meu Salvador e o meu Deus. (Salmos 43:5)";
 frase[1834] = "Ó Deus, tu nos respondes, dando-nos a vitória, e fazes coisas maravilhosas para nos salvar. Os povos do mundo inteiro, até os dos mares distantes, põem a sua esperança em ti. (Salmos 65:5)";
 frase[1835] = "Naquele dia, todos dirão: — Ele é o nosso Deus. Nós pusemos a nossa esperança nele, e ele nos salvou. Ele é o Senhor, e nós confiamos nele. Vamos cantar e nos alegrar porque ele nos socorreu. (Isaías 25:9)";
 frase[1836] = "No entanto, o Senhor continua esperando porque ele quer ser bondoso e ter compaixão de vocês; pois ele é Deus que faz o que é direito. Felizes são aqueles que põem a sua esperança nele! (Isaías 30:18)";
 frase[1837] = "Escutem, vocês que temem o Senhor e obedecem às ordens do seu servo: se o caminho em que andam é escuro, sem nenhum raio de luz, confiem no Senhor, ponham a sua esperança no seu Deus. (Isaías 50:10)";
 frase[1838] = "Pois o Altíssimo, o Santo Deus, o Deus que vive para sempre, diz: “Eu moro num lugar alto e sagrado, mas moro também com os humildes e os aflitos, para dar esperança aos humildes e aos aflitos, novas forças. (Isaías 57:15)";
 frase[1839] = "Nenhum dos ídolos das nações pode fazer chover, nem o céu pode fazer cair chuva. Pusemos a nossa esperança em ti, ó Senhor, nosso Deus, pois tu és aquele que faz todas estas coisas.”(Jeremias 14:22)";
 frase[1840] = "Ó Senhor Deus, tu és a esperança do povo de Israel; todos os que te abandonam serão humilhados. Desaparecerão como nomes escritos na areia porque abandonaram a ti, o Senhor, a fonte de água fresca. (Jeremias 17:13)";
 frase[1841] = "Jerusalém querida, o que posso lhe dizer? Como posso consolar você? Nunca ninguém sofreu assim; a sua desgraça é tão grande como o mar. Quem poderá lhe dar esperança?(Lamentações 2:13)";
 frase[1842] = "Ali, eu devolverei a ela as suas plantações de uvas e transformarei o vale da Desgraça em uma porta de esperança. Então ela falará comigo como fazia no tempo em que era moça, quando saiu do Egito. (Oseias 2:15)";
 frase[1843] = "Quando os moradores da cidade de Asquelom souberem disso, ficarão com medo. O povo de Gaza também vai sofrer muito, e o povo de Ecrom perderá toda a esperança. O rei de Gaza morrerá, e Asquelom ficará sem moradores. (Zacarias 9:5)";
 frase[1844] = "Todas as tribos do nosso povo, que adoram a Deus dia e noite, também esperam ver o cumprimento dessa promessa. É por causa dessa esperança, ó rei, que estou sendo acusado pelos judeus. (Atos 26:7)";
 frase[1845] = "Foi Cristo quem nos deu, por meio da nossa fé, esta vida na graça de Deus. E agora continuamos firmes nessa graça e nos alegramos na esperança de participar da glória de Deus. (Romanos 5:2)";
 frase[1846] = "Porque tudo o que está nas Escrituras foi escrito para nos ensinar, a fim de que tenhamos esperança por meio da paciência e da coragem que as Escrituras nos dão. (Romanos 15:4)";
 frase[1847] = "Ou foi a nosso respeito que ele disse isso? É claro que isso está escrito em nosso favor! Tanto a pessoa que planta como a que colhe fazem o seu trabalho na esperança de receber a sua parte da colheita. (1Coríntios 9:10)";
 frase[1848] = "Desse modo a esperança que temos em vocês está firme. Pois sabemos que, assim como vocês tomam parte nos nossos sofrimentos, assim também recebem a ajuda que Deus dá. (2Coríntios 1:7)";
 frase[1849] = "Irmãos, queremos que saibam das aflições pelas quais passamos na província da Ásia. Os sofrimentos que suportamos foram tão grandes e tão duros, que já não tínhamos mais esperança de escapar de lá com vida. (2Coríntios 1:8)";
 frase[1850] = "Ele nos salvou e continuará a nos salvar desses terríveis perigos de morte. Sim, nós temos posto nele a nossa esperança, na certeza de que ele continuará a nos salvar,(2Coríntios 1:10)";
 frase[1851] = "Mas nós temos a esperança de que Deus nos aceitará, e é isso o que esperamos pelo poder do Espírito de Deus, que age por meio da nossa fé. (Gálatas 5:5)";
 frase[1852] = "Peço que Deus abra a mente de vocês para que vejam a luz dele e conheçam a esperança para a qual ele os chamou. E também para que saibam como são maravilhosas as bênçãos que ele prometeu ao seu povo(Efésios 1:18)";
 frase[1853] = "Pois lembramos, na presença do nosso Deus e Pai, como vocês puseram em prática a sua fé, como o amor de vocês os fez trabalhar tanto e como é firme a esperança que vocês têm no nosso Senhor Jesus Cristo. (1Tessalonicenses 1:3)";
 frase[1854] = "Afinal, quando o nosso Senhor Jesus vier, vocês e ninguém mais são de modo todo especial a nossa esperança, a nossa alegria e o nosso motivo de satisfação, diante dele, pela nossa vitória. (1Tessalonicenses 2:19)";
 frase[1855] = "Mas nós, que somos do dia, devemos estar em nosso perfeito juízo. Nós devemos usar a fé e o amor como couraça e a nossa esperança de salvação como capacete. (1Tessalonicenses 5:8)";
 frase[1856] = "Que o próprio Jesus Cristo, o nosso Senhor, e Deus, o nosso Pai, que nos ama e que na sua bondade nos dá uma coragem que não acaba e uma esperança firme,(2Tessalonicenses 2:16)";
 frase[1857] = "Portanto, há duas coisas que não podem ser mudadas, e a respeito delas Deus não pode mentir. E assim nós, que encontramos segurança nele, nos sentimos muito encorajados a nos manter firmes na esperançaque nos foi dada. (Hebreus 6:18)";
 frase[1858] = "Essa esperança mantém segura e firme a nossa vida, assim como a âncora mantém seguro o barco. Ela passa pela cortina do templo do céu e entra no Lugar Santíssimo celestial. (Hebreus 6:19)";
 frase[1859] = "Louvemos ao Deus e Pai do nosso Senhor Jesus Cristo! Por causa da sua grande misericórdia, ele nos deu uma nova vida pela ressurreição de Jesus Cristo. Por isso o nosso coração está cheio de uma esperançaviva. (1Pedro 1:3)";
 frase[1860] = "Porque era assim que costumavam se enfeitar as mulheres do passado, as mulheres que eram dedicadas a Deus e que punham a sua esperança nele. Elas eram obedientes ao seu marido. (1Pedro 3:5)";
 frase[1861] = "Tenham no coração de vocês respeito por Cristo e o tratem como Senhor. Estejam sempre prontos para responder a qualquer pessoa que pedir que expliquem a esperança que vocês têm. (1Pedro 3:15)";
 frase[1862] = "E agora todos os meus parentes ficaram contra mim. Estão exigindo que eu entregue a eles o meu filho porque querem matá-lo, pois ele matou o seu irmão. Se fizerem isso, eu ficarei sem nenhum filho. Eles vão destruir a minha última esperança e vão deixar o meu marido sem nenhum filho para manter vivo o seu nome. (2Samuel 14:7)";
 frase[1863] = "Mas Abisai, cuja mãe era Zeruia, socorreu Davi, atacou o filisteu e o matou. Então os soldados de Davi fizeram a promessa de nunca mais deixar que Davi saísse com eles para a guerra. Eles disseram: — O senhor é a esperança de Israel, e nós não queremos perdê-lo. (2Samuel 21:17)";
 frase[1864] = "Tu és a única esperança do povo de Israel, tu és aquele que nos salva quando estamos em dificuldades. Por que é que tens de ser como um estrangeiro em nossa terra ou como um viajante que só pousa uma noite?(Jeremias 14:8)";
 frase[1865] = "Porém a pessoa que não põe a sua esperança nas coisas que faz, mas simplesmente crê em Deus, é a fé dessa pessoa que faz com que ela seja aceita por Deus, o Deus que trata o culpado como se ele fosse inocente. (Romanos 4:5)";
 frase[1866] = "Naquele tempo vocês estavam separados de Cristo; eram estrangeiros e não pertenciam ao povo escolhido de Deus. Não tinham parte nas suas alianças , que eram baseadas nas promessas de Deus para o seu povo. E neste mundo viviam sem esperança e sem Deus. (Efésios 2:12)";
 frase[1867] = "O meu grande desejo e a minha esperança são de nunca falhar no meu dever, para que, sempre e agora ainda mais, eu tenha muita coragem. E assim, em tudo o que eu disser e fizer, tanto na vida como na morte, eu poderei levar outros a reconhecerem a grandeza de Cristo. (Filipenses 1:20)";
 frase[1868] = "Quando a verdadeira mensagem, a boa notícia do evangelho, chegou a vocês pela primeira vez, vocês ouviram falar a respeito da esperança que o evangelho oferece. Por isso, a fé e o amor que vocês têm são baseados naquilo que esperam e que está guardado para vocês no céu. (Colossenses 1:5)";
 frase[1869] = "Mas é preciso que vocês continuem fiéis, firmados sobre um alicerce seguro, sem se afastar da esperança que receberam quando ouviram a boa notícia do evangelho. Foi desse evangelho que eu, Paulo, me tornei servo, e é esse evangelho que tem sido anunciado no mundo inteiro. (Colossenses 1:23)";
 frase[1870] = "O plano de Deus é fazer com que o seu povo conheça esse maravilhoso e glorioso segredo que ele tem para revelar a todos os povos. E o segredo é este: Cristo está em vocês, o que lhes dá a firme esperança de que vocês tomarão parte na glória de Deus. (Colossenses 1:27)";
 frase[1871] = "“A minha vida vai passando; os meus planos fracassaram, e as esperanças do meu coração se foram. (Jó 17:11)";
 frase[1872] = "Os maus fazem com que fracassem as esperanças dos necessitados, mas estes são protegidos pelo Senhor. (Salmos 14:6)";
 frase[1873] = "A leoa viu que as suas esperanças estavam perdidas. Aí criou outro filhote , e ele se tornou um leão feroz. (Ezequiel 19:5)";
 frase[1874] = "As esperanças do povo começaram a aumentar, e eles pensavam que talvez João fosse o Messias. (Lucas 3:15)";
 frase[1875] = "Ó Senhor Deus, responde-me depressa, pois já perdi todas as esperanças! Não te escondas de mim para que eu não seja como aqueles que descem ao mundo dos mortos. (Salmos 143:7)";
 frase[1876] = "O Senhor Todo-Poderoso diz ao povo de Jerusalém: — Não escutem o que os profetas dizem, pois eles estão iludindo vocês com falsas esperanças. Dizem coisas que eles mesmos inventam e não aquilo que eu falei. (Jeremias 23:16)";
 frase[1877] = "O rei chorará, o príncipe perderá as esperanças, e o povo tremerá de medo. Eu castigarei vocês por tudo o que fizeram e os julgarei do modo como vocês julgaram os outros. Isso mostrará que eu sou o Senhor. (Ezequiel 7:27)";
 frase[1878] = "Eu me sentirei orgulhoso quando ouvir você falar com sabedoria. (Provérbios 23:16)";
 frase[1879] = "Quem ama é paciente e bondoso. Quem ama não é ciumento, nem orgulhoso, nem vaidoso. (1Coríntios 13:4)";
 frase[1880] = "Você ainda continua orgulhoso e não quer deixar o meu povo ir. (Êxodo 9:17)";
 frase[1881] = "O seu olhar é orgulhoso, e o seu coração é egoísta. (Jó 15:27)";
 frase[1882] = "O orgulhoso será logo humilhado; mas com os humildes está a sabedoria. (Provérbios 11:2)";
 frase[1883] = "O orgulhoso acaba sendo humilhado, mas quem é humilde será respeitado. (Provérbios 29:23)";
 frase[1884] = "Isso quer dizer que ninguém pode ficar orgulhoso, pois sabe que está sendo visto por Deus. (1Coríntios 1:29)";
 frase[1885] = "O tolo orgulhoso sofre por causa das coisas que diz, mas os sábios são protegidos pelas suas próprias palavras. (Provérbios 14:3)";
 frase[1886] = "Se você tem sido bastante tolo para ser orgulhoso e planejar o mal, então pare e pense:(Provérbios 30:32)";
 frase[1887] = "Vocês nunca mais verão aquele povo orgulhoso, aquela gente que fala uma língua estranha, uma língua difícil que ninguém entende. (Isaías 33:19)";
 frase[1888] = "Temos ouvido falar do orgulho de Moabe. Esse povo é orgulhoso, soberbo, vaidoso e cheio de si. (Jeremias 48:29)";
 frase[1889] = "Se levanto a cabeça, orgulhoso da minha inocência, tu, como um leão, me persegues; e até fazes milagres para me destruir. (Jó 10:16)";
 frase[1890] = "O rei do Egito ficará muito orgulhoso por ter derrotado os sírios e por ter matado tantos soldados. Mas o seu poder durará pouco. (Daniel 11:12)";
 frase[1891] = "Eu não tenho o direito de ficar orgulhoso por anunciar o evangelho. Afinal de contas, fazer isso é minha obrigação. Ai de mim se não anunciar o evangelho! (1Coríntios 9:16)";
 frase[1892] = "Mas, para que não ficasse orgulhoso demais por causa das coisas maravilhosas que vi, eu recebi uma doença dolorosa, que é como um espinho no meu corpo. Ela veio como um mensageiro de Satanás para me dar bofetadas e impedir que eu ficasse orgulhoso. (2Coríntios 12:7)";
 frase[1893] = "“Rúben, você é o meu filho mais velho. Você é a minha força, o primeiro fruto do meu vigor, o mais orgulhosoe o mais forte dos meus filhos. (Gênesis 49:3)";
 frase[1894] = "Olho para o futuro e vejo o povo de Israel. Um rei, como uma estrela brilhante, vai aparecer naquela nação; como um cometa ele virá de Israel. Ele derrotará os chefes dos moabitas e acabará com esse povo orgulhoso. (Números 24:17)";
