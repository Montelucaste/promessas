 frase[2794] = "Quando os filhos de Jacó chegaram do campo e souberam do caso, ficaram indignados e furiosos, pois Siquém havia feito uma coisa vergonhosa em Israel, desonrando a filha de Jacó. Isso era uma coisa que não se devia fazer. (Gênesis 34:7)";
 frase[2795] = "Acabe cometeu os pecados mais vergonhosos, adorando ídolos, como haviam feito os amorreus, o povo que o Senhor havia expulsado do país conforme o povo de Israel tinha ido avançando.)(1Reis 21:26)";
 frase[2796] = "O povo de Judá tem tantos deuses quantas são as suas cidades; e, para oferecerem os vergonhosos sacrifícios ao deus Baal, os moradores de Jerusalém levantaram tantos altares quantas são as ruas da cidade. (Jeremias 11:13)";
 frase[2797] = "E Deus me disse: — Homem mortal, você vê o que está acontecendo? Olhe para as coisas nojentas que o povo de Israel está fazendo aqui para me afastar cada vez mais do meu lugar santo. Você verá coisas ainda mais vergonhosas do que essas. (Ezequiel 8:6)";
 frase[2798] = "— Samaria não cometeu a metade dos pecados que você, Jerusalém, cometeu. Você fez coisas ainda mais vergonhosas do que as suas irmãs Sodoma e Samaria fizeram. Elas até parecem inocentes quando a sua corrupção, Jerusalém, é comparada com a delas. (Ezequiel 16:51)";
 frase[2799] = "— Mas, se um homem correto deixar de fazer o bem e começar a fazer todas as coisas más e vergonhosas que os homens maus fazem, será que ele vai continuar a viver? Não! Nenhuma das boas ações que ele praticou será lembrada. Ele morrerá por causa da sua infidelidade e dos seus pecados. (Ezequiel 18:24)";
 frase[2800] = "Os reis construíram a entrada e os pilares do seu palácio encostados na entrada e nos pilares do meu Templo, e assim entre nós ficou apenas uma parede. Eles profanaram o meu santo nome por causa de todas as coisas vergonhosas que fizeram, e por isso na minha ira eu os destruí. (Ezequiel 43:8)";
 frase[2801] = "E também os homens deixam as relações naturais com as mulheres e se queimam de paixão uns pelos outros. Homens têm relações vergonhosas uns com os outros e por isso recebem em si mesmos o castigo que merecem por causa dos seus erros. (Romanos 1:27)";
 frase[2802] = "Nós rejeitamos tudo o que é feito escondido e tudo o que é vergonhoso. Não agimos de má-fé, nem falsificamos a mensagem de Deus. Pelo contrário, agimos sempre abertamente, de acordo com a verdade, e assim as pessoas têm uma boa impressão de nós, que vivemos na presença de Deus. (2Coríntios 4:2)";
 frase[2803] = "Portanto, aconselho que comprem de mim ouro puro para que sejam, de fato, ricos. E comprem roupas brancas para se vestir e cobrir a sua nudez vergonhosa. Comprem também colírio para os olhos a fim de que possam ver. (Apocalipse 3:18)";
 frase[2804] = "Porém nela não entrará nada que seja impuro nem ninguém que faça coisas vergonhosas ou que conte mentiras. Entrarão na cidade somente as pessoas que têm o seu nome escrito no Livro da Vida , o qual pertence ao Cordeiro. (Apocalipse 21:27)";
 frase[2805] = "aí os líderes a levarão para perto da porta da casa do pai, e os homens da cidade a matarão a pedradas. Ela fez uma coisa vergonhosa no meio do povo de Israel: antes de casada e enquanto ainda vivia na casa do pai, ela teve relações com um homem. Assim vocês tirarão o mal do meio do povo de Israel. (Deuteronômio 22:21)";
 frase[2806] = "E havia também homens e mulheres que serviam como prostitutos nesses lugares pagãos de adoração. O povo de Israel fez todas as coisas vergonhosas que faziam os povos que o Senhor Deus havia expulsado da terra, conforme os israelitas iam avançando para dentro do país. (1Reis 14:24)";
 frase[2807] = "Então o Senhor me disse: — Homem mortal, você está vendo isso? Essa gente de Judá faz todas as coisas vergonhosas que você viu aqui e ainda não fica satisfeita. Por causa deles há violência por toda parte, no país inteiro. Além disso, eles vêm e fazem essas coisas aqui no Templo e assim me irritam mais ainda. Veja só como me insultam da pior maneira possível! (Ezequiel 8:17)";
 frase[2808] = "Eles têm profanado o meu Templo, deixando estrangeiros que não foram circuncidados, gente que não me conhece, entrar no pátio do Templo quando a gordura e o sangue dos sacrifícios estão sendo oferecidos a mim. Assim, fazendo todas essas coisas vergonhosas, o meu povo tem quebrado a minha aliança. (Ezequiel 44:7)";
 frase[2809] = "Com as suas vergonhosas bebedeiras, eles são como manchas de sujeira nas refeições de amizade que vocês realizam. Eles cuidam somente de si mesmos. São como nuvens levadas pelo vento, que não trazem nenhuma chuva; são como árvores que, mesmo no outono, não produzem nenhuma fruta; são como árvores que foram arrancadas pela raiz e estão completamente mortas. (Judas 1:12)";
 frase[2810] = "O Senhor os castigará, fazendo com que fiquem loucos, cegos e confusos. (Deuteronômio 28:28)";
 frase[2811] = "Os sábios serão envergonhados; ficarão confusos e atrapalhados. Eles rejeitaram as minhas palavras. Que sabedoria é essa que eles têm?(Jeremias 8:9)";
 frase[2812] = "Naquele dia, o Senhor fará com que eles fiquem tão confusos e assustados, que cada um agarrará a pessoa que estiver ao seu lado e a atacará. (Zacarias 14:13)";
 frase[2813] = "ficou muito triste por haver feito os seres humanos. O Senhor ficou tão triste e com o coração tão pesado. (Gênesis 6:6)";
 frase[2814] = "Então perguntou: — Por que vocês estão com essa cara tão triste hoje?(Gênesis 40:7)";
 frase[2815] = "Que seja solitária e triste aquela noite, e que nela não se escutem gritos de alegria! (Jó 3:7)";
 frase[2816] = "Quantas vezes se revoltaram contra Deus no deserto! Quantas vezes o fizeram ficar triste! (Salmos 78:40)";
 frase[2817] = "A alegria faz bem à saúde; estar sempre triste é morrer aos poucos. (Provérbios 17:22)";
 frase[2818] = "A esposa briguenta é como um dia triste em que a chuva não para de cair. (Provérbios 27:15)";
 frase[2819] = "Eu tenho visto neste mundo esta coisa triste: algumas pessoas economizam dinheiro e sofrem com isso. (Eclesiastes 5:13)";
 frase[2820] = "Também tenho visto outra coisa muito triste que acontece neste mundo:(Eclesiastes 6:1)";
 frase[2821] = "Povo de Israel, escute esta canção triste que eu canto a respeito de você:(Amós 5:1)";
 frase[2822] = "Quando o moço ouviu isso, foi embora triste, pois era muito rico. (Mateus 19:22)";
 frase[2823] = "Quando o homem ouviu isso, fechou a cara; e, porque era muito rico, foi embora triste. (Marcos 10:22)";
 frase[2824] = "Quando o homem ouviu isso, ficou muito triste, pois era riquíssimo. (Lucas 18:23)";
 frase[2825] = "Posso tentar esquecer as minhas queixas, posso deixar o meu ar triste e voltar a ser alegre,(Jó 9:27)";
 frase[2826] = "Levo uma vida triste, como um dia sem sol; eu me levanto diante de todos e peço ajuda. (Jó 30:28)";
 frase[2827] = "A minha voz é um gemido triste, como os uivos do lobo ou os gritos do avestruz. (Jó 30:29)";
 frase[2828] = "Há tempo de ficar triste e tempo de se alegrar; tempo de chorar e tempo de dançar;(Eclesiastes 3:4)";
 frase[2829] = "Então Jesus perguntou: — O que é que vocês estão conversando pelo caminho? Eles pararam, com um jeito triste,(Lucas 24:17)";
 frase[2830] = "Agora vocês devem perdoá-lo e animá-lo para que ele não fique tão triste, que acabe caindo no desespero. (2Coríntios 2:7)";
 frase[2831] = "— Que o senhor sempre pense bem de mim! — respondeu ela. E saiu. Então comeu alguma coisa e já não estava tão triste. (1Samuel 1:18)";
 frase[2832] = "e por isso perguntou: — Por que você está triste? Você não está doente; portanto, deve estar se sentindo infeliz. Então eu fiquei com muito medo(Neemias 2:2)";
 frase[2833] = "Depois disso, Mordecai voltou para a entrada do palácio, enquanto que Hamã, envergonhado e triste, correu para casa, escondendo o rosto. (Ester 6:12)";
 frase[2834] = "ou querer se esquentar, num dia frio, tirando a roupa. Cantar para quem está triste é como esfregar sal numa ferida. (Provérbios 25:20)";
 frase[2835] = "O povo de Gaza ficou muito triste, e os moradores de Asquelom estão calados. Até quando vão chorar os que ficaram na terra dos filisteus?(Jeremias 47:5)";
 frase[2836] = "Eles cantam para você esta canção triste: ‘Quem pode se comparar com Tiro, que agora está em silêncio no meio do mar?(Ezequiel 27:32)";
 frase[2837] = "Ao ouvir isso, o rei ficou muito triste e resolveu salvar Daniel. Até o pôr do sol daquele dia, ele fez tudo o que pôde para salvá-lo. (Daniel 6:14)";
 frase[2838] = "As parreiras e as figueiras secaram; estão secas as romãzeiras, as palmeiras, as macieiras e todas as outras árvores frutíferas. O povo todo está triste. (Joel 1:12)";
 frase[2839] = "O rei Herodes ficou triste, mas, por causa do juramento que havia feito na frente dos convidados, ordenou que o pedido da moça fosse atendido. (Mateus 14:9)";
 frase[2840] = "Então Jesus olhou zangado e triste para eles porque não queriam entender. E disse para o homem: — Estenda a mão! O homem estendeu a mão, e ela sarou. (Marcos 3:5)";
 frase[2841] = "Herodes ficou muito triste, mas, por causa do juramento que havia feito na frente dos convidados, não pôde deixar de atender o pedido da moça. (Marcos 6:26)";
 frase[2842] = "que disse: — Vou fazer desaparecer da terra essa gente, que criei, e também todos os animais, os seres que se arrastam pelo chão e as aves, pois estou muito triste porque os criei. (Gênesis 6:7)";
 frase[2843] = "Leia ficou grávida e deu à luz um filho; e pôs nele o nome de Rúben . Ela explicou assim: — O Senhor viu que eu estava triste, mas agora o meu marido vai me amar. (Gênesis 29:32)";
 frase[2844] = "será que vocês iriam esperar até que eles crescessem para vocês casarem com eles? É claro que não, minhas filhas! O Senhor está contra mim, e isso me deixa muito triste, pois vocês também estão sofrendo. (Rute 1:13)";
 frase[2845] = "Um dia o seu marido Elcana lhe perguntou: — Ana, por que você está chorando? Por que não come? Por que está sempre triste? Por acaso, eu não sou melhor para você do que dez filhos?(1Samuel 1:8)";
 frase[2846] = "— Eu estou arrependido de ter feito Saul rei, pois ele me abandonou e desobedeceu às minhas ordens. Samuel ficou triste com isso e a noite inteira orou em voz bem alta a Deus, o Senhor, em favor de Saul. (1Samuel 15:11)";
 frase[2847] = "Jonadabe disse a Amnom: — Você é filho do rei e, no entanto, cada dia está mais triste. Diga-me por quê. — É que estou apaixonado por Tamar, a irmã de Absalão, o meu irmão por parte de pai! — respondeu Amnom. (2Samuel 13:4)";
 frase[2848] = "Quando Elias acabou de falar, Acabe rasgou as suas roupas, jogou-as longe e vestiu uma roupa de pano grosseiro. Ele não comia nada, dormia em cima de panos grosseiros e andava triste e abatido. (1Reis 21:27)";
 frase[2849] = "Eliseu viu o que aconteceu e gritou: — Meu pai, meu pai! O senhor sempre foi como um exército para defender Israel! E nunca mais ele viu Elias. Muito triste, Eliseu rasgou a sua capa pelo meio. (2Reis 2:12)";
 frase[2850] = "Aí Esdras saiu da frente do Templo e foi para o quarto de Joanã, filho de Eliasibe. Ele passou a noite ali, sem comer nem beber, porque estava muito triste por causa da infidelidade dos que haviam voltado da Babilônia. (Esdras 10:6)";
 frase[2851] = "O que vou contar aconteceu quatro meses mais tarde, no vigésimo ano do reinado de Artaxerxes . Um dia, quando o rei estava jantando, eu peguei vinho e o servi. O rei nunca me havia visto triste(Neemias 2:1)";
 frase[2852] = "e respondi: — Que o rei viva para sempre! Como posso deixar de parecer triste, quando a cidade onde os meus antepassados estão sepultados está em ruínas, e os seus portões estão queimados?(Neemias 2:3)";
 frase[2853] = "Por que estou tão triste? Por que estou tão aflito? Eu porei a minha esperança em Deus e ainda o louvarei. Ele é o meu Salvador e o meu Deus. (Salmos 42:5)";
 frase[2854] = "Por que estou tão triste? Por que estou tão aflito? Eu porei a minha esperança em Deus e ainda o louvarei. Ele é o meu Salvador e o meu Deus. (Salmos 42:11)";
 frase[2855] = "Por que estou tão triste? Por que estou tão aflito? Eu porei a minha esperança em Deus e ainda o louvarei. Ele é o meu Salvador e o meu Deus. (Salmos 43:5)";
 frase[2856] = "Isso também é muito triste! Nós vamos embora deste mundo do mesmo jeito que viemos. Trabalhamos tanto, tentando pegar o vento, e o que é que ganhamos com isso?(Eclesiastes 5:16)";
 frase[2857] = "Deus disse ainda: “Chore, povo de Jerusalém. Corte os seus cabelos e jogue fora. Cante música triste no alto dos montes, pois eu, o Senhor, estou irado e abandonei o meu povo.”(Jeremias 7:29)";
 frase[2858] = "O povo disse: “Que elas venham depressa e cantem uma canção triste para nós para que os nossos olhos se encham de lágrimas e fiquem molhados de tanto chorar!”(Jeremias 9:18)";
 frase[2859] = "“Se vocês quiserem continuar a viver nesta terra, eu edificarei a nação e não a destruirei; plantarei e não arrancarei. A destruição que fiz cair sobre vocês me deixou muito triste. (Jeremias 42:10)";
 frase[2860] = "Ali, com voz muito triste, ele disse: — Daniel, servo do Deus vivo! Será que o seu Deus, a quem você serve com tanta dedicação, conseguiu salvá-lo dos leões?(Daniel 6:20)";
 frase[2861] = "Quando aquele dia chegar, outros vão inventar um provérbio a respeito de vocês e cantarão esta canção triste: “Estamos completamente arruinados! O Senhor tirou a nossa terra, ele tirou o que era nosso e deu aos que nos conquistaram.”(Miqueias 2:4)";
 frase[2862] = "— Quando vocês jejuarem, não façam uma cara triste como fazem os hipócritas, pois eles fazem isso para todos saberem que eles estão jejuando. Eu afirmo a vocês que isto é verdade: eles já receberam a sua recompensa. (Mateus 6:16)";
 frase[2863] = "Quando uma mulher está para dar à luz, ela fica triste porque chegou a sua hora de sofrer. Mas, depois que a criança nasce, a mulher fica tão alegre, que nem lembra mais do seu sofrimento. (João 16:21)";
 frase[2864] = "Mas ele respondeu: — Por que vocês choram assim e me deixam tão triste? Eu estou pronto não somente para ser amarrado, mas até para morrer em Jerusalém pela causa do Senhor Jesus. (Atos 21:13)";
 frase[2865] = "Se você faz com que um irmão fique triste por causa do que você come, então você não está agindo com amor. Não deixe que a pessoa por quem Cristo morreu se perca por causa da comida que você come. (Romanos 14:15)";
 frase[2866] = "Eu escrevi aquela carta muito preocupado e triste e derramando muitas lágrimas. Porém não escrevi para fazer com que vocês ficassem tristes, mas para que soubessem do grande amor que tenho por todos vocês. (2Coríntios 2:4)";
 frase[2867] = "Mas, se alguém fez com que alguma pessoa ficasse triste, não fez isso a mim, mas sim a vocês ou, pelo menos, a alguns de vocês. Escrevo assim para não ser muito duro com esse homem. (2Coríntios 2:5)";
 frase[2868] = "Pois a tristeza que é usada por Deus produz o arrependimento que leva à salvação; e nisso não há motivo para alguém ficar triste. Mas as tristezas deste mundo produzem a morte. (2Coríntios 7:10)";
 frase[2869] = "E não façam com que o Espírito Santo de Deus fique triste. Pois o Espírito é a marca de propriedade de Deus colocada em vocês, a qual é a garantia de que chegará o dia em que Deus os libertará. (Efésios 4:30)";
 frase[2870] = "O seu irmão Absalão perguntou: — Amnom fez mal a você? Não conte isso a ninguém, minha irmã. Afinal de contas, ele é seu meio-irmão. Não leve isso muito a sério. Assim Tamar ficou vivendo triste e sozinha na casa de Absalão. (2Samuel 13:20)";
 frase[2871] = "Então o rei ficou profundamente triste. Subiu à sala que ficava por cima do portão e começou a chorar. Ele andava para lá e para cá e gritava: — Ó meu filho! Meu filho Absalão! Absalão, meu filho! Eu preferiria ter morrido no seu lugar, meu filho! (2Samuel 18:33)";
 frase[2872] = "é o homem viver sozinho, sem amigos, sem filhos, sem irmãos, sempre trabalhando e nunca satisfeito com a riqueza que tem. Para que é que ele trabalha tanto, deixando de aproveitar as coisas boas da vida? Isso também é ilusão, é uma triste maneira de viver. (Eclesiastes 4:8)";
 frase[2873] = "Eu escutei com atenção, mas vocês não falaram a verdade. Ninguém ficou triste por causa da sua maldade; ninguém perguntou: “O que foi que eu fiz de errado?” Cada um continua seguindo o seu próprio caminho, como um cavalo que corre depressa para a batalha. (Jeremias 8:6)";
 frase[2874] = "— Não entre numa casa onde tenha gente chorando. Não fique triste, nem chore por causa de ninguém. Pois eu não abençoarei mais esse povo com a minha paz; não os amarei mais, nem terei pena deles. Sou eu, o Senhor, quem está falando. (Jeremias 16:5)";
 frase[2875] = "E perguntou pela terceira vez: — Simão, filho de João, você me ama? Então Pedro ficou triste por Jesus ter perguntado três vezes: “Você me ama?” E respondeu: — O senhor sabe tudo e sabe que eu o amo, Senhor! E Jesus ordenou: — Tome conta das minhas ovelhas. (João 21:17)";
 frase[2876] = "Os levitas foram pelo meio do povo, acalmando-os e dizendo que não ficassem tristes num dia tão santo. (Neemias 8:11)";
 frase[2877] = "Eles ficaram muito tristes e, um por um, começaram a perguntar: — O senhor não está achando que sou eu; está?(Mateus 26:22)";
 frase[2878] = "Eles ficaram tristes e, um por um, começaram a perguntar: — O senhor não está achando que sou eu, está?(Marcos 14:19)";
 frase[2879] = "Ela foi contar isso aos companheiros de Jesus, pois eles estavam tristes e chorando. (Marcos 16:10)";
 frase[2880] = "Como é que vocês podem estar tão orgulhosos? Pelo contrário, vocês deviam ficar muito tristes e expulsar do meio de vocês quem está fazendo uma coisa dessas. (1Coríntios 5:2)";
 frase[2881] = "Pois eu afirmo a vocês que isto é verdade: vocês vão chorar e ficar tristes, mas as pessoas do mundo ficarão alegres. Vocês ficarão tristes, mas essa tristeza virará alegria. (João 16:20)";
 frase[2882] = "Os israelitas ficaram muito tristes quando Moisés contou o que o Senhor tinha dito. (Números 14:39)";
 frase[2883] = "e eles vão matá-lo; mas três dias depois ele será ressuscitado. E os discípulos ficaram muito tristes. (Mateus 17:23)";
 frase[2884] = "Mas agora estou alegre, não porque vocês ficaram tristes, mas porque aquela tristeza fez com que vocês se arrependessem. Aquela tristeza foi usada por Deus, e assim nós não causamos nenhum mal a vocês. (2Coríntios 7:9)";
 frase[2885] = "Irmãos, queremos que vocês saibam a verdade a respeito dos que já morreram, para que não fiquem tristes como ficam aqueles que não têm esperança. (1Tessalonicenses 4:13)";
 frase[2886] = "Fiquem tristes, gritem e chorem. Mudem as suas risadas em choro e a sua alegria em tristeza. (Tiago 4:9)";
 frase[2887] = "Alegrem-se por isso, se bem que agora é possível que vocês fiquem tristes por algum tempo, por causa dos muitos tipos de provações que vocês estão sofrendo. (1Pedro 1:6)";
 frase[2888] = "Não me arrependo de ter escrito aquela carta , embora vocês tenham ficado tristes por causa dela. Quando soube que a carta os deixou tristes por algum tempo, eu poderia ter ficado arrependido. (2Coríntios 7:8)";
 frase[2889] = "Agora não fiquem tristes nem aborrecidos com vocês mesmos por terem me vendido a fim de ser trazido para cá. Foi para salvar vidas que Deus me enviou na frente de vocês. (Gênesis 45:5)";
 frase[2890] = "O Senhor Todo-Poderoso disse: “Atenção! Chamem mulheres que são pagas para chorar, mulheres que saibam cantar músicas tristes.”(Jeremias 9:17)";
 frase[2891] = "Assim acontece também com vocês: agora estão tristes, mas eu os verei novamente. Aí vocês ficarão cheios de alegria, e ninguém poderá tirar essa alegria de vocês. (João 16:22)";
 frase[2892] = "Estavam tristes, especialmente porque ele lhes tinha dito que nunca mais iam vê-lo. Então eles o acompanharam até o navio. (Atos 20:38)";
 frase[2893] = "Às vezes ficamos tristes, outras vezes ficamos alegres. Parecemos pobres, mas enriquecemos muitas pessoas. Parece que não temos nada, mas na verdade possuímos tudo. (2Coríntios 6:10)";
 frase[2894] = "E não foi somente a chegada dele que nos animou, mas também a informação dada por ele de que vocês o animaram. Ele contou que vocês estão com saudade de mim e disse que estão muito tristes e estão prontos para me defender. Por isso agora estou mais feliz ainda. (2Coríntios 7:7)";
 frase[2895] = "Vão agora para casa e façam uma festa. Repartam a sua comida e o seu vinho com quem não tiver nada preparado. Este dia é sagrado para o nosso Deus; portanto, não fiquem tristes. A alegria que o Senhor dá fará com que vocês fiquem fortes. (Neemias 8:10)";
 frase[2896] = "Eu disse: “Mulheres, ouçam o que o Senhor Deus disse e deem atenção às suas palavras. Ensinem as suas filhas a chorar; ensinem as suas amigas a cantar canções tristes. (Jeremias 9:20)";
 frase[2897] = "Jesus respondeu: — Vocês acham que os convidados de um casamento podem estar tristes enquanto o noivo está com eles? Claro que não! Mas chegará o tempo em que o noivo será tirado do meio deles; então sim eles vão jejuar! (Mateus 9:15)";
 frase[2898] = "Em sinal de tristeza, Josué rasgou a sua roupa e se jogou no chão, com o rosto em terra, na frente da arca da aliança de Deus, o Senhor. Os líderes de Israel fizeram a mesma coisa e ficaram ali com Josué até de tarde. E fizeram como ele: também jogaram terra na cabeça para mostrar que estavam tristes. (Josué 7:6)";
 frase[2899] = "Jó tinha três amigos: Elifaz, da região de Temã; Bildade, da região de Sua; e Zofar, da região de Naamá. Eles ficaram sabendo das desgraças que haviam acontecido a Jó e combinaram fazer-lhe uma visita para falar de como estavam tristes pelo que lhe havia acontecido e para consolá-lo. (Jó 2:11)";
 frase[2900] = "Todos os seus irmãos e irmãs e todos os seus amigos foram visitá-lo e tomaram parte num banquete na casa dele. Falaram de como estavam tristes pelo que lhe havia acontecido e o consolaram por todas as desgraças que o Senhor havia feito cair sobre ele. E cada um lhe deu dinheiro e um anel de ouro. (Jó 42:11)";
 frase[2901] = "As estradas que levam a Sião estão tristes, pois não há ninguém que vá por elas para as festas religiosas. As moças que cantavam no Templo estão aflitas, e os sacerdotes vivem gemendo. A cidade sofre amargamente, e não há gente para se reunir nas suas praças. (Lamentações 1:4)";
 frase[2902] = "Ele os guiou sozinho, sem a ajuda de outro deus. (Deuteronômio 32:12)";
 frase[2903] = "Depois de mandar o povo embora, Jesus subiu um monte a fim de orar sozinho. Quando chegou a noite, ele estava ali, sozinho. (Mateus 14:23)";
 frase[2904] = "Eu sozinho não posso cuidar de todo este povo; isso é demais para mim! (Números 11:14)";
 frase[2905] = "Quando Eliseu chegou, entrou sozinho no quarto e viu o menino morto na cama. (2Reis 4:32)";
 frase[2906] = "Deus sozinho estendeu o céu; ele pisou sobre as costas do Mar . (Jó 9:8)";
 frase[2907] = "Nunca tomei sozinho as minhas refeições, mas sempre reparti a minha comida com os órfãos. (Jó 31:17)";
 frase[2908] = "mas ele ficou para trás, sozinho. Aí veio um homem que lutou com ele até o dia amanhecer. (Gênesis 32:24)";
 frase[2909] = "Desse jeito você vai ficar cansado demais, e o povo também. Isso é muito trabalho para você fazer sozinho. (Êxodo 18:18)";
 frase[2910] = "O preguiçoso acha que ele sozinho sabe mais do que sete homens capazes de dar respostas certas. (Provérbios 26:16)";
 frase[2911] = "Se faz frio, dois podem dormir juntos e se esquentar; mas um sozinho, como é que vai se esquentar?(Eclesiastes 4:11)";
 frase[2912] = "Eu estava ali sozinho enquanto via essa visão impressionante. Fiquei pálido de medo e perdi as forças. (Daniel 10:8)";
 frase[2913] = "Quando chegou a noite, o barco estava no meio do lago, e Jesus estava em terra, sozinho. (Marcos 6:47)";
 frase[2914] = "Jesus ficou sabendo que queriam levá-lo à força para o fazerem rei; então voltou sozinho para o monte. (João 6:15)";
 frase[2915] = "Quem me enviou está comigo e não me deixou sozinho, pois faço sempre o que lhe agrada. (João 8:29)";
 frase[2916] = "Depois o Senhor disse: — Não é bom que o homem viva sozinho. Vou fazer para ele alguém que o ajude como se fosse a sua outra metade. (Gênesis 2:18)";
 frase[2917] = "Em seguida Moisés disse ao povo: — Quando ainda estávamos ao pé do monte Sinai, eu lhes disse: “Eu sozinho não posso cuidar de vocês. (Deuteronômio 1:9)";
 frase[2918] = "Mas como é que eu posso, sozinho, aguentar a carga pesada de resolver todas as causas e todas as questões que aparecem no meio do povo?(Deuteronômio 1:12)";
 frase[2919] = "Davi foi falar com o sacerdote Aimeleque, em Nobe. O sacerdote saiu tremendo para se encontrar com Davi e disse: — Por que é que você veio aqui sozinho?(1Samuel 21:1)";
 frase[2920] = "Então avisou o rei. E o rei disse: — Se ele está sozinho, vem trazendo boas notícias. E o corredor veio chegando. (2Samuel 18:25)";
 frase[2921] = "Um dia Jeroboão saiu de Jerusalém em viagem, e o profeta Aías, de Siló, se encontrou com ele sozinho na estrada, no meio do campo. (1Reis 11:29)";
 frase[2922] = "Dois homens podem resistir a um ataque que derrotaria um deles se estivesse sozinho. Uma corda de três cordões é difícil de arrebentar. (Eclesiastes 4:12)";
 frase[2923] = "Não tenho gasto o meu tempo rindo e gozando a vida junto com outras pessoas. Por causa do trabalho pesado que me deste, fiquei sozinho e muito indignado. (Jeremias 15:17)";
 frase[2924] = "Os israelitas são como um jumento bravo que teima em andar sozinho. Eles foram pedir a ajuda da Assíria e pagaram outras nações para protegê-los. (Oseias 8:9)";
 frase[2925] = "Certa vez Jesus estava sozinho, orando, e os discípulos chegaram perto dele. Então ele perguntou: — Quem o povo diz que eu sou?(Lucas 9:18)";
 frase[2926] = "Quando a voz parou, eles viram que Jesus estava sozinho. Os discípulos ficaram calados e naquela ocasião não disseram nada a ninguém sobre o que tinham visto. (Lucas 9:36)";
 frase[2927] = "E, se eu julgar, o meu julgamento é verdadeiro porque não julgo sozinho, pois o Pai, que me enviou, está comigo. (João 8:16)";
 frase[2928] = "Quando Jetro viu tudo o que Moisés estava fazendo, perguntou: — Por que você está agindo assim? Por que está resolvendo sozinho os problemas do povo, com todas essas pessoas em pé ao seu redor, desde a manhã até a noite?(Êxodo 18:14)";
 frase[2929] = "Se o dono do escravo lhe der uma mulher, e ela der à luz filhos e filhas, a mulher e os filhos serão do dono, e o escravo irá embora sozinho. (Êxodo 21:4)";
 frase[2930] = "Então eu descerei e falarei com você ali; tirarei uma parte do Espírito que lhe dei e darei a eles, para que o ajudem no pesado trabalho de cuidar do povo. Assim, você não precisará fazer isso sozinho. (Números 11:17)";
 frase[2931] = "Então o vigia viu outro homem correndo sozinho e gritou para o guarda do portão: — Veja! Vem vindo outro homem correndo! — Esse também está trazendo boas notícias! — respondeu Davi. (2Samuel 18:26)";
 frase[2932] = "Se uma delas cai, a outra a ajuda a se levantar. Mas, se alguém está sozinho e cai, fica em má situação porque não tem ninguém que o ajude a se levantar. (Eclesiastes 4:10)";
 frase[2933] = "Mil de vocês fugirão de um só inimigo que os atacar, cinco inimigos farão com que todos vocês fujam. Os poucos que restarem parecerão um mastro de bandeira sozinho no alto de um morro.”(Isaías 30:17)";
 frase[2934] = "Enquanto a matança continuava, fiquei ali sozinho. Eu me atirei no chão, com o rosto encostado na terra, e gritei: — Senhor Deus, será que estás tão zangado com Jerusalém, que vais matar todos os que foram deixados em Israel?(Ezequiel 9:8)";
 frase[2935] = "O anjo protetor do Reino da Pérsia lutou contra mim durante vinte e um dias. Mas Miguel, um dos anjos-chefes, veio me ajudar, pois eu estava lutando sozinho contra os reis da Pérsia. (Daniel 10:13)";
 frase[2936] = "Ao saber o que havia acontecido, Jesus saiu dali num barco e foi sozinho para um lugar deserto. Mas as multidões souberam onde ele estava, vieram dos seus povoados e o seguiram por terra. (Mateus 14:13)";
 frase[2937] = "O fariseu ficou de pé e orou sozinho, assim: “Ó Deus, eu te agradeço porque não sou avarento, nem desonesto, nem imoral como as outras pessoas. Agradeço-te também porque não sou como este cobrador de impostos. (Lucas 18:11)";
 frase[2938] = "Pois chegou a hora de vocês todos serem espalhados, cada um para a sua casa; e assim vão me deixar sozinho. Mas eu não estou só, pois o Pai está comigo. (João 16:32)";
 frase[2939] = "Eles passaram pelo primeiro e pelo segundo posto da guarda e chegaram ao portão de ferro que dava para a rua. O portão se abriu sozinho, e eles saíram. Andaram por uma rua, e, de repente, o anjo foi embora. (Atos 12:10)";
 frase[2940] = "Aí Balaão disse a Balaque: — Fique aí perto da sua oferta queimada, que eu vou até ali. Talvez o Senhor venha encontrar-se comigo, e eu direi a você tudo o que ele me ordenar. Depois Balaão subiu sozinho até o alto de um monte. (Números 23:3)";
 frase[2941] = "Davi estava sentado entre o portão que dá para fora da cidade e o que dá para dentro. O vigia subiu para o alto da muralha e ficou no terraço do portão. Ele olhou para fora e viu um homem correndo sozinho. (2Samuel 18:24)";
 frase[2942] = "é o homem viver sozinho, sem amigos, sem filhos, sem irmãos, sempre trabalhando e nunca satisfeito com a riqueza que tem. Para que é que ele trabalha tanto, deixando de aproveitar as coisas boas da vida? Isso também é ilusão, é uma triste maneira de viver. (Eclesiastes 4:8)";
 frase[2943] = "O Senhor, o Salvador de Israel, diz: “Meu povo, eu sou o seu Criador; antes que você tivesse nascido, eu já o havia criado. Sozinho, eu criei todas as coisas; estendi os céus e firmei a terra sem a ajuda de ninguém. (Isaías 44:24)";
 frase[2944] = "Então foram sozinhos de barco para um lugar deserto. (Marcos 6:32)";
 frase[2945] = "Quando Deus nos faz sofrer, devemos ficar sozinhos, pacientes e em silêncio. (Lamentações 3:28)";
 frase[2946] = "Tremam de medo e parem de pecar. Sozinhos e quietos nos seus quartos, examinem a sua própria consciência. (Salmos 4:4)";
 frase[2947] = "Então não pudemos aguentar mais sem ter notícias de vocês. Por isso Silas e eu resolvemos ficar sozinhos em Atenas(1Tessalonicenses 3:1)";
 frase[2948] = "Todas as famílias do país chorarão. Cada uma chorará sozinha, isto é, a família dos descendentes de Davi, a dos descendentes de Natã, a dos descendentes de Levi e a dos descendentes de Simei. Cada família chorará sozinha: os homens chorarão em um lugar, e as mulheres, em outro. (Zacarias 12:12)";
 frase[2949] = "Enquanto sofrer de uma doença contagiosa, a pessoa continuará impura e precisará morar sozinha, fora do acampamento. (Levítico 13:46)";
 frase[2950] = "Do alto das rochas, na montanha, eu vejo o povo de Israel. Eles vivem sozinhos e acham que são diferentes dos outros povos. (Números 23:9)";
 frase[2951] = "Então você pensará assim: ‘Quem me fez mãe destes filhos? Eu, uma mulher que não podia ter filhos, abandonada, rejeitada e prisioneira — quem criou esses filhos para mim? Eu estava sozinha — de onde vieram todos eles?’ ”(Isaías 49:21)";
 frase[2952] = "Os apóstolos voltaram e contaram a Jesus tudo o que haviam feito. Então ele os levou consigo, e foram sozinhos para o povoado de Betsaida. (Lucas 9:10)";
 frase[2953] = "Marta estava ocupada com todo o trabalho da casa. Então chegou perto de Jesus e perguntou: — O senhor não se importa que a minha irmã me deixe sozinha com todo este trabalho? Mande que ela venha me ajudar. (Lucas 10:40)";
 frase[2954] = "O seu irmão Absalão perguntou: — Amnom fez mal a você? Não conte isso a ninguém, minha irmã. Afinal de contas, ele é seu meio-irmão. Não leve isso muito a sério. Assim Tamar ficou vivendo triste e sozinha na casa de Absalão. (2Samuel 13:20)";
 frase[2955] = "Porém Zorobabel, Josué e os outros chefes das famílias israelitas responderam: — Não precisamos que vocês nos ajudem a construir um templo para o Senhor, nosso Deus. Nós vamos fazer isso sozinhos, como Ciro, rei da Pérsia, mandou. (Esdras 4:3)";
 frase[2956] = "Havia ali tanta gente, chegando e saindo, que Jesus e os apóstolos não tinham tempo nem para comer. Então ele lhes disse: — Venham! Vamos sozinhos para um lugar deserto a fim de descansarmos um pouco. (Marcos 6:31)";
 frase[2957] = "No dia seguinte a multidão que estava no lado leste do lago viu que ali só havia um barco pequeno. Sabiam que Jesus não tinha embarcado com os discípulos, pois estes haviam saído sozinhos. (João 6:22)";
 frase[2958] = "Porque a raiva humana não produz o que Deus aprova. (Tiago 1:20)";
 frase[2959] = "Por causa disso, Jonas ficou com raiva e muito aborrecido. (Jonas 4:1)";
 frase[2960] = "Mas Deus perguntou: — Jonas, você acha que está certo ficar com raiva por causa dessa planta? Jonas respondeu: — É claro que tenho razão para estar com raiva e, com tanta raiva, que até quero morrer! (Jonas 4:9)";
 frase[2961] = "Se vocês ficarem com raiva, não deixem que isso faça com que pequem e não fiquem o dia inteiro com raiva. (Efésios 4:26)";
 frase[2962] = "Abandonem toda amargura, todo ódio e toda raiva. Nada de gritarias, insultos e maldades! (Efésios 4:31)";
 frase[2963] = "Então o Senhor disse: — Por que você está com raiva? Por que anda carrancudo?(Gênesis 4:6)";
 frase[2964] = "Zebul, o governador da cidade, ficou com muita raiva quando soube o que Gaal tinha dito. (Juízes 9:30)";
 frase[2965] = "Então Davi perguntou: — E, se o seu pai responder com raiva, quem vai me avisar?(1Samuel 20:10)";
 frase[2966] = "Então o rei voltou aborrecido e com raiva para a sua casa em Samaria. (1Reis 20:43)";
 frase[2967] = "Olhe para todos os orgulhosos; faça explodir a sua raiva contra eles e humilhe-os. (Jó 40:11)";
 frase[2968] = "Não fique com raiva, não fique furioso. Não se aborreça, pois isso será pior para você. (Salmos 37:8)";
 frase[2969] = "Não esqueças os gritos de raiva dos teus inimigos nem do barulho constante dos teus adversários. (Salmos 74:23)";
 frase[2970] = "Fico queimando de raiva porque os meus inimigos desprezam a tua palavra. (Salmos 119:139)";
 frase[2971] = "Então você dirá: — Como eu tinha raiva de conselhos! Nunca aceitei conselhos de ninguém. (Provérbios 5:12)";
 frase[2972] = "A resposta delicada acalma o furor, mas a palavra dura aumenta a raiva. (Provérbios 15:1)";
 frase[2973] = "Quando o rei fica com raiva, há perigo de morte, mas o sábio o acalma. (Provérbios 16:14)";
 frase[2974] = "Dê um presente em segredo a quem estiver zangado com você, e a raiva dele acabará. (Provérbios 21:14)";
 frase[2975] = "O tolo mostra toda a sua raiva, mas quem é sensato se cala e a domina. (Provérbios 29:11)";
 frase[2976] = "bater o leite dá manteiga; pancada no nariz faz sair sangue; provocar a raiva dá briga. (Provérbios 30:33)";
 frase[2977] = "O Senhor respondeu: — Jonas, você acha que tem razão para ficar com tanta raiva assim?(Jonas 4:4)";
 frase[2978] = "O rei ficou com tanta raiva, que mandou matar aqueles assassinos e queimar a cidade deles. (Mateus 22:7)";
 frase[2979] = "Quando ouviram isso, todos os que estavam na sinagoga ficaram com muita raiva. (Lucas 4:28)";
 frase[2980] = "Quando os membros do Conselho ouviram isso, ficaram com tanta raiva, que resolveram matar os apóstolos. (Atos 5:33)";
 frase[2981] = "Lembrem disto, meus queridos irmãos: cada um esteja pronto para ouvir, mas demore para falar e ficar com raiva. (Tiago 1:19)";
 frase[2982] = "Certa vez José teve um sonho e o contou aos seus irmãos. Aí é que ficaram com mais raiva dele(Gênesis 37:5)";
 frase[2983] = "Arão respondeu: — Não fique com raiva de mim. Você sabe como este povo está sempre pronto para fazer o mal. (Êxodo 32:22)";
 frase[2984] = "Então enforcaram Hamã na forca que ele tinha construído para enforcar Mordecai. E assim a raiva do rei se acalmou. (Ester 7:10)";
 frase[2985] = "“Aqueles que têm um coração perverso guardam raiva e, mesmo quando são castigados, não clamam pedindo socorro. (Jó 36:13)";
 frase[2986] = "Ele não aceitará nenhum pagamento; e mesmo uma porção de presentes não acabará com a sua raiva. (Provérbios 6:35)";
 frase[2987] = "A raiva do rei é como o rugido de um leão; quem provoca o rei arrisca a vida. (Provérbios 20:2)";
 frase[2988] = "Eu mesmo lutarei contra vocês com toda a minha força, ira e raiva e com o meu grande furor. (Jeremias 21:5)";
 frase[2989] = "Veja só de que jeito o seu escravo me tratou! Quando ouviu essa história, o dono de José ficou com muita raiva. (Gênesis 39:19)";
 frase[2990] = "Um dia o senhor ficou com raiva de mim e do chefe dos padeiros e nos mandou para a cadeia, na casa do capitão da guarda. (Gênesis 41:10)";
 frase[2991] = "A jumenta viu o Anjo e se deitou no chão. Balaão ficou com tanta raiva, que surrou a jumenta com a vara. (Números 22:27)";
 frase[2992] = "Se ele disser: “Está bem”, eu estarei salvo. Mas, se ele ficar com raiva, então você ficará sabendo que ele está com más intenções. (1Samuel 20:7)";
 frase[2993] = "Os maus veem isso e ficam com raiva; olham com ódio e se acabam. A esperança dos maus dá em nada. (Salmos 112:10)";
 frase[2994] = "A raiva do rei é como o rugido de um leão, mas a sua bondade é como o orvalho sobre as plantas. (Provérbios 19:12)";
 frase[2995] = "Não vá a toda hora à casa do vizinho, pois ele pode se cansar e acabar ficando com raiva de você. (Provérbios 25:17)";
 frase[2996] = "Tu não ficarás com raiva de mim para sempre.” Povo de Israel, foi isso o que você disse, mas continuou fazendo todo mal que podia. (Jeremias 3:5)";
 frase[2997] = "Ao ouvir isso, Nabucodonosor ficou furioso com os três jovens e, vermelho de raiva, mandou que se esquentasse a fornalha sete vezes mais do que de costume. (Daniel 3:19)";
 frase[2998] = "Queimando de raiva, eles mataram os seus chefes; todos os seus reis foram mortos, um depois do outro. Mas não há ninguém que ore a mim. (Oseias 7:7)";
 frase[2999] = "— O patrão ficou com muita raiva e mandou o empregado para a cadeia a fim de ser castigado até que pagasse toda a dívida. (Mateus 18:34)";
 frase[3000] = "Quando Jesus saiu dali, os mestres da Lei e os fariseus começaram a criticá-lo com raiva e a lhe fazer perguntas sobre muitos assuntos. (Lucas 11:53)";
 frase[3001] = "a adoração de ídolos, as feitiçarias, as inimizades, as brigas, as ciumeiras, os acessos de raiva, a ambição egoísta, a desunião, as divisões,(Gálatas 5:20)";
 frase[3002] = "Foi pela fé que Moisés saiu do Egito, sem ter medo da raiva do rei, e continuou firme, como se estivesse vendo o Deus invisível. (Hebreus 11:27)";
 frase[3003] = "Aí Jacó ficou zangado. Ele disse a Labão: — O que foi que eu fiz de errado? Qual foi a lei que eu quebrei para o senhor me perseguir com tanta raiva?(Gênesis 31:36)";
 frase[3004] = "Mas, se um homem ficar com raiva e matar outro de propósito, deverá ser morto, ainda que ele tenha fugido para o meu altar a fim de se salvar. (Êxodo 21:14)";
 frase[3005] = "Aí Balaque ficou com muita raiva de Balaão. Com uma das mãos deu um soco na outra em sinal de ódio e disse: — Eu o chamei para amaldiçoar os meus inimigos, mas nestas três vezes você só os abençoou. (Números 24:10)";
 frase[3006] = "Acabe foi para casa aborrecido e com raiva por causa do que Nabote tinha dito. Ele se deitou na cama, virado para a parede, e não quis comer nada. (1Reis 21:4)";
 frase[3007] = "Mais tarde a raiva do rei já havia passado, mas mesmo assim ele continuava a pensar no que Vasti havia feito e no decreto que ele havia assinado contra ela. (Ester 2:1)";
 frase[3008] = "Com a sua raiva, você só está se ferindo. Será que, por você estar zangado, o mundo vai virar um deserto? Será que, por sua causa, as montanhas vão mudar de lugar?(Jó 18:4)";
 frase[3009] = "Eu tremo quando ouço as ameaças dos meus inimigos; a perseguição dos maus me esmaga. Eles fazem com que desgraças caiam sobre mim; estão com raiva de mim e me odeiam. (Salmos 55:3)";
 frase[3010] = "O povo andará de um lugar para outro, sem rumo, desanimado e com fome. Por causa da fome, ficarão com raiva e amaldiçoarão o seu rei e o seu Deus. Olharão para o céu(Isaías 8:21)";
 frase[3011] = "— Por essa razão, eu, o Senhor Deus, estou dizendo isto a você, Oolibá. Você está enjoada desses amantes, mas eu farei com que eles fiquem com raiva de você e os trarei para que a cerquem. (Ezequiel 23:22)";
 frase[3012] = "— O empregado voltou e contou tudo ao patrão. Ele ficou com muita raiva e disse: “Vá depressa pelas ruas e pelos becos da cidade e traga os pobres, os aleijados, os cegos e os coxos.”(Lucas 14:21)";
 frase[3013] = "Para não deixarem de cumprir a Lei de Moisés, vocês circuncidam um menino, mesmo no sábado. Então por que ficam com raiva de mim quando eu curo completamente uma pessoa no sábado?(João 7:23)";
 frase[3014] = "Mas agora livrem-se de tudo isto: da raiva, da paixão e dos sentimentos de ódio. E que não saia da boca de vocês nenhum insulto e nenhuma conversa indecente. (Colossenses 3:8)";
 frase[3015] = "Odede, um profeta do Senhor Deus, estava em Samaria e foi encontrar-se com o exército israelita, que estava voltando para lá. Odede disse a eles: — O Senhor, o Deus dos seus antepassados, ficou irado com o povo de Judá e deixou que vocês o derrotassem. Mas vocês mataram aquela gente com tanta raiva, que Deus ficou sabendo disso. (2Crônicas 28:9)";
 frase[3016] = "Ele mandou que eu fosse até o Norte e dissesse ao povo: — Ó Israel infiel, volte para mim. Sou eu, o Senhor, quem está falando. Sou bondoso e por isso não ficarei com raiva de você, não ficarei irado para sempre. Sou eu, o Senhor, quem está falando. (Jeremias 3:12)";
 frase[3017] = "O Senhor Deus diz: — O povo do país de Edom tem cometido tantos pecados, tantos mesmo, que eu tenho de castigá-los. Fizeram guerra contra os seus irmãos , os israelitas, e não tiveram dó nem piedade. A raivados edomitas não parou, e eles conservaram o seu ódio para sempre. (Amós 1:11)";
 frase[3018] = "Quando Herodes viu que os visitantes do Oriente o haviam enganado, ficou com muita raiva e mandou matar, em Belém e nas suas vizinhanças, todos os meninos de menos de dois anos. Ele fez isso de acordo com a informação que havia recebido sobre o tempo em que a estrela havia aparecido. (Mateus 2:16)";
 frase[3019] = "Mas eu lhes digo que qualquer um que ficar com raiva do seu irmão será julgado. Quem disser ao seu irmão: “Você não vale nada” será julgado pelo tribunal. E quem chamar o seu irmão de idiota estará em perigo de ir para o fogo do inferno. (Mateus 5:22)";
 frase[3020] = "O rei Herodes estava com muita raiva dos moradores das cidades de Tiro e de Sidom. Então eles formaram um grupo e foram falar com Herodes. Primeiro conseguiram o apoio de Blasto, que era um alto funcionário do palácio. Aí pediram ao rei Herodes que fizesse as pazes com eles, pois os alimentos que a região deles recebia vinham do país do rei. (Atos 12:20)";
 frase[3021] = "Eu pergunto ainda: será que o povo de Israel não soube disso? Moisés foi o primeiro a dar uma resposta. Ele disse: “Eu farei com que vocês fiquem com ciúmes de um povo que não é uma nação; farei com que fiquem com raiva de uma nação de gente sem juízo.”(Romanos 10:19)";
 frase[3022] = "Vejo que você está cheio de inveja, uma inveja amarga como fel, e vejo também que você está preso pelo pecado. (Atos 8:23)";
 frase[3023] = "Os irmãos de José tinham inveja dele, mas o seu pai ficou pensando no caso. (Gênesis 37:11)";
 frase[3024] = "Não se aborreça por causa dos maus, nem tenha inveja dos que praticam o mal. (Salmos 37:1)";
 frase[3025] = "Não tenha inveja dos violentos, nem faça o que eles fazem,(Provérbios 3:31)";
 frase[3026] = "A paz de espírito dá saúde ao corpo, mas a inveja destrói como câncer. (Provérbios 14:30)";
 frase[3027] = "Não tenha inveja dos maus, nem procure ter amizade com eles. (Provérbios 24:1)";
 frase[3028] = "Não se revolte por causa dos maus, nem tenha inveja deles. (Provérbios 24:19)";
 frase[3029] = "O ódio é cruel e destruidor, mas a inveja é pior ainda. (Provérbios 27:4)";
 frase[3030] = "Pilatos sabia muito bem que os líderes judeus haviam entregado Jesus porque tinham inveja dele. (Mateus 27:18)";
 frase[3031] = "Nós não devemos ser orgulhosos, nem provocar ninguém, nem ter inveja uns dos outros. (Gálatas 5:26)";
 frase[3032] = "Pois, onde há inveja e egoísmo, há também confusão e todo tipo de coisas más. (Tiago 3:16)";
 frase[3033] = "Portanto, abandonem tudo o que é mau, toda mentira, fingimento, inveja e críticas injustas. (1Pedro 2:1)";
 frase[3034] = "Isaque tinha tantas ovelhas e cabras, tanto gado e tantos empregados, que os filisteus acabaram ficando com inveja dele. (Gênesis 26:14)";
 frase[3035] = "Não tenha inveja dos pecadores. Procure respeitar e obedecer a Deus todos os dias da sua vida. (Provérbios 23:17)";
 frase[3036] = "Quando Raquel percebeu que não podia ter filhos, ficou com inveja da sua irmã Leia e disse ao marido: — Dê-me filhos; se não, eu morro! (Gênesis 30:1)";
 frase[3037] = "Você passará dificuldades e terá inveja de todas as coisas boas que vou dar ao povo de Israel, mas ninguém da sua família chegará a ficar velho. (1Samuel 2:32)";
 frase[3038] = "Por que é que vocês, montanhas tão altas, olham com inveja para o monte que Deus escolheu para nele morar? O Senhor Deus viverá ali para sempre. (Salmos 68:16)";
 frase[3039] = "Porém, quando vi que tudo ia bem para os orgulhosos e os maus, quase perdi a confiança em Deus porque fiquei com inveja deles. (Salmos 73:2)";
 frase[3040] = "Ali, no seu acampamento, eles ficaram com inveja de Moisés e também de Arão, o sacerdote dedicado ao serviço do Senhor. (Salmos 106:16)";
 frase[3041] = "Por acaso não tenho o direito de fazer o que quero com o meu próprio dinheiro? Ou você está com invejasomente porque fui bom para ele?”(Mateus 20:15)";
 frase[3042] = "os adultérios, a avareza, as maldades, as mentiras, as imoralidades, a inveja, a calúnia, o orgulho e o falar e agir sem pensar nas consequências. (Marcos 7:22)";
 frase[3043] = "Ele sabia muito bem que os chefes dos sacerdotes tinham inveja de Jesus e que era por isso que o haviam entregado a ele. (Marcos 15:10)";
 frase[3044] = "Então o Grande Sacerdote e todos os seus companheiros, que eram do partido dos saduceus, ficaram com inveja dos apóstolos e resolveram fazer alguma coisa. (Atos 5:17)";
 frase[3045] = "Estêvão continuou: — Os irmãos de José tinham inveja dele e o venderam para ser escravo no Egito. Mas Deus estava com ele(Atos 7:9)";
 frase[3046] = "Quando os judeus viram aquela multidão, ficaram com muita inveja. Então começaram a dizer o contrário do que Paulo dizia e o insultaram. (Atos 13:45)";
 frase[3047] = "Mas, se no coração de vocês existe inveja, amargura e egoísmo, então não mintam contra a verdade, gabando-se de serem sábios. (Tiago 3:14)";
 frase[3048] = "Não se irrite por causa dos que vencem na vida, nem tenha inveja dos que conseguem realizar os seus planos de maldade. Tenha paciência, pois o Senhor Deus cuidará disso. (Salmos 37:7)";
 frase[3049] = "Por isso, eu, o Senhor Deus, juro pela minha vida que o tratarei com a mesma ira, inveja e ódio com que você tratou o meu povo. Eles ficarão sabendo que eu o estou castigando pelo que você fez com eles. (Ezequiel 35:11)";
 frase[3050] = "Mas os judeus ficaram com inveja. Eles foram buscar alguns homens maus entre os malandros das ruas e formaram um grupo de desordeiros. Estes fizeram muita confusão na cidade e atacaram a casa de Jasão, procurando Paulo e Silas a fim de os levar para o meio do povo. (Atos 17:5)";
 frase[3051] = "Pois antigamente nós mesmos não tínhamos juízo e éramos rebeldes e maus. Éramos escravos das paixões e dos prazeres de todo tipo e passávamos a nossa vida no meio da malícia e da inveja. Os outros tinham ódio de nós, e nós tínhamos ódio deles. (Tito 3:3)";
 frase[3052] = "Eu a fiz linda assim e cheia de muitos galhos. No Éden, o jardim de Deus, todas as árvores a invejavam.”(Ezequiel 31:9)";
 frase[3053] = "as invejas, as bebedeiras, as farras e outras coisas parecidas com essas. Repito o que já disse: os que fazem essas coisas não receberão o Reino de Deus. (Gálatas 5:21)";
 frase[3054] = "essa pessoa está cheia de orgulho e não sabe nada. Discutir e brigar a respeito de palavras é como uma doença nessas pessoas. E daí vêm invejas, brigas, insultos, desconfianças maldosas(1Timóteo 6:4)";
 frase[3055] = "Lembre da Minha Ordem: Seja forte e corajoso! Não fique desanimado, nem tenha medo, porque eu, o Senhor, seu Deus, estarei com você em qualquer lugar para onde você for! (Josué 1:9)";
 frase[3056] = "Corra a boa corrida da fé e ganhe a vida eterna. Pois foi para essa vida que Deus o chamou quando você deu o seu belo testemunho de fé na presença de muitas testemunhas . (1Timóteo 6:12)";
 frase[3057] = "Que o próprio Jesus Cristo, o nosso Senhor, e Deus, o nosso Pai, que nos ama e que na sua bondade nos dá uma coragem que não acaba e uma esperança firme, (2Tessalonicenses 2:16)";
 frase[3058] = "Aos que têm riquezas neste mundo ordene que não sejam orgulhosos e que não ponham a sua esperança nessas riquezas, pois elas não dão segurança nenhuma. Que eles ponham a sua esperança em Deus, que nos dá todas as coisas em grande quantidade, para o nosso prazer! (1Timóteo 6:17)";
 frase[3059] = "Existem sete coisas que o Senhor Deus detesta e que não pode tolerar: o olhar orgulhoso, a língua mentirosa, mãos que matam gente inocente, a mente que faz planos perversos, pés que se apressam para fazer o mal, a testemunha falsa que diz mentiras e a pessoa que provoca brigas entre amigos. (Provérbios 6:16)";
 frase[3060] = "Você não ficará preocupado com os desastres que caem de repente como uma tempestade sobre os maus. (Provérbios 3:25)";
 frase[3061] = "No mundo dos mortos, ninguém te agradece, ninguém louva o teu nome; os que estão ali não confiam na tua fidelidade. (Isaías 38:18)";
 frase[3062] = "Se a nossa esperança em Cristo só vale para esta vida, nós somos as pessoas mais infelizes deste mundo. (1Coríntios 15:19)";
 frase[3063] = "O que eu digo é que vocês não devem ter nada a ver com ninguém que se diz irmão na fé, mas é imoral, ou avarento, ou adora ídolos, ou é bêbado, ou difamador, ou ladrão. Com gente assim vocês não devem nem comer uma refeição. (1Coríntios 5:11)";
 frase[3064] = "Mas alguém poderá dizer: “Você tem fé, e eu tenho ações.” E eu respondo: “Então me mostre como é possível ter fé sem que ela seja acompanhada de ações. Eu vou lhe mostrar a minha fé por meio das minhas ações.” (Tiago 2:18)";
 frase[3065] = "Tu sempre exististe, ó Senhor. Ó meu Santo Deus, tu és imortal. Tu és o nosso protetor. Ó Senhor, tu escolheste os babilônios e lhes deste forças para nos castigar. (Habacuque 1:12)";
 frase[3066] = "Quem tem juízo colhe no tempo certo, mas quem dorme na época da colheita passa vergonha. (Provérbios 10:5)";
 frase[3067] = "Ó Senhor Deus, felizes são aqueles que tu ensinas, aqueles a quem ensinas a tua lei! (Salmos 94:12)";
 frase[3068] = "Pela verdade de Cristo, a qual está em mim, eu garanto que ninguém, em nenhum lugar da Acaia, tirará de mim este orgulho de anunciar o evangelho sem cobrar nada. (2Coríntios 11:10)";
 frase[3069] = "Jesus continuou: — Eu afirmo a vocês, meus amigos: não tenham medo daqueles que matam o corpo, mas depois não podem fazer mais nada. (Lucas 12:4)";
 frase[3070] = "Para envergonhar os sábios, Deus escolheu aquilo que o mundo acha que é loucura; e, para envergonhar os poderosos, ele escolheu o que o mundo acha fraco. (1Coríntios 1:27)";
 frase[3071] = "Jovem, aproveite a sua mocidade e seja feliz enquanto é moço. Faça tudo o que quiser e siga os desejos do seu coração. Mas lembre de uma coisa: Deus o julgará por tudo o que você fizer. (Eclesiastes 11:9)";
 frase[3072] = "Eu descobri mais outra coisa neste mundo: nem sempre são os corredores mais velozes que ganham as corridas; nem sempre são os soldados mais valentes que ganham as batalhas. Notei ainda que as pessoas mais sábias nem sempre têm o que comer e que as mais inteligentes nem sempre ficam ricas. Notei também que as pessoas mais capazes nem sempre alcançam altas posições. Tudo depende da sorte e da ocasião. (Eclesiastes 9:11)";
 frase[3073] = "O oficial do exército romano e os seus soldados, que estavam guardando Jesus, viram o terremoto e tudo o que aconteceu. Então ficaram com muito medo e disseram: — De fato, este homem era o Filho de Deus! (Mateus 27:54)";
 frase[3074] = "Eles vão para a destruição no inferno porque o deus deles são os desejos do corpo. Eles têm orgulho daquilo que devia ser uma vergonha para eles e pensam somente nas coisas que são deste mundo. (Filipenses 3:19)";
 frase[3075] = "Naquela ocasião Jesus disse: — Ó Pai, Senhor do céu e da terra, eu te agradeço porque tens mostrado às pessoas sem instrução aquilo que escondeste dos sábios e dos instruídos! (Mateus 11:25)";
 frase[3076] = "Pois, onde há inveja e egoísmo, há também confusão e todo tipo de coisas más. (Tiago 3:16)";
 frase[3077] = "Mas será que é a mim que eles estão ferindo? Eu afirmo que não! Eles estão ferindo a si mesmos e vão passar vergonha. (Jeremias 7:19)";
 frase[3078] = "essa pessoa está cheia de orgulho e não sabe nada. Discutir e brigar a respeito de palavras é como uma doença nessas pessoas. E daí vêm invejas, brigas, insultos, desconfianças maldosas (1Timóteo 6:4)";
 frase[3079] = "Então Jesus afirmou: — Eu sou a ressurreição e a vida. Quem crê em mim, ainda que morra, viverá; e quem vive e crê em mim nunca morrerá. Você acredita nisso? (João 11:25-26) ";
 frase[3080] = "Então Jesus lhes disse: — Como vocês demoram a entender e a crer em tudo o que os profetas disseram! (Lucas 24:25)";
 frase[3081] = "Não deixes que os meus inimigos, aqueles mentirosos, se alegrem com a minha derrota! Não permitas que os que me odeiam sem motivo fiquem rindo, felizes, por causa da minha desgraça! (Salmos 35:19)";
 frase[3082] = "Pedimos a Deus que vocês se tornem fortes com toda a força que vem do glorioso poder dele, para que possam suportar tudo com paciência. (Colossenses 1:11)";
 frase[3083] = "Ele disse: — Se vocês prestarem atenção no que eu digo, se fizerem o que é certo e se guardarem os meus mandamentos, eu não os castigarei com nenhuma das doenças que mandei contra os egípcios. Eu sou o Senhor, que cura vocês. (Êxodo 15:26)";
 frase[3084] = "Ele castigará especialmente os que seguem os seus próprios desejos imorais e desprezam a autoridade dele. Esses falsos mestres são atrevidos e orgulhosos. Eles não têm nenhum respeito pelos gloriosos seres celestiais e os insultam. (2Pedro 2:10)";
 frase[3085] = "Portanto, sejam humildes debaixo da poderosa mão de Deus para que ele os honre no tempo certo. (1Pedro 5:6)";
 frase[3086] = "Mas, depois de sofrerem por um pouco de tempo, o Deus que tem por nós um amor sem limites e que chamou vocês para tomarem parte na sua eterna glória, por estarem unidos com Cristo, ele mesmo os aperfeiçoará e dará firmeza, força e verdadeira segurança. (1Pedro 5:10)";
 frase[3087] = "Estejam alertas e fiquem vigiando porque o inimigo de vocês, o Diabo, anda por aí como um leão que ruge, procurando alguém para devorar. (1Pedro 5:8)";
 frase[3088] = "Por isso, profetize para o meu povo de Israel e diga-lhes que eu, o Senhor Deus, abrirei as sepulturas deles, e os tirarei para fora, e os levarei de volta para a terra de Israel. Eu vou abrir os túmulos onde o meu povo está sepultado e vou tirá-los para fora; aí ficarão sabendo que eu sou o Senhor. (Ezequiel 37:12-13)";
 frase[3089] = "Porei a minha respiração neles, e os farei viver novamente, e os deixarei morar na sua própria terra. Aí ficarão sabendo que eu sou o Senhor. Prometi que faria isso e farei. Eu, o Senhor, falei. (Ezequiel 37:14)";
 frase[3090] = "Davi sabia o que Deus ia fazer e por isso falou a respeito da ressurreição do Messias. Davi disse: “Ele não foi abandonado no mundo dos mortos, nem o seu corpo apodreceu na sepultura.” Deus ressuscitou este Jesus, e todos nós somos testemunhas disso. (Atos 2:31-32)";
 frase[3091] = "Deus rebaixa os orgulhosos, mas salva os humildes. (Jó 22:29)";
 frase[3092] = "Nós que somos fortes na fé devemos ajudar os fracos a carregarem as suas cargas e não devemos agradar a nós mesmos. (Romanos 15:1)";
 frase[3093] = "Então eu me alegrarei por causa do que o Senhor Deus tem feito; ficarei feliz porque ele me salvou da morte. (Salmos 35:9)";
 frase[3094] = "Mas eu lhes digo: não se vinguem dos que fazem mal a vocês. Se alguém lhe der um tapa na cara, vire o outro lado para ele bater também. Se alguém processar você para tomar a sua túnica, deixe que leve também a capa. (Mateus 5:39-40)";

    <script>
    // --- LÓGICA PRINCIPAL (AGORA SEPARADA E GARANTIDA) ---
    (function() {
        // Elementos do DOM
        const verseDisplay = document.getElementById('verseDisplay');
        const newVerseBtn = document.getElementById('newVerseBtn');
        const phoneInput = document.getElementById('phoneNumber');

        // Converter o array para um array normal (caso tenha índices não sequenciais)
        const verseList = frase.filter(Boolean);

        // Índice atual
        let currentIndex = Math.floor(Math.random() * verseList.length);

        // Função para atualizar o versículo
        function updateVerse(index) {
            if (verseList[index]) {
                verseDisplay.innerText = verseList[index];
            } else {
                verseDisplay.innerText = "A paz de Cristo esteja com vocês! (Jo 14:27)";
            }
        }

        // Inicializa
        updateVerse(currentIndex);

        // EVENTO DO BOTÃO "NOVA MENSAGEM" - CORRIGIDO
        newVerseBtn.addEventListener('click', function() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * verseList.length);
            } while (verseList.length > 1 && newIndex === currentIndex);
            
            currentIndex = newIndex;
            updateVerse(currentIndex);
            console.log('Novo versículo:', verseList[currentIndex].substring(0, 30) + '...');
        });

        // Função global para enviar WhatsApp
        window.sendToWhatsApp = function() {
            let phone = phoneInput.value.trim().replace(/\D/g, '');
            
            if (phone === '') {
                alert('Por favor, digite o número do WhatsApp com DDD (ex: 5511999999999).');
                return;
            }
            
            const verseText = verseList[currentIndex];
            if (!verseText) return;

            const encodedMessage = encodeURIComponent(verseText + ' - Local Sagrado');
            const whatsappUrl = `https://wa.me/${phone}?text=${encodedMessage}`;
            window.open(whatsappUrl, '_blank');
        };
    })();
    </script>

    <!-- ==================== FOGOS DE ARTIFÍCIO ==================== -->
    <script>
    // Fireworks - código original adaptado
    if ((document.getElementById) && window.addEventListener || window.attachEvent) {
        (function() {
            var showerCol = new Array('#000000', '#ff0000', '#000000', '#00ff00', '#ff00ff', '#ffffff', '#ffa500', '#000000', '#fff000');
            var launchCol = new Array('#ffa500', '#00ff00', '#ffaaff', '#fff000', '#ffffff');
            var launchColour = "#00ff00";
            var rs = 30;
            var y = 200;
            var x = 200;
            var h;
            var w;
            var xs = 190;
            var t = null;
            var ss = 1;
            var e = 360 / 14;
            var f = new Array();
            var c1 = -1;
            var c2 = 5;
            var r;
            var pix = "px";
            var strictmod = ((document.compatMode) && document.compatMode.indexOf("CSS") != -1);
            var o;
            var domWw = (typeof window.innerWidth == "number");
            var domSy = (typeof window.pageYOffset == "number");
            var n = 14;
            var idx = 1;

            // Encontra um índice livre
            for (i = 0; i < n; i++) {
                if (document.getElementById(idx + i)) {
                    idx = (idx += (n));
                }
            }

            // Cria os divs dos fogos
            var placeholder = document.getElementById('fireworksPlaceholder');
            for (i = 0; i < n; i++) {
                var div = document.createElement('div');
                div.id = idx + i;
                div.style.position = 'absolute';
                div.style.top = '0px';
                div.style.left = '0px';
                div.style.height = '1px';
                div.style.width = '1px';
                div.style.fontSize = '1px';
                div.style.backgroundColor = launchColour;
                div.style.zIndex = '9999';
                document.body.appendChild(div); // Adiciona ao body para ficar sobre tudo
            }

            if (domWw) r = window;
            else {
                if (document.documentElement && typeof document.documentElement.clientWidth == "number" && document.documentElement.clientWidth != 0)
                    r = document.documentElement;
                else {
                    if (document.body && typeof document.body.clientWidth == "number")
                        r = document.body;
                }
            }

            function scrl(yx) {
                var y, x;
                if (domSy) {
                    y = r.pageYOffset;
                    x = r.pageXOffset;
                } else {
                    y = r.scrollTop;
                    x = r.scrollLeft;
                }
                return (yx == 0) ? y : x;
            }

            function wndwsz() {
                if (domWw) {
                    h = r.innerHeight;
                    w = r.innerWidth;
                } else {
                    h = r.clientHeight;
                    w = r.clientWidth;
                }
                o = (w >= h) ? h : w;
            }

            function rst() {
                c1 = 0;
                launchColour = launchCol[Math.floor(Math.random() * launchCol.length)];
                xs = Math.round(100 + Math.random() * (o / 4));
                y = xs + Math.round(Math.random() * (h - (xs * 2.2))) + scrl(0);
                x = xs + Math.round(Math.random() * (w - (xs * 2.2))) + scrl(1);
                ss = 1;
                for (i = 0; i < n; i++) {
                    if (f[i]) {
                        f[i].backgroundColor = launchColour;
                        f[i].width = ss + pix;
                        f[i].height = ss + pix;
                        f[i].fontSize = ss + pix;
                    }
                }
                dsply();
            }

            function dsply() {
                c1 += c2;
                t = setTimeout(dsply, rs);
                for (i = 0; i < n; i++) {
                    if (f[i]) {
                        f[i].top = y + xs * Math.sin(i * e * Math.PI / 180) * Math.sin(c1 / 100) + pix;
                        f[i].left = x + xs * Math.cos(i * e * Math.PI / 180) * Math.sin(c1 / 100) + pix;
                        if (c1 > 100) {
                            ss = (xs < 150) ? 1 : Math.round(1 + Math.random() * 2);
                            f[i].backgroundColor = showerCol[Math.floor(Math.random() * showerCol.length)];
                            f[i].width = ss + pix;
                            f[i].height = ss + pix;
                            f[i].fontSize = ss + pix;
                        }
                    }
                }
                if (c1 > 160) {
                    clearTimeout(t);
                    rst();
                }
            }

            function init() {
                wndwsz();
                for (i = 0; i < n; i++) {
                    var el = document.getElementById(idx + i);
                    if (el) f[i] = el.style;
                }
                var strt = Math.floor(500 + Math.random() * 2000);
                setTimeout(dsply, strt);
            }

            if (window.addEventListener) {
                window.addEventListener("resize", wndwsz, false);
                window.addEventListener("load", init, false);
            } else if (window.attachEvent) {
                window.attachEvent("onresize", wndwsz);
                window.attachEvent("onload", init);
            }
        })();
    }
    // End.
    </script>
