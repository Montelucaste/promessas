 frase[1026] = "Então ele disse aos discípulos: — Por acaso vocês não têm fé? Mas eles estavam admirados e com medo e diziam uns aos outros: — Que homem é este? Ele manda até no vento e nas ondas, e eles obedecem! (Lucas 8:25)";
 frase[1027] = "É Deus quem veste a erva do campo, que hoje está aqui e amanhã desaparece, queimada no forno. Então é claro que ele vestirá também vocês, que têm uma fé tão pequena! (Lucas 12:28)";
 frase[1028] = "E ele respondeu: — Se a fé que vocês têm fosse do tamanho de uma semente de mostarda, vocês poderiam dizer a esta figueira brava: “Arranque-se pelas raízes e vá se plantar no mar!” E ela obedeceria. (Lucas 17:6)";
 frase[1029] = "Eu afirmo a vocês que ele julgará a favor do seu povo e fará isso bem depressa. Mas, quando o Filho do Homem vier, será que vai encontrar fé na terra?(Lucas 18:8)";
 frase[1030] = "Todos concordaram com a proposta dos apóstolos. Então escolheram Estêvão, um homem cheio de fé e do Espírito Santo, e também Filipe, Prócoro, Nicanor, Timom, Pármenas e Nicolau de Antioquia, um não judeu que antes tinha se convertido ao Judaísmo. (Atos 6:5)";
 frase[1031] = "A palavra de Deus continuava a se espalhar. Em Jerusalém o número dos seguidores de Jesus crescia cada vez mais, e era grande o número de sacerdotes judeus que aceitavam a fé cristã. (Atos 6:7)";
 frase[1032] = "Eles animavam os cristãos e lhes davam coragem para ficarem firmes na fé. E também ensinavam que era preciso passar por muitos sofrimentos para poder entrar no Reino de Deus. (Atos 14:22)";
 frase[1033] = "Durante muito tempo eu os castiguei em todas as sinagogas e os forcei a negar a sua fé. Tinha tanto ódio deles, que até fui a outras cidades para persegui-los. (Atos 26:11)";
 frase[1034] = "Em primeiro lugar, por meio de Jesus Cristo dou graças ao meu Deus por todos vocês, pois no mundo inteiro se ouve falar a respeito da fé que vocês têm. (Romanos 1:8)";
 frase[1035] = "Deus aceita as pessoas por meio da fé que elas têm em Jesus Cristo. É assim que ele trata todos os que creem, pois não existe nenhuma diferença entre as pessoas. (Romanos 3:22)";
 frase[1036] = "Será que isso quer dizer que, por causa da fé, nós tratamos a lei como se ela não valesse nada? Não; de modo nenhum! Pelo contrário, afirmamos que a lei tem valor. (Romanos 3:31)";
 frase[1037] = "Ele é também o pai dos que são circuncidados. Não apenas porque são circuncidados, mas porque vivem a mesma vida de fé que Abraão, o nosso pai, viveu antes de ter sido circuncidado. (Romanos 4:12)";
 frase[1038] = "Abraão teve fé e esperança, mesmo quando não havia motivo para ter esperança, e por isso ele se tornou “o pai de muitas nações”. Como dizem as Escrituras: “Os seus descendentes serão muitos.”(Romanos 4:18)";
 frase[1039] = "Abraão tinha quase cem anos. Mas, mesmo quando ele pensou a respeito do seu corpo, que já estava como morto, ou quando lembrou que Sara não podia ter filhos, a sua fé não enfraqueceu. (Romanos 4:19)";
 frase[1040] = "Foi Cristo quem nos deu, por meio da nossa fé, esta vida na graça de Deus. E agora continuamos firmes nessa graça e nos alegramos na esperança de participar da glória de Deus. (Romanos 5:2)";
 frase[1041] = "Porém, quanto a ser aceito por Deus por meio da fé, Moisés diz o seguinte: “Não fique pensando assim: quem vai subir até o céu?”, isto é, para trazer Cristo do céu. (Romanos 10:6)";
 frase[1042] = "O que Moisés diz é isto: “A mensagem de Deus está perto de você, nos seus lábios e no seu coração” — isto é, a mensagem de fé que anunciamos. (Romanos 10:8)";
 frase[1043] = "Portanto, usemos os nossos diferentes dons de acordo com a graça que Deus nos deu. Se o dom que recebemos é o de anunciar a mensagem de Deus, façamos isso de acordo com a fé que temos. (Romanos 12:6)";
 frase[1044] = "Meus irmãos, peço que tomem cuidado com as pessoas que provocam divisões, que atrapalham os outros na fé e que vão contra o ensinamento que vocês receberam. Afastem-se dessas pessoas(Romanos 16:17)";
 frase[1045] = "Na verdade, irmãos, eu não pude falar com vocês como costumo fazer com as pessoas que têm o Espírito de Deus. Tive de falar com vocês como se vocês fossem pessoas do mundo, como se fossem crianças na fécristã. (1Coríntios 3:1)";
 frase[1046] = "Mesmo que vocês tivessem milhares de mestres na fé cristã, não poderiam ter mais de um pai. Pois, quando levei a vocês o evangelho, eu me tornei o pai de vocês na vida que vivem em união com Cristo Jesus. (1Coríntios 4:15)";
 frase[1047] = "Quando algum de vocês tem uma queixa contra um irmão na fé, como se atreve a pedir justiça a juízes pagãos, em vez de pedir ao povo de Deus que resolva o caso?(1Coríntios 6:1)";
 frase[1048] = "Agora vou tratar do problema dos alimentos oferecidos aos ídolos. Na verdade, como se diz, “todos nós temos conhecimento.” Porém esse tipo de conhecimento enche a pessoa de orgulho; mas o amor nos faz progredir na fé. (1Coríntios 8:1)";
 frase[1049] = "Quando estou entre os fracos na fé, eu me torno fraco também a fim de ganhá-los para Cristo. Assim eu me torno tudo para todos a fim de poder, de qualquer maneira possível, salvar alguns. (1Coríntios 9:22)";
 frase[1050] = "Poderia ter o dom de anunciar mensagens de Deus, ter todo o conhecimento, entender todos os segredos e ter tanta fé, que até poderia tirar as montanhas do seu lugar, mas, se não tivesse amor, eu não seria nada. (1Coríntios 13:2)";
 frase[1051] = "Eu pedi a Tito que fosse visitá-los e mandei com ele o outro irmão na fé. Por acaso Tito os explorou? Será que nós dois não temos agido do mesmo modo e com o mesmo espírito?(2Coríntios 12:18)";
 frase[1052] = "Examinem-se para descobrir se vocês estão firmes na fé. Com certeza vocês sabem que Jesus Cristo está unido com vocês, a não ser que vocês tenham falhado completamente. (2Coríntios 13:5)";
 frase[1053] = "Cristo fez isso para que a bênção que Deus prometeu a Abraão seja dada, por meio de Cristo Jesus, aos não judeus e para que todos nós recebamos por meio da fé o Espírito que Deus prometeu. (Gálatas 3:14)";
 frase[1054] = "Porém as Escrituras Sagradas afirmam que o mundo inteiro está dominado pelo pecado, e isso para que as pessoas que creem recebam o que Deus promete aos que têm fé em Jesus Cristo. (Gálatas 3:22)";
 frase[1055] = "Mas nós temos a esperança de que Deus nos aceitará, e é isso o que esperamos pelo poder do Espírito de Deus, que age por meio da nossa fé. (Gálatas 5:5)";
 frase[1056] = "Desse modo todos nós chegaremos a ser um na nossa fé e no nosso conhecimento do Filho de Deus. E assim seremos pessoas maduras e alcançaremos a altura espiritual de Cristo. (Efésios 4:13)";
 frase[1057] = "Talvez o meu sangue, isto é, a minha vida, seja apresentado como uma oferta junto com o sacrifício que vocês, por meio da sua fé, oferecem a Deus. Se isso acontecer, ficarei contente e me alegrarei com todos vocês. (Filipenses 2:17)";
 frase[1058] = "Pois, quando vocês foram batizados, foram sepultados com Cristo; e no batismo também foram ressuscitados com ele por meio da fé que vocês têm no grande poder de Deus, o mesmo Deus que ressuscitou Cristo. (Colossenses 2:12)";
 frase[1059] = "Pois lembramos, na presença do nosso Deus e Pai, como vocês puseram em prática a sua fé, como o amor de vocês os fez trabalhar tanto e como é firme a esperança que vocês têm no nosso Senhor Jesus Cristo. (1Tessalonicenses 1:3)";
 frase[1060] = "e enviar a vocês o nosso irmão Timóteo. Ele tem trabalhado conosco no serviço de Deus, anunciando o evangelho de Cristo. Nós o enviamos para animar e ajudar vocês na fé,(1Tessalonicenses 3:2)";
 frase[1061] = "Dia e noite pedimos a ele de todo o coração que nos deixe ir vê-los pessoalmente para podermos completar o que ainda falta na fé que vocês têm. (1Tessalonicenses 3:10)";
 frase[1062] = "Mas nós, que somos do dia, devemos estar em nosso perfeito juízo. Nós devemos usar a fé e o amor como couraça e a nossa esperança de salvação como capacete. (1Tessalonicenses 5:8)";
 frase[1063] = "Tomem cuidado para que ninguém pague o mal com o mal. Pelo contrário, procurem em todas as ocasiões fazer o bem uns aos outros e também aos que não são irmãos na fé. (1Tessalonicenses 5:15)";
 frase[1064] = "É por isso que nas igrejas de Deus falamos com orgulho sobre vocês. Nós temos orgulho de vocês por causa da paciência e da fé que vocês mostram no meio de todas as perseguições e sofrimentos. (2Tessalonicenses 1:4)";
 frase[1065] = "escrevo a você, Timóteo, meu verdadeiro filho na fé. Que a graça, a misericórdia e a paz de Deus, o Pai, e de Cristo Jesus, o nosso Senhor, estejam com você! (1Timóteo 1:2)";
 frase[1066] = "Essa ordem está sendo dada a fim de que amemos uns aos outros com um amor que vem de um coração puro, de uma consciência limpa e de uma fé verdadeira. (1Timóteo 1:5)";
 frase[1067] = "Ele fez isso apesar de eu ter dito blasfêmias contra ele no passado e de o ter perseguido e insultado. Mas Deus teve misericórdia de mim, pois eu não tinha fé e por isso não sabia o que estava fazendo. (1Timóteo 1:13)";
 frase[1068] = "Pois o amor ao dinheiro é uma fonte de todos os tipos de males. E algumas pessoas, por quererem tanto ter dinheiro, se desviaram da fé e encheram a sua vida de sofrimentos. (1Timóteo 6:10)";
 frase[1069] = "Agora, diante de Deus, que dá vida a todas as criaturas, e diante de Cristo Jesus, que deu o seu belo testemunho de fé em frente de Pôncio Pilatos, eu ordeno a você o seguinte:(1Timóteo 6:13)";
 frase[1070] = "escrevo a você, Timóteo, meu querido filho na fé. Que a graça, a misericórdia e a paz de Deus, o Pai, e de Cristo Jesus, o nosso Senhor, estejam com você! (2Timóteo 1:2)";
 frase[1071] = "E você, Timóteo, fuja das paixões da mocidade e procure viver uma vida correta, com fé, amor e paz, junto com os que com um coração puro pedem a ajuda do Senhor. (2Timóteo 2:22)";
 frase[1072] = "Mas você tem seguido os meus ensinamentos, a minha maneira de agir e o propósito que tenho na minha vida. E tem seguido também a minha fé, a minha paciência, o meu amor, a minha perseverança,(2Timóteo 3:10)";
 frase[1073] = "Peço a Deus que a fé que une você a nós faça com que compreendamos mais profundamente todas as bênçãos que temos recebido na nossa vida, por estarmos unidos com Cristo. (Filemom 1:6)";
 frase[1074] = "Pois, assim como aquelas pessoas ouviram, também nós ouvimos a boa notícia. Elas ouviram a mensagem, porém ela não lhes fez nenhum bem porque, quando a ouviram, não a receberam com fé. (Hebreus 4:2)";
 frase[1075] = "Como é que as pessoas que abandonaram a fé podem se arrepender de novo? Elas já estavam na luz de Deus. Já haviam experimentado o dom do céu e recebido a sua parte do Espírito Santo. (Hebreus 6:4)";
 frase[1076] = "Deus não é injusto. Ele não esquece o trabalho que vocês fizeram nem o amor que lhe mostraram na ajuda que deram e ainda estão dando aos seus irmãos na fé. (Hebreus 6:10)";
 frase[1077] = "Foi pela fé que Enoque escapou da morte. Ele foi levado para Deus, e ninguém o encontrou porque Deus mesmo o havia levado. As Escrituras Sagradas dizem que antes disso ele já havia agradado a Deus. (Hebreus 11:5)";
 frase[1078] = "Foi pela fé que Abraão, ao ser chamado por Deus, obedeceu e saiu para uma terra que Deus lhe prometeu dar. Ele deixou o seu próprio país, sem saber para onde ia. (Hebreus 11:8)";
 frase[1079] = "Foi pela fé que Abraão se tornou pai, embora fosse velho demais e a própria Sara não pudesse ter filhos. Ele creu que Deus ia cumprir a sua promessa. (Hebreus 11:11)";
 frase[1080] = "Todos esses morreram cheios de fé. Não receberam as coisas que Deus tinha prometido, mas as viram de longe e ficaram contentes por causa delas. E declararam que eram estrangeiros e refugiados, de passagem por este mundo. (Hebreus 11:13)";
 frase[1081] = "Foi pela fé que Abraão, quando Deus o quis pôr à prova, ofereceu o seu filho Isaque em sacrifício. Deus tinha prometido muitos descendentes a Abraão, mas mesmo assim ele estava pronto para oferecer o seu único filho em sacrifício. (Hebreus 11:17)";
 frase[1082] = "Foi pela fé que José, quando estava para morrer, falou da saída dos israelitas do Egito e deu ordens sobre o que deveria ser feito com o seu corpo. (Hebreus 11:22)";
 frase[1083] = "Foi pela fé que os pais de Moisés, quando ele nasceu, o esconderam durante três meses. Eles viram que o menino era bonito e não tiveram medo de desobedecer à ordem do rei. (Hebreus 11:23)";
 frase[1084] = "Pela fé Moisés começou o costume de celebrar a Páscoa e mandou marcar com sangue as portas das casas dos israelitas para que o Anjo da Morte não matasse os filhos mais velhos deles. (Hebreus 11:28)";
 frase[1085] = "Pela fé mulheres receberam de volta os seus mortos, que ressuscitaram. Outros foram torturados até a morte; eles recusaram ser postos em liberdade a fim de ressuscitar para uma vida melhor. (Hebreus 11:35)";
 frase[1086] = "Por isso, por meio de Jesus Cristo, ofereçamos sempre louvor a Deus. Esse louvor é o sacrifício que apresentamos, a oferta que é dada por lábios que confessam a sua fé nele. (Hebreus 13:15)";
 frase[1087] = "Essas bênçãos são para vocês que, por meio da fé, são guardados pelo poder de Deus para a salvação que está pronta para ser revelada no fim dos tempos. (1Pedro 1:5)";
 frase[1088] = "Agora que vocês já se purificaram pela obediência à verdade e agora que já têm um amor sincero pelos irmãos na fé, amem uns aos outros com todas as forças e com um coração puro. (1Pedro 1:22)";
 frase[1089] = "Eu, Simão Pedro, servo e apóstolo de Jesus Cristo, escrevo esta carta a vocês que, por causa da bondade do nosso Deus e Salvador Jesus Cristo, receberam uma fé tão preciosa como a nossa. (2Pedro 1:1)";
 frase[1090] = "Eu sei que vocês moram aí onde está o trono de Satanás . Vocês são fiéis e não abandonaram a fé que têm em mim, até mesmo quando Antipas, minha testemunha fiel, foi morto aí em Pérgamo, onde Satanás mora. (Apocalipse 2:13)";
 frase[1091] = "Por causa da bondade de Deus para comigo, me chamando para ser apóstolo, eu digo a todos vocês que não se achem melhores do que realmente são. Pelo contrário, pensem com humildade a respeito de vocês mesmos, e cada um julgue a si mesmo conforme a fé que Deus lhe deu. (Romanos 12:3)";
 frase[1092] = "Porém o Senhor disse a Moisés e a Arão: — Vocês não tiveram fé suficiente para fazer com que o povo de Israel reconhecesse o meu santo poder e por isso vocês não vão levá-los para a terra que prometi dar a eles. (Números 20:12)";
 frase[1093] = "Você vai abrir os olhos deles a fim de que eles saiam da escuridão para a luz e do poder de Satanás para Deus. Então, por meio da fé em mim, eles serão perdoados dos seus pecados e passarão a ser parte do povo escolhido de Deus.”(Atos 26:18)";
 frase[1094] = "Porém a pessoa que não põe a sua esperança nas coisas que faz, mas simplesmente crê em Deus, é a fé dessa pessoa que faz com que ela seja aceita por Deus, o Deus que trata o culpado como se ele fosse inocente. (Romanos 4:5)";
 frase[1095] = "Ele foi circuncidado mais tarde. E a sua circuncisão foi um sinal para provar que Deus aceitou Abraão porque ele tinha fé; e isso aconteceu quando ele ainda não havia sido circuncidado. Assim Abraão é o pai espiritual de todos os que creem em Deus e são aceitos por ele, mesmo que não sejam circuncidados. (Romanos 4:11)";
 frase[1096] = "Portanto, a promessa de Deus depende da fé, a fim de que a promessa seja garantida como presente de Deus a todos os descendentes de Abraão. Ela não é somente para os que obedecem à lei, mas também para os que creem em Deus como Abraão creu, pois ele é o pai espiritual de todos nós. (Romanos 4:16)";
 frase[1097] = "Louvemos a Deus! Pois ele pode conservar vocês firmes na fé, de acordo com o evangelho que eu anuncio, isto é, a mensagem a respeito de Jesus Cristo. E de acordo também com a verdade secreta que nunca foi revelada no passado. (Romanos 16:25)";
 frase[1098] = "O que eu digo é que vocês não devem ter nada a ver com ninguém que se diz irmão na fé, mas é imoral, ou avarento, ou adora ídolos, ou é bêbado, ou difamador, ou ladrão. Com gente assim vocês não devem nem comer uma refeição. (1Coríntios 5:11)";
 frase[1099] = "Afinal de contas eu não tenho o direito de julgar os que não são cristãos. Deus os julgará. Mas será que vocês não devem julgar os seus irmãos na fé? Como dizem as Escrituras Sagradas: “Expulsem do meio de vocês esse homem imoral.”(1Coríntios 5:12)";
 frase[1100] = "Nós rejeitamos tudo o que é feito escondido e tudo o que é vergonhoso. Não agimos de má-fé, nem falsificamos a mensagem de Deus. Pelo contrário, agimos sempre abertamente, de acordo com a verdade, e assim as pessoas têm uma boa impressão de nós, que vivemos na presença de Deus. (2Coríntios 4:2)";
 frase[1101] = "Vocês mostram que, em tudo, são mais ricos do que os outros: na fé, na palavra, no conhecimento, na vontade de ajudar os outros e no nosso amor por vocês. E nesse novo serviço de amor queremos também que façam mais do que os outros. (2Coríntios 8:7)";
 frase[1102] = "Assim não nos orgulhamos do trabalho que outros têm feito em lugares que vão além dos limites que Deus nos deu. Pelo contrário, esperamos que a fé que vocês têm possa crescer e que nós possamos fazer um trabalho ainda maior entre vocês, sempre dentro dos limites que Deus tem posto para nós. (2Coríntios 10:15)";
 frase[1103] = "Porém alguns tinham se juntado ao nosso grupo, fazendo de conta que eram irmãos na fé, e queriam circuncidá-lo. Eram homens que tinham entrado para o grupo como espiões a fim de espiar a liberdade que temos por estarmos unidos com Cristo Jesus e para nos tornar escravos de novo. (Gálatas 2:4)";
 frase[1104] = "Antes que isso acontecesse, as Escrituras viram que Deus ia aceitar os não judeus por meio da fé. Por isso, antes de chegar o tempo, elas anunciaram a boa notícia a Abraão, dizendo: “Por meio de você, Deus abençoará todos os povos.”(Gálatas 3:8)";
 frase[1105] = "Agora, o mais importante é que vocês vivam de acordo com o evangelho de Cristo. Desse modo, tanto se eu puder ir visitar vocês como se não puder, eu saberei que vocês continuam firmes e unidos. E saberei também que vocês, por meio da fé que se baseia no evangelho, estão lutando juntos, com um só desejo. (Filipenses 1:27)";
 frase[1106] = "Quando a verdadeira mensagem, a boa notícia do evangelho, chegou a vocês pela primeira vez, vocês ouviram falar a respeito da esperança que o evangelho oferece. Por isso, a fé e o amor que vocês têm são baseados naquilo que esperam e que está guardado para vocês no céu. (Colossenses 1:5)";
 frase[1107] = "Pois a mensagem a respeito do Senhor partiu de vocês e se espalhou pela Macedônia e pela Acaia, e as notícias sobre a fé que vocês têm em Deus chegaram a todos os lugares. Portanto, sobre isso não é preciso falarmos mais nada. (1Tessalonicenses 1:8)";
 frase[1108] = "Por isso não pude aguentar mais sem ter notícias de vocês e enviei Timóteo para saber como vai a fé que vocês têm. É que eu tinha medo de que o Diabo os tivesse tentado de tal modo, que todo o nosso trabalho tivesse ficado inútil. (1Tessalonicenses 3:5)";
 frase[1109] = "Agora Timóteo já voltou daí de Tessalônica e nos trouxe boas notícias a respeito da fé que vocês têm em Deus e do amor que vocês têm uns pelos outros. Ele nos contou que vocês sempre lembram de nós com carinho e que têm tanta vontade de nos ver como nós temos de ver vocês. (1Tessalonicenses 3:6)";
 frase[1110] = "Irmãos, sempre temos de dar graças a Deus por vocês. Para nós é certo fazer isso porque a fé que vocês têm está crescendo cada vez mais, e o amor que vocês têm uns pelos outros está se tornando cada vez maior. (2Tessalonicenses 1:3)";
 frase[1111] = "É por isso que sempre oramos por vocês, pedindo que o nosso Deus, que chamou vocês para a nova vida, faça com que sejam merecedores dela. Pedimos também que ele, pelo seu poder, realize todos os desejos que vocês têm de fazer o bem e complete o trabalho que fazem com fé. (2Tessalonicenses 1:11)";
 frase[1112] = "Irmãos, sempre devemos dar graças a Deus por vocês, a quem o Senhor ama. Pois Deus os escolheu como os primeiros a serem salvos pelo poder do Espírito Santo e pela fé que vocês têm na verdade, a fim de tornar vocês o seu povo dedicado a ele. (2Tessalonicenses 2:13)";
 frase[1113] = "Diga a essa gente que deixe de lado as lendas e as longas listas de nomes de antepassados , pois essas coisas só produzem discussões. Elas não têm nada a ver com o plano de Deus, que é conhecido somente por meio da fé. (1Timóteo 1:4)";
 frase[1114] = "Sem nenhuma dúvida, é grandiosa a verdade revelada da nossa religião. Essa verdade é a seguinte: “Ele se tornou um ser humano, foi aprovado pelo Espírito de Deus, foi visto pelos anjos, foi anunciado entre as nações, foi aceito com fé por muitos no mundo inteiro e foi levado para a glória.”(1Timóteo 3:16)";
 frase[1115] = "E os escravos que têm dono cristão não devem perder o respeito por ele por ser seu irmão na fé. Pelo contrário, devem trabalhar para ele melhor ainda, pois o dono, que recebe os seus serviços, é cristão e irmão amado. Ensine e recomende estas coisas:(1Timóteo 6:2)";
 frase[1116] = "Eu, Paulo, servo de Deus e apóstolo de Jesus Cristo, escrevo esta carta. Eu fui escolhido e mandado para ajudar a tornar mais forte a fé que o povo de Deus tem e para fazer com que eles conheçam a verdade ensinada pela nossa religião,(Tito 1:1)";
 frase[1117] = "Escrevo para vocês esta pequena carta com a ajuda de Silas, a quem eu considero um fiel irmão na fé. Quero animá-los e dar o meu testemunho de que as bênçãos que vocês têm recebido são uma prova verdadeira da graça de Deus. Continuem firmes, pois, nessa graça. (1Pedro 5:12)";
 frase[1118] = "E foi isso mesmo que ele disse em todas as suas cartas quando escreveu a respeito disso. Nas cartas dele há algumas coisas difíceis de entender, que os ignorantes e os fracos na fé explicam de maneira errada, como fazem também com outras partes das Escrituras Sagradas. E assim eles causam a sua própria destruição. (2Pedro 3:16)";
 frase[1119] = "Meus queridos amigos, eu estava fazendo todo o possível para escrever a vocês a respeito da salvação que temos em comum. Então senti que era necessário escrever agora para animá-los a combater a favor da féque, uma vez por todas, Deus deu ao seu povo. (Judas 1:3)";
 frase[1120] = "Conservemos os nossos olhos fixos em Jesus, pois é por meio dele que a nossa fé começa, e é ele quem a aperfeiçoa. Ele não deixou que a cruz fizesse com que ele desistisse. Pelo contrário, por causa da alegria que lhe foi prometida, ele não se importou com a humilhação de morrer na cruz e agora está sentado do lado direito do trono de Deus. (Hebreus 12:2)";
 frase[1121] = "Pois a Síria não é mais forte do que Damasco, a sua capital, e Damasco não é mais forte do que o rei Rezim. A terra de Israel não é mais forte do que Samaria, a sua capital, e Samaria não é mais forte do que o rei Peca. Mas daqui a sessenta e cinco anos Israel será destruído e deixará de existir como nação. — Se vocês não tiverem uma fé firme, não poderão ficar firmes. (Isaías 7:8)";
 frase[1122] = "Deus ofereceu Cristo como sacrifício para que, pela sua morte na cruz, Cristo se tornasse o meio de as pessoas receberem o perdão dos seus pecados, pela fé nele. Deus quis mostrar com isso que ele é justo. No passado ele foi paciente e não castigou as pessoas por causa dos seus pecados; mas agora, pelo sacrifício de Cristo, Deus mostra que é justo. Assim ele é justo e aceita os que creem em Jesus. (Romanos 3:25)";
 frase[1123] = "Entreguem todas as suas preocupações a Deus, pois ele cuida de vocês. (1Pedro 5:7)";
 frase[1124] = "Não se preocupem com nada, mas em todas as orações peçam a Deus o que vocês precisam e orem sempre com o coração agradecido. (Filipenses 4:6)";
 frase[1125] = "E a paz de Deus, que ninguém consegue entender, guardará o coração e a mente de vocês, pois vocês estão unidos com Cristo Jesus. (Filipenses 4:7)";
 frase[1126] = "Eu digo isso para que, por estarem unidos comigo, vocês tenham paz. No mundo vocês vão sofrer; mas tenham coragem. Eu venci o mundo. (João 16:33)";
 frase[1127] = "Que o Senhor da paz dê a vocês a paz, sempre e de todas as maneiras! E que o Senhor esteja com todos vocês! (2Tessalonicenses 3:16)";
 frase[1128] = "Tu, ó Senhor, dás paz e prosperidade às pessoas que têm uma fé firme, às pessoas que confiam em ti. (Isaías 26:3)";
 frase[1129] = "Não conhecem o caminho da paz(Romanos 3:17)";
 frase[1130] = "mas eles encontram a paz. Os que vivem uma vida correta descansam em paz na sepultura.”(Isaías 57:2)";
 frase[1131] = "— Antes de atacarem uma cidade, façam uma proposta de paz. (Deuteronômio 20:10)";
 frase[1132] = "Josafá viveu em paz com o rei de Israel. (1Reis 22:45)";
 frase[1133] = "“Ao rei Dario: Que o senhor governe em paz! (Esdras 5:7)";
 frase[1134] = "Não tenho paz, nem descanso, nem sossego; só tenho agitação.”(Jó 3:26)";
 frase[1135] = "Quando falo de paz, eles falam a favor de guerra. (Salmos 120:7)";
 frase[1136] = "— Não pensem que eu vim trazer paz ao mundo. Não vim trazer a paz, mas a espada. (Mateus 10:34)";
 frase[1137] = "— Deixo com vocês a paz. É a minha paz que eu lhes dou; não lhes dou a paz como o mundo a dá. Não fiquem aflitos, nem tenham medo. (João 14:27)";
 frase[1138] = "colocarei palavras de louvor. A todos ofereço a paz, paz aos que estão perto e aos que estão longe; eu os curarei. (Isaías 57:19)";
 frase[1139] = "Se um homem de paz morar ali, deixem a saudação com ele; mas, se o homem não for de paz, retirem a saudação. (Lucas 10:6)";
 frase[1140] = "Vocês pensam que eu vim trazer paz ao mundo? Pois eu afirmo a vocês que não vim trazer paz, mas divisão. (Lucas 12:51)";
 frase[1141] = "e calcem, como sapatos, a prontidão para anunciar a boa notícia de paz. (Efésios 6:15)";
 frase[1142] = "São estas as leis para as ofertas de paz que são apresentadas a Deus, o Senhor. (Levítico 7:11)";
 frase[1143] = "A coxa direita do animal morto como oferta de paz será do sacerdote(Levítico 7:32)";
 frase[1144] = "que o Senhor olhe para vocês com amor e lhes dê a paz.”(Números 6:26)";
 frase[1145] = "Portanto, volte para casa em paz e não faça nada que possa desagradar a esses governadores. (1Samuel 29:7)";
 frase[1146] = "— Vá em paz! — disse o rei. Aí Absalão foi a Hebrom. (2Samuel 15:9)";
 frase[1147] = "Ele ordenou: — Prendam vivos esses soldados, quer tenham vindo para lutar, quer tenham vindo pedir paz. (1Reis 20:18)";
 frase[1148] = "Durante os dois anos seguintes houve paz entre Israel e a Síria. (1Reis 22:1)";
 frase[1149] = "Se eu tivesse morrido naquele momento, agora estaria dormindo, descansando em paz. (Jó 3:13)";
 frase[1150] = "Os maus têm sempre do bom e do melhor e morrem em paz, sem sofrimento. (Jó 21:13)";
 frase[1151] = "“No entanto, a Deus eles dizem: ‘Deixa-nos em paz; não queremos saber das tuas leis. (Jó 21:14)";
 frase[1152] = "“Deus é poderoso e deve ser temido; ele faz com que haja paz no céu. (Jó 25:2)";
 frase[1153] = "Quando me deito, durmo em paz, pois só tu, ó Senhor, me fazes viver em segurança. (Salmos 4:8)";
 frase[1154] = "Mas os humildes viverão em segurança na Terra Prometida e terão alegria, prosperidade e paz. (Salmos 37:11)";
 frase[1155] = "Somente em Deus eu encontro paz; é dele que vem a minha salvação. (Salmos 62:1)";
 frase[1156] = "Somente em Deus eu encontro paz e nele ponho a minha esperança. (Salmos 62:5)";
 frase[1157] = "O amor e a fidelidade se encontrarão; a justiça e a paz se abraçarão. (Salmos 85:10)";
 frase[1158] = "Há muito tempo que estou morando com aqueles que odeiam a paz. (Salmos 120:6)";
 frase[1159] = "Orem para que haja paz em Jerusalém. “Ó Jerusalém, que prosperem aqueles que a amam! (Salmos 122:6)";
 frase[1160] = "Que haja paz na cidade protegida por muralhas! Que haja segurança nos seus palácios!”(Salmos 122:7)";
 frase[1161] = "Ele conserva a paz nas fronteiras e alimenta o povo com o melhor trigo. (Salmos 147:14)";
 frase[1162] = "— Paguei hoje os meus votos, e a carne da oferta de paz está comigo. (Provérbios 7:14)";
 frase[1163] = "A pessoa honesta anda em paz e segurança, mas a desonesta será desmascarada. (Provérbios 10:9)";
 frase[1164] = "Quem esconde a verdade causa problemas, mas quem critica com franqueza trabalha pela paz. (Provérbios 10:10)";
 frase[1165] = "O mensageiro perverso causa a desgraça, mas o de confiança traz a paz. (Provérbios 13:17)";
 frase[1166] = "A paz de espírito dá saúde ao corpo, mas a inveja destrói como câncer. (Provérbios 14:30)";
 frase[1167] = "A pessoa de mau gênio sempre causa problemas, mas a que tem paciência traz a paz. (Provérbios 15:18)";
 frase[1168] = "Há tempo de amar e tempo de odiar; tempo de guerra e tempo de paz. (Eclesiastes 3:8)";
 frase[1169] = "Agora o mundo inteiro está calmo e em paz, e todos cantam de alegria. (Isaías 14:7)";
 frase[1170] = "A justiça trará paz e tranquilidade, trará segurança que durará para sempre. (Isaías 32:17)";
 frase[1171] = "O meu povo viverá em lugares seguros; todos estarão em paz e segurança nas suas casas. (Isaías 32:18)";
 frase[1172] = "Eu mesmo ensinarei todos os seus moradores, e eles viverão em paz e segurança. (Isaías 54:13)";
 frase[1173] = "“Ouvi um grito de terror, grito de medo e não de paz. (Jeremias 30:5)";
 frase[1174] = "Já não sei mais o que é paz e esqueci o que é felicidade. (Lamentações 3:17)";
 frase[1175] = "O desespero está chegando. Vocês procurarão a paz, porém não a encontrarão. (Ezequiel 7:25)";
 frase[1176] = "— Felizes as pessoas que trabalham pela paz, pois Deus as tratará como seus filhos. (Mateus 5:9)";
 frase[1177] = "Quando entrarem numa casa, digam: “Que a paz esteja nesta casa!”(Mateus 10:12)";
 frase[1178] = "Mas Jesus disse à mulher: — A sua fé salvou você. Vá em paz. (Lucas 7:50)";
 frase[1179] = "Aí Jesus disse: — Minha filha, você sarou porque teve fé! Vá em paz. (Lucas 8:48)";
 frase[1180] = "Quando entrarem numa casa, façam primeiro esta saudação: “Que a paz esteja nesta casa!”(Lucas 10:5)";
 frase[1181] = "Então o carcereiro disse a Paulo: — As autoridades mandaram soltá-los. Podem ir embora em paz. (Atos 16:36)";
 frase[1182] = "E que Deus, a nossa fonte de paz, esteja com todos vocês! Amém! (Romanos 15:33)";
 frase[1183] = "Pois quem deseja paz a essa pessoa é seu companheiro no mal que ela faz. (2João 1:11)";
 frase[1184] = "Que vocês tenham mais e mais a misericórdia, a paz e o amor de Deus! (Judas 1:2)";
 frase[1185] = "E que a paz que Cristo dá dirija vocês nas suas decisões, pois foi para essa paz que Deus os chamou a fim de formarem um só corpo. E sejam agradecidos. (Colossenses 3:15)";
 frase[1186] = "E agora, irmãos, até logo. Procurem ser corretos em tudo. Escutem bem o que eu digo. Tenham todos o mesmo modo de pensar e vivam em paz. E o Deus de amor e de paz estará com vocês. (2Coríntios 13:11)";
 frase[1187] = "Mas o Espírito de Deus produz o amor, a alegria, a paz, a paciência, a delicadeza, a bondade, a fidelidade,(Gálatas 5:22)";
 frase[1188] = "Aí Moisés mandou que alguns moços queimassem animais em sacrifício ao Senhor e matassem touros como ofertas de paz. (Êxodo 24:5)";
 frase[1189] = "Além disso, com essa oferta de paz feita para agradecer a Deus, a pessoa oferecerá pão feito com fermento. (Levítico 7:13)";
 frase[1190] = "— Quando matarem um animal para uma oferta de paz, façam como eu mandei, e assim eu aceitarei a oferta. (Levítico 19:5)";
 frase[1191] = "Ofereçam também um bode para tirar pecados e dois carneirinhos de um ano como oferta de paz. (Levítico 23:19)";
 frase[1192] = "e, como ofertas de paz, vinte e quatro bois, sessenta carneiros, sessenta bodes e sessenta carneirinhos de um ano. (Números 7:88)";
 frase[1193] = "e ofertas de paz. Comam dos sacrifícios e alegrem-se ali na presença de Deus, o Senhor. (Deuteronômio 27:7)";
 frase[1194] = "Que as suas cidades sejam protegidas com portões de ferro, e que os seus moradores vivam sempre em paz!”(Deuteronômio 33:25)";
 frase[1195] = "Antes disso Hebrom era chamada de Quiriate-Arba. Arba havia sido o maior dos anaquins. Então houve pazna terra. (Josué 14:15)";
 frase[1196] = "Depois disso Otoniel ainda viveu quarenta anos, e durante todo esse tempo a terra de Israel ficou em paz. (Juízes 3:11)";
 frase[1197] = "Assim os israelitas derrotaram Moabe naquele dia. E houve paz na terra de Israel durante oitenta anos. (Juízes 3:30)";
 frase[1198] = "Então todos concordaram em mandar mensageiros aos benjamitas, na rocha de Rimom, para fazer uma proposta de paz. (Juízes 21:13)";
 frase[1199] = "Então Eli disse: — Vá em paz. Que o Deus de Israel lhe dê o que você pediu! (1Samuel 1:17)";
 frase[1200] = "— Que Ziba fique com tudo! — respondeu Mefibosete. — Para mim é suficiente que o senhor tenha voltado em paz para casa. (2Samuel 19:30)";
 frase[1201] = "O Senhor mandou um líder que livrou os israelitas dos sírios, e assim eles viveram em paz, como antes. (2Reis 13:5)";
 frase[1202] = "Davi disse: — O Senhor, o Deus de Israel, tem dado paz ao seu povo e morará em Jerusalém para sempre. (1Crônicas 23:25)";
 frase[1203] = "Assim o reinado de Josafá continuou tranquilo, pois Deus lhe deu paz com todas as nações vizinhas. (2Crônicas 20:30)";
 frase[1204] = "Na sua casa você viverá em paz e, quando contar as suas coisas, não vai achar falta de nada. (Jó 5:24)";
 frase[1205] = "Detesto a vida; não quero mais viver. Deixa-me em paz, pois a minha vida não vale nada. (Jó 7:16)";
 frase[1206] = "A minha vida está chegando ao fim. Então me deixa em paz! Deixa que eu tenha um pouco de alegria(Jó 10:20)";
 frase[1207] = "A Deus eles diziam: ‘Deixa-nos em paz!’ E comentavam: ‘O que pode o Todo-Poderoso fazer em nosso favor?’(Jó 22:17)";
 frase[1208] = "Se obedecem a Deus e o adoram, então têm paz e prosperidade até o fim da vida. (Jó 36:11)";
 frase[1209] = "Afastem-se do mal e façam o bem; procurem a paz e façam tudo para alcançá-la. (Salmos 34:14)";
 frase[1210] = "Eles não falam como amigos; pelo contrário, inventam acusações falsas contra as pessoas que amam a paz. (Salmos 35:20)";
 frase[1211] = "Preste atenção nos bons, e observe os honestos, e você verá que as pessoas que amam a paz deixam descendentes. (Salmos 37:37)";
 frase[1212] = "Eu amo os meus patrícios e amigos e por isso digo a Jerusalém: “Que a paz esteja com você!”(Salmos 122:8)";
 frase[1213] = "E que você viva para ver os seus netos! Que a paz esteja com o povo de Israel! (Salmos 128:6)";
 frase[1214] = "Ó Deus, como eu gostaria que tu acabasses com os maus! Gostaria que os homens violentos me deixassem em paz! (Salmos 139:19)";
 frase[1215] = "Os que zombam de tudo põem uma cidade inteira em confusão, mas os sábios mantêm tudo em paz. (Provérbios 29:8)";
 frase[1216] = "Os soldados valentes estão se lamentando nas ruas, e os embaixadores que procuravam fazer a paz choram amargamente. (Isaías 33:7)";
 frase[1217] = "Judas foi até perto de Jesus e disse: — Mestre, que a paz esteja com o senhor! E o beijou. (Mateus 26:49)";
 frase[1218] = "E Jesus disse: — Minha filha, você sarou porque teve fé. Vá em paz; você está livre do seu sofrimento. (Marcos 5:34)";
 frase[1219] = "— Glória a Deus nas maiores alturas do céu! E paz na terra para as pessoas a quem ele quer bem! (Lucas 2:14)";
 frase[1220] = "— Agora, Senhor, cumpriste a promessa que fizeste e já podes deixar este teu servo partir em paz. (Lucas 2:29)";
 frase[1221] = "Eles diziam: — Que Deus abençoe o Rei que vem em nome do Senhor! Paz no céu e glória a Deus! (Lucas 19:38)";
 frase[1222] = "Enquanto estavam contando isso, Jesus apareceu de repente no meio deles e disse: — Que a paz esteja com vocês! (Lucas 24:36)";
 frase[1223] = "Então Jesus respondeu: — Deixe Maria em paz! Que ela guarde isso para o dia do meu sepultamento. (João 12:7)";
 frase[1224] = "No que depender de vocês, façam todo o possível para viver em paz com todas as pessoas. (Romanos 12:18)";
 frase[1225] = "Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (1Coríntios 1:3)";
 frase[1226] = "Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (2Coríntios 1:2)";
 frase[1227] = "Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (Gálatas 1:3)";
 frase[1228] = "Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (Efésios 1:2)";
 frase[1229] = "Façam tudo para conservar, por meio da paz que une vocês, a união que o Espírito dá. (Efésios 4:3)";
 frase[1230] = "Que Deus, o Pai, e o Senhor Jesus Cristo deem a todos os irmãos paz e amor, com fé! (Efésios 6:23)";
 frase[1231] = "Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (Filipenses 1:2)";
 frase[1232] = "procurem viver em paz, tratem dos seus próprios assuntos e vivam do seu próprio trabalho, como já dissemos antes. (1Tessalonicenses 4:11)";
 frase[1233] = "Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (2Tessalonicenses 1:2)";
 frase[1234] = "Que a graça e a paz de Deus, o nosso Pai, e do Senhor Jesus Cristo estejam com vocês! (Filemom 1:3)";
 frase[1235] = "Pois a bondade é a colheita produzida pelas sementes que foram plantadas pelos que trabalham em favor da paz. (Tiago 3:18)";
 frase[1236] = "Afaste-se do mal e faça o bem; procure a paz e faça tudo para alcançá-la. (1Pedro 3:11)";
 frase[1237] = "Cumprimentem uns aos outros com um beijo de irmão. Que a paz esteja com todos vocês que pertencem a Cristo! (1Pedro 5:14)";
 frase[1238] = "A paz esteja com você! Os seus amigos mandam saudações. Dê saudações, pessoalmente, a cada um dos nossos amigos. (3João 1:15)";
 frase[1239] = "Porém Deus me fez uma promessa. Ele disse: “Você terá um filho que governará em paz porque eu farei com que ele viva em paz com todos os seus inimigos. O seu nome será Salomão porque durante o seu reinado eu darei paz e segurança ao povo de Israel. (1Crônicas 22:9)";
 frase[1240] = "Você terá uma velhice abençoada, morrerá em paz, será sepultado e irá se reunir com os seus antepassados no mundo dos mortos. (Gênesis 15:15)";
 frase[1241] = "do mesmo jeito que se tira tudo isso do touro sacrificado como uma oferta de paz. E o sacerdote queimará tudo no altar de ofertas queimadas. (Levítico 4:10)";
 frase[1242] = "desse ao povo as seguintes leis: Quando alguém apresentar o seu sacrifício de paz, deverá oferecer ao Senhor parte do sacrifício como oferta especial. (Levítico 7:29)";
 frase[1243] = "— Eu darei paz à terra de vocês. Todos dormirão sossegados, e ninguém os assustará, pois farei desaparecer da terra os animais selvagens e acabarei com as guerras. (Levítico 26:6)";
 frase[1244] = "Na porta da Tenda o nazireu rapará a cabeça, pegará o cabelo e o colocará no fogo onde está sendo queimada a oferta de paz. (Números 6:18)";
 frase[1245] = "Quando vocês oferecerem um touro novo como oferta que será completamente queimada, ou como oferta especial para pagar uma promessa, ou, ainda, como oferta de paz,(Números 15:8)";
 frase[1246] = "O Senhor entregará esses povos nas suas mãos, e vocês os atacarão e destruirão completamente. Não façam nenhum acordo de paz com eles, nem tenham pena deles. (Deuteronômio 7:2)";
 frase[1247] = "Vocês ainda não entraram na terra que o Senhor, nosso Deus, lhes está dando, a terra onde vão viver em paz. (Deuteronômio 12:9)";
 frase[1248] = "E também nesses países vocês não terão sossego nem paz; o Senhor fará com que fiquem cheios de aflição, desespero e medo. (Deuteronômio 28:65)";
 frase[1249] = "O povo de Israel vive sempre seguro, vive em paz numa terra que produz cereais e vinho, onde o orvalho rega o chão. (Deuteronômio 33:28)";
 frase[1250] = "Porém os homens de Israel disseram: — Pode ser que vocês morem aqui por perto. Como é que podemos fazer um acordo de paz com vocês?(Josué 9:7)";
 frase[1251] = "Josué fez um acordo de paz com os gibeonitas, prometendo que não seriam mortos. E os líderes do povo de Israel juraram que cumpririam a sua palavra. (Josué 9:15)";
 frase[1252] = "— Venham me ajudar a atacar Gibeão porque o povo de lá fez um acordo de paz com Josué e com o povo de Israel. (Josué 10:4)";
 frase[1253] = "Nenhuma dessas cidades fez acordos de paz com Israel, a não ser Gibeão, onde moravam alguns heveus. As outras cidades foram tomadas na guerra. (Josué 11:19)";
 frase[1254] = "O Senhor Deus deixou que o povo de Israel vivesse em paz com os inimigos ao seu redor. Passou muito tempo, e Josué ficou bem velho. (Josué 23:1)";
 frase[1255] = "O povo se levantou bem cedo na manhã seguinte e construiu ali um altar. Apresentaram ofertas que foram completamente queimadas e sacrifícios de paz. (Juízes 21:4)";
 frase[1256] = "Então Saul lhes disse: — Tragam os animais para o sacrifício que é completamente queimado e para as ofertas de paz. Ele ofereceu o sacrifício,(1Samuel 13:9)";
 frase[1257] = "Quando Joabe chegou com os seus soldados, contaram-lhe que Abner havia ido falar com o rei Davi e que este o havia deixado ir embora em paz. (2Samuel 3:23)";
 frase[1258] = "E Davi continuou a falar com Zadoque: — Olhe! Leve seu filho Aimaás e também Jônatas, filho de Abiatar, e volte em paz para a cidade. (2Samuel 15:27)";
 frase[1259] = "Mas agora o Senhor me deu paz em todas as fronteiras. Eu não tenho inimigos, e não há perigo de ataques. (1Reis 5:4)";
 frase[1260] = "O Senhor Deus cumpriu a sua promessa e deu sabedoria a Salomão. Havia paz entre Hirão e Salomão, e eles fizeram um acordo entre si. (1Reis 5:12)";
 frase[1261] = "e então queimou sobre ele sacrifícios de animais, ofertas de cereais, e derramou em cima dele uma oferta de vinho e o sangue de uma oferta de paz. (2Reis 16:13)";
 frase[1262] = "e por isso só depois da sua morte é que vou castigar Jerusalém. Vou deixar que você morra em paz.” Então os homens levaram ao rei essa resposta. (2Reis 22:20)";
 frase[1263] = "Ali eles acharam muitas pastagens num pedaço de terra espaçosa, tranquila e cheia de paz. Os descendentes de Cam haviam morado ali antes. (1Crônicas 4:40)";
 frase[1264] = "Proibiu o culto nos lugares pagãos em todas as cidades de Judá e destruiu os altares de incenso. E durante o seu reinado houve paz. (2Crônicas 14:5)";
 frase[1265] = "Asa construiu muralhas e fortalezas nas cidades, e durante o seu reinado nenhum inimigo guerreou contra ele, pois o Senhor Deus fez com que houvesse paz. (2Crônicas 14:6)";
 frase[1266] = "Consertou o altar do Senhor, ofereceu nele ofertas de paz e ofertas de gratidão e ordenou ao povo de Judá que adorasse o Senhor, o Deus de Israel. (2Crônicas 33:16)";
 frase[1267] = "Cópias da carta foram mandadas a todos os judeus das cento e vinte e sete províncias do reino, desejando-lhes paz e prosperidade(Ester 9:30)";
 frase[1268] = "Os bandidos têm paz em suas casas, os que ofendem a Deus vivem tranquilos, embora o seu deus seja a sua própria força. (Jó 12:6)";
 frase[1269] = "Para de olhar para nós e deixa-nos em paz, até que o nosso dia chegue ao fim, como chega ao fim o dia de um trabalhador. (Jó 14:6)";
 frase[1270] = "Eu vivia em paz, mas ele me esmagou; Deus me pegou pela garganta e me quebrou. Ele fez de mim o seu alvo(Jó 16:12)";
 frase[1271] = "Porém, quando castigares os maus, castiga também aqueles que abandonam os teus caminhos. Que a pazesteja com o povo de Israel! (Salmos 125:5)";
 frase[1272] = "É melhor comer um pedaço de pão seco, tendo paz de espírito, do que ter um banquete numa casa cheia de brigas. (Provérbios 17:1)";
 frase[1273] = "Pois já nasceu uma criança, Deus nos mandou um menino que será o nosso rei. Ele será chamado de “Conselheiro Maravilhoso”, “Deus Poderoso”, “Pai Eterno”, “Príncipe da Paz”. (Isaías 9:6)";
 frase[1274] = "Lobos e ovelhas viverão em paz, leopardos e cabritinhos descansarão juntos. Bezerros e leões comerão uns com os outros, e crianças pequenas os guiarão. (Isaías 11:6)";
 frase[1275] = "Como é bonito ver um mensageiro correndo pelas montanhas, trazendo notícias de paz, boas notícias de salvação! Ele diz a Sião: “O seu Deus é Rei!”(Isaías 52:7)";
 frase[1276] = "“Vocês sairão alegres da Babilônia, serão guiados em paz para a sua terra. As montanhas e os morros cantarão de alegria; todas as árvores baterão palmas. (Isaías 55:12)";
 frase[1277] = "Não conhecem o caminho da paz, e todas as suas ações são injustas. Vocês preferem seguir caminhos errados e por isso não têm segurança. (Isaías 59:8)";
 frase[1278] = "Esperamos a paz, porém não veio nada de bom; esperamos um tempo de descanso, mas o que veio foi o terror. (Jeremias 8:15)";
 frase[1279] = "Em todos os morros do deserto, apareceram homens para assaltar os outros. Eu mandei a guerra para destruir o país inteiro; ninguém pode viver em paz. (Jeremias 12:12)";
 frase[1280] = "Quando isso acontecer, o povo de Judá ficará seguro, e o povo de Israel viverá em paz. Esse rei será chamado de “Senhor, nossa Salvação”. (Jeremias 23:6)";
 frase[1281] = "Eles gritam e gemem de aflição, pois Deus, na sua ira, destruiu a nação deles e arrasou as suas terras tão cheias de paz. (Jeremias 25:36)";
 frase[1282] = "Mas o profeta que profetiza a paz só pode ser aceito como profeta mandado por Deus quando as palavras dele se cumprem. (Jeremias 28:9)";
 frase[1283] = "Mas eu curarei esta cidade e o seu povo e novamente lhe darei saúde. E farei com que tenha tempos de paze segurança. (Jeremias 33:6)";
 frase[1284] = "Rei Zedequias, escute o que eu, o Senhor, estou dizendo a seu respeito: você vai morrer em paz e não na guerra. (Jeremias 34:4)";
 frase[1285] = "O rei Nabucodonosor mandou aos povos de todas as nações, raças e línguas a seguinte mensagem: — Felicidade e paz para todos! (Daniel 4:1)";
 frase[1286] = "Não aceito animais que são queimados em sacrifício, nem as ofertas de cereais, nem os animais gordos que vocês oferecem como sacrifícios de paz. (Amós 5:22)";
 frase[1287] = "E ele trará a paz. Quando os assírios invadirem o nosso país e conquistarem as nossas fortalezas, nós mandaremos para lutar contra eles os nossos líderes mais importantes. (Miqueias 5:5)";
 frase[1288] = "Então o novo Templo será ainda mais belo do que o primeiro, e dali eu darei prosperidade e paz ao meu povo. Eu, o Senhor Todo-Poderoso, falei. (Ageu 2:9)";
 frase[1289] = "Então aqueles anjos disseram ao anjo que estava no meio das moitas: — Acabamos de andar por toda a terra e vimos que tudo está calmo e em paz. (Zacarias 1:11)";
 frase[1290] = "Se as pessoas daquela casa receberem vocês bem, que a saudação de paz fique com elas. Mas, se não os receberem bem, retirem a saudação. (Mateus 10:13)";
 frase[1291] = "De repente, Jesus se encontrou com elas e disse: — Que a paz esteja com vocês! Elas chegaram perto dele, abraçaram os seus pés e o adoraram. (Mateus 28:9)";
 frase[1292] = "Os líderes judeus sabiam que a parábola era contra eles e quiseram prender Jesus, mas tinham medo do povo. Por isso deixaram Jesus em paz e foram embora. (Marcos 12:12)";
 frase[1293] = "mas Jesus disse: — Deixem esta mulher em paz! Por que é que vocês a estão aborrecendo? Ela fez para mim uma coisa muito boa. (Marcos 14:6)";
 frase[1294] = "O anjo veio e disse: — Que a paz esteja com você, Maria! Você é muito abençoada. O Senhor está com você. (Lucas 1:28)";
 frase[1295] = "e do céu iluminará todos os que vivem na escuridão da sombra da morte, para guiar os nossos passos no caminho da paz. (Lucas 1:79)";
 frase[1296] = "Se não fizer isso, acabará precisando mandar mensageiros ao outro rei, enquanto este ainda estiver longe, para combinar condições de paz. Jesus terminou, dizendo:(Lucas 14:32)";
 frase[1297] = "e disse: — Ah! Jerusalém! Se hoje mesmo você soubesse o que é preciso para conseguir a paz! Mas agora você não pode ver isso. (Lucas 19:42)";
 frase[1298] = "Então Jesus disse de novo: — Que a paz esteja com vocês! Assim como o Pai me enviou, eu também envio vocês. (João 20:21)";
 frase[1299] = "Vocês conhecem a mensagem que Deus mandou ao povo de Israel, anunciando a boa notícia de paz por meio de Jesus Cristo, que é o Senhor de todos. (Atos 10:36)";
 frase[1300] = "Mas Deus dará glória, honra e paz a todos os que fazem o bem, primeiro aos judeus e também aos não judeus. (Romanos 2:10)";
 frase[1301] = "Agora que fomos aceitos por Deus pela nossa fé nele, temos paz com ele por meio do nosso Senhor Jesus Cristo. (Romanos 5:1)";
 frase[1302] = "Por isso procuremos sempre as coisas que trazem a paz e que nos ajudam a fortalecer uns aos outros na fé. (Romanos 14:19)";
 frase[1303] = "E Deus, a nossa fonte de paz, logo esmagará Satanás debaixo dos pés de vocês. Que a graça do nosso Senhor Jesus esteja com vocês! (Romanos 16:20)";
 frase[1304] = "pois Deus não quer que nós vivamos em desordem e sim em paz. Como em todas as igrejas do povo de Deus,(1Coríntios 14:33)";
 frase[1305] = "E, para todos os que seguem essa regra na sua vida, que a paz e a misericórdia estejam com eles e com todo o povo de Deus! (Gálatas 6:16)";
 frase[1306] = "Tratem essas pessoas com o maior respeito e amor, por causa do trabalho que fazem. E vivam em paz uns com os outros. (1Tessalonicenses 5:13)";
 frase[1307] = "Procurem ter paz com todos e se esforcem para viver uma vida completamente dedicada ao Senhor, pois sem isso ninguém o verá. (Hebreus 12:14)";
 frase[1308] = "Por isso, meus amigos, enquanto vocês esperam aquele dia, façam o possível para estar em paz com Deus, sem mancha e sem culpa diante dele. (2Pedro 3:14)";
 frase[1309] = "Que a graça, a misericórdia e a paz de Deus, o nosso Pai, e de Jesus Cristo, o seu Filho, estejam conosco em verdade e amor! (2João 1:3)";
 frase[1310] = "As pessoas que têm a mente controlada pela natureza humana acabarão morrendo espiritualmente; mas as que têm a mente controlada pelo Espírito de Deus terão a vida eterna e a paz. (Romanos 8:6)";
 frase[1311] = "Que Deus, que nos dá essa esperança, encha vocês de alegria e de paz, por meio da fé que vocês têm nele, a fim de que a esperança de vocês aumente pelo poder do Espírito Santo! (Romanos 15:13)";
 frase[1312] = "Ponham em prática o que vocês receberam e aprenderam de mim, tanto com as minhas palavras como com as minhas ações. E o Deus que nos dá a paz estará com vocês. (Filipenses 4:9)";
 frase[1313] = "Você não nos fará nenhum mal, assim como nós não fizemos nenhum mal a você. Nós fomos bondosos para você e deixamos que fosse embora em paz. Agora está claro que o Senhor o tem abençoado. (Gênesis 26:29)";
 frase[1314] = "José disse: — De jeito nenhum! Eu nunca faria uma coisa dessas! Só aquele que estava com o meu copo é que será meu escravo. Os outros podem voltar em paz para a casa do pai. (Gênesis 44:17)";
 frase[1315] = "Então Moisés voltou para a casa de Jetro , o seu sogro, e disse: — Deixe que eu volte para visitar os meus parentes no Egito. Quero ver se eles ainda vivem. — Vá em paz — respondeu Jetro. (Êxodo 4:18)";
 frase[1316] = "O que foi que lhe dissemos no Egito? Pedimos que nos deixasse em paz, trabalhando como escravos para os egípcios. Pois é melhor ser escravo dos egípcios do que morrer aqui no deserto! (Êxodo 14:12)";
 frase[1317] = "As ofertas de paz dos israelitas serão feitas assim, para sempre. O peito e a coxa do animal pertencem aos sacerdotes. Essa é a oferta do povo para mim, o Senhor. (Êxodo 29:28)";
 frase[1318] = "No dia seguinte, de manhã cedo, eles trouxeram alguns animais para serem queimados como sacrifício e outros para serem comidos como ofertas de paz. Depois o povo sentou-se para comer e beber e se levantou para se divertir. (Êxodo 32:6)";
 frase[1319] = "Quando um homem apresentar a Deus, o Senhor, uma oferta de paz, se o animal for tirado do gado, poderá ser um touro ou uma vaca, mas precisará ser sem defeito. (Levítico 3:1)";
 frase[1320] = "Se o homem oferecer a Deus, o Senhor, um animal do seu rebanho como oferta de paz, o animal poderá ser macho ou fêmea, mas precisará ser sem defeito. (Levítico 3:6)";
 frase[1321] = "Como no caso da oferta de paz, toda a gordura do bode será queimada no altar. Assim, o sacerdote oferecerá o sacrifício para conseguir o perdão de pecados, e o homem será perdoado. (Levítico 4:26)";
 frase[1322] = "O fogo do altar nunca se apagará; deverá ficar sempre aceso. Todas as manhãs o sacerdote porá lenha no fogo, arrumará em cima a oferta que vai ser completamente queimada e queimará a gordura das ofertas de paz. (Levítico 6:12)";
 frase[1323] = "Se a carne tocar em qualquer coisa impura, então deverá ser queimada; não poderá ser comida. Qualquer pessoa que estiver pura poderá comer a carne da oferta de paz;(Levítico 7:19)";
 frase[1324] = "E quem tocar em qualquer coisa impura, seja uma impureza humana ou um animal impuro, e depois comer a carne do sacrifício de paz, será expulso do meio do povo. (Levítico 7:21)";
 frase[1325] = "O peito e a coxa do animal são uma oferta especial que o Senhor toma dos israelitas e dá aos sacerdotes, que são descendentes de Arão. Eles terão direito para sempre a essas partes das ofertas de paz. (Levítico 7:34)";
 frase[1326] = "São essas, portanto, as leis a respeito das ofertas que são completamente queimadas, das ofertas de cereais, das ofertas para tirar pecados, das ofertas para tirar culpas, das ofertas da ordenação dos sacerdotes e das ofertas de paz. (Levítico 7:37)";
 frase[1327] = "Arão matou o touro e o carneiro a serem apresentados como a oferta de paz do povo. Os filhos lhe levaram o sangue, e ele o borrifou nos quatro lados do altar. (Levítico 9:18)";
 frase[1328] = "Portanto, os israelitas, em vez de matarem os animais no campo, deverão levá-los ao sacerdote, em frente da Tenda Sagrada. Ali matarão os animais e os apresentarão ao Senhor como oferta de paz. (Levítico 17:5)";
 frase[1329] = "Ele apresentará ao Senhor o carneiro como oferta de paz e também oferecerá a cesta de pães feitos sem fermento. Ele dará ainda as ofertas de cereais e as ofertas de vinho. (Números 6:17)";
 frase[1330] = "Os descendentes de Jacó são como a poeira; são tantos, que não podem ser contados. Gostaria de terminar a minha vida como alguém que pertence ao povo de Deus; quero morrer em paz como as pessoas honestas.”(Números 23:10)";
 frase[1331] = "E Moisés continuou, dizendo: — Depois, quando estávamos no deserto de Quedemote, mandei que alguns mensageiros levassem ao rei Seom, que morava na cidade de Hesbom, um tratado de paz, com as seguintes condições:(Deuteronômio 2:26)";
 frase[1332] = "Quando atravessarem o rio Jordão e começarem a morar na terra que o Senhor vai dar a vocês, ele os protegerá de todos os inimigos, e vocês viverão em paz. (Deuteronômio 12:10)";
 frase[1333] = "Eles foram até o acampamento de Gilgal e disseram a Josué e a todos os homens de Israel: — Nós estamos chegando de um país que fica bem longe daqui. Façam um acordo de paz com a gente. (Josué 9:6)";
 frase[1334] = "Os nossos líderes e toda a nossa gente nos mandaram preparar comida para viajar. Eles nos mandaram encontrar com vocês e dizer: “Estamos prontos para ser seus empregados! Façam um acordo de paz com a gente.”(Josué 9:11)";
 frase[1335] = "O Senhor lhes deu paz com os povos vizinhos, conforme havia prometido aos seus antepassados. Nenhum dos inimigos conseguiu resistir, pois o Senhor deu ao povo de Israel a vitória sobre eles. (Josué 21:44)";
 frase[1336] = "Agora o Senhor, o Deus de vocês, deu aos seus irmãos israelitas a paz, como havia prometido. Voltem, pois, para a terra que vocês conquistaram do outro lado do rio Jordão, a terra que Moisés, servo do Senhor, lhes deu. (Josué 22:4)";
 frase[1337] = "Nós não construímos o nosso altar para oferecer sacrifícios a serem completamente queimados, nem para colocar sobre ele ofertas de cereais ou ofertas de paz. Que o Senhor mesmo nos castigue se construímos este altar para desobedecer a ele! (Josué 22:23)";
 frase[1338] = "Porém Sísera fugiu para a barraca de Jael, mulher de Héber, o queneu. Ele fez isso porque Jabim, rei de Hazor, estava em paz com a família de Héber. (Juízes 4:17)";
 frase[1339] = "Assim, ó Senhor Deus, morram todos os teus inimigos, porém que os teus amigos brilhem como a forte luz do sol nascente! E houve paz no país durante quarenta anos. (Juízes 5:31)";
 frase[1340] = "Gideão construiu ali um altar para Deus, o Senhor, e o chamou de “O Senhor é paz”. E até hoje esse altar está em Ofra, cidade que pertence às famílias de Abiezer. (Juízes 6:24)";
 frase[1341] = "Os midianitas foram derrotados pelos israelitas e por muito tempo deixaram de ser uma ameaça para eles. E a terra ficou em paz durante quarenta anos enquanto Gideão viveu. (Juízes 8:28)";
 frase[1342] = "Todas as cidades que os filisteus haviam tomado, desde Ecrom até Gate, foram devolvidas ao povo de Israel. Dessa maneira os israelitas receberam de volta toda a sua terra. E também houve paz entre os israelitas e os amorreus. (1Samuel 7:14)";
 frase[1343] = "Vá na minha frente para Gilgal. Eu me encontrarei com você lá e oferecerei sacrifícios que serão completamente queimados e ofertas de paz. Espere lá sete dias até que eu chegue e diga o que você deve fazer. (1Samuel 10:8)";
 frase[1344] = "Então foram todos a Gilgal e lá, no lugar sagrado, fizeram de Saul o seu rei. Ofereceram sacrifícios de paz, e Saul e todo o povo de Israel festejaram o acontecimento. (1Samuel 11:15)";
 frase[1345] = "Samuel fez o que o Senhor Deus havia mandado e foi a Belém. Quando chegou lá, os líderes da cidade foram tremendo encontrá-lo e perguntaram: — A sua visita é de paz?(1Samuel 16:4)";
 frase[1346] = "Levaram a arca e a colocaram no seu lugar, na barraca que Davi tinha preparado para ela. Então ele ofereceu a Deus, o Senhor, sacrifícios que foram completamente queimados e ofertas de paz. (2Samuel 6:17)";
 frase[1347] = "Quando os reis que eram chefiados por Hadadezer viram que tinham sido vencidos pelos israelitas, fizeram paz com eles, ficando debaixo do seu poder. E os sírios ficaram com medo de ajudar de novo os amonitas. (2Samuel 10:19)";
 frase[1348] = "e trarei de volta todos os homens dele para o senhor, como uma esposa que volta para o seu marido. Já que o senhor quer matar somente um homem, o resto do povo será deixado em paz. (2Samuel 17:3)";
 frase[1349] = "Ele construiu ali um altar para Deus, o Senhor, e apresentou ofertas que foram completamente queimadas e ofertas de paz. O Senhor respondeu à oração dele, e a peste acabou em Israel. (2Samuel 24:25)";
 frase[1350] = "— Bendito seja o Senhor Deus, que deu paz ao seu povo, como havia prometido! Ele tem cumprido todas as abençoadas promessas que fez por meio do seu servo Moisés. (1Reis 8:56)";
 frase[1351] = "Ele ofereceu em sacrifício vinte e dois mil bois e cento e vinte mil ovelhas como ofertas de paz. E assim o rei e todo o povo dedicaram o Templo ao serviço do Senhor. (1Reis 8:63)";
 frase[1352] = "Três vezes por ano Salomão oferecia sacrifícios a serem queimados e ofertas de paz no altar que ele havia construído para Deus, o Senhor. Ele também queimava incenso ao Senhor. E assim Salomão terminou a construção do Templo. (1Reis 9:25)";
 frase[1353] = "Micaías respondeu: — Vejo o exército de Israel espalhado pelos morros como ovelhas sem pastor. E o Senhor Deus diz: “Estes homens não têm chefe; que eles voltem para casa em paz.”(1Reis 22:17)";
 frase[1354] = "Micaías exclamou: — Se o senhor, ó rei, voltar em paz, então, de fato, o Senhor Deus não falou por meio de mim! E disse também: — Todos aqui deem atenção àquilo que eu profetizei! (1Reis 22:28)";
 frase[1355] = "O rei Ezequias entendeu que isso queria dizer que durante a vida dele haveria paz e segurança. Por isso, disse: — A mensagem do Senhor que você me deu é boa. (2Reis 20:19)";
 frase[1356] = "Levaram a arca da aliança para a barraca que Davi tinha preparado para ela e a colocaram lá dentro. Então ofereceram a Deus sacrifícios que foram completamente queimados e ofertas de paz. (1Crônicas 16:1)";
 frase[1357] = "Quando os reis que eram chefiados por Hadadezer viram que tinham sido vencidos pelos israelitas, fizeram paz com Davi, ficando debaixo do seu poder. E os sírios nunca mais quiseram ajudar os amonitas. (1Crônicas 19:19)";
 frase[1358] = "Então construiu ali um altar para Deus e ofereceu sacrifícios que foram completamente queimados e ofertas de paz. Ele orou, e Deus respondeu, mandando fogo do céu para queimar os sacrifícios que estavam no altar. (1Crônicas 21:26)";
 frase[1359] = "O rei Abias morreu e foi sepultado na Cidade de Davi, e o seu filho Asa ficou no lugar dele como rei. Durante o reinado de Asa houve dez anos de paz na terra de Judá. (2Crônicas 14:1)";
 frase[1360] = "Micaías respondeu: — Vejo o exército de Israel espalhado pelos morros como ovelhas sem pastor. E o Senhor Deus diz: “Estes homens não têm chefe; que eles voltem para casa em paz.”(2Crônicas 18:16)";
 frase[1361] = "Micaías exclamou: — Se o senhor, ó rei, voltar em paz, então, de fato, o Senhor Deus não falou por meio de mim! E disse também: — Todos aqui deem atenção àquilo que eu profetizei! (2Crônicas 18:27)";
 frase[1362] = "Ezequias elogiou todos os levitas que haviam dirigido tão bem o culto de adoração. Durante sete dias, todos tomaram parte na Festa, apresentaram as ofertas de paz e louvaram o Senhor, o Deus dos seus antepassados. (2Crônicas 30:22)";
 frase[1363] = "Foi assim que o Senhor Deus salvou Ezequias e os moradores de Jerusalém das mãos de Senaqueribe, rei da Assíria, e das mãos de todos os outros inimigos. E Deus deu ao seu povo paz com todos os países vizinhos. (2Crônicas 32:22)";
 frase[1364] = "e por isso só depois da sua morte é que vou castigar Jerusalém e o seu povo. Vou deixar que você morra em paz.” Então os homens levaram ao rei essa resposta. (2Crônicas 34:28)";
 frase[1365] = "Eles disseram que nunca deveríamos casar com essa gente. Disseram também que nunca deveríamos ajudá-los a ter paz e prosperidade, se quiséssemos comer os bons alimentos produzidos pela terra e passá-la aos nossos descendentes para sempre. (Esdras 9:12)";
 frase[1366] = "Eu escuto o que o Senhor está dizendo. Para nós, o seu povo, para nós, os que somos fiéis, ele promete pazse não voltarmos aos nossos caminhos de loucura. (Salmos 85:8)";
 frase[1367] = "Pode ser. Mas é melhor ter pouco numa das mãos, com paz de espírito, do que estar sempre com as duas mãos cheias de trabalho, tentando pegar o vento. (Eclesiastes 4:6)";
 frase[1368] = "O rei Ezequias entendeu que isso queria dizer que durante a vida dele haveria paz e segurança. Por isso, disse: — A mensagem do Senhor que você me deu é boa. (Isaías 39:8)";
 frase[1369] = "Então eu disse: — Ó Senhor, meu Deus, tu enganaste completamente o povo de Jerusalém! Disseste que ia haver paz, mas o que há é uma espada encostada na garganta deles. (Jeremias 4:10)";
 frase[1370] = "O Senhor Deus disse ao seu povo: — Fiquem nas encruzilhadas e vejam quais são as melhores estradas, procurem saber qual é o melhor caminho. Andem nesse caminho e vocês terão paz. Mas eles responderam: — Nós não vamos andar nesse caminho! (Jeremias 6:16)";
 frase[1371] = "Então eu disse: — Ó Senhor, meu Deus, tu sabes que alguns profetas estão dizendo ao povo que não vai haver guerra nem fome. Eles afirmam que prometeste que em nossa terra só haverá paz. (Jeremias 14:13)";
 frase[1372] = "Então todos os oficiais vieram e me fizeram perguntas. E eu respondi como o rei havia ordenado. Eles me deixaram em paz porque não tinham ouvido nada da conversa. (Jeremias 38:27)";
 frase[1373] = "Mas aquele que vai libertá-los é forte; o seu nome é Senhor, o Todo-Poderoso. Ele mesmo defenderá a causa deles e trará paz à terra; mas para o povo da Babilônia ele trará confusão. (Jeremias 50:34)";
 frase[1374] = "Depois dessa semana, os sacerdotes começarão a oferecer sobre o altar as ofertas que serão completamente queimadas e as ofertas de paz trazidas pelo povo. Então ficarei contente com todos vocês. Eu, o Senhor Deus, falei. (Ezequiel 43:27)";
 frase[1375] = "Ó rei, aceite o meu conselho. Deixe de pecar e faça o que é certo; acabe com as suas maldades e ajude os pobres. Assim talvez o senhor possa continuar a viver em paz e felicidade. (Daniel 4:27)";
 frase[1376] = "Então o rei Dario escreveu uma carta para os povos de todas as nações, raças e línguas do mundo. A carta dizia o seguinte: “Felicidade e paz para todos! (Daniel 6:25)";
 frase[1377] = "Ele disse: — Deus o ama. Portanto, não fique com medo. Que a paz de Deus esteja com você. Anime-se! Tenha coragem! Então eu me senti bem mais forte e respondi: — Fale, pois o senhor me deu novas forças. (Daniel 10:19)";
 frase[1378] = "Ele levará para o Egito as imagens dos deuses da Síria e objetos de valor feitos de ouro e de prata. Haverá alguns anos de paz entre as duas nações,(Daniel 11:8)";
 frase[1379] = "Os seus aliados o traíram e o expulsaram do seu próprio país. Povos com quem você tinha acordos de paz conquistaram a sua terra. Os seus amigos mais chegados fizeram planos contra você. Eles dizem: ‘Os edomitas são uns tolos!’ ”(Obadias 1:7)";
 frase[1380] = "Saiam daqui! Vão embora! Pois não é este o lugar onde vocês vão descansar em paz. Aqui há tanta gente desonesta e sem-vergonha, que a destruição vai ser total. (Miqueias 2:10)";
 frase[1381] = "Os profetas enganam o povo. Para os que lhes pagam eles prometem paz, mas ameaçam com guerra os que não lhes dão nada. O Senhor diz a esses profetas:(Miqueias 3:5)";
 frase[1382] = "Eles semearão as suas terras em paz; as parreiras darão uvas, a terra dará boas colheitas, e cairá chuva do céu. Darei tudo isso aos que restarem do meu povo. (Zacarias 8:12)";
 frase[1383] = "São estas as coisas que vocês devem fazer: digam todos a verdade uns aos outros e decidam com justiça os casos nos tribunais a fim de que haja paz. (Zacarias 8:16)";
 frase[1384] = "— Os jejuns do quarto, quinto, sétimo e décimo meses de cada ano vão virar dias de alegria, dias de festa para o povo de Judá. Portanto, amem a verdade e a paz. (Zacarias 8:19)";
 frase[1385] = "— Na aliança que fiz com eles, eu lhes prometi vida e paz. Fiz o que tinha prometido, para que eles me respeitassem; e, de fato, eles me respeitaram e temeram. (Malaquias 2:5)";
 frase[1386] = "Ensinavam sempre o que era direito e nunca o que era errado. Viviam em paz comigo, faziam o que é certo e ajudaram muitos a deixarem o caminho da maldade. (Malaquias 2:6)";
 frase[1387] = "O sal é uma coisa útil; mas, se perder o gosto, como é que vocês poderão lhe dar gosto de novo? Tenham sal em vocês mesmos e vivam em paz uns com os outros. (Marcos 9:50)";
 frase[1388] = "E Jesus terminou, dizendo: — Eu afirmo a vocês que foi este homem, e não o outro, que voltou para casa em paz com Deus. Porque quem se engrandece será humilhado, e quem se humilha será engrandecido. (Lucas 18:14)";
 frase[1389] = "Naquele mesmo domingo, à tarde, os discípulos de Jesus estavam reunidos de portas trancadas, com medo dos líderes judeus. Então Jesus chegou, ficou no meio deles e disse: — Que a paz esteja com vocês! (João 20:19)";
 frase[1390] = "Uma semana depois, os discípulos de Jesus estavam outra vez reunidos ali com as portas trancadas, e Tomé estava com eles. Jesus chegou, ficou no meio deles e disse: — Que a paz esteja com vocês! (João 20:26)";
 frase[1391] = "Em toda a região da Judeia, Galileia e Samaria, a Igreja estava em paz. Ela ficava cada vez mais forte, crescia em número de pessoas com a ajuda do Espírito Santo e mostrava grande respeito pelo Senhor Jesus. (Atos 9:31)";
 frase[1392] = "Pois o Reino de Deus não é uma questão de comida ou de bebida, mas de viver corretamente, em paz e com a alegria que o Espírito Santo dá. (Romanos 14:17)";
 frase[1393] = "Não deixem que ninguém o despreze. Pelo contrário, vocês devem ajudá-lo a continuar a sua viagem em paz, a fim de que ele volte para cá. Pois estou esperando que ele volte junto com os outros irmãos. (1Coríntios 16:11)";
 frase[1394] = "Pois foi Cristo quem nos trouxe a paz, tornando os judeus e os não judeus um só povo. Por meio do sacrifício do seu corpo, ele derrubou o muro de inimizade que separava os judeus dos não judeus. (Efésios 2:14)";
 frase[1395] = "Ele acabou com a lei, juntamente com os seus mandamentos e regulamentos; e dos dois povos formou um só povo, novo e unido com ele. Foi assim que ele trouxe a paz. (Efésios 2:15)";
 frase[1396] = "Assim Cristo veio e anunciou a todos a boa notícia de paz, tanto a vocês, os não judeus, que estavam longe de Deus, como aos judeus, que estavam perto dele. (Efésios 2:17)";
 frase[1397] = "ao povo de Deus que mora na cidade de Colossos, os nossos fiéis irmãos em Cristo. Que a graça e a paz de Deus, o nosso Pai, estejam com vocês! (Colossenses 1:2)";
 frase[1398] = "escrevo a você, Timóteo, meu verdadeiro filho na fé. Que a graça, a misericórdia e a paz de Deus, o Pai, e de Cristo Jesus, o nosso Senhor, estejam com você! (1Timóteo 1:2)";
 frase[1399] = "escrevo a você, Timóteo, meu querido filho na fé. Que a graça, a misericórdia e a paz de Deus, o Pai, e de Cristo Jesus, o nosso Senhor, estejam com você! (2Timóteo 1:2)";
 frase[1400] = "E você, Timóteo, fuja das paixões da mocidade e procure viver uma vida correta, com fé, amor e paz, junto com os que com um coração puro pedem a ajuda do Senhor. (2Timóteo 2:22)";
 frase[1401] = "Escrevo a você, Tito, meu verdadeiro filho na fé, esta fé que é sua e minha. Que a graça e a paz de Deus, o Pai, e de Cristo Jesus, o nosso Salvador, estejam com você! (Tito 1:4)";
 frase[1402] = "Quando somos corrigidos, isso no momento nos parece motivo de tristeza e não de alegria. Porém, mais tarde, os que foram corrigidos recebem como recompensa uma vida correta e de paz. (Hebreus 12:11)";
 frase[1403] = "Que a graça e a paz estejam com vocês e aumentem cada vez mais, por meio do conhecimento que vocês têm de Deus e de Jesus, o nosso Senhor! (2Pedro 1:2)";
 frase[1404] = "Se alguém for até vocês e não levar o ensinamento de Cristo, não recebam essa pessoa na casa de vocês, nem lhe digam: “Que a paz esteja com você!”(2João 1:10)";
 frase[1405] = "Salomão dedicou também ao serviço de Deus a parte central do pátio que ficava em frente do Templo; ali ele apresentou as ofertas que foram completamente queimadas e a gordura dos animais que haviam sido oferecidos nas ofertas de paz. Salomão fez isso porque o altar de bronze era muito pequeno para os sacrifícios que eram completamente queimados, para as ofertas de cereais e para a gordura das ofertas de paz. (2Crônicas 7:7)";
 frase[1406] = "Façam um altar de terra para mim e em cima dele ofereçam as suas ovelhas e os seus bois como sacrifícios que serão completamente queimados e como ofertas de paz. Eu separarei lugares para que neles vocês me adorem, e nesses lugares eu me encontrarei com vocês e os abençoarei. (Êxodo 20:24)";
 frase[1407] = "Depois ele tirará toda a gordura do animal e queimará essa gordura no altar, como costuma fazer com a oferta de paz. O cheiro dessa oferta é agradável a Deus, o Senhor. Assim, o sacerdote oferecerá o sacrifício para conseguir o perdão de pecados, e a pessoa será perdoada. (Levítico 4:31)";
 frase[1408] = "Como costuma fazer com a oferta de paz, o sacerdote tirará toda a gordura da ovelha e queimará essa gordura no altar, em cima das ofertas que foram queimadas em sacrifício a Deus, o Senhor. Assim, o sacerdote oferecerá o sacrifício para conseguir o perdão de pecados, e a pessoa será perdoada. (Levítico 4:35)";
 frase[1409] = "Se alguém trouxer uma oferta de paz para pagar uma promessa ou se a trouxer por vontade própria, não será preciso que a carne seja toda comida no dia em que se faz a oferta; o que sobrar poderá ser comido no dia seguinte. (Levítico 7:16)";
 frase[1410] = "e também um touro e um carneiro para serem sacrificados como oferta de paz. Mande que eles sacrifiquem esses animais ao Senhor, junto com a oferta de cereais misturada com azeite. Eles precisam fazer isso porque o Senhor vai aparecer a eles hoje. (Levítico 9:4)";
 frase[1411] = "Vocês e as suas famílias têm o direito de comer o peito e a coxa que são apresentados ao Senhor como oferta especial. Essa parte das ofertas de paz feitas pelos israelitas pertence a vocês e aos seus filhos. Comam isso num lugar puro. (Levítico 10:14)";
 frase[1412] = "Se alguém apresentar uma oferta de paz, seja para pagar uma promessa, seja uma oferta feita por vontade própria, o animal deverá ser sem defeito a fim de que a oferta seja aceita. Poderá ser um touro novo, ou uma ovelha, ou uma cabra, mas não poderá ter defeito. (Levítico 22:21)";
 frase[1413] = "e entregará a Deus, o Senhor, três animais sem defeito, isto é, um carneirinho de um ano como sacrifício que vai ser completamente queimado, uma ovelhinha de um ano como sacrifício para tirar pecados e um carneiro como oferta de paz. (Números 6:14)";
 frase[1414] = "Também nas ocasiões de alegria, isto é, nas Festas da Lua Nova e nas outras festas religiosas, vocês deverão tocar as trombetas quando apresentarem os sacrifícios que serão completamente queimados e as ofertas de paz. Então eu os ajudarei. Eu sou o Senhor, o Deus de vocês. (Números 10:10)";
 frase[1415] = "— São essas as leis a respeito dos sacrifícios que são completamente queimados, das ofertas de cereais, das ofertas de vinho e das ofertas de paz que vocês devem dar a Deus, o Senhor, nas datas marcadas para as festas. Essas coisas vocês devem oferecer a Deus e mais as ofertas que vocês prometerem ou as ofertas que fizerem por vontade própria. (Números 29:39)";
 frase[1416] = "Ajudem os seus patrícios até que eles acabem de tomar posse das terras que o Senhor, nosso Deus, está dando a eles a oeste do rio Jordão e até que estejam morando ali em paz, como vocês estão nas suas terras. Aí vocês poderão voltar e morar na terra que eu lhes dei aqui, a leste do Jordão.”(Deuteronômio 3:20)";
 frase[1417] = "Ele seguiu as ordens que Moisés, servo do Senhor, tinha dado aos israelitas, como está escrito na Lei de Moisés: “Faça um altar de pedras brutas, que não foram cortadas com ferramentas.” Sobre esse altar apresentaram ao Senhor ofertas que foram completamente queimadas e ofertas de paz. (Josué 8:31)";
 frase[1418] = "Adoni-Zedeque, rei de Jerusalém , ouviu dizer que Josué havia tomado e destruído completamente a cidade de Ai e matado o seu rei. E ouviu dizer que o mesmo havia acontecido com Jericó e o seu rei. Também soube que os gibeonitas tinham feito um acordo de paz com os israelitas e que viviam entre eles. (Josué 10:1)";
 frase[1419] = "Então todo o povo de Israel subiu de novo até Betel para chorar. Ficaram ali na presença de Deus, o Senhor, e não comeram nada até a tarde. E apresentaram ao Senhor ofertas que foram completamente queimadas e sacrifícios de paz. (Juízes 20:26)";
 frase[1420] = "Abner disse a Davi: — Eu irei agora e conquistarei todo o povo de Israel para o senhor. E eles o aceitarão como rei. Aí o senhor terá o que desejava e governará o país inteiro. Então Davi deixou Abner ir embora em paz. (2Samuel 3:21)";
 frase[1421] = "Pouco tempo depois, Joabe e os outros oficiais de Davi voltaram de um ataque rápido, trazendo muitas coisas que haviam tomado dos inimigos. Mas Abner não estava mais em Hebrom com Davi porque este já o havia deixado ir embora em paz. (2Samuel 3:22)";
 frase[1422] = "Escolhi um lugar para o meu povo de Israel e o fiz morar ali, onde eles viverão em paz. Desde que entraram nesta terra, eles têm sido atacados por povos violentos, mas isso não acontecerá mais. Eu prometo que livrarei você de todos os seus inimigos e que lhe darei descendentes. (2Samuel 7:10)";
 frase[1423] = "E Davi disse a Abisai e a todos os seus oficiais: — Se o meu próprio filho está tentando me matar, por que eu ficaria admirado se este membro da tribo de Benjamim quisesse fazer o mesmo? Deixem esse homem em paz. Deixem que ele amaldiçoe porque foi o Senhor quem o mandou fazer isso. (2Samuel 16:11)";
 frase[1424] = "Quando acordou, Salomão compreendeu que Deus havia falado com ele no sonho. Então foi para Jerusalém, ficou diante da arca da aliança e apresentou a Deus ofertas de paz e sacrifícios que foram completamente queimados. Depois deu uma festa para todas as autoridades. (1Reis 3:15)";
 frase[1425] = "Salomão dominava toda a região a oeste do rio Eufrates, desde Tifsa, no Eufrates, até a cidade de Gaza, no litoral do mar Mediterrâneo. Todos os reis a oeste do Eufrates eram dominados por ele, e ele estava em pazcom todos os países vizinhos. (1Reis 4:24)";
 frase[1426] = "Naquele mesmo dia Salomão separou, a fim de ser sagrada para Deus, a parte central do pátio que ficava em frente ao Templo. Ali ele apresentou as ofertas que foram completamente queimadas, as ofertas de cereais e a gordura dos animais que haviam sido trazidos como ofertas de paz. Salomão fez isso porque o altar de bronze era muito pequeno para todas essas ofertas. (1Reis 8:64)";
 frase[1427] = "Ele disse: — O Senhor, nosso Deus, tem estado com vocês e lhes tem dado paz por todos os lados. Ele deixou que eu conquistasse todos os povos que moravam nesta terra, e agora eles são dominados por vocês e por Deus. (1Crônicas 22:18)";
 frase[1428] = "Asa disse ao povo de Judá: — Enquanto não há perigo de guerra, vamos construir nas cidades muralhas, fortalezas e portões com trancas. Pois temos adorado o Senhor, nosso Deus, e temos procurado obedecer ao que ele manda. É por isso que ele nos tem deixado viver em paz com todos os povos vizinhos. Portanto, tudo isso foi construído, e houve progresso. (2Crônicas 14:7)";
 frase[1429] = "O povo de Judá ficou alegre por causa desse juramento, que tinha feito com todo o coração. E, por terem procurado o Senhor com toda a boa vontade, ele deixou que o achassem e permitiu que vivessem em pazcom todos os povos vizinhos. (2Crônicas 15:15)";
 frase[1430] = "Além dos muitos animais que foram completamente queimados, houve também a oferta da gordura dos animais oferecidos como ofertas de paz. E houve as ofertas de vinho que acompanhavam os sacrifícios que eram completamente queimados. Assim começou de novo o culto no Templo. (2Crônicas 29:35)";
 frase[1431] = "Ezequias organizou os sacerdotes e os levitas em grupos, dando a cada grupo a sua responsabilidade. Os sacerdotes apresentavam os sacrifícios que eram completamente queimados e as ofertas de paz; os levitas cantavam louvores, e davam graças a Deus, e guardavam os portões do Templo. (2Crônicas 31:2)";
 frase[1432] = "Quando voltou a paz, o teu povo pecou de novo, e outra vez deixaste que os inimigos deles os conquistassem. E de novo, quando eles se arrependeram e pediram que os salvasses, tu ouviste no céu e, vez após vez, tu os livraste por causa da tua grande misericórdia. (Neemias 9:28)";
 frase[1433] = "Ele será descendente do rei Davi; o seu poder como rei crescerá, e haverá paz em todo o seu reino. As bases do seu governo serão a justiça e o direito, desde o começo e para sempre. No seu grande amor, o Senhor Todo-Poderoso fará com que tudo isso aconteça. (Isaías 9:7)";
 frase[1434] = "As montanhas podem desaparecer, os montes podem se desfazer, mas o meu amor por você não acabará nunca, e a minha aliança de paz com você nunca será quebrada.” É isso o que diz o Senhor, que tem amor por você. (Isaías 54:10)";
 frase[1435] = "“Em vez de bronze, eu trarei ouro para você, e prata, em vez de ferro; trarei bronze e ferro, em vez de madeira e pedras. Farei com que a paz seja o seu rei e com que a justiça a governe. (Isaías 60:17)";
 frase[1436] = "Deus respondeu: — Jeremias, se você se cansa apostando corrida com os homens, como é que vai correr mais do que os cavalos? Se você não se sente seguro numa terra de paz, como é que vai conseguir viver nas matas do rio Jordão?(Jeremias 12:5)";
