 frase[580] = "Quando virem isso acontecer, vocês ficarão contentes e terão novas forças, como uma planta que cresce viçosa. Vocês ficarão sabendo que eu, o Senhor, cuido dos meus servos, mas, quando fico irado, castigo os meus inimigos.”(Isaías 66:14)";
 frase[581] = "— Quando chegar o momento final, o rei do Egito atacará o rei da Síria, e este sairá ao seu encontro com todas as suas forças armadas, isto é, carros de guerra, a cavalaria e muitos navios. Como as águas de uma enchente, os seus soldados invadirão o Egito. (Daniel 11:40)";
 frase[582] = "Quando ouvi tudo isso, fiquei assustado, e os meus lábios tremeram de medo. Perdi todas as forças e não pude ficar de pé. Portanto, vou esperar, tranquilo, o dia em que Deus castigará aqueles que nos atacam. (Habacuque 3:16)";
 frase[583] = "Pois, por meio dele, Deus criou tudo, no céu e na terra, tanto o que se vê como o que não se vê, inclusive todos os poderes espirituais , as forças, os governos e as autoridades. Por meio dele e para ele, Deus criou todo o Universo. (Colossenses 1:16)";
 frase[584] = "De fato, essas regras parecem ser sábias, ao exigirem a adoração forçada dos anjos, a falsa humildade e um modo duro de tratar o corpo. Mas tudo isso não tem nenhum valor para controlar as paixões que levam àimoralidade. (Colossenses 2:23)";
 frase[585] = "Mas Jonadabe, filho de Simeia, irmão de Davi, disse: — Senhor, eles não mataram todos os seus filhos. Somente Amnom morreu. Pelo jeito de Absalão, a gente podia ver que ele havia resolvido fazer isso desde o dia em que Amnom forçou a sua irmã Tamar. (2Samuel 13:32)";
 frase[586] = "O rei Salomão usou trabalhadores forçados para construir o Templo e o seu próprio palácio, para aterrar o lado leste da cidade e para construir as muralhas de Jerusalém. Também usou esses trabalhadores para reconstruir as cidades de Hazor, Megido e Gezer. (1Reis 9:15)";
 frase[587] = "Então o rei Roboão mandou que Adonirão, o encarregado dos trabalhadores forçados, fosse falar com os israelitas, mas eles o mataram a pedradas. Porém Roboão saltou depressa para o seu carro de guerra e fugiu para Jerusalém. (1Reis 12:18)";
 frase[588] = "Então o rei Roboão mandou que Adonirão, o encarregado dos trabalhadores forçados, fosse falar com os israelitas, mas eles o mataram a pedradas. Porém Roboão subiu depressa no seu carro de guerra e fugiu para Jerusalém. (2Crônicas 10:18)";
 frase[589] = "Justamente nesse instante, Hamã entrou no pátio que ficava ao lado dos quartos do rei para lhe pedir que mandasse enforcar Mordecai na forca que ele, Hamã, havia mandado construir. O rei perguntou: — Quem está no pátio?(Ester 6:4)";
 frase[590] = "Um deles, chamado Harbona, disse: — Perto da casa de Hamã há uma forca de uns vinte metros de altura que ele mandou construir para enforcar Mordecai, o homem que salvou a vida do senhor. — Enforquem Hamã nela! — ordenou o rei. (Ester 7:9)";
 frase[591] = "Ele disse: — Deus o ama. Portanto, não fique com medo. Que a paz de Deus esteja com você. Anime-se! Tenha coragem! Então eu me senti bem mais forte e respondi: — Fale, pois o senhor me deu novas forças. (Daniel 10:19)";
 frase[592] = "O Senhor Deus diz: “Darei forças ao povo de Judá, salvarei o povo de Israel. Tenho compaixão deles e os trarei de volta do cativeiro. Será como se eu nunca os tivesse rejeitado, pois eu sou o Senhor, o Deus deles, e atendo as suas orações. (Zacarias 10:6)";
 frase[593] = "Devemos amar a Deus com todo o nosso coração, com toda a nossa mente e com todas as nossas forças e também devemos amar os outros como amamos a nós mesmos. Pois é melhor obedecer a estes dois mandamentos do que trazer animais para serem queimados no altar e oferecer outros sacrifícios a Deus. (Marcos 12:33)";
 frase[594] = "Escute, Jeremias! Todas as pessoas desta terra, isto é, os reis de Judá, as autoridades, os sacerdotes e o povo, vão ficar contra você. Mas hoje eu estou lhe dando forças para poder enfrentar essa gente. Você será como uma cidade cercada de muralhas, como um poste de ferro, como um muro de bronze. Eles não o derrotarão, pois eu estarei ao seu lado para protegê-lo. Eu, o Senhor, falei. (Jeremias 1:18)";
 frase[595] = "O Senhor Deus os protegerá de toda enfermidade e nunca os castigará com as terríveis doenças com que castigou os egípcios, como vocês bem sabem. Pelo contrário, ele mandará essas doenças para os povos que odeiam vocês. (Deuteronômio 7:15)";
 frase[596] = "Por causa da tua ira, estou muito doente. O meu corpo todo está enfermo por causa das minhas maldades. (Salmos 38:3)";
 frase[597] = "Jesus fez isso para cumprir o que o profeta Isaías tinha dito: “Ele levou as nossas doenças e carregou as nossas enfermidades.”(Mateus 8:17)";
 frase[598] = "Jesus andou por toda a Galileia, ensinando nas sinagogas, anunciando a boa notícia do Reino e curando as enfermidades e as doenças graves do povo. (Mateus 4:23)";
 frase[599] = "Jesus andava visitando todas as cidades e povoados. Ele ensinava nas sinagogas, anunciava a boa notícia sobre o Reino e curava todo tipo de enfermidades e doenças graves das pessoas. (Mateus 9:35)";
 frase[600] = "Jesus chamou os seus doze discípulos e lhes deu autoridade para expulsar espíritos maus e curar todas as enfermidades e doenças graves. (Mateus 10:1)";
 frase[601] = "Depois de anoitecer , todos os que tinham amigos enfermos, com várias doenças, os levaram a Jesus. Ele pôs as suas mãos sobre cada um deles e os curou. (Lucas 4:40)";
 frase[602] = "Por causa da tua ira, estou muito doente. O meu corpo todo está enfermo por causa das minhas maldades. (Salmos 38:3)";
 frase[603] = "Jesus fez isso para cumprir o que o profeta Isaías tinha dito: “Ele levou as nossas doenças e carregou as nossas enfermidades.”(Mateus 8:17)";
 frase[604] = "O Senhor Deus os protegerá de toda enfermidade e nunca os castigará com as terríveis doenças com que castigou os egípcios, como vocês bem sabem. Pelo contrário, ele mandará essas doenças para os povos que odeiam vocês. (Deuteronômio 7:15)";
 frase[605] = "Jesus andou por toda a Galileia, ensinando nas sinagogas, anunciando a boa notícia do Reino e curando as enfermidades e as doenças graves do povo. (Mateus 4:23)";
 frase[606] = "Jesus andava visitando todas as cidades e povoados. Ele ensinava nas sinagogas, anunciava a boa notícia sobre o Reino e curava todo tipo de enfermidades e doenças graves das pessoas. (Mateus 9:35)";
 frase[607] = "Jesus chamou os seus doze discípulos e lhes deu autoridade para expulsar espíritos maus e curar todas as enfermidades e doenças graves. (Mateus 10:1)";
 frase[608] = "Depois de anoitecer , todos os que tinham amigos enfermos, com várias doenças, os levaram a Jesus. Ele pôs as suas mãos sobre cada um deles e os curou. (Lucas 4:40)";
 frase[609] = "Mas Fineias castigou o culpado, e a doença acabou. (Salmos 106:30)";
 frase[610] = "ninguém que seja corcunda ou anão; ninguém que tenha doença nos olhos ou que tenha sarna ou outra doença da pele; e ninguém que seja castrado. (Levítico 21:20)";
 frase[611] = "Quando alguém tiver uma doença contagiosa da pele, deve ser levado ao sacerdote. (Levítico 13:9)";
 frase[612] = "Se o sacerdote achar que a doença se espalhou pelo corpo inteiro, da cabeça aos pés,(Levítico 13:12)";
 frase[613] = "Quando um homem ou uma mulher tiver uma doença da pele na cabeça ou no queixo,(Levítico 13:29)";
 frase[614] = "Depois de tudo isso, o Senhor castigou Jeorão com uma doença intestinal incurável. (2Crônicas 21:18)";
 frase[615] = "os que ficarem vivos morrerão de doença, e as suas viúvas não chorarão por eles. (Jó 27:15)";
 frase[616] = "Então ele deu o que pediram, mas lhes mandou também uma doença terrível. (Salmos 106:15)";
 frase[617] = "Portanto, a doença de Naamã vai pegar em você, e os seus descendentes a terão para sempre. Quando saiu dali Geazi tinha pegado a doença, e a sua pele estava branca como a neve. (2Reis 5:27)";
 frase[618] = "Nabucodonosor virá e derrotará o Egito. Os que tiverem de morrer de doença morrerão de doença; os que tiverem de cair prisioneiros serão levados como prisioneiros; e os que tiverem de morrer na guerra morrerão na guerra. (Jeremias 43:11)";
 frase[619] = "Se a mancha se espalhou, é um caso de doença contagiosa, e o sacerdote declarará que a pessoa está impura. (Levítico 13:22)";
 frase[620] = "Mas, se na parte pelada da cabeça aparecer uma mancha cor de rosa, é uma doença contagiosa. (Levítico 13:42)";
 frase[621] = "Enquanto sofrer de uma doença contagiosa, a pessoa continuará impura e precisará morar sozinha, fora do acampamento. (Levítico 13:46)";
 frase[622] = "Uma doença mortal se espalha pelo seu corpo e faz com que os seus braços e pernas apodreçam. (Jó 18:13)";
 frase[623] = "Mesmo que a minha pele seja toda comida pela doença, ainda neste corpo eu verei a Deus. (Jó 19:26)";
 frase[624] = "Com as suas ações, eles fizeram com que Deus ficasse irado e foram atacados por uma doença terrível. (Salmos 106:29)";
 frase[625] = "O Senhor destruirá completamente as florestas e as plantações; será como uma doença mortal que acaba matando a pessoa. (Isaías 10:18)";
 frase[626] = "Nesta cidade, matarei tudo o que tem vida; tanto as pessoas como os animais morrerão de uma doençahorrível. (Jeremias 21:6)";
 frase[627] = "Mandarei contra eles guerra, fome e doença, até que desapareçam da terra que dei a eles e aos seus antepassados. (Jeremias 24:10)";
 frase[628] = "Eu castigarei aqueles que estão morando no Egito como castiguei Jerusalém, isto é, com guerra, fome e doença. (Jeremias 44:13)";
 frase[629] = "eu o castigarei com uma doença horrível, que atacará todos os seus animais, isto é, os cavalos, os jumentos, os camelos, o gado, as ovelhas e as cabras. (Êxodo 9:3)";
 frase[630] = "Por isso o Senhor Deus castigou os israelitas com uma doença, pois eles haviam obrigado Arão a fazer o bezerro de ouro. (Êxodo 32:35)";
 frase[631] = "Ele a examinará e, se a mancha tiver se espalhado, declarará que a pessoa está impura; é um caso de doença contagiosa. (Levítico 13:8)";
 frase[632] = "O sacerdote o examinará outra vez e, se encontrar uma ferida aberta, então declarará que a pessoa está impura. Uma ferida aberta é sinal de doença contagiosa. (Levítico 13:15)";
 frase[633] = "No sétimo dia o sacerdote a examinará, e, se a mancha tiver se espalhado, então é uma doença contagiosa, e o sacerdote declarará que a pessoa está impura. (Levítico 13:27)";
 frase[634] = "é uma doença contagiosa. O homem está impuro, e o sacerdote declarará que está impuro por causa da infecção na cabeça. (Levítico 13:44)";
 frase[635] = "Eliseu mandou que um empregado saísse e dissesse a ele que fosse se lavar sete vezes no rio Jordão, pois assim ficaria completamente curado da sua doença. (2Reis 5:10)";
 frase[636] = "E você mesmo vai ter uma doença intestinal muito séria, que irá piorando cada vez mais, até que os seus intestinos saiam do corpo.’ ”(2Crônicas 21:15)";
 frase[637] = "E pergunta: ‘Como é que eu poderia mentir, dizendo que estou errado? Sofro de uma doença que não tem cura, embora não tenha cometido nenhum pecado.’(Jó 34:6)";
 frase[638] = "Os profetas que falaram há muito tempo, antes do meu tempo e do seu, disseram que viria guerra, fome e doença para muitas nações e poderosos reinos. (Jeremias 28:8)";
 frase[639] = "O Senhor Todo-Poderoso diz: ‘Eu mandarei contra eles guerra, fome e doença; e farei com que sejam como figos estragados, ruins demais para serem comidos. (Jeremias 29:17)";
 frase[640] = "Portanto, lembrem disto: vocês vão morrer na guerra, ou de fome, ou de doença na terra para onde querem ir e onde querem viver. (Jeremias 42:22)";
 frase[641] = "E agora está aqui uma descendente de Abraão que Satanás prendeu durante dezoito anos. Por que é que no sábado ela não devia ficar livre dessa doença?(Lucas 13:16)";
 frase[642] = "porque de vez em quando um anjo do Senhor descia e agitava a água. O primeiro doente que entrava no tanque depois disso sarava de qualquer doença.](João 5:4)";
 frase[643] = "Assim que Deus saiu, a nuvem que estava sobre a Tenda desapareceu. No mesmo instante Míriam foi atacada por uma terrível doença da pele, que ficou branca como a neve. Arão olhou para Míriam e viu que, de fato, ela estava atacada por aquela doença. (Números 12:10)";
 frase[644] = "Quando Jesus recebeu a notícia, disse: — O resultado final dessa doença não será a morte de Lázaro. Isso está acontecendo para que Deus revele o seu poder glorioso; e assim, por causa dessa doença, a natureza divina do Filho de Deus será revelada. (João 11:4)";
 frase[645] = "Se uma pessoa tiver na pele uma inchação, tumor ou mancha que vai virando uma doença contagiosa, essa pessoa será levada a Arão, o sacerdote, ou a um dos sacerdotes, que são filhos de Arão. (Levítico 13:2)";
 frase[646] = "O sacerdote examinará a pele, e, se os pelos da mancha se tornaram brancos, e se parecer que a ferida ficou mais funda do que a pele, então é uma doença contagiosa; o sacerdote declarará que a pessoa é impura. (Levítico 13:3)";
 frase[647] = "então é um caso crônico de doença contagiosa. Aí o sacerdote declarará que o doente está impuro e não fará com que ele fique no isolamento , pois não há dúvida de que ele é impuro. (Levítico 13:11)";
 frase[648] = "então ele examinará o doente. Se, de fato, a doença se espalhou pelo corpo todo, e a pele se tornou branca, então o homem está puro, e o sacerdote o declarará puro. (Levítico 13:13)";
 frase[649] = "o sacerdote examinará a pele. Se parecer que a ferida ficou mais funda do que a pele, e, se os cabelos dali estiverem amarelos e forem poucos, é uma doença contagiosa, e o sacerdote declarará que a pessoa está impura. (Levítico 13:30)";
 frase[650] = "No sétimo dia ele a examinará; se a doença não tiver se espalhado e no lugar não houver cabelos amarelados, e, se a ferida não ficou mais funda do que a pele,(Levítico 13:32)";
 frase[651] = "Uma pessoa que sofrer de uma doença contagiosa da pele deverá vestir roupas rasgadas, deixar os cabelos sem pentear, cobrir o rosto da boca para baixo e gritar: “Impuro, impuro!”(Levítico 13:45)";
 frase[652] = "Esta é a lei para a purificação das pessoas que sararam de uma doença contagiosa da pele, mas que não têm recursos para comprar tudo o que a lei exige. (Levítico 14:32)";
 frase[653] = "— Mande que os israelitas expulsem do acampamento todos os que têm uma doença contagiosa da pele, todos os que têm corrimento no membro e todos os que estão impuros por terem tocado em algum morto. (Números 5:2)";
 frase[654] = "— Se você ficar com uma doença contagiosa da pele, siga com todo o cuidado as instruções dos sacerdotes levitas. Obedeça a todas as ordens que eu dei a eles. (Deuteronômio 24:8)";
 frase[655] = "Um dia a menina disse à patroa: — Eu gostaria que o meu patrão fosse falar com o profeta que mora em Samaria, pois ele o curaria da sua doença. (2Reis 5:3)";
 frase[656] = "Quatro homens que sofriam de uma doença contagiosa da pele estavam do lado de fora dos portões da cidade de Samaria. Eles disseram uns aos outros: — Por que ficamos aqui sentados esperando a morte?(2Reis 7:3)";
 frase[657] = "O profeta Eliseu foi atacado por uma doença sem cura. Quando ele estava para morrer, o rei Jeoás foi visitá-lo. Então o abraçou e chorou, dizendo: — Meu pai, meu pai! O senhor foi como um exército para defender Israel! (2Reis 13:14)";
 frase[658] = "No ano trinta e nove do seu reinado, ele foi atacado por uma doença muito grave nos pés; mesmo assim não pediu socorro a Deus, o Senhor, mas confiou nos médicos. (2Crônicas 16:12)";
 frase[659] = "Ao ouvir isso, Uzias ficou furioso com os sacerdotes. Ele estava ali no Templo, perto do altar do incenso, segurando o queimador de incenso. E, no momento em que ficou furioso, uma doença contagiosa da pele apareceu na sua testa. (2Crônicas 26:19)";
 frase[660] = "Azarias e os sacerdotes, vendo que ele estava com aquela terrível doença, o expulsaram imediatamente do Templo. E ele mesmo tratou de sair depressa, pois o Senhor Deus o havia castigado. (2Crônicas 26:20)";
 frase[661] = "O rei Uzias sofreu dessa doença até morrer. E, por ter ficado impuro, ele morava numa casa separada e ficou proibido de entrar no Templo. O seu filho Jotão era quem mandava no palácio e governava o país. (2Crônicas 26:21)";
 frase[662] = "Uzias morreu e foi sepultado no cemitério dos reis em Jerusalém, mas não nos túmulos dos reis, por causa da sua doença. E o seu filho Jotão ficou no lugar dele como rei. (2Crônicas 26:23)";
 frase[663] = "Por isso, o Senhor, o Deus Todo-Poderoso, enviará contra os fortes soldados assírios uma doença que os deixará sem forças. Mandará uma febre que, como fogo, queimará os corpos deles. (Isaías 10:16)";
 frase[664] = "Quem ficar nesta cidade será morto na batalha, pela fome ou pela doença. Mas quem sair e se entregar aos babilônios que estão cercando a cidade não será morto: o que essa pessoa vai ganhar é escapar com vida. (Jeremias 21:9)";
 frase[665] = "Todos os que estiverem resolvidos a viver no Egito morrerão na guerra, ou de fome, ou de doença. Não sobrará ninguém; ninguém escapará da desgraça que farei cair sobre vocês.”(Jeremias 42:17)";
 frase[666] = "Eu não vou trazer para vocês a felicidade, mas a desgraça. Vocês, todo o povo de Judá que vive no Egito, vão morrer na guerra ou de doença, até que se acabem. (Jeremias 44:27)";
 frase[667] = "O Senhor Deus disse: — Ezequiel, torça as mãos, bata os pés e grite de tristeza por causa de todas as coisas más e nojentas que os israelitas fizeram. Eles morrerão na guerra, de fome e de doença. (Ezequiel 6:11)";
 frase[668] = "essa pessoa está cheia de orgulho e não sabe nada. Discutir e brigar a respeito de palavras é como uma doença nessas pessoas. E daí vêm invejas, brigas, insultos, desconfianças maldosas(1Timóteo 6:4)";
 frase[669] = "Ele a examinará e, se parecer que a ferida ficou mais funda do que a pele, e os pelos do lugar se tornaram brancos, então ele declarará que a pessoa está impura. É um caso de doença contagiosa que começou no furúnculo. (Levítico 13:20)";
 frase[670] = "o sacerdote examinará a mancha. Se os pelos do lugar se tornaram brancos, e a ferida ficou mais funda do que a pele, é uma doença contagiosa que começou com a queimadura, e o sacerdote declarará que apessoa está impura. (Levítico 13:25)";
 frase[671] = "e no sétimo dia examinará a pele. Se a doença não tiver se espalhado e, se não parecer que ficou mais funda do que a pele, o sacerdote declarará que a pessoa está pura. Ela lavará a roupa que estiver vestindo e estará pura. (Levítico 13:34)";
 frase[672] = "— Nenhum descendente de Arão que tiver uma doença contagiosa da pele ou tiver um corrimento no membro poderá comer das ofertas sagradas até que fique puro outra vez. Um sacerdote ficará impuro se tocar em qualquer coisa que ficou impura por ter tocado num morto. Ele ficará impuro se tiver perda de esperma(Levítico 22:4)";
 frase[673] = "Os homens que Moisés havia mandado para espionar a terra trouxeram más informações a respeito dela. E, quando voltaram, fizeram com que o povo reclamasse contra Moisés. Por isso o Senhor fez com que fossem atacados por uma doença, e eles morreram. (Números 14:36)";
 frase[674] = "Que o castigo por esse crime caia sobre Joabe e toda a sua família! Que nunca faltem na sua família homens que tenham gonorreia ou doença contagiosa de pele, ou que sejam capazes de fazer somente trabalho de mulher, ou que sejam mortos em batalha, ou que não tenham o que comer! (2Samuel 3:29)";
 frase[675] = "— Quando nesta terra houver falta de alimentos, ou houver pragas, ou as colheitas forem destruídas por ventos muito quentes ou por bandos de gafanhotos, ou quando o teu povo for atacado pelos seus inimigos, ou quando houver peste ou doença entre o povo,(1Reis 8:37)";
 frase[676] = "Todas as outras coisas que o rei Asa fez, os seus atos de coragem e as cidades que ele cercou de muralhas, tudo isso está escrito na História dos Reis de Judá. Na sua velhice ele foi atacado por uma doença nos pés. (1Reis 15:23)";
 frase[677] = "Naamã, o comandante do exército da Síria, era muito respeitado e estimado pelo rei do seu país porque, por meio de Naamã, o Senhor Deus tinha dado a vitória ao exército dos sírios. Ele era um soldado valente, mas sofria de uma terrível doença da pele. (2Reis 5:1)";
 frase[678] = "Então Hazael carregou quarenta camelos com todos os tipos dos mais finos produtos de Damasco e foi falar com Eliseu. Quando se encontrou com ele, disse: — O rei Ben-Hadade, que é como se fosse seu filho, mandou perguntar ao senhor se ele vai ficar bom da sua doença. (2Reis 8:9)";
 frase[679] = "O Senhor Deus feriu o rei Uzias, e ele ficou sofrendo de uma doença contagiosa da pele até o fim da sua vida. Ele morava numa casa separada, e era o seu filho Jotão quem cuidava das coisas do governo e reinava no país. (2Reis 15:5)";
 frase[680] = "— Quando nesta terra houver falta de alimento ou houver pragas, ou as colheitas forem destruídas por ventos muito quentes ou por bandos de gafanhotos, ou quando o teu povo for atacado pelos seus inimigos, ou quando houver peste ou doença entre o povo,(2Crônicas 6:28)";
 frase[681] = "Quando perguntarem para onde devem ir, responda que eu disse isto: “Alguns estão condenados a morrer de doença — assim será! Outros estão condenados a morrer na guerra — assim será! Alguns estão condenados a morrer de fome — assim será! Outros estão condenados a ser levados como prisioneiros — assim será!”(Jeremias 15:2)";
 frase[682] = "O rei Zedequias, os seus oficiais e as outras pessoas que não morrerem por causa da guerra, da fome e da doença — todos estes eu deixarei que sejam presos pelo rei Nabucodonosor e pelos outros inimigos que querem matá-los. Nabucodonosor mandará matá-los; ele não terá dó nem piedade de nenhum deles. Eu, o Senhor, estou falando. (Jeremias 21:7)";
 frase[683] = "— Mas, se alguma nação ou reino não quiser servir ao rei da Babilônia, nem obedecer ao seu governo, então eu a castigarei com guerra, fome e doença. E no fim deixarei que Nabucodonosor acabe com aquela nação. Sou eu, o Senhor, quem está falando. (Jeremias 27:8)";
 frase[684] = "Por que é que o senhor e o seu povo haveriam de morrer na guerra, ou de fome, ou de doença? Pois é isso que o Senhor Deus disse que acontecerá com qualquer nação que não servir ao rei da Babilônia. (Jeremias 27:13)";
 frase[685] = "Eu os perseguirei com guerra, fome e doença; e as nações do mundo ficarão horrorizadas com o que virem. Em todos os lugares para onde eu os espalhar, as pessoas ficarão chocadas e horrorizadas com o que aconteceu com eles. Zombarão deles e usarão o seu nome para rogar pragas. (Jeremias 29:18)";
 frase[686] = "Por isso, eu, o Senhor, digo que vocês me desobedeceram e não deram a liberdade aos seus patrícios hebreus. Pois bem! Eu vou dar liberdade a vocês: liberdade de morrer na guerra e de morrer de doença e fome. Farei com que sejam um espetáculo horrível para todas as nações da terra. Sou eu, o Senhor, quem está falando. (Jeremias 34:17)";
 frase[687] = "o Senhor Deus tinha dito o seguinte: — Quem ficar na cidade morrerá em combate, ou de fome, ou de doença. Mas aquele que sair e se entregar aos babilônios não será morto; pelo menos, escapará com vida e continuará a viver. (Jeremias 38:2)";
 frase[688] = "Mas, para que não ficasse orgulhoso demais por causa das coisas maravilhosas que vi, eu recebi uma doença dolorosa, que é como um espinho no meu corpo. Ela veio como um mensageiro de Satanás para me dar bofetadas e impedir que eu ficasse orgulhoso. (2Coríntios 12:7)";
 frase[689] = "O Senhor os castigará com doenças e mais doenças, até que todos morram na terra que vão invadir e que vai ser de vocês. (Deuteronômio 28:21)";
 frase[690] = "Ele os castigará com as mesmas doenças com que castigou os egípcios, doenças que não têm cura e que deixam vocês com tanto medo. (Deuteronômio 28:60)";
 frase[691] = "O Senhor perdoa todos os meus pecados e cura todas as minhas doenças;(Salmos 103:3)";
 frase[692] = "então ele castigará vocês e os seus descendentes com pragas e com doenças terríveis e demoradas. (Deuteronômio 28:59)";
 frase[693] = "“Outras vezes, Deus castiga com doenças e com fortes dores que não passam. (Jó 33:19)";
 frase[694] = "Deus livrará você de perigos escondidos e de doenças mortais. (Salmos 91:3)";
 frase[695] = "Na frente dele vão pragas terríveis, e atrás vêm doenças mortais. (Habacuque 3:5)";
 frase[696] = "nem de curar doenças, nem de falar em línguas estranhas, nem de explicar o que essas línguas querem dizer. (1Coríntios 12:30)";
 frase[697] = "O Senhor Deus os protegerá de toda enfermidade e nunca os castigará com as terríveis doenças com que castigou os egípcios, como vocês bem sabem. Pelo contrário, ele mandará essas doenças para os povos que odeiam vocês. (Deuteronômio 7:15)";
 frase[698] = "Mas, por causa de Sarai, o Senhor Deus castigou o rei e a sua família com doenças horríveis. (Gênesis 12:17)";
 frase[699] = "Se eu tivesse atacado você e o seu povo com doenças, você já teria sido completamente destruído. (Êxodo 9:15)";
 frase[700] = "O Senhor mandará também doenças e pragas que não estão escritas neste Livro da Lei e os destruirá. (Deuteronômio 28:61)";
 frase[701] = "Jesus fez isso para cumprir o que o profeta Isaías tinha dito: “Ele levou as nossas doenças e carregou as nossas enfermidades.”(Mateus 8:17)";
 frase[702] = "Jesus chamou os doze discípulos e lhes deu poder e autoridade para expulsar todos os demônios e curar doenças. (Lucas 9:1)";
 frase[703] = "Ele disse: — Se vocês prestarem atenção no que eu digo, se fizerem o que é certo e se guardarem os meus mandamentos, eu não os castigarei com nenhuma das doenças que mandei contra os egípcios. Eu sou o Senhor, que cura vocês. (Êxodo 15:26)";
 frase[704] = "Se vocês adorarem a mim, o Senhor, seu Deus, eu os abençoarei, dando-lhes comida e água, e tirarei de vocês todas as doenças. (Êxodo 23:25)";
 frase[705] = "as seguintes leis a respeito da cerimônia de purificação das pessoas que sararam de doenças contagiosas da pele: A pessoa será levada ao sacerdote,(Levítico 14:2)";
 frase[706] = "São essas as leis para todas as doenças contagiosas da pele e da cabeça; para inchações, tumores e manchas na pele; para o mofo na roupa e nas casas. (Levítico 14:54)";
 frase[707] = "— No futuro os seus descendentes e os estrangeiros que virão de países distantes verão os resultados dos desastres e das doenças que o Senhor vai mandar a esta nação. (Deuteronômio 29:22)";
 frase[708] = "A fome os matará, febres e doenças sem cura os destruirão. Mandarei animais selvagens para atacá-los e cobras venenosas para picá-los. (Deuteronômio 32:24)";
 frase[709] = "Como de um poço sai água, de Jerusalém sai o pecado. Na cidade, falam de violência e destruição; só vejo doenças e ferimentos. (Jeremias 6:7)";
 frase[710] = "Deixarei alguns escaparem da guerra, da fome e das doenças, de modo que, lá no meio das nações, eles compreenderão o quanto as suas ações foram vergonhosas e reconhecerão que eu sou o Senhor. (Ezequiel 12:16)";
 frase[711] = "O Senhor Deus diz o seguinte: — Vou mandar a Jerusalém os meus quatro castigos mais violentos, isto é, guerra, fome, animais ferozes e doenças, para destruir pessoas e animais. (Ezequiel 14:21)";
 frase[712] = "Eu lhe mandarei doenças e farei com que corra sangue nas suas ruas. Você será atacada de todos os lados, e todos os seus moradores serão mortos. Assim você ficará sabendo que eu sou o Senhor.”(Ezequiel 28:23)";
 frase[713] = "Eu os castigarei com doenças e morte. Derramarei chuvas pesadas, pedras de gelo, fogo e enxofre em cima de Gogue e do seu exército e em cima das muitas nações que estão do lado dele. (Ezequiel 38:22)";
 frase[714] = "Jesus andou por toda a Galileia, ensinando nas sinagogas, anunciando a boa notícia do Reino e curando as enfermidades e as doenças graves do povo. (Mateus 4:23)";
 frase[715] = "Jesus andava visitando todas as cidades e povoados. Ele ensinava nas sinagogas, anunciava a boa notícia sobre o Reino e curava todo tipo de enfermidades e doenças graves das pessoas. (Mateus 9:35)";
 frase[716] = "Jesus chamou os seus doze discípulos e lhes deu autoridade para expulsar espíritos maus e curar todas as enfermidades e doenças graves. (Mateus 10:1)";
 frase[717] = "Jesus curou muitas pessoas de todo tipo de doenças e expulsou muitos demônios. Ele não deixava que os demônios falassem, pois eles sabiam quem Jesus era. (Marcos 1:34)";
 frase[718] = "Depois de anoitecer , todos os que tinham amigos enfermos, com várias doenças, os levaram a Jesus. Ele pôs as suas mãos sobre cada um deles e os curou. (Lucas 4:40)";
 frase[719] = "Mas as notícias a respeito de Jesus se espalhavam ainda mais, e muita gente vinha para ouvi-lo e para ser curada das suas doenças. (Lucas 5:15)";
 frase[720] = "Eles tinham vindo para ouvir Jesus e para serem curados das suas doenças. Os que estavam atormentados por espíritos maus também vieram e foram curados. (Lucas 6:18)";
 frase[721] = "Naquele momento Jesus curou muitas pessoas das suas doenças e dos seus sofrimentos, expulsou espíritos maus e também curou muitos cegos. (Lucas 7:21)";
 frase[722] = "e também algumas mulheres que haviam sido livradas de espíritos maus e curadas de doenças. Eram Maria, chamada Madalena, de quem tinham sido expulsos sete demônios;(Lucas 8:2)";
 frase[723] = "Por isso num mesmo dia cairão sobre ela estas pragas: doenças, dor e fome, e ela será queimada no fogo. Pois o Senhor Deus, que a julga, é poderoso. (Apocalipse 18:8)";
 frase[724] = "Moisés e Arão responderam: — O Deus dos hebreus veio falar conosco. Por isso deixe-nos viajar três dias pelo deserto a fim de oferecermos sacrifícios ao Senhor, nosso Deus. Se não formos, ele nos matará com doenças e na guerra. (Êxodo 5:3)";
 frase[725] = "Não ofereçam ao Senhor um animal cego, ou aleijado, ou defeituoso; ou um animal que tenha úlceras, sarna ou outras doenças da pele. Um animal nessas condições não deverá ser apresentado ao Senhor como oferta de alimento. (Levítico 22:22)";
 frase[726] = "então eu os castigarei. Mandarei desastres, e doenças, e febres que abalam a saúde e enfraquecem o corpo. Não adiantará nada semear os campos, pois os inimigos é que comerão as colheitas. (Levítico 26:16)";
 frase[727] = "Ele os castigará com doenças contagiosas, infecções, inflamações e febres; mandará secas e ventos muito quentes; e fará com que pragas ataquem as plantas. Essas desgraças continuarão até que vocês morram. (Deuteronômio 28:22)";
 frase[728] = "“Se alguma desgraça cair sobre nós como castigo, seja guerra, ou doenças, ou falta de alimentos, então nos ajuntaremos em frente deste Templo, onde tu moras, e no nosso sofrimento clamaremos a ti pedindo socorro, e tu atenderás o nosso pedido.”(2Crônicas 20:9)";
 frase[729] = "Mesmo que jejuem e orem, eu não os ouvirei. Não os aceitarei, mesmo que me ofereçam animais em sacrifício e me tragam ofertas de cereais. Pelo contrário, eu os matarei na guerra e também por meio de fome e de doenças. (Jeremias 14:12)";
 frase[730] = "— Os babilônios construíram rampas de terra em volta das muralhas da cidade a fim de invadi-la e agora estão atacando. A guerra, a fome e as doenças vão fazer a cidade cair nas mãos deles. Como vês, tudo o que disseste aconteceu. (Jeremias 32:24)";
 frase[731] = "Depois, o Senhor, o Deus de Israel, disse o seguinte: — Jeremias, o povo anda dizendo que a guerra, a fome e as doenças vão fazer esta cidade cair nas mãos do rei da Babilônia. Agora, escute o que vou dizer! (Jeremias 32:36)";
 frase[732] = "Olhei e vi um cavalo amarelo. O seu cavaleiro se chamava Morte, e o mundo dos mortos o seguia. Estes receberam poder sobre a quarta parte da terra, para matar por meio de guerras, fome, doenças e animais selvagens. (Apocalipse 6:8)";
 frase[733] = "Ordenarei que povos inimigos os ataquem; e assim vocês serão castigados por terem quebrado a aliança que fiz com vocês. E, se vocês se ajuntarem nas cidades para escaparem dos inimigos, eu farei com que vocês sejam atacados por doenças graves, e os inimigos os prenderão. (Levítico 26:25)";
 frase[734] = "Eles morrerão de doenças horríveis. Ninguém chorará a morte deles, e não serão sepultados. Ficarão espalhados pelo chão como esterco. Serão mortos na guerra ou então morrerão de fome, e os seus corpos serão comidos pelas aves e pelos animais selvagens. (Jeremias 16:4)";
 frase[735] = "Mas, agora, ó Deus, deixa que os filhos deles morram de fome ou que sejam mortos na guerra. Que as mulheres percam os seus maridos e filhos, que os homens morram de doenças, e que os moços sejam mortos na guerra! (Jeremias 18:21)";
 frase[736] = "As notícias a respeito dele se espalharam por toda a região da Síria. Por isso o povo levava a Jesus pessoas que sofriam de várias doenças e de todos os tipos de males, isto é, epiléticos, paralíticos e pessoas dominadas por demônios; e ele curava todos. (Mateus 4:24)";
 frase[737] = "Estou muito doente, queimando de febre. (Salmos 38:7)";
 frase[738] = "Porém, quando aparecer uma ferida aberta na pele do doente, ele estará impuro. (Levítico 13:14)";
 frase[739] = "Quando os homens de Saul foram pegar Davi, Mical disse que ele estava doente. (1Samuel 19:14)";
 frase[740] = "Nesse tempo, o filho do rei Jeroboão, que se chamava Abias, ficou doente. (1Reis 14:1)";
 frase[741] = "O doente perde o apetite e não quer nem ver as comidas mais gostosas. (Jó 33:20)";
 frase[742] = "Nenhum morador de Jerusalém ficará doente, e os pecados de todos serão perdoados. (Isaías 33:24)";
 frase[743] = "A minha tristeza não pode ser curada; o meu coração está doente. (Jeremias 8:18)";
 frase[744] = "O nosso coração está doente, e as lágrimas escurecem a nossa visão,(Lamentações 5:17)";
 frase[745] = "Quando foi que vimos o senhor doente ou na cadeia e fomos visitá-lo?”(Mateus 25:39)";
 frase[746] = "Entre eles havia um homem que era doente fazia trinta e oito anos. (João 5:5)";
 frase[747] = "As duas irmãs mandaram dizer a Jesus: — Senhor, o seu querido amigo Lázaro está doente! (João 11:3)";
 frase[748] = "Porém quando soube que Lázaro estava doente, ainda ficou dois dias onde estava. (João 11:6)";
 frase[749] = "Algum tempo depois, o filho da viúva ficou doente. Ele foi ficando cada vez pior e acabou morrendo. (1Reis 17:17)";
 frase[750] = "Por causa da tua ira, estou muito doente. O meu corpo todo está enfermo por causa das minhas maldades. (Salmos 38:3)";
 frase[751] = "A esperança adiada faz o coração ficar doente, mas o desejo realizado enche o coração de vida. (Provérbios 13:12)";
 frase[752] = "A vontade de viver mantém a vida de um doente, mas, se ele desanima, não existe mais esperança. (Provérbios 18:14)";
 frase[753] = "“Quem pode entender o coração humano? Não há nada que engane tanto como ele; está doente demais para ser curado. (Jeremias 17:9)";
 frase[754] = "Estava sem roupa, e me vestiram; estava doente, e cuidaram de mim. Estava na cadeia, e foram me visitar.”(Mateus 25:36)";
 frase[755] = "A sogra de Simão estava de cama, com febre. Assim que Jesus chegou, contaram a ele que ela estava doente. (Marcos 1:30)";
 frase[756] = "Havia ali um oficial romano que tinha um empregado a quem estimava muito. O empregado estava gravemente doente, quase morto. (Lucas 7:2)";
 frase[757] = "Um homem chamado Lázaro estava doente. Ele era do povoado de Betânia, onde Maria e a sua irmã Marta moravam. (João 11:1)";
 frase[758] = "Lembram por que foi que lhes anunciei pela primeira vez o evangelho? Foi porque eu estava doente. (Gálatas 4:13)";
 frase[759] = "Erasto ficou na cidade de Corinto, e eu deixei Trófimo na cidade de Mileto porque ele estava doente. (2Timóteo 4:20)";
 frase[760] = "Algum tempo depois disseram a José que o seu pai estava doente. Então José foi visitá-lo, levando consigo os seus dois filhos, Efraim e Manassés. (Gênesis 48:1)";
 frase[761] = "— Se alguém pedir emprestado um animal, e este ficar doente ou morrer quando o seu dono não estiver presente, quem pediu emprestado deverá pagar o preço dele. (Êxodo 22:14)";
 frase[762] = "então a pessoa rapará a cabeça ou o queixo, sem cortar os cabelos da parte doente. O sacerdote mandará que ela fique no isolamento mais sete dias(Levítico 13:33)";
 frase[763] = "Aí Natã foi para casa. Então o Senhor fez com que o filho de Davi e da mulher de Urias ficasse muito doente. (2Samuel 12:15)";
 frase[764] = "Eliseu foi até a cidade de Damasco numa época em que o rei Ben-Hadade, da Síria, estava doente. Quando o rei soube que Eliseu estava lá,(2Reis 8:7)";
 frase[765] = "e por isso perguntou: — Por que você está triste? Você não está doente; portanto, deve estar se sentindo infeliz. Então eu fiquei com muito medo(Neemias 2:2)";
 frase[766] = "Ele disse: — Senhor, o meu empregado está na minha casa, tão doente, que não pode nem se mexer na cama. Ele está sofrendo demais. (Mateus 8:6)";
 frase[767] = "Era estrangeiro, e não me receberam na sua casa; estava sem roupa, e não me vestiram. Estava doente e na cadeia, e vocês não cuidaram de mim.”(Mateus 25:43)";
 frase[768] = "Jesus saiu da sinagoga e foi até a casa de Simão. A sogra de Simão estava doente, com febre alta; e contaram isso a Jesus. (Lucas 4:38)";
 frase[769] = "E chegou ali uma mulher que fazia dezoito anos que estava doente, por causa de um espírito mau. Ela andava encurvada e não conseguia se endireitar. (Lucas 13:11)";
 frase[770] = "porque de vez em quando um anjo do Senhor descia e agitava a água. O primeiro doente que entrava no tanque depois disso sarava de qualquer doença.](João 5:4)";
 frase[771] = "Jesus viu o homem deitado e, sabendo que fazia todo esse tempo que ele era doente, perguntou: — Você quer ficar curado?(João 5:6)";
 frase[772] = "(Esta Maria era a mesma que pôs perfume nos pés do Senhor Jesus e os enxugou com os seus cabelos. Era o irmão dela, Lázaro, que estava doente.)(João 11:2)";
 frase[773] = "Naqueles dias Dorcas ficou doente e morreu. Lavaram o corpo dela e depois o puseram num quarto do andar de cima. (Atos 9:37)";
 frase[774] = "O pai dele estava de cama, doente com febre e disenteria. Paulo entrou no quarto, fez uma oração, pôs as mãos sobre ele e o curou. (Atos 28:8)";
 frase[775] = "Ele tem tido muitas saudades de todos vocês e tem andado muito preocupado por vocês terem sabido que ele estava doente. (Filipenses 2:26)";
 frase[776] = "Já que muitas vezes você tem ficado doente do estômago, não beba somente água, mas beba também um pouco de vinho. (1Timóteo 5:23)";
 frase[777] = "Se algum de vocês estiver doente, que chame os presbíteros da igreja, para que façam oração e ponham azeite na cabeça dessa pessoa em nome do Senhor. (Tiago 5:14)";
 frase[778] = "Essa oração, feita com fé, salvará a pessoa doente. O Senhor lhe dará saúde e perdoará os pecados que tiver cometido. (Tiago 5:15)";
 frase[779] = "então é um caso crônico de doença contagiosa. Aí o sacerdote declarará que o doente está impuro e não fará com que ele fique no isolamento , pois não há dúvida de que ele é impuro. (Levítico 13:11)";
 frase[780] = "então ele examinará o doente. Se, de fato, a doença se espalhou pelo corpo todo, e a pele se tornou branca, então o homem está puro, e o sacerdote o declarará puro. (Levítico 13:13)";
 frase[781] = "Então Davi perguntou: — Quem é o seu dono? De onde você é? — Eu sou egípcio e sou escravo de um amalequita! — respondeu ele. — O meu dono me deixou aqui há três dias porque fiquei doente. (1Samuel 30:13)";
 frase[782] = "Ele estava tão apaixonado, que até ficou doente. Amnom pensava que era impossível possuir a sua meia-irmã; ela era virgem e por isso não tinha o direito de se encontrar com nenhum homem. (2Samuel 13:2)";
 frase[783] = "Mas Naamã ficou muito zangado e disse: — Eu pensava que pelo menos o profeta ia sair e falar comigo e que oraria ao Senhor, seu Deus, e que passaria a mão sobre o lugar doente e me curaria! (2Reis 5:11)";
 frase[784] = "Por esse mesmo tempo, o rei da Babilônia, Merodaque-Baladã, filho de Baladã, soube que o rei Ezequias havia estado doente. Então lhe mandou uma carta e um presente. (2Reis 20:12)";
 frase[785] = "Por esse tempo, o rei Ezequias ficou doente e quase morreu. Então orou a Deus, o Senhor, e Deus respondeu, dando um sinal para provar que ele ficaria bom. (2Crônicas 32:24)";
 frase[786] = "Por esse mesmo tempo, o rei da Babilônia, Merodaque-Baladã, filho de Baladã, soube que o rei Ezequias havia estado doente, mas agora já estava bom. Então lhe mandou uma carta e um presente. (Isaías 39:1)";
 frase[787] = "“Condena-os por causa de todas as suas maldades, castiga-os como me castigaste por causa dos meus pecados. Eu não paro de gemer, e o meu coração está doente.”(Lamentações 1:22)";
 frase[788] = "Eu, Daniel, passei vários dias abatido e doente. Depois, fiquei bom e comecei a tratar dos negócios do governo. Mas continuei muito preocupado com a visão, pois não conseguia entendê-la. (Daniel 8:27)";
 frase[789] = "— Quando Israel percebeu que estava doente, e Judá notou que também estava ferido, Israel foi procurar a ajuda do poderoso rei da Assíria; mas ele não os pôde curar nem fazer sarar os seus ferimentos. (Oseias 5:13)";
 frase[790] = "Vocês dizem: “Já estamos cansados de tudo isso!” e riem de mim e me tratam com desprezo. E ainda me oferecem um animal roubado ou um animal aleijado ou doente. Vocês acham que eu, o Senhor, vou aceitar isso?(Malaquias 1:13)";
 frase[791] = "— Então eles perguntarão: “Senhor, quando foi que vimos o senhor com fome, ou com sede, ou como estrangeiro, ou sem roupa, ou doente, ou na cadeia e não o ajudamos?”(Mateus 25:44)";
 frase[792] = "Jesus voltou a Caná da Galileia, onde havia transformado água em vinho. Estava ali um alto funcionário público que morava em Cafarnaum. Ele tinha em casa um filho doente. (João 4:46)";
 frase[793] = "Ele respondeu: — Senhor, eu não tenho ninguém para me pôr no tanque quando a água se mexe. Cada vez que eu tento entrar, outro doente entra antes de mim. (João 5:7)";
 frase[794] = "De fato, ele esteve doente e quase morreu. Mas Deus teve pena dele e não somente dele, mas também de mim; e assim evitou que eu tivesse uma tristeza ainda maior. (Filipenses 2:27)";
 frase[795] = "Então Jonadabe disse: — Finja que está doente e vá se deitar. Quando o seu pai vier, diga a ele: “Por favor, deixe que a minha irmã Tamar venha me dar de comer. Que ela prepare a comida aqui onde eu possa vê-la e que ela mesma me sirva a comida.”(2Samuel 13:5)";
 frase[796] = "E Amnom se deitou e fingiu que estava doente. O rei Davi foi visitá-lo, e Amnom disse: — Por favor, deixe que Tamar venha e prepare alguns bolos aqui onde eu possa vê-la, e que ela mesma os sirva para mim. (2Samuel 13:6)";
 frase[797] = "Mas Deus lhe disse que a mulher de Jeroboão vinha vindo perguntar sobre o filho dela, que estava doente. E Deus disse a Aías o que devia dizer a ela. A mulher de Jeroboão chegou, fazendo de conta que era outra pessoa. (1Reis 14:5)";
 frase[798] = "Por esse tempo, o rei Ezequias ficou doente e quase morreu. O profeta Isaías, filho de Amoz, foi visitá-lo e disse: — O Senhor Deus diz: “Ponha as suas coisas em ordem porque você não vai sarar. Apronte-se para morrer.”(2Reis 20:1)";
 frase[799] = "Por esse tempo, o rei Ezequias ficou doente e quase morreu. O profeta Isaías, filho de Amoz, foi visitá-lo e disse: — O Senhor Deus diz assim: “Ponha as suas coisas em ordem porque você não vai sarar. Apronte-se para morrer.”(Isaías 38:1)";
 frase[800] = "mas, por causa de toda aquela gente, eles não puderam levá-lo até perto de Jesus. Então fizeram um buraco no telhado da casa, em cima do lugar onde Jesus estava, e pela abertura desceram o doente deitado na sua cama. (Marcos 2:4)";
 frase[801] = "Uma grande multidão o seguiu, e ali ele curou os doentes. (Mateus 19:2)";
 frase[802] = "É por isso que muitos de vocês estão doentes e fracos, e alguns já morreram. (1Coríntios 11:30)";
 frase[803] = "Vocês empurram as doentes para o lado e com chifradas as põem para fora do rebanho. (Ezequiel 34:21)";
 frase[804] = "Depois disso os outros doentes da ilha vieram e também foram curados. (Atos 28:9)";
 frase[805] = "Ele não pôde fazer milagres em Nazaré, a não ser curar alguns doentes, pondo as mãos sobre eles. (Marcos 6:5)";
 frase[806] = "Jesus respondeu: — Os que têm saúde não precisam de médico, mas sim os doentes. (Lucas 5:31)";
 frase[807] = "Então os enviou para anunciarem o Reino de Deus e curarem os doentes. (Lucas 9:2)";
 frase[808] = "Ali o povo reconheceu Jesus e avisou todos os doentes das regiões vizinhas. Então muitas pessoas levaram doentes a ele,(Mateus 14:35)";
 frase[809] = "Mas, quando eles estavam doentes, eu vesti roupas de luto e até deixei de comer. Curvei a cabeça e orei por eles. (Salmos 35:13)";
 frase[810] = "Quando estiverem doentes, de cama, o Senhor os ajudará e lhes dará saúde novamente. (Salmos 41:3)";
 frase[811] = "O que ganhamos é passar a vida na escuridão e na tristeza, preocupados, doentes e amargurados. (Eclesiastes 5:17)";
 frase[812] = "Jesus ouviu a pergunta e respondeu: — Os que têm saúde não precisam de médico, mas sim os doentes. (Mateus 9:12)";
 frase[813] = "Quando Jesus soube disso, foi embora dali, e muita gente o seguiu. Ele curou todos os que estavam doentes(Mateus 12:15)";
 frase[814] = "pedindo que deixasse que os doentes pelo menos tocassem na barra da sua roupa. E todos os que tocavam nela ficavam curados. (Mateus 14:36)";
 frase[815] = "À tarde, depois do pôr do sol , levaram até Jesus todos os doentes e as pessoas que estavam dominadas por demônios. (Marcos 1:32)";
 frase[816] = "Pois ele estava curando tanta gente, que todos os doentes se juntavam em volta dele para tocá-lo. (Marcos 3:10)";
 frase[817] = "Eles expulsavam muitos demônios e curavam muitos doentes, pondo azeite na cabeça deles. (Marcos 6:13)";
 frase[818] = "Os discípulos então saíram de viagem e andaram por todos os povoados, anunciando o evangelho e curando doentes por toda parte. (Lucas 9:6)";
 frase[819] = "Curem os doentes daquela cidade e digam ao povo dali: “O Reino de Deus chegou até vocês.”(Lucas 10:9)";
 frase[820] = "Perto das entradas estavam deitados muitos doentes: cegos, aleijados e paralíticos. [Esperavam o movimento da água,(João 5:3)";
 frase[821] = "Uma grande multidão o seguia porque eles tinham visto os milagres que Jesus tinha feito, curando os doentes. (João 6:2)";
 frase[822] = "Os que estiverem longe ficarão doentes e morrerão; os que estiverem perto serão mortos na guerra. Os que restarem morrerão de fome. Eles sentirão toda a força da minha ira. (Ezequiel 6:12)";
 frase[823] = "Vocês não tratam as fracas, não curam as doentes, não fazem curativos nas machucadas, não vão buscar as que se desviam, nem procuram as que se perdem. Pelo contrário, vocês tratam as ovelhas com violência e crueldade. (Ezequiel 34:4)";
 frase[824] = "— Procurarei as ovelhas perdidas, trarei de volta as que se desviaram, farei curativo nas machucadas e tratarei das doentes. Mas destruirei as que estão gordas e fortes, porque eu sou um pastor que faz o que é certo. (Ezequiel 34:16)";
 frase[825] = "Curem os leprosos e outros doentes, ressuscitem os mortos e expulsem os demônios. Vocês receberam sem pagar; portanto, deem sem cobrar. (Mateus 10:8)";
 frase[826] = "Quando Jesus saiu do barco e viu aquela grande multidão, ficou com muita pena deles e curou os doentes que estavam ali. (Mateus 14:14)";
 frase[827] = "E foram até Jesus grandes multidões levando coxos, aleijados, cegos, mudos e muitos outros doentes, que eram colocados aos seus pés. E ele curou todos. (Mateus 15:30)";
 frase[828] = "Jesus ouviu a pergunta e disse aos mestres da Lei: — Os que têm saúde não precisam de médico, mas sim os doentes. Eu vim para chamar os pecadores e não os bons. (Marcos 2:17)";
 frase[829] = "Então, eles saíram correndo por toda aquela região, começaram a trazer os doentes em camas e os levavam para o lugar onde sabiam que Jesus estava. (Marcos 6:55)";
 frase[830] = "se pegarem em cobras ou beberem algum veneno, não sofrerão nenhum mal; e, quando puserem as mãos sobre os doentes, estes ficarão curados. (Marcos 16:18)";
 frase[831] = "Por causa dos milagres que os apóstolos faziam, as pessoas punham os doentes nas ruas, em camas e esteiras. Faziam isso para que, quando Pedro passasse, pelo menos a sua sombra cobrisse alguns deles. (Atos 5:15)";
 frase[832] = "Multidões vinham das cidades vizinhas de Jerusalém trazendo os seus doentes e os que eram dominados por espíritos maus, e todos eram curados. (Atos 5:16)";
 frase[833] = "tanto que as pessoas pegavam lenços e aventais que ele usava e os levavam para os doentes tocarem. E, quando estes tocavam neles, ficavam curados; e de outras pessoas saíam os espíritos maus. (Atos 19:12)";
 frase[834] = "E me ofendem também porque pensam que não faz mal me oferecerem animais cegos, aleijados ou doentes. Pois procurem oferecer um animal desses ao governador! Acham que ele o aceitaria com prazer e atenderia os seus pedidos? Eu, o Senhor Todo-Poderoso, falei. (Malaquias 1:8)";
 frase[835] = "Depois do pôr do sol, o povo levou até Jesus muitas pessoas que estavam dominadas por demônios. E ele, apenas com uma palavra, expulsava os espíritos maus e curava todas as pessoas que estavam doentes. (Mateus 8:16)";
 frase[836] = "Em todos os lugares aonde ele ia, isto é, nos povoados, nas cidades e nas fazendas, punham os doentes nas praças e pediam a Jesus que os deixasse pelo menos tocar na barra da sua roupa. E todos os que tocavam nela ficavam curados. (Marcos 6:56)";
 frase[837] = "Um dia Jesus estava ensinando, e alguns fariseus e alguns mestres da Lei estavam sentados perto dele. Eles tinham vindo de todas as cidades da Galileia e da Judeia e também de Jerusalém. O poder do Senhor estava com Jesus para que ele curasse os doentes. (Lucas 5:17)";
 frase[838] = "— Diga a essa gente que eu, o Senhor Deus, estou avisando: Juro que os moradores das cidades arrasadas serão mortos. Os que vivem no campo serão comidos por animais selvagens. Os que estão escondidos nas montanhas e cavernas ficarão doentes e morrerão. (Ezequiel 33:27)";
 frase[839] = "Pois pela graça de Deus vocês são salvos por meio da fé. Isso não vem de vocês, mas é um presente dado por Deus. (Efésios 2:8)";
 frase[840] = "Porque Deus amou o mundo tanto, que deu o seu único Filho, para que todo aquele que nele crer não morra, mas tenha a vida eterna. (João 3:16)";
 frase[841] = "A fé é a certeza de que vamos receber as coisas que esperamos e a prova de que existem coisas que não podemos ver. (Hebreus 11:1)";
 frase[842] = "É pela fé que entendemos que o Universo foi criado pela palavra de Deus e que aquilo que pode ser visto foi feito daquilo que não se vê. (Hebreus 11:3)";
 frase[843] = "Sem fé ninguém pode agradar a Deus, porque quem vai a ele precisa crer que ele existe e que recompensa os que procuram conhecê-lo melhor. (Hebreus 11:6)";
 frase[844] = "Então Jesus disse: — Eu afirmo a vocês que isto é verdade: se tiverem fé e não duvidarem, vocês poderão fazer a mesma coisa que eu fiz com esta figueira. E não somente isso, mas vocês poderão dizer a este monte: “Levante-se e jogue-se no mar”, e isso acontecerá. (Mateus 21:21)";
 frase[845] = "Mas sabemos que todos são aceitos por Deus somente pela fé em Jesus Cristo e não por fazerem o que a lei manda. Assim nós também temos crido em Cristo Jesus a fim de sermos aceitos por Deus pela nossa fé em Cristo e não por fazermos o que a lei manda. Pois ninguém é aceito por Deus por fazer o que a lei manda. (Gálatas 2:16)";
 frase[846] = "Jesus respondeu: — Tenham fé em Deus. (Marcos 11:22)";
 frase[847] = "Então o pai gritou: — Eu tenho fé! Ajude-me a ter mais fé ainda! (Marcos 9:24)";
 frase[848] = "Os apóstolos pediram ao Senhor: — Aumente a nossa fé. (Lucas 17:5)";
 frase[849] = "Então Jesus disse: — Veja! Você está curado porque teve fé. (Lucas 18:42)";
 frase[850] = "Estejam alertas, fiquem firmes na fé, sejam corajosos, sejam fortes. (1Coríntios 16:13)";
 frase[851] = "Porque vivemos pela fé e não pelo que vemos. (2Coríntios 5:7)";
 frase[852] = "Lembro da sua fé sincera, a mesma fé que a sua avó Loide e Eunice, a sua mãe, tinham. E tenho a certeza de que é a mesma fé que você tem. (2Timóteo 1:5)";
 frase[853] = "Fiquem firmes na fé e enfrentem o Diabo porque vocês sabem que no mundo inteiro os seus irmãos na féestão passando pelos mesmos sofrimentos. (1Pedro 5:9)";
 frase[854] = "Deus é um só e aceitará os judeus na base da sua fé e também aceitará os não judeus por meio da fé que eles têm. (Romanos 3:30)";
 frase[855] = "Abraão não perdeu a fé, nem duvidou da promessa de Deus. A sua fé o encheu de poder, e ele louvou a Deus(Romanos 4:20)";
 frase[856] = "Não estamos querendo mandar na sua fé, pois vocês estão firmes na fé. Pelo contrário, queremos trabalhar com vocês para que vocês sejam mais felizes ainda. (2Coríntios 1:24)";
 frase[857] = "Mas, antes que chegasse o tempo da fé, nós éramos prisioneiros da lei, até que fosse revelada a fé que devia vir. (Gálatas 3:23)";
 frase[858] = "Por isso, desde que ouvi falar da fé que vocês têm no Senhor Jesus e do amor que vocês têm por todos os irmãos na fé,(Efésios 1:15)";
 frase[859] = "Conserve a sua fé e mantenha a sua consciência limpa. Algumas pessoas não têm escutado a sua própria consciência, e isso tem causado a destruição da sua fé. (1Timóteo 1:19)";
 frase[860] = "Meus irmãos na fé, vocês que também foram chamados por Deus, olhem para Jesus, que Deus enviou para ser o Grande Sacerdote da fé que professamos. (Hebreus 3:1)";
 frase[861] = "Meus irmãos, que adianta alguém dizer que tem fé se ela não vier acompanhada de ações? Será que essa fépode salvá-lo?(Tiago 2:14)";
 frase[862] = "Veja como a sua fé e as suas ações agiram juntas. Por meio das suas ações, a sua fé se tornou completa. (Tiago 2:22)";
 frase[863] = "Porém vocês, meus amigos, continuem a progredir na sua fé, que é a fé mais sagrada que existe. Orem guiados pelo Espírito Santo. (Judas 1:20)";
 frase[864] = "Confie no Senhor. Tenha fé e coragem. Confie em Deus, o Senhor. (Salmos 27:14)";
 frase[865] = "Pois vocês sabem que, quando a sua fé vence essas provações, ela produz perseverança. (Tiago 1:3)";
 frase[866] = "Quem ama nunca desiste, porém suporta tudo com fé, esperança e paciência. (1Coríntios 13:7)";
 frase[867] = "“Mas eu abençoarei aquele que confia em mim, aquele que tem fé em mim, o Senhor. (Jeremias 17:7)";
 frase[868] = "E felizes são aqueles que não abandonam a sua fé em mim! (Mateus 11:6)";
 frase[869] = "Jesus não pôde fazer muitos milagres ali porque eles não tinham fé. (Mateus 13:58)";
 frase[870] = "Nessa época muitos vão abandonar a sua fé e vão trair e odiar uns aos outros. (Mateus 24:10)";
 frase[871] = "Jesus respondeu: — Se eu posso? Tudo é possível para quem tem fé. (Marcos 9:23)";
 frase[872] = "Mas Jesus disse à mulher: — A sua fé salvou você. Vá em paz. (Lucas 7:50)";
 frase[873] = "Aí Jesus disse: — Minha filha, você sarou porque teve fé! Vá em paz. (Lucas 8:48)";
 frase[874] = "Jesus ouviu isso e disse a Jairo: — Não tenha medo; tenha fé, e ela ficará boa. (Lucas 8:50)";
 frase[875] = "E Jesus disse a ele: — Levante-se e vá. Você está curado porque teve fé. (Lucas 17:19)";
 frase[876] = "E Jesus disse ainda: — Eu digo isso para que vocês não abandonem a sua fé. (João 16:1)";
 frase[877] = "Por isso Abraão, por meio da fé, “foi aceito por Deus.”(Romanos 4:22)";
 frase[878] = "Aceitem entre vocês quem é fraco na fé sem criticar as opiniões dessa pessoa. (Romanos 14:1)";
 frase[879] = "Para uma pessoa o mesmo Espírito dá fé e para outra dá o poder de curar. (1Coríntios 12:9)";
 frase[880] = "Portanto, vocês devem saber que os verdadeiros descendentes de Abraão são os que têm fé. (Gálatas 3:7)";
 frase[881] = "Pois, por meio da fé em Cristo Jesus, todos vocês são filhos de Deus. (Gálatas 3:26)";
 frase[882] = "Há um só Senhor, uma só fé e um só batismo. (Efésios 4:5)";
 frase[883] = "Eles devem se apegar à verdade revelada da fé e ter sempre a consciência limpa. (1Timóteo 3:9)";
 frase[884] = "Fiz o melhor que pude na corrida, cheguei até o fim, conservei a fé. (2Timóteo 4:7)";
 frase[885] = "Portanto, vemos que elas não puderam entrar na Terra Prometida porque não tiveram fé. (Hebreus 3:19)";
 frase[886] = "Foi pela fé que as pessoas do passado conseguiram a aprovação de Deus. (Hebreus 11:2)";
 frase[887] = "Foi pela fé que Isaque prometeu bênçãos para o futuro a Jacó e a Esaú. (Hebreus 11:20)";
 frase[888] = "Portanto, a fé é assim: se não vier acompanhada de ações, é coisa morta. (Tiago 2:17)";
 frase[889] = "Seu tolo! Vou provar-lhe que a fé sem ações não vale nada. (Tiago 2:20)";
 frase[890] = "Pois o evangelho mostra como é que Deus nos aceita: é por meio da fé, do começo ao fim. Como dizem as Escrituras Sagradas: “Viverá aquele que, por meio da fé, é aceito por Deus.”(Romanos 1:17)";
 frase[891] = "Mas quem tem dúvidas a respeito do que come é condenado por Deus quando come, pois aquilo que ele faz não se baseia na fé. E o que não se baseia na fé é pecado. (Romanos 14:23)";
 frase[892] = "Pois os diáconos que fazem um bom trabalho conquistam o respeito dos irmãos na fé e são capazes de falar com coragem sobre a sua fé em Cristo Jesus. (1Timóteo 3:13)";
 frase[893] = "Se der esses conselhos aos irmãos na fé, você será um bom servo de Cristo Jesus, alimentando-se espiritualmente com as doutrinas da fé e com o verdadeiro ensinamento que você tem seguido. (1Timóteo 4:6)";
 frase[894] = "Corra a boa corrida da fé e ganhe a vida eterna. Pois foi para essa vida que Deus o chamou quando você deu o seu belo testemunho de fé na presença de muitas testemunhas . (1Timóteo 6:12)";
 frase[895] = "Escrevo a você, Tito, meu verdadeiro filho na fé, esta fé que é sua e minha. Que a graça e a paz de Deus, o Pai, e de Cristo Jesus, o nosso Salvador, estejam com você! (Tito 1:4)";
 frase[896] = "Tu, ó Senhor, dás paz e prosperidade às pessoas que têm uma fé firme, às pessoas que confiam em ti. (Isaías 26:3)";
 frase[897] = "Portanto, agora existem estas três coisas: a fé, a esperança e o amor. Porém a maior delas é o amor. (1Coríntios 13:13)";
 frase[898] = "E levem sempre a fé como escudo, para poderem se proteger de todos os dardos de fogo do Maligno . (Efésios 6:16)";
 frase[899] = "Ele não tem medo de receber más notícias; a sua fé é forte, pois ele confia no Senhor. (Salmos 112:7)";
 frase[900] = "Imediatamente Jesus estendeu a mão, segurou Pedro e disse: — Como é pequena a sua fé! Por que você duvidou?(Mateus 14:31)";
 frase[901] = "Jesus viu que eles tinham fé e disse ao paralítico: — Meu filho, os seus pecados estão perdoados. (Marcos 2:5)";
 frase[902] = "Aí ele perguntou: — Por que é que vocês são assim tão medrosos? Vocês ainda não têm fé?(Marcos 4:40)";
 frase[903] = "E Jesus disse: — Minha filha, você sarou porque teve fé. Vá em paz; você está livre do seu sofrimento. (Marcos 5:34)";
 frase[904] = "Mas Jesus não se importou com a notícia e disse a Jairo: — Não tenha medo; tenha fé! (Marcos 5:36)";
 frase[905] = "E ficou admirado com a falta de fé que havia ali. Jesus ensinava nos povoados que havia perto dali. (Marcos 6:6)";
 frase[906] = "Jesus disse: — Gente sem fé! Até quando ficarei com vocês? Até quando terei de aguentá-los? Tragam o menino aqui. (Marcos 9:19)";
 frase[907] = "Jesus viu que eles tinham fé e disse ao paralítico: — Meu amigo, os seus pecados estão perdoados! (Lucas 5:20)";
 frase[908] = "Barnabé era um homem bom, cheio do Espírito Santo e de fé. E muitos se converteram ao Senhor. (Atos 11:24)";
 frase[909] = "Assim as igrejas ficavam mais fortes na fé, e o número de cristãos aumentava cada dia mais. (Atos 16:5)";
 frase[910] = "quer dizer, para que nos animemos uns aos outros por meio da fé que vocês e eu temos. (Romanos 1:12)";
 frase[911] = "Assim percebemos que a pessoa é aceita por Deus pela fé e não por fazer o que a lei manda. (Romanos 3:28)";
 frase[912] = "Portanto, a fé vem por ouvir a mensagem, e a mensagem vem por meio da pregação a respeito de Cristo. (Romanos 10:17)";
 frase[913] = "Portanto, a fé que vocês têm não se baseia na sabedoria humana, mas no poder de Deus. (1Coríntios 2:5)";
 frase[914] = "Mas tenham cuidado para que essa liberdade de vocês não faça com que os fracos na fé caiam em pecado. (1Coríntios 8:9)";
 frase[915] = "Agora que chegou o tempo da fé, não precisamos mais da lei para tomar conta de nós. (Gálatas 3:25)";
 frase[916] = "Portanto, sempre que pudermos, devemos fazer o bem a todos, especialmente aos que fazem parte da nossa família na fé. (Gálatas 6:10)";
 frase[917] = "Que Deus, o Pai, e o Senhor Jesus Cristo deem a todos os irmãos paz e amor, com fé! (Efésios 6:23)";
 frase[918] = "Evódia e Síntique, peço, por favor, que procurem viver bem uma com a outra, como irmãs na fé. (Filipenses 4:2)";
 frase[919] = "Assim, irmãos, em todas as nossas dificuldades e sofrimentos o que nos animou foi a fé que vocês têm. (1Tessalonicenses 3:7)";
 frase[920] = "Ensine os mais velhos a serem moderados, sérios, prudentes e firmes na fé, no amor e na perseverança. (Tito 2:2)";
 frase[921] = "Guardemos firmemente a esperança da fé que professamos, pois podemos confiar que Deus cumprirá as suas promessas. (Hebreus 10:23)";
 frase[922] = "Nós não somos gente que volta atrás e se perde. Pelo contrário, temos fé e somos salvos. (Hebreus 10:39)";
 frase[923] = "Foi pela fé que Moisés, quando já era adulto, não quis ser chamado de filho da filha de Faraó. (Hebreus 11:24)";
 frase[924] = "Foi pela fé que caíram as muralhas de Jericó, depois que os israelitas marcharam em volta delas durante sete dias. (Hebreus 11:30)";
 frase[925] = "Assim, vocês veem que a pessoa é aceita por Deus por meio das suas ações e não somente pela fé. (Tiago 2:24)";
 frase[926] = "Portanto, assim como o corpo sem o espírito está morto, assim também a fé sem ações está morta. (Tiago 2:26)";
 frase[927] = "Vocês têm essa alegria porque estão recebendo a sua salvação, que é o resultado da fé que possuem. (1Pedro 1:9)";
 frase[928] = "Respeitem todas as pessoas, amem os seus irmãos na fé, temam a Deus e respeitem o Imperador. (1Pedro 2:17)";
 frase[929] = "porque todo filho de Deus pode vencer o mundo. Assim, com a nossa fé conseguimos a vitória sobre o mundo. (1João 5:4)";
 frase[930] = "Foi pela fé que Abel ofereceu a Deus um sacrifício melhor do que o de Caim. Pela fé ele conseguiu a aprovação de Deus como homem correto, tendo o próprio Deus aprovado as suas ofertas. Por meio da sua fé, Abel, mesmo depois de morto, ainda fala. (Hebreus 11:4)";
 frase[931] = "Mas alguém poderá dizer: “Você tem fé, e eu tenho ações.” E eu respondo: “Então me mostre como é possível ter fé sem que ela seja acompanhada de ações. Eu vou lhe mostrar a minha fé por meio das minhas ações.”(Tiago 2:18)";
 frase[932] = "Peço também que, por meio da fé, Cristo viva no coração de vocês. E oro para que vocês tenham raízes e alicerces no amor,(Efésios 3:17)";
 frase[933] = "O próprio Abraão disse que Sara é irmã dele, e ela disse a mesma coisa. O que eu fiz foi de boa fé e não sou culpado. (Gênesis 20:5)";
 frase[934] = "No sonho Deus respondeu: — Eu sei que você fez tudo de boa fé. Portanto, para que você não pecasse contra mim, eu não deixei que você tocasse nela. (Gênesis 20:6)";
 frase[935] = "Então os que tinham fé foram para onde estavam os seus chefes, e o povo de Deus, o Senhor, pronto para lutar, foi encontrar-se com Baraque. (Juízes 5:13)";
 frase[936] = "Duzentos homens saíram de Jerusalém com Absalão, como convidados; eles não sabiam nada daquele plano e foram com toda a boa-fé. (2Samuel 15:11)";
 frase[937] = "Então algumas pessoas trouxeram um paralítico deitado numa cama. Jesus viu que eles tinham fé e disse ao paralítico: — Coragem, meu filho! Os seus pecados estão perdoados. (Mateus 9:2)";
 frase[938] = "Jesus virou, viu a mulher e disse: — Coragem, minha filha! Você sarou porque teve fé. E naquele momento a mulher ficou curada. (Mateus 9:22)";
 frase[939] = "mas duram pouco porque não têm raiz. E, quando por causa da mensagem chegam os sofrimentos e as perseguições, elas logo abandonam a sua fé. (Mateus 13:21)";
 frase[940] = "— Mulher, você tem muita fé! — disse Jesus. — Que seja feito o que você quer! E naquele momento a filha dela ficou curada. (Mateus 15:28)";
 frase[941] = "Jesus ouviu o que eles estavam dizendo e perguntou: — Por que é que vocês estão conversando por não terem pão? Como é pequena a fé que vocês têm! (Mateus 16:8)";
 frase[942] = "Jesus respondeu: — Gente má e sem fé! Até quando ficarei com vocês? Até quando terei de aguentá-los? Tragam o menino aqui! (Mateus 17:17)";
 frase[943] = "— Vá; você está curado porque teve fé! — afirmou Jesus. No mesmo instante, Bartimeu começou a ver de novo e foi seguindo Jesus pelo caminho. (Marcos 10:52)";
 frase[944] = "Jesus respondeu: — Gente má e sem fé! Até quando ficarei com vocês? Até quando terei de aguentá-los? Então disse ao homem: — Traga o seu filho aqui. (Lucas 9:41)";
 frase[945] = "Mas eu tenho orado por você, Simão, para que não lhe falte fé. E, quando você voltar para mim, anime os seus irmãos. (Lucas 22:32)";
 frase[946] = "Mas o mágico Elimas (este é o nome dele em grego) era contra os apóstolos. Ele não queria que o Governador aceitasse a fé cristã. (Atos 13:8)";
 frase[947] = "Alguns dias mais tarde Félix veio com Drusila, a sua esposa, que era judia. Mandou chamar Paulo e o ouviu falar a respeito da fé em Cristo Jesus. (Atos 24:24)";
 frase[948] = "Pois, se aqueles que obedecem à lei vão receber o que Deus prometeu, então a fé é inútil, e a promessa de Deus não tem valor. (Romanos 4:14)";
 frase[949] = "Agora que fomos aceitos por Deus pela nossa fé nele, temos paz com ele por meio do nosso Senhor Jesus Cristo. (Romanos 5:1)";
 frase[950] = "O que vamos dizer, então? Vamos dizer isto: os não judeus, que não procuravam ser aceitos por Deus, foram aceitos por meio da fé. (Romanos 9:30)";
 frase[951] = "E por que não? Porque eles procuravam alcançar isso por meio das suas ações e não por meio da fé. Eles tropeçaram na “pedra de tropeço”,(Romanos 9:32)";
 frase[952] = "Por exemplo, algumas pessoas creem que podem comer de tudo, mas quem é fraco na fé come somente verduras e legumes. (Romanos 14:2)";
 frase[953] = "Por isso procuremos sempre as coisas que trazem a paz e que nos ajudam a fortalecer uns aos outros na fé. (Romanos 14:19)";
 frase[954] = "Nós que somos fortes na fé devemos ajudar os fracos a carregarem as suas cargas e não devemos agradar a nós mesmos. (Romanos 15:1)";
 frase[955] = "Pelo contrário, cada um de nós deve agradar o seu irmão, para o bem dele, a fim de que ele cresça na fé. (Romanos 15:2)";
 frase[956] = "Saudações a Apeles, um irmão que tem dado muitas provas da sua fé em Cristo. Saudações ao pessoal da família de Aristóbulo. (Romanos 16:10)";
 frase[957] = "E, se Cristo não foi ressuscitado, a fé que vocês têm é uma ilusão, e vocês continuam perdidos nos seus pecados. (1Coríntios 15:17)";
 frase[958] = "As Escrituras Sagradas dizem: “Eu cri e por isso falei.” Pois assim nós, que temos a mesma fé em Deus, também falamos porque cremos. (2Coríntios 4:13)";
 frase[959] = "Por isso ficamos alegres quando estamos fracos, contanto que vocês estejam fortes. E também oramos para que vocês se tornem mais fortes na fé. (2Coríntios 13:9)";
 frase[960] = "Elas somente tinham ouvido o que outros diziam: “Aquele que antes nos perseguia está anunciando agora a fé que no passado tentava destruir!”(Gálatas 1:23)";
 frase[961] = "É claro que ninguém é aceito por Deus por meio da lei, pois as Escrituras dizem: “Viverá aquele que, por meio da fé, é aceito por Deus.”(Gálatas 3:11)";
 frase[962] = "Mas a lei não tem nada a ver com a fé. Pelo contrário, como dizem as Escrituras: “Viverá aquele que fizer o que a lei manda.”(Gálatas 3:12)";
 frase[963] = "Assim, a lei ficou tomando conta de nós até que Cristo viesse para podermos ser aceitos por Deus por meio da fé. (Gálatas 3:24)";
 frase[964] = "Pois, quando estamos unidos com Cristo Jesus, não faz diferença nenhuma estar ou não estar circuncidado. O que importa é a fé que age por meio do amor. (Gálatas 5:6)";
 frase[965] = "Por estarmos unidos com Cristo, por meio da nossa fé nele, nós temos a coragem de nos apresentarmos na presença de Deus com toda a confiança. (Efésios 3:12)";
 frase[966] = "Por isso não mintam mais. Que cada um diga a verdade para o seu irmão na fé, pois todos nós somos membros do corpo de Cristo! (Efésios 4:25)";
 frase[967] = "E, como estou certo disso, sei que continuarei vivendo e ficarei com todos vocês para ajudá-los a progredirem e a terem a alegria que vem da fé. (Filipenses 1:25)";
 frase[968] = "Pois ficamos sabendo da fé que vocês têm em Cristo Jesus e também do amor que vocês têm por todo o povo de Deus. (Colossenses 1:4)";
 frase[969] = "Porque, embora no corpo eu esteja longe, em espírito eu estou com vocês. E fico alegre em saber que vocês estão unidos e firmes na fé em Cristo. (Colossenses 2:5)";
 frase[970] = "Estejam enraizados nele, construam a sua vida sobre ele e se tornem mais fortes na fé, como foi ensinado a vocês. E deem sempre graças a Deus. (Colossenses 2:7)";
 frase[971] = "Não há necessidade de lhes escrever a respeito do amor pelos irmãos na fé, pois o próprio Deus lhes ensinou que vocês devem amar uns aos outros. (1Tessalonicenses 4:9)";
 frase[972] = "Pedimos a vocês, irmãos, que aconselhem com firmeza os preguiçosos, deem coragem aos tímidos, ajudem os fracos na fé e tenham paciência com todos. (1Tessalonicenses 5:14)";
 frase[973] = "E o nosso Senhor derramou a sua imensa graça sobre mim e me deu a fé e o amor que temos por estarmos unidos com Cristo Jesus. (1Timóteo 1:14)";
 frase[974] = "E eu fui escolhido como apóstolo e mestre dos não judeus para anunciar a mensagem da fé e da verdade. Eu não estou mentindo; estou dizendo a verdade. (1Timóteo 2:7)";
 frase[975] = "Mas a mulher será salva tendo filhos se ela, com pureza, continuar na fé, no amor e na dedicação a Deus. (1Timóteo 2:15)";
 frase[976] = "O Espírito de Deus diz claramente que, nos últimos tempos, alguns abandonarão a fé. Eles darão atenção a espíritos enganadores e a ensinamentos que vêm de demônios. (1Timóteo 4:1)";
 frase[977] = "Porém aquele que não cuida dos seus parentes, especialmente dos da sua própria família, negou a fé e é pior do que os que não creem. (1Timóteo 5:8)";
 frase[978] = "Mas você, homem de Deus, fuja de tudo isso. Viva uma vida correta, de dedicação a Deus, de fé, de amor, de perseverança e de respeito pelos outros. (1Timóteo 6:11)";
 frase[979] = "Algumas pessoas, afirmando que tinham esse “conhecimento”, se desviaram do caminho da fé. Que a graça de Deus esteja com vocês! (1Timóteo 6:21)";
 frase[980] = "Tome como modelo os ensinamentos verdadeiros que eu lhe dei e fique firme na fé e no amor que temos por estarmos unidos com Cristo Jesus. (2Timóteo 1:13)";
 frase[981] = "os quais abandonaram o caminho da verdade. Eles afirmam que a nossa ressurreição já aconteceu e assim estão atrapalhando a fé cristã de alguns. (2Timóteo 2:18)";
 frase[982] = "Assim como Janes e Jambres foram contra Moisés, assim também esses homens são contra a verdade. Eles perderam o juízo e fracassaram na fé. (2Timóteo 3:8)";
 frase[983] = "Quanto a você, continue firme nas verdades que aprendeu e em que creu de todo o coração. Você sabe quem foram os seus mestres na fé cristã. (2Timóteo 3:14)";
 frase[984] = "E, desde menino, você conhece as Escrituras Sagradas, as quais lhe podem dar a sabedoria que leva à salvação, por meio da fé em Cristo Jesus. (2Timóteo 3:15)";
 frase[985] = "E ele tinha razão quando disse isso. Portanto, você tem de repreender duramente esses falsos mestres para que sejam sadios na fé(Tito 1:13)";
 frase[986] = "Se uma pessoa causar divisões entre os irmãos na fé, aconselhe essa pessoa uma ou duas vezes; mas depois disso não tenha nada mais a ver com ela. (Tito 3:10)";
 frase[987] = "Todos os que estão comigo mandam saudações a você. Dê saudações aos nossos amigos na fé. Que a graça de Deus esteja com todos vocês! (Tito 3:15)";
 frase[988] = "porque tenho ouvido falar do seu amor por todo o povo de Deus e da fé que você tem no Senhor Jesus. (Filemom 1:5)";
 frase[989] = "Aqueles que foram os primeiros a ouvir a boa notícia não tiveram fé e por isso não receberam esse descanso. Portanto, há outros que vão recebê-lo. (Hebreus 4:6)";
 frase[990] = "Portanto, fiquemos firmes na fé que anunciamos, pois temos um Grande Sacerdote poderoso, Jesus, o Filho de Deus, o qual entrou na própria presença de Deus. (Hebreus 4:14)";
 frase[991] = "Mas depois abandonaram a fé. É impossível levar essas pessoas a se arrependerem de novo, pois estão crucificando outra vez o Filho de Deus e zombando publicamente dele. (Hebreus 6:6)";
 frase[992] = "Portanto, cheguemos perto de Deus com um coração sincero e uma fé firme, com a consciência limpa das nossas culpas e com o corpo lavado com água pura. (Hebreus 10:22)";
 frase[993] = "E todos aqueles que eu aceito terão fé em mim e viverão. Mas, se uma pessoa voltar atrás, eu não ficarei contente com ela.”(Hebreus 10:38)";
 frase[994] = "Pela fé ele morou como estrangeiro na terra que Deus lhe havia prometido. Viveu em barracas com Isaque e Jacó, que também receberam a mesma promessa de Deus. (Hebreus 11:9)";
 frase[995] = "Foi pela fé que Jacó, pouco antes de morrer, abençoou os filhos de José. Ele se apoiou na sua bengala e adorou a Deus. (Hebreus 11:21)";
 frase[996] = "Foi pela fé que Moisés saiu do Egito, sem ter medo da raiva do rei, e continuou firme, como se estivesse vendo o Deus invisível. (Hebreus 11:27)";
 frase[997] = "Foi pela fé que os israelitas atravessaram o mar Vermelho como se fosse terra seca. E, quando os egípcios tentaram atravessar, o mar os engoliu. (Hebreus 11:29)";
 frase[998] = "Foi pela fé que Raabe, a prostituta, não morreu com os que tinham desobedecido a Deus, pois ela havia recebido bem os espiões israelitas. (Hebreus 11:31)";
 frase[999] = "Pela fé eles lutaram contra nações inteiras e venceram. Fizeram o que era correto e receberam o que Deus lhes havia prometido. Fecharam a boca de leões,(Hebreus 11:33)";
 frase[1000] = "Lembrem dos seus primeiros líderes espirituais, que anunciaram a mensagem de Deus a vocês. Pensem como eles viveram e morreram e imitem a fé que eles tinham. (Hebreus 13:7)";
 frase[1001] = "Escutem, meus queridos irmãos! Deus escolheu os pobres deste mundo para serem ricos na fé e para possuírem o Reino que ele prometeu aos que o amam. (Tiago 2:5)";
 frase[1002] = "Essa oração, feita com fé, salvará a pessoa doente. O Senhor lhe dará saúde e perdoará os pecados que tiver cometido. (Tiago 5:15)";
 frase[1003] = "Por meio dele vocês creem em Deus, que o ressuscitou e lhe deu glória. Assim a fé e a esperança que vocês têm estão firmadas em Deus. (1Pedro 1:21)";
 frase[1004] = "Por isso mesmo façam todo o possível para juntar a bondade à fé que vocês têm. À bondade juntem o conhecimento(2Pedro 1:5)";
 frase[1005] = "Portanto, meus irmãos, procurem ficar cada vez mais firmes na certeza de que Deus os chamou e escolheu. Se vocês fizerem isso, jamais abandonarão a fé(2Pedro 1:10)";
 frase[1006] = "Jesus respondeu: — Foi porque vocês não têm bastante fé. Eu afirmo a vocês que isto é verdade: se vocês tivessem fé, mesmo que fosse do tamanho de uma semente de mostarda, poderiam dizer a este monte: “Saia daqui e vá para lá”, e ele iria. E vocês teriam poder para fazer qualquer coisa! (Mateus 17:20)";
 frase[1007] = "Foi o poder do nome de Jesus que deu forças a este homem. O que vocês estão vendo e sabendo foi feito pela fé no seu nome, pois foi a fé em Jesus que curou este homem em frente de todos vocês. (Atos 3:16)";
 frase[1008] = "e estar unido com ele. Eu já não procuro mais ser aceito por Deus por causa da minha obediência à lei. Pois agora é por meio da minha fé em Cristo que eu sou aceito; essa aceitação vem de Deus e se baseia na fé. (Filipenses 3:9)";
 frase[1009] = "Foi pela fé que Noé ouviu os avisos de Deus sobre as coisas que iam acontecer e que não podiam ser vistas. Noé obedeceu a Deus e construiu uma barca em que ele e a sua família foram salvos. Assim Noé condenou o mundo e recebeu de Deus a aprovação que vem por meio da fé. (Hebreus 11:7)";
 frase[1010] = "Essas provações são para mostrar que a fé que vocês têm é verdadeira. Pois até o ouro, que pode ser destruído, é provado pelo fogo. Da mesma maneira, a fé que vocês têm, que vale muito mais do que o ouro, precisa ser provada para que continue firme. E assim vocês receberão aprovação, glória e honra, no dia em que Jesus Cristo for revelado. (1Pedro 1:7)";
 frase[1011] = "Assim já não sou eu quem vive, mas Cristo é quem vive em mim. E esta vida que vivo agora, eu a vivo pela fé no Filho de Deus, que me amou e se deu a si mesmo por mim. (Gálatas 2:20)";
 frase[1012] = "Que Deus, que nos dá essa esperança, encha vocês de alegria e de paz, por meio da fé que vocês têm nele, a fim de que a esperança de vocês aumente pelo poder do Espírito Santo! (Romanos 15:13)";
 frase[1013] = "Não deixe que ninguém o despreze por você ser jovem. Mas, para os que creem, seja um exemplo na maneira de falar, na maneira de agir, no amor, na fé e na pureza. (1Timóteo 4:12)";
 frase[1014] = "Porém peçam com fé e não duvidem de modo nenhum, pois quem duvida é como as ondas do mar, que o vento leva de um lado para o outro. (Tiago 1:6)";
 frase[1015] = "Não digam palavras que fazem mal aos outros, mas usem apenas palavras boas, que ajudam os outros a crescer na fé e a conseguir o que necessitam, para que as coisas que vocês dizem façam bem aos que ouvem. (Efésios 4:29)";
 frase[1016] = "Por isso, o Senhor Deus diz: “Estou colocando em Sião uma pedra, uma pedra preciosa que eu escolhi, para ser a pedra principal do alicerce. Nela está escrito isto: ‘Quem tem fé não tem medo.’(Isaías 28:16)";
 frase[1017] = "Por isso, o Santo Deus de Israel diz ao seu povo: “Vocês rejeitam a minha mensagem e põem a sua confiança e a sua fé na violência e na mentira. (Isaías 30:12)";
 frase[1018] = "É Deus quem veste a erva do campo, que hoje dá flor e amanhã desaparece, queimada no forno. Então é claro que ele vestirá também vocês, que têm uma fé tão pequena! (Mateus 6:30)";
 frase[1019] = "Quando Jesus ouviu isso, ficou muito admirado e disse aos que o seguiam: — Eu afirmo a vocês que isto é verdade: nunca vi tanta fé, nem mesmo entre o povo de Israel! (Mateus 8:10)";
 frase[1020] = "— Por que é que vocês são assim tão medrosos? — respondeu Jesus. — Como é pequena a fé que vocês têm! Ele se levantou, falou duro com o vento e com as ondas, e tudo ficou calmo. (Mateus 8:26)";
 frase[1021] = "Jesus respondeu: — Como as pessoas de hoje são más e sem fé! Vocês estão me pedindo que faça um milagre, mas o milagre do profeta Jonas é o único sinal que lhes será dado. (Mateus 12:39)";
 frase[1022] = "Como o povo de hoje é mau e sem fé! Vocês estão me pedindo um milagre, mas o milagre de Jonas é o único sinal que lhes será dado. Então ele saiu e foi embora. (Mateus 16:4)";
 frase[1023] = "mas depois de pouco tempo essas pessoas abandonam a mensagem porque ela não criou raízes nelas. E, quando por causa da mensagem chegam os sofrimentos e as perseguições, elas logo abandonam a sua fé. (Marcos 4:17)";
 frase[1024] = "Por último Jesus apareceu aos onze discípulos enquanto eles estavam à mesa, comendo. Ele os repreendeu por não terem fé e por teimarem em não acreditar no que haviam contado os que o tinham visto ressuscitado. (Marcos 16:14)";
 frase[1025] = "Jesus ficou muito admirado quando ouviu isso. Então virou-se e disse para a multidão que o seguia: — Eu afirmo a vocês que nunca vi tanta fé, nem mesmo entre o povo de Israel! (Lucas 7:9)";
