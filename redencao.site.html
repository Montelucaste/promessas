<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Versículo do Dia - Local Sagrado</title>
    <style>
        /* Reset e Estilos Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1a0f0a 0%, #2b1b13 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #f0e6d5;
        }

        .main-container {
            max-width: 500px;
            width: 100%;
            background-color: rgba(50, 26, 2, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 42px;
            padding: 28px 20px 32px 20px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(232, 182, 86, 0.2) inset;
            border: 1px solid rgba(255, 215, 140, 0.25);
        }

        /* Cabeçalho com a GIF de Jesus */
        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-section img {
            max-width: 220px;
            width: 100%;
            height: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0 8px 12px #00000066);
            border-radius: 20px;
        }

        .header-section h1 {
            font-size: 1.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #ffd28f;
            text-shadow: 0 2px 4px #00000050;
            font-family: 'Georgia', serif;
            border-bottom: 1px solid #b58b4b;
            padding-bottom: 8px;
            width: 100%;
            text-align: center;
        }

        /* Versículo */
        .verse-card {
            background: #26170e;
            border-radius: 32px;
            padding: 32px 20px;
            margin: 20px 0 24px 0;
            box-shadow: inset 0 2px 8px #00000088, 0 12px 18px -8px #000000cc;
            border-left: 4px solid #dba55c;
            border-right: 4px solid #dba55c;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verse-text {
            font-size: 1.1rem;
            line-height: 1.2;
            font-family: 'Georgia', 'Times New Roman', serif;
            text-align: center;
            color: #ffefd1;
            quotes: "“" "”" "‘" "’";
            word-break: break-word;
        }

        .verse-text::before {
            content: "“";
            font-size: 1.5rem;
            color: #eeb76b;
            opacity: 0.7;
            margin-right: 5px;
            vertical-align: middle;
        }

        .verse-text::after {
            content: "”";
            font-size: 1.5rem;
            color: #eeb76b;
            opacity: 0.7;
            margin-left: 5px;
            vertical-align: bottom;
        }

        /* Botões */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 24px 0 16px 0;
            justify-content: center;
        }

        .btn {
            flex: 1 1 auto;
            min-width: 160px;
            padding: 18px 20px;
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            background: #4a3724;
            color: #ffeecd;
            box-shadow: 0 6px 0 #1e130c, 0 8px 14px #00000055;
            cursor: pointer;
            transition: all 0.1s ease-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #b78b4b;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1e130c, 0 5px 10px #00000055;
        }

        .btn-primary {
            background: #b27d40;
            color: #1f130a;
            font-weight: 700;
            border-color: #efc48c;
        }

        .btn-outline {
            background: transparent;
            box-shadow: 0 4px 0 #1e130c, 0 6px 12px #00000055;
            border: 2px solid #b27d40;
        }

        /* Área do WhatsApp */
        .whatsapp-area {
            background: #2f1f13;
            border-radius: 80px;
            padding: 8px 8px 8px 20px;
            margin: 10px 0 5px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #9b763d;
        }

        .whatsapp-area span {
            font-size: 1.2rem;
            margin-right: 6px;
            color: #dfb777;
        }

        .whatsapp-area input[type="tel"] {
            flex: 2 1 180px;
            background: transparent;
            border: none;
            padding: 14px 8px;
            font-size: 1.1rem;
            color: #faeacb;
            outline: none;
            min-width: 140px;
        }

        .whatsapp-area input[type="tel"]::placeholder {
            color: #a38d6b;
            font-size: 0.95rem;
        }

        .whatsapp-area .btn-wsp-send {
            flex: 0 1 auto;
            background: #25D366;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-weight: bold;
            color: #1c2b1a;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 4px 0 #128C7E;
            font-size: 1rem;
            margin-left: auto;
        }

        .whatsapp-area .btn-wsp-send:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Área do Altar com a GIF */
        .altar-container {
            text-align: center;
            margin: 25px 0 15px 0;
        }

        .altar-img {
            max-width: 280px;
            width: 100%;
            height: auto;
            border-radius: 30px;
            margin: 10px auto;
            display: block;
            box-shadow: 0 10px 18px #00000060;
            border: 1px solid #b27d40;
        }

        .fireworks-placeholder {
            width: 100%;
            height: 10px;
            margin: 0;
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.9rem;
            color: #c7a56e;
            border-top: 1px dashed #7a623e;
            padding-top: 18px;
        }

        .footer-note a {
            color: #fad393;
            text-decoration: none;
            font-weight: 500;
        }

        .small-note {
            font-size: 0.8rem;
            color: #9e8a6b;
            margin-top: 10px;
        }
    </style>
</head>

frase[120] = "Se ele passar, aprisionar, ou chamar a juízo, quem o impedirá? (Jó 11:10)";

frase[122] = "E deu-lhes ordem, dizendo: Isto é o que haveis de fazer.(2 Rs 11:5)";
frase[123] = "Então me invocareis, e ireis, e orareis a mim, e eu vos ouvirei. (Jr 29:12)";
frase[124] = "Ali caem os que praticam a iniqüidade; cairão, e não se poderão levantar. (Sl 36:12)";
frase[125] = "Bem-aventurada é a nação cujo Deus é o SENHOR, e o povo ao qual escolheu para sua herança. (Sl 33:12)";

frase[127] = "E esta é a promessa que ele nos fez: a vida eterna. (1 Jo 2:25)";
frase[128] = "O homem bom se compadece, e empresta; disporá as suas coisas com juízo; (Sl 112:5)";
frase[129] = "Porque o reino de Deus não consiste em palavras, mas em poder. (1 Co 4:20)";
frase[130] = "Aquele, pois, que cuida estar em pé, olhe não caia. (1 Co 10:12)";
frase[131] = "Mas aquele que perseverar até ao fim será salvo. (Mt 24:13)";
frase[132] = "E, quando subiram para o barco, acalmou o vento. (Mt 14:32)";
frase[133] = "Escondi a tua palavra no meu coração, para eu não pecar contra ti. (Sl 119:11)";
frase[134] = "Nisto está o amor, não em que nós tenhamos amado a Deus, mas em que ele nos amou a nós, e enviou seu Filho para propiciação pelos nossos pecados. (1 Jo 4:10)";
frase[135] = "Porque do pó não procede a aflição, nem da terra brota o trabalho. (Jó 5:6)";
frase[136] = "Aquele que não ama não conhece a Deus; porque Deus é amor. (1 Jo 4:8)";
frase[137] = "Eu não vim chamar os justos, mas, sim, os pecadores, ao arrependimento. (Lc 5:32)";
frase[138] = "Volta-te, SENHOR, livra a minha alma; salva-me por tua benignidade. (Sl 6:4)";
frase[139] = "Porém ele sabe o meu caminho; provando-me ele, sairei como o ouro. (Jó 23:10)";
frase[140] = "Ah! quem me dera ser como eu fui nos meses passados, como nos dias em que Deus me guardava! (Jó 29:2)";
frase[141] = "Os sacrifícios para Deus são o espírito quebrantado; a um coração quebrantado e contrito não desprezarás, ó Deus. (Sl 51:17)";
frase[142] = "Porque o ouvido prova as palavras, como o paladar experimenta a comida. (Jó 34:3)";
frase[143] = "Porque aquilo que temia me sobreveio; e o que receava me aconteceu. (Jó 3:25)";
frase[144] = "E eis que sobre vós envio a promessa de meu Pai; ficai, porém, na cidade de Jerusalém, até que do alto sejais revestidos de poder. (Lc 24:49)";
frase[145] = "No demais, irmãos meus, fortalecei-vos no Senhor e na força do seu poder. (Ef 6:10)";
frase[146] = "Porquanto o SENHOR teu Deus é Deus misericordioso, e não te desamparará, nem te destruirá, nem se esquecerá da aliança que jurou a teus pais. (Dt 4:31)";
frase[147] = "O ladrão não vem senão a roubar, a matar, e a destruir; eu vim para que tenham vida, e a tenham com abundância. (Jo 10:10)";
frase[148] = "Eu sou o bom Pastor; o bom Pastor dá a sua vida pelas ovelhas. (Jo 10:11)";
frase[149] = "Eu sou a porta; se alguém entrar por mim, salvar-se-á, e entrará, e sairá, e achará pastagens. (Jo 10:9)";
frase[150] = "O SENHOR te abençoe e te guarde; (Nm 6:24)";
frase[151] = "Eis que Deus não rejeitará ao reto; nem toma pela mão aos malfeitores; (Jó 8:20)";
frase[152] = "Eis que hoje eu ponho diante de vós a bênção e a maldição; (Dt 11:26)";
frase[153] = "E disse-me: A minha graça te basta, porque o meu poder se aperfeiçoa na fraqueza. De boa vontade, pois, me gloriarei nas minhas fraquezas, para que em mim habite o poder de Cristo. (2 Co 12:9)";
frase[154] = "E, qualquer que entre vós quiser ser o primeiro, seja vosso servo; (Mt 20:27)";
frase[155] = "Não peço que os tires do mundo, mas que os livres do mal. (Jo 17:15)";
frase[156] = "Porque me fez grandes coisas o Poderoso; E Santo é seu nome. (Lc 1:49)";
frase[158] = "Confundidos sejam todos os que servem imagens de escultura, que se gloriam de ídolos; prostrai-vos diante dele todos os deuses. (Sl 97:7)";
frase[159] = "Servi ao SENHOR com temor, e alegrai-vos com tremor. (Sl 2:11)";

frase[161] = "Isto vos mando: Que vos ameis uns aos outros. (Jo 15:17)";
frase[162] = "TU, pois, meu filho, fortifica-te na graça que há em Cristo Jesus. (2 Tm 2:1)";
frase[163] = "Fortalecei as mãos fracas, e firmai os joelhos trementes. (Is 35:3)";
frase[164] = "Eu os remirei da mão do inferno, e os resgatarei da morte. Onde estão, ó morte, as tuas pragas? Onde está, ó inferno, a tua perdição? O arrependimento está escondido de meus olhos. (Os 13:14)";
frase[165] = "Porque todos sois filhos de Deus pela fé em Cristo Jesus. (Gl 3:26)";
frase[166] = "Eu sou o SENHOR, vosso Santo, o Criador de Israel, vosso Rei. (Is 43:15)";
frase[167] = "Faz cessar a tormenta, e acalmam-se as suas ondas. (Sl 107:29)";
frase[168] = "O que semear a perversidade segará males; e com a vara da sua própria indignação será extinto. (Pv 22:8)";
frase[169] = "E dirás: Espancaram-me e não me doeu; bateram-me e nem senti; quando despertarei? aí então beberei outra vez. (Pv 23:35)";
frase[170] = "O Pai ama o Filho, e todas as coisas entregou nas suas mãos. (Jo 3:35)";
frase[171] = "Eis que vós confiais em palavras falsas, que para nada vos aproveitam. (Jr 7:8)";
frase[172] = "Antes de ser afligido andava errado; mas agora tenho guardado a tua palavra. (Sl 119:67)";
frase[173] = "Bem-aventurado o homem cuja força está em ti, em cujo coração estão os caminhos aplanados. (Sl 84:5)";
frase[174] = "Vigiai e orai, para que não entreis em tentação; o espírito, na verdade, está pronto, mas a carne é fraca. (Mc 14:38)";
frase[175] = "Odeio aqueles que se entregam a vaidades enganosas; eu, porém, confio no SENHOR. (Sl 31:6)";
frase[176] = "E Jesus lhe disse: Eu irei, e lhe darei saúde. (Mt 8:7)";
frase[177] = "Mas qualquer que me negar diante dos homens, eu o negarei também diante de meu Pai, que está nos céus. (Mt 10:33)";
frase[178] = "Não temais, pois; mais valeis vós do que muitos passarinhos. (Mt 10:31)";
frase[179] = "Portanto, qualquer que me confessar diante dos homens, eu o confessarei diante de meu Pai, que está nos céus. (Mt 10:32)";
frase[180] = "Andarei perante a face do SENHOR na terra dos viventes. (Sl 116:9)";
frase[181] = "Mas os ímpios não têm paz, diz o SENHOR. (Is 48:22)";
frase[182] = "O segredo do SENHOR é com aqueles que o temem; e ele lhes mostrará a sua aliança. (Sl 25:14)";
frase[183] = "Porque o Filho do homem veio salvar o que se tinha perdido. (Mt 18:11)";
frase[184] = "Os justos clamam, e o SENHOR os ouve, e os livra de todas as suas angústias. (Sl 34:17)";

frase[187] = "O caminho do justo é todo plano; tu retamente pesas o andar do justo. (Is 26:7)";
frase[188] = "Porque ele faz a chaga, e ele mesmo a liga; ele fere, e as suas mãos curam. (Jó 5:18)";
frase[189] = "Ele dá a chuva sobre a terra, e envia águas sobre os campos. (Jó 5:10)";
frase[190] = "Surdos, ouvi, e vós, cegos, olhai, para que possais ver. (Is 42:18)";
frase[191] = "E viu Deus os filhos de Israel, e atentou Deus para a sua condição. (Êx 2:25)";
frase[192] = "A ti, SENHOR, clamei, e ao SENHOR supliquei. (Sl 30:8)";
frase[193] = "Tendo, pois, tal esperança, usamos de muita ousadia no falar. (2 Co 3:12)";
frase[194] = "Venham sobre mim as tuas misericórdias, para que viva, pois a tua lei é a minha delícia. (Sl 119:77)";
frase[195] = "Cantai ao SENHOR em ação de graças; cantai louvores ao nosso Deus sobre a harpa. (Sl 147:7)";
frase[196] = "Todas as vossas coisas sejam feitas com amor. (1 Co 16:14)";
frase[197] = "EU sou a videira verdadeira, e meu Pai é o lavrador. (Jo 15:1)";
frase[198] = "Os que semeiam em lágrimas segarão com alegria. (Sl 126:5)";
frase[199] = "Porventura fazes pouco caso das consolações de Deus, e da suave palavra que te dirigimos? (Jó 15:11)";
frase[200] = "Assim por lábios gaguejantes, e por outra língua, falará a este povo. (Is 28:11)";
frase[201] = "Perto está o que me justifica; quem contenderá comigo? Compareçamos juntamente; quem é meu adversário? Chegue-se para mim. (Is 50:8)";

frase[203] = "Dizendo com grande voz: Temei a Deus, e dai-lhe glória; porque é vinda a hora do seu juízo. E adorai aquele que fez o céu, e a terra, e o mar, e as fontes das águas. (Ap 14:7)";
frase[204] = "Assim os cantores como os tocadores de instrumentos estarão lá; todas as minhas fontes estão em ti. (Sl 87:7)";
frase[205] = "Por isso vos rogo que confirmeis para com ele o vosso amor. (2 Co 2:8)";

frase[207] = "Vigiai, estai firmes na fé; portai-vos varonilmente, e fortalecei-vos. (1 Co 16:33)";
frase[208] = "Eis que vós confiais em palavras falsas, que para nada vos aproveitam. (Jr 7:8)";
frase[209] = "Bom é o sal; mas, se o sal degenerar, com que se há de salgar? (Lc 14:34)";
frase[210] = "Ali os maus cessam de perturbar; e ali repousam os cansados. (Jó 3:17)";
frase[211] = "Mas, buscai primeiro o reino de Deus, e a sua justiça, e todas estas coisas vos serão acrescentadas. (Mt 6:33)";
frase[212] = "Vinde a mim, todos os que estais cansados e oprimidos, e eu vos aliviarei. (Mt 11:28)";
frase[213] = "E tudo quanto pedirdes em meu nome eu o farei, para que o Pai seja glorificado no Filho. Se pedirdes alguma coisa em meu nome, eu o farei. (Jo 14:13,14)";
frase[214] = "Ensinando-os a guardar todas as coisas que eu vos tenho mandado; e eis que eu estou convosco todos os dias, até a consumação dos séculos. Amém. (Mt 28:20)";
frase[215] = "Amados, agora somos filhos de Deus, e ainda não é manifestado o que havemos de ser. ( Mas sabemos que, quando ele se manifestar, seremos semelhantes a ele; porque assim como é o veremos. (1 Jo 3:2)";
frase[216] = "E ouvi uma grande voz do céu, que dizia: Eis aqui o tabernáculo de Deus com os homens, pois com eles habitará, e eles serão o seu povo, e o mesmo Deus estará com eles, e será o seu Deus. E Deus limpará de seus olhos toda a lágrima; e não haverá mais morte, nem pranto, nem clamor, nem dor; porque já as primeiras coisas são passadas. (Ap 21:3,4)";
frase[218] = "E ali nunca mais haverá maldição contra alguém; e nela estará o trono de Deus e do Cordeiro, e os seus servos o servirão. E verão o seu rosto, e nas suas testas estará o seu nome. ( E ali não haverá mais noite, e não necessitarão de lâmpada nem de luz do sol, porque o Senhor Deus os ilumina; e reinarão para todo o sempre.  Ap 22:3-5)";
frase[219] = "Humilhai-vos, pois, debaixo da potente mão de Deus, para que a seu tempo vos exalte; (1 Pe 5:6)";
frase[220] = "Aquele que nem mesmo a seu próprio Filho poupou, antes o entregou por todos nós, como nos não dará também com ele todas as coisas? (Rm 8:32)";
frase[221] = "Em quem temos a redenção pelo seu sangue, a saber, a remissão dos pecados; (Cl 1:14)";
frase[222] = "Por isso vos digo que todas as coisas que pedirdes, orando, crede receber, e tê-las-eis. (Mc 11:24)";
frase[223] = "Porque naquilo que ele mesmo, sendo tentado, padeceu, pode socorrer aos que são tentados. (Hb 2:18)";
frase[224] = "Pedi, e dar-se-vos-á; buscai, e encontrareis; batei, e abrir-se-vos-á. (Mt 7:7)";
frase[225] = "Chegai-vos a Deus, e ele se chegará a vós.  Alimpai as mãos, pecadores; e, vós de duplo ânimo, purificai os corações. (Tg 4:8)";
frase[226] = "Falou-lhes, pois, Jesus outra vez, dizendo: Eu sou a luz do mundo; quem me segue não andará em trevas, mas terá a luz da vida. (Jo 8:12)";
frase[227] = "Ora, àquele que é poderoso para fazer tudo muito mais abundantemente além daquilo que pedimos ou pensamos, segundo o poder que em nós opera, (Ef 3:20)";
frase[228] = "Portanto, pode também salvar perfeitamente os que por ele se chegam a Deus, vivendo sempre para interceder por eles. (Hb 7:25)";
frase[229] = "Ora, àquele que é poderoso para vos guardar de tropeçar, e apresentar-vos irrepreensíveis, com alegria, perante a sua glória, (Jd 24:24)";
frase[230] = "Confessai as vossas culpas uns aos outros, e orai uns pelos outros, para que sareis. A oração feita por um justo pode muito em seus efeitos. (Tg 5:16)";
frase[231] = "E a paz de Deus, que excede todo o entendimento, guardará os vossos corações e os vossos sentimentos em Cristo Jesus. (Fp 4:7)";
frase[232] = "Se vós estiverdes em mim, e as minhas palavras estiverem em vós, pedireis tudo o que quiserdes, e vos será feito. (Jo 15:7)";
frase[233] = "Não veio sobre vós tentação, senão humana; mas fiel é Deus, que não vos deixará tentar acima do que podeis, antes com a tentação dará também o escape, para que a possais suportar. (1 Co 10:13)";
frase[234] = "O Senhor será também um alto refúgio para o oprimido; um alto refúgio em tempos de angústia. (Salmo 9:9)";
frase[235] = "Deus é a minha fortaleza e a minha força, e Ele perfeitamente desembaraça o meu caminho. (2 Samuel 22:33)";
frase[236] = "Tudo o que o Pai me dá virá a Mim e o que vem a Mim de maneira nenhuma o lançarei fora. (João 6:37)";
frase[237] = "Bem-aventurados os que trilham caminhos retos, e andam na lei do Senhor. (Salmo 119:1)";
frase[238] = "O Senhor conhece os que são seus, e qualquer que profere o nome de Cristo aparte-se da iniquidade. (2Tm 2:19)";
frase[239] = "O Senhor é a minha luz e a minha salvação; a quem temerei? (Salmo 27:1)";
frase[240] = "Bendito o Senhor, que de dia em dia nos cumula de benefícios. (Salmo 68:19)";
frase[241] = "Os justos chamam, e o Senhor os ouve e os livra. (Salmo 34:17)";
frase[242] = "Deus é o nosso refúgio e fortaleza, socorro bem presente na angústia. (Salmos 46:1)";
frase[243] = " Guarda a tua língua do mal, e os teus lábios de falarem o engano. (Salmos 34:13)";
frase[244] = "O que semear a perversidade segará males; e com a vara da sua própria indignação será extinto. (Provérbios 22:8)";
frase[245] = "Provai, e vede que o SENHOR é bom; bem-aventurado o homem que nele se refugia. (Salmos 34:8)";
frase[246] = "Sabendo que a prova da vossa fé opera a paciência. (Tiago 1:3)";
frase[247] = "Bendito o Senhor, que de dia em dia nos cumula de benefícios. (Salmo 68:19)";
frase[248] = "Seja bendito o nome do Senhor desde agora para sempre. (Salmo 113:2)";
frase[249] = "De tudo que se tem ouvido, o fim é: Teme a Deus. (Eclesiastes 12:13)";
frase[250] = "Eu sou Aquele que vos consola; quem pois és tu, para que temas o homem que é mortal? (Isaías 51:12)";
frase[251] = "O que vencer será vestido de vestes brancas, e de maneira nenhuma riscarei o seu nome do livro da vida. (Apocalipse 3:5)";
frase[252] = "A erva seca, a flor cai, mas a palavra do nosso Deus dura para sempre. (Isaías 40:8)";
frase[253] = "Tu és o meu servo, a ti escolhi e não te rejeitarei. (Isaías 41:9)";
frase[254] = "Tu conservarás em paz aquele cuja mente está firme em ti: porque ele confia em ti. (Isaías 26:3)";
frase[255] = "O meu socorro vem do Senhor, que fez o céu e a terra. (Salmo 121:2) ";
frase[256] = "Deus o abençoará em tudo o que fizer. (Deuteronômio 28:6)";
frase[257] = "Não é o que entra pela boca que faz alguém ficar impuro. Ao contrário, o que sai da boca é que pode torná-lo impuro. (Mateus 15:11)";
 frase[258] = "Salomão ficou no lugar de Davi, o seu pai, como rei, e o seu governo se fortaleceu muito. (1Reis 2:12)";
 frase[259] = "Fortaleçam as mãos cansadas, deem firmeza aos joelhos fracos. (Isaías 35:3)";
 frase[260] = "Por isso procuremos sempre as coisas que trazem a paz e que nos ajudam a fortalecer uns aos outros na fé. (Romanos 14:19)";
 frase[261] = "Portanto, levantem as suas mãos cansadas e fortaleçam os seus joelhos enfraquecidos. (Hebreus 12:12)";
 frase[262] = "Pois eu quero muito vê-los, a fim de repartir bênçãos espirituais com vocês para fortalecê-los,(Romanos 1:11)";
 frase[263] = "Acordem e fortaleçam aquilo que ainda está vivo, antes que morra completamente; pois sei que o que vocês fizeram não está ainda de acordo com aquilo que o meu Deus exige. (Apocalipse 3:2)";
 frase[264] = "O Senhor Deus diz: “Aqui está o meu servo, a quem eu fortaleço, o meu escolhido, que dá muita alegria ao meu coração. Pus nele o meu Espírito, e ele anunciará a minha vontade a todos os povos. (Isaías 42:1)";
 frase[265] = "Então o profeta foi falar com o rei Acabe e disse: — Volte, fortaleça o seu exército e faça planos cuidadosos, pois daqui a um ano o rei da Síria vai atacar de novo. (1Reis 20:22)";
 frase[266] = "com saúde e cheios de força. (Jó 21:24)";
 frase[267] = "Elas são esmagadas e caem, derrotadas pela força bruta. (Salmos 10:10)";
 frase[268] = "Como és poderoso! Como é grande a tua força! (Salmos 89:13)";
 frase[269] = "Com a força que Cristo me dá, posso enfrentar qualquer situação. (Filipenses 4:13)";
 frase[270] = "Deus os tirou do Egito; ele tem a força de um touro selvagem. (Números 23:22)";
 frase[271] = "Tu me dás força para atacar os meus inimigos e poder para vencer as suas defesas. (2Samuel 22:30)";
 frase[272] = "Tu me dás força para a batalha e fazes com que eu derrote os meus inimigos. (2Samuel 22:40)";
 frase[273] = "Ele mostra desprezo pelas autoridades e acaba com a força dos poderosos. (Jó 12:21)";
 frase[274] = "Quando Deus regulou a força dos ventos e marcou o tamanho do mar;(Jó 28:25)";
 frase[275] = "De que me serviria a força dos seus braços? São homens magros,(Jó 30:2)";
 frase[276] = "mas veja quanta força tem e como são poderosos os seus músculos! (Jó 40:16)";
 frase[277] = "“Agora vou falar das pernas do Leviatã, do seu tamanho e da sua força sem igual. (Jó 41:12)";
 frase[278] = "A sua força está no pescoço, e a cara dele mete medo em todo mundo. (Jó 41:22)";
 frase[279] = "Ó Senhor Deus, como eu te amo! Tu és a minha força. (Salmos 18:1)";
 frase[280] = "Tu me dás força para atacar os meus inimigos e poder para vencer as suas defesas. (Salmos 18:29)";
 frase[281] = "Tu me dás força para a batalha e fazes com que eu derrote os meus inimigos. (Salmos 18:39)";
 frase[282] = "Ó Deus, salva-me pelo teu poder! Livra-me com a tua força. (Salmos 54:1)";
 frase[283] = "Com o teu poder, puseste as montanhas no lugar, mostrando assim a tua força poderosa. (Salmos 65:6)";
 frase[284] = "Pela tua força, salvaste o teu povo, os descendentes de Jacó e de José. (Salmos 77:15)";
 frase[285] = "Enquanto vão indo, a força deles vai aumentando; eles verão o Deus dos deuses em Sião. (Salmos 84:7)";
 frase[286] = "Esmagaste o monstro Raabe e o mataste; com a tua grande força, derrotaste os teus inimigos. (Salmos 89:10)";
 frase[287] = "A minha força estará sempre com ele, o meu poder o tornará forte. (Salmos 89:21)";
 frase[288] = "Os braços de todos ficarão sem força, e de medo os corações deles baterão mais rápido,(Isaías 13:7)";
 frase[289] = "Todas as autoridades de Israel confiam na sua própria força e cometem assassinatos. (Ezequiel 22:6)";
 frase[290] = "E Paulo atravessou a província da Síria e a região da Cilícia, dando força às igrejas. (Atos 15:41)";
 frase[291] = "mas o comandante Lísias veio e o tirou de nós à força. (Atos 24:7)";
 frase[292] = "De fato, quando não tínhamos força espiritual, Cristo morreu pelos maus, no tempo escolhido por Deus. (Romanos 5:6)";
 frase[293] = "Por causa disso, eles sentirão toda a força da minha ira. Não deixarei ninguém escapar e não terei pena de ninguém. Eles gritarão com toda a força, pedindo a minha ajuda, mas eu não os atenderei. (Ezequiel 8:18)";
 frase[294] = "Eu me alegro também com as fraquezas, os insultos, os sofrimentos, as perseguições e as dificuldades pelos quais passo por causa de Cristo. Porque, quando perco toda a minha força, então tenho a força de Cristo em mim. (2Coríntios 12:10)";
 frase[295] = "Abraão fez uma reclamação a Abimeleque por causa de um poço que os empregados de Abimeleque haviam tomado à força. (Gênesis 21:25)";
 frase[296] = "Jacó respondeu: — Eu fiquei com medo, pois pensei que o senhor ia me tirar as suas filhas à força. (Gênesis 31:31)";
 frase[297] = "— Quem levar à força uma pessoa para vendê-la ou para ficar com ela como escrava será morto. (Êxodo 21:16)";
 frase[298] = "Farei uso da força? Ele é o forte. Chamarei Deus ao tribunal? E quem o obrigaria a comparecer?(Jó 9:19)";
 frase[299] = "Ó Senhor Deus, o rei está muito feliz porque lhe deste força; está muito contente porque o tornaste vitorioso. (Salmos 21:1)";
 frase[300] = "O rei prenderá os seus inimigos; com a sua força ele prenderá todos os que o odeiam. (Salmos 21:8)";
 frase[301] = "Ó Senhor Deus, nós te louvaremos por causa do teu poder; nós cantaremos e louvaremos a tua força. (Salmos 21:13)";
 frase[302] = "O Senhor Deus é a força do seu povo. O Senhor é o refúgio seguro do rei que ele escolheu. (Salmos 28:8)";
 frase[303] = "O Senhor dá força ao seu povo e o abençoa, dando-lhe tudo o que é bom. (Salmos 29:11)";
 frase[304] = "Nenhum rei vence por ter um exército poderoso, nem os soldados conseguem a vitória por causa da sua força. (Salmos 33:16)";
 frase[305] = "Não são os cavalos de guerra que ganham a batalha; a sua grande força não pode salvar ninguém. (Salmos 33:17)";
 frase[306] = "Coberto de glória, avance para vencer, defendendo a verdade e a justiça. A sua força conquistará grandes vitórias. (Salmos 45:4)";
 frase[307] = "Deus é o nosso refúgio e a nossa força, socorro que não falta em tempos de aflição. (Salmos 46:1)";
 frase[308] = "Anunciem o poder de Deus; a majestade dele está sobre o povo de Israel, a sua força está nos céus. (Salmos 68:34)";
 frase[309] = "A beleza dos jovens está na sua força, e o enfeite dos velhos são os seus cabelos brancos. (Provérbios 20:29)";
 frase[310] = "Ser sábio é melhor do que ser forte; o conhecimento é mais importante do que a força. (Provérbios 24:5)";
 frase[311] = "Você é poderoso, mas o Senhor vai agarrá-lo e, com toda a força, vai jogá-lo longe. (Isaías 22:17)";
 frase[312] = "Eu mesmo lutarei contra vocês com toda a minha força, ira e raiva e com o meu grande furor. (Jeremias 21:5)";
 frase[313] = "O poder de Moabe foi esmagado, e a sua força foi destruída. Eu, o Senhor, estou falando. (Jeremias 48:25)";
 frase[314] = "Os que correm depressa não poderão escapar, os fortes perderão toda a força, e os corajosos não salvarão avida. (Amós 2:14)";
 frase[315] = "Depois, vão em frente, como o vento que passa; eles não adoram outro deus senão a sua própria força.”(Habacuque 1:11)";
 frase[316] = "Porém, quando sentiu a força do vento, ficou com medo e começou a afundar. Então gritou: — Socorro, Senhor! (Mateus 14:30)";
 frase[317] = "Jesus ficou sabendo que queriam levá-lo à força para o fazerem rei; então voltou sozinho para o monte. (João 6:15)";
 frase[318] = "Judas e Silas, que eram profetas, falaram muito com os irmãos, dando-lhes assim ânimo e força. (Atos 15:32)";
 frase[319] = "Para terminar: tornem-se cada vez mais fortes, vivendo unidos com o Senhor e recebendo a força do seu grande poder. (Efésios 6:10)";
 frase[320] = "Porém o seu arco ficou firme, e os seus braços continuaram fortes pela força do Poderoso de Jacó, pelo nome do Pastor, a Rocha de Israel. (Gênesis 49:24)";
 frase[321] = "Ele conquistará os inimigos de Israel, os edomitas, e fará que a terra deles seja sua propriedade. O povo de Israel mostrará a sua força. (Números 24:18)";
 frase[322] = "Deus amou os nossos antepassados e por isso escolheu vocês; e ele mesmo, com a sua grande força, os tirou do Egito. (Deuteronômio 4:37)";
 frase[323] = "— Portanto, não pensem que foi com a sua própria força e com o seu trabalho que vocês conseguiram todas essas riquezas. (Deuteronômio 8:17)";
 frase[324] = "Mas eles são o teu povo, o teu povo escolhido, que tiraste do Egito com a tua força e com o teu grande poder.”(Deuteronômio 9:29)";
 frase[325] = "Com a sua força e com o seu poder ele fez milagres, maravilhas e coisas espantosas, e nos tirou do Egito,(Deuteronômio 26:8)";
 frase[326] = "Ele protege a vida dos que são fiéis a ele, mas deixa que os maus desapareçam na escuridão, pois ninguém vence pela sua própria força. (1Samuel 2:9)";
 frase[327] = "Elias se levantou, comeu e bebeu, e a comida lhe deu força bastante para andar quarenta dias e quarenta noites até o Sinai, o monte sagrado. (1Reis 19:8)";
 frase[328] = "Obedeçam a mim, o Senhor, que tirei vocês do Egito com grande poder e força; ajoelhem-se diante de mim e ofereçam sacrifícios a mim. (2Reis 17:36)";
 frase[329] = "— Senhor, estes são teus servos, o teu povo. Tu os livraste do cativeiro com o teu grande poder e com a tua força. (Neemias 1:10)";
 frase[330] = "Os bandidos têm paz em suas casas, os que ofendem a Deus vivem tranquilos, embora o seu deus seja a sua própria força. (Jó 12:6)";
 frase[331] = "Será que você pode confiar na grande força que ele tem, deixando por conta dele o trabalho pesado que há para fazer?(Jó 39:11)";
 frase[332] = "Será que a sua força pode ser comparada com a minha? Será que você pode trovejar com voz tão forte como eu?(Jó 40:9)";
 frase[333] = "O seu rabo levantado é duro como um galho de cedro, e nos músculos das suas pernas ele tem muita força. (Jó 40:17)";
 frase[334] = "Como Deus é maravilhoso no seu Templo! O Deus de Israel dá força e poder ao seu povo. Louvem a Deus. (Salmos 68:35)";
 frase[335] = "Ainda que a minha mente e o meu corpo enfraqueçam, Deus é a minha força, ele é tudo o que sempre preciso. (Salmos 73:26)";
 frase[336] = "O Senhor reina no céu com poder. A sua força é maior do que a fúria do oceano e mais poderosa do que as ondas do mar. (Salmos 93:4)";
 frase[337] = "Cantem uma nova canção a Deus, o Senhor, pois ele tem feito coisas maravilhosas. Com a sua força e com o seu santo poder, ele se tornou vitorioso. (Salmos 98:1)";
 frase[338] = "Quando estou cercado de perigos, tu me dás segurança. A tua força me protege do ódio dos meus inimigos; tu me salvas pelo teu poder. (Salmos 138:7)";
 frase[339] = "Deus é o meu Salvador; eu confiarei nele e não terei medo. Pois o Senhor me dá força e poder, ele é o meu Salvador. (Isaías 12:2)";
 frase[340] = "O Senhor Deus vem vindo cheio de força; com o seu braço poderoso, ele conseguiu a vitória. E ele traz consigo o povo que ele salvou. (Isaías 40:10)";
 frase[341] = "“Eu, e somente eu, sou o Senhor; não há outro deus além de mim. Embora você não me conheça, eu lhe dou força para lutar. (Isaías 45:5)";
 frase[342] = "Vocês estão pensando que o Senhor perdeu a força e não pode nos salvar? Ou pensam que ele está surdo e não pode nos ouvir?(Isaías 59:1)";
 frase[343] = "O Senhor disse: — O sábio não deve se orgulhar da sua sabedoria, nem o forte, da sua força, nem o rico, da sua riqueza. (Jeremias 9:23)";
 frase[344] = "O Senhor Deus diz: “Eu amaldiçoarei aquele que se afasta de mim, que confia nos outros, que confia na força de fracos seres humanos. (Jeremias 17:5)";
 frase[345] = "— Ó Senhor, meu Deus, com o teu grande poder e com a tua força, fizeste o céu e a terra. Nada é impossível para ti. (Jeremias 32:17)";
 frase[346] = "— A parede e os que a rebocaram sentirão a força da minha ira. Então direi a vocês: “A parede não existe mais, nem aqueles que a rebocaram,(Ezequiel 13:15)";
 frase[347] = "Correu até o lugar onde estava o carneiro que eu tinha visto perto do rio e o atacou com toda a força. (Daniel 8:6)";
 frase[348] = "Vocês se orgulham de terem derrotado a cidade de Lo-Debar e se gabam, dizendo: “Pela nossa própria forçaconquistamos Carnaim .”(Amós 6:13)";
 frase[349] = "O Senhor Deus é a minha força. Ele torna o meu andar firme como o de uma corça e me leva para as montanhas, onde estarei seguro. (Habacuque 3:19)";
 frase[350] = "Caiu a chuva, vieram as enchentes, e o vento soprou com força contra aquela casa. Porém ela não caiu porque havia sido construída na rocha. (Mateus 7:25)";
 frase[351] = "Caiu a chuva, vieram as enchentes, e o vento soprou com força contra aquela casa. Ela caiu e ficou totalmente destruída. (Mateus 7:27)";
 frase[352] = "Naquele momento o barco já estava no meio do lago. E as ondas batiam com força no barco porque o vento soprava contra ele. (Mateus 14:24)";
 frase[353] = "De repente, começou a soprar um vento muito forte, e as ondas arrebentavam com tanta força em cima do barco, que ele já estava ficando cheio de água. (Marcos 4:37)";
 frase[354] = "Quando o levaram, o espírito viu Jesus e sacudiu com força o menino. Ele caiu e começou a rolar no chão, espumando pela boca. (Marcos 9:20)";
 frase[355] = "Escutem! Eu dei a vocês poder para pisar cobras e escorpiões e para, sem sofrer nenhum mal, vencer aforça do inimigo. (Lucas 10:19)";
 frase[356] = "Cheio de uma grande aflição, Jesus orava com mais força ainda. O seu suor era como gotas de sangue caindo no chão.](Lucas 22:44)";
 frase[357] = "E também para que tempos de nova força espiritual venham do Senhor, e ele mande Jesus, que ele já tinha escolhido para ser o Messias de vocês. (Atos 3:20)";
 frase[358] = "A multidão ficou ouvindo Paulo até que ele disse isso, mas aí eles começaram a gritar com toda a força: — Matem esse homem! — Ele não merece viver! (Atos 22:22)";
 frase[359] = "e como é grande o seu poder que age em nós, os que cremos nele. Esse poder que age em nós é a mesma força poderosa(Efésios 1:19)";
 frase[360] = "Pedimos a Deus que vocês se tornem fortes com toda a força que vem do glorioso poder dele, para que possam suportar tudo com paciência. (Colossenses 1:11)";
 frase[361] = "É para realizar essa tarefa que eu trabalho e luto com a força de Cristo, que está agindo poderosamente em mim. (Colossenses 1:29)";
 frase[362] = "e cantavam com voz forte: “O Cordeiro que foi morto é digno de receber poder, riqueza, sabedoria e força, honra, glória e louvor.”(Apocalipse 5:12)";
 frase[363] = "dizendo: — Amém! Ao nosso Deus pertencem para todo o sempre o louvor, a glória, a sabedoria, a gratidão, a honra, o poder e a força! Amém! (Apocalipse 7:12)";
 frase[364] = "O Senhor Deus diz: — Povo de Jerusalém, levante-se e ataque os inimigos! Eu darei a vocês a força de um touro com chifres de ferro e cascos de bronze. Vocês destruirão muitos povos e oferecerão a mim, o Senhor do mundo inteiro, as riquezas que eles conquistaram pela força. (Miqueias 4:13)";
 frase[365] = "A verdade é que foi à força que me tiraram da terra dos hebreus e me trouxeram para o Egito; e mesmo aqui no Egito não fiz nada para vir parar na cadeia. (Gênesis 40:15)";
 frase[366] = "“Rúben, você é o meu filho mais velho. Você é a minha força, o primeiro fruto do meu vigor, o mais orgulhoso e o mais forte dos meus filhos. (Gênesis 49:3)";
 frase[367] = "Porém Moisés fez um pedido ao Senhor, seu Deus. Ele disse: — Ó Senhor, por que ficaste assim tão irado com o teu povo, que tiraste do Egito com grande poder e força?(Êxodo 32:11)";
 frase[368] = "Lembre que você foi escravo no Egito e que eu, o Senhor, seu Deus, o tirei de lá com a minha força e com o meu poder. É por isso que eu mando que você guarde o sábado. (Deuteronômio 5:15)";
 frase[369] = "Mas o Senhor os amou e com a sua força os livrou do poder de Faraó, o rei do Egito, onde vocês eram escravos. Ele fez isso para cumprir o juramento que tinha feito aos nossos antepassados. (Deuteronômio 7:8)";
 frase[370] = "Lembrem do Senhor, nosso Deus, pois é ele quem lhes dá força para poderem conseguir riquezas. Vocês estão vendo que assim ele está cumprindo a aliança feita por meio de juramento com os nossos antepassados. (Deuteronômio 8:18)";
 frase[371] = "E orei assim ao Senhor: “Ó Senhor, meu Deus! Eu te peço que não destruas o teu povo, o teu povo escolhido, que com a tua força e com o teu poder livraste do Egito. (Deuteronômio 9:26)";
 frase[372] = "Pensem hoje na grandeza de Deus e naquilo que aprenderam a respeito do seu poder e da sua força. Foram vocês, e não os seus filhos, que viram e conheceram tudo isso. (Deuteronômio 11:2)";
 frase[373] = "Então os sacerdotes tocaram as cornetas. Logo que o povo ouviu este som, gritou com toda a força, e a muralha caiu. Aí todos subiram, entraram na cidade e a tomaram. (Josué 6:20)";
 frase[374] = "e me sinto tão forte hoje como no dia em que Moisés me mandou espionar a terra. Ainda tenho bastante força para combater na guerra e para fazer o que for preciso. (Josué 14:11)";
 frase[375] = "Então o Senhor Deus ordenou a Gideão: — Vá com toda a sua força e livre o povo de Israel dos midianitas. Sou eu quem está mandando que você vá. (Juízes 6:14)";
 frase[376] = "Então Dalila pediu a Sansão: — Por favor, me conte o segredo da sua força. Se alguém quiser amarrar você e deixar sem defesa, o que é que ele deve fazer?(Juízes 16:6)";
 frase[377] = "Ela fez com que Sansão dormisse no seu colo. Em seguida chamou um homem, e ele cortou as sete tranças de Sansão. Aí Dalila começou a provocá-lo, mas ele havia perdido a sua força. (Juízes 16:19)";
 frase[378] = "E, se o homem respondia: “Deixe que a gordura queime primeiro, depois você pode tirar o que quiser”, o ajudante do sacerdote dizia: “Não. Entregue logo essa carne. Se não, eu a tomarei à força.”(1Samuel 2:16)";
 frase[379] = "Davi respondeu ao mensageiro: — Anime Joabe e diga-lhe que não fique preocupado, pois numa batalha nunca se sabe quem vai morrer. Diga-lhe que ataque com mais força, até conquistar a cidade. (2Samuel 11:25)";
 frase[380] = "Mas Jeú puxou a corda do seu arco com toda a força e atirou uma flecha, que feriu Jorão nas costas. Aflecha atravessou o coração, e ele caiu morto no seu carro de guerra. (2Reis 9:24)";
 frase[381] = "Você está pensando que as palavras podem tomar o lugar da experiência militar e da força? Quem você pensa que vai ajudá-lo na sua revolta contra o rei da Assíria?(2Reis 18:20)";
 frase[382] = "Não houve antes nenhum rei como ele, que servisse a Deus, o Senhor, com todo o seu coração, mente e força, obedecendo a toda a Lei de Moisés; e depois nunca houve outro rei igual a ele. (2Reis 23:25)";
 frase[383] = "Toda a riqueza e prosperidade vêm de ti; tu governas todas as coisas com o teu poder e a tua força e podes tornar grande e forte qualquer pessoa. (1Crônicas 29:12)";
 frase[384] = "Ele só conta com a força dos homens, mas do nosso lado está o Senhor, nosso Deus, para nos ajudar e para guerrear por nós. E o povo ficou animado ao ouvir as palavras do rei Ezequias. (2Crônicas 32:8)";
 frase[385] = "Mas eu os avisei: — Não adianta vocês passarem a noite do lado de fora das muralhas, esperando pela manhã. Se vocês fizerem isso de novo, eu usarei a força. Daí em diante, eles não voltaram mais no sábado. (Neemias 13:21)";
 frase[386] = "O Senhor é a minha força e o meu escudo; com todo o coração eu confio nele. O Senhor me ajuda; por isso, o meu coração está feliz, e eu canto hinos em seu louvor. (Salmos 28:7)";
 frase[387] = "Agora que estou velho, e os meus cabelos ficaram brancos, não me abandones, ó Deus! Fica comigo enquanto anuncio o teu poder e a tua força a este povo e aos seus descendentes. (Salmos 71:18)";
 frase[388] = "Olha de novo para mim e tem misericórdia de mim; dá-me a tua força e salva-me, pois eu te sirvo, como te serviu também a minha mãe. (Salmos 86:16)";
 frase[389] = "Eu sempre achei que a sabedoria é melhor do que a força; mas ninguém acredita que uma pessoa pobre pode ser sábia e ninguém presta atenção no que ela diz. (Eclesiastes 9:16)";
 frase[390] = "Será que você pensa que as palavras podem tomar o lugar da experiência militar e da força? Quem você pensa que vai ajudá-lo na sua revolta contra o rei da Assíria?(Isaías 36:5)";
 frase[391] = "Alguém diz: “Anuncie a mensagem!” “O que devo anunciar?” — eu pergunto. “Anuncie que todos os seres humanos são como a erva do campo e toda a força deles é como uma flor do mato. (Isaías 40:6)";
 frase[392] = "O Senhor se prepara para a guerra e sai pronto para lutar, como um soldado valente. Com toda a força, ele solta o grito de batalha e com o seu poder derrota os seus inimigos. (Isaías 42:13)";
 frase[393] = "O ferreiro pega um pedaço de metal, coloca nas brasas e depois com toda a força vai batendo nele com o martelo até formar a imagem. Ele trabalha tanto, que não come, nem bebe e acaba perdendo as forças. (Isaías 44:12)";
 frase[394] = "O Senhor Deus diz: “Grite com toda a força, sem parar! Grite alto, como se você fosse trombeta! Anuncie ao meu povo, os descendentes de Jacó, os seus pecados e as suas maldades. (Isaías 58:1)";
 frase[395] = "Ele ficou espantado quando viu que não havia ninguém que socorresse o seu povo. Então com a sua própria força ele venceu e, por ser o Deus justo, conseguiu a vitória. (Isaías 59:16)";
 frase[396] = "Olhei, mas não havia ninguém que me ajudasse, fiquei admirado ao ver que não havia quem me apoiasse. Então consegui a vitória com o meu próprio poder, e a minha ira me encheu de força. (Isaías 63:5)";
 frase[397] = "Como se fossem leões, eles têm dado urros contra Israel; eles têm rugido com força. Fizeram com que aterra de Israel virasse um deserto; as suas cidades estão destruídas, e ninguém mora nelas. (Jeremias 2:15)";
 frase[398] = "Por que é que tens de ser como um homem apanhado de surpresa, como um soldado que não tem forçapara defender os outros? Mas tu, ó Senhor, estás entre nós, e nós somos o teu povo. Não nos abandones!”(Jeremias 14:9)";
 frase[399] = "O Senhor disse: — Por isso, farei com que eles conheçam a minha força e o meu poder uma vez para sempre. E eles saberão que o meu nome é Senhor. (Jeremias 16:21)";
 frase[400] = "— Eu, com o meu grande poder e com a minha força, criei o mundo, os seres humanos e todos os animais que vivem na terra; e posso dá-los a quem eu quiser. (Jeremias 27:5)";
 frase[401] = "Tiraste o povo de Israel da terra do Egito por meio do teu poder e da tua força e por meio de milagres e maravilhas que encheram de terror os nossos inimigos. (Jeremias 32:21)";
 frase[402] = "“Moabe, você confiou na sua força e na sua riqueza, mas agora você mesmo será dominado. O seu deus Quemos será levado para fora do país, junto com os seus príncipes e os seus sacerdotes. (Jeremias 48:7)";
 frase[403] = "Tenham pena de Moabe, vocês que moram perto, todos vocês que conhecem a sua fama. Digam: “O seu grande poder se acabou; a sua glória e a sua força não existem mais.”(Jeremias 48:17)";
 frase[404] = "Povo infiel, por que é que vocês se gabam? O seu poder está no fim. Por que é que vocês confiam na sua própria força e dizem que ninguém terá coragem de atacá-los?(Jeremias 49:4)";
 frase[405] = "Os estrangeiros que moravam lá disseram: “Quisemos ajudar a Babilônia, mas já era tarde demais. Vamos sair e voltar cada um para a sua pátria. Deus castigou com toda a sua força a Babilônia e a destruiu completamente.”(Jeremias 51:9)";
 frase[406] = "Como se fosse um inimigo, Deus apontou as suas flechas contra nós e, com a sua força, matou as pessoas mais estimadas do nosso povo. Ele derramou a sua ira, como se fosse fogo, sobre os moradores de Jerusalém. (Lamentações 2:4)";
 frase[407] = "Os que estiverem longe ficarão doentes e morrerão; os que estiverem perto serão mortos na guerra. Os que restarem morrerão de fome. Eles sentirão toda a força da minha ira. (Ezequiel 6:12)";
 frase[408] = "— Logo vocês vão sentir toda a força da minha ira. Eu estou julgando vocês pelo que têm feito. Farei com que sofram as consequências do seu nojento modo de agir. (Ezequiel 7:8)";
 frase[409] = "Mas eles se revoltaram contra mim e não quiseram me ouvir. E não jogaram fora os seus ídolos nojentos, nem abandonaram os ídolos do Egito. Eu estava pronto para fazê-los sentir, ali no Egito, a força da minha ira. (Ezequiel 20:8)";
 frase[410] = "Vocês pensam que ainda terão alguma coragem ou força bastante para levantar a mão quando eu acabar de agir contra vocês? Eu, o Senhor, estou falando e mantenho a minha palavra. (Ezequiel 22:14)";
 frase[411] = "Jerusalém, os seus atos imorais mancharam você. Eu tentei purificá-la, mas você continuou impura. Você não será pura de novo até que sinta toda a força da minha ira. (Ezequiel 24:13)";
 frase[412] = "Sim! Farei com que o rei do Egito fique fraco e darei força ao rei da Babilônia. Quando eu lhe der a minha espada, e ele a apontar para o Egito, todos ficarão sabendo que eu sou o Senhor. (Ezequiel 30:25)";
 frase[413] = "Eu os fiz sentir a força da minha ira, por causa dos crimes de morte que haviam cometido na terra e por causa dos ídolos com que eles a tornaram impura. (Ezequiel 36:18)";
 frase[414] = "Ele ficará cada vez mais poderoso, mas não pela sua própria força. Causará destruições terríveis, acabará com povos poderosos e também com o povo de Deus. Fará o que quiser e prosperará sempre. (Daniel 8:24)";
 frase[415] = "Com a sua presença, ele enganará a todos; ficará cada vez mais orgulhoso e matará muitas pessoas à traição. Finalmente, ele desafiará a Deus, o Rei dos reis, mas será destruído sem o uso de força humana. (Daniel 8:25)";
 frase[416] = "Em vez de fazerem isso, os marinheiros começaram a remar com toda a força, tentando levar o navio para a praia; porém não conseguiam nada porque a tempestade piorava ainda mais. (Jonas 1:13)";
 frase[417] = "Alguns soldados também perguntavam: — E nós, o que devemos fazer? E João respondia: — Não tomem dinheiro de ninguém, nem pela força nem por meio de acusações falsas. E se contentem com o salário que recebem. (Lucas 3:14)";
 frase[418] = "Mas, como não os encontraram, levaram à força Jasão e alguns outros irmãos até a presença das autoridades da cidade, gritando: — Aqueles homens têm provocado desordens em todos os lugares! Agora chegaram até a nossa cidade,(Atos 17:6)";
 frase[419] = "Mas o navio bateu num banco de areia e ficou encalhado. A parte da frente ficou presa, e a de trás começou a ser arrebentada pela força das ondas. (Atos 27:41)";
 frase[420] = "Alguns galhos da oliveira cultivada foram quebrados, e um galho de oliveira brava foi enxertado nela. Pois vocês, os não judeus, são como aquela oliveira brava e agora tomam parte na força e na riqueza espiritual dos judeus. (Romanos 11:17)";
 frase[421] = "Pois aquilo que parece ser a loucura de Deus é mais sábio do que a sabedoria humana, e aquilo que parece ser a fraqueza de Deus é mais forte do que a força humana. (1Coríntios 1:25)";
 frase[422] = "Desse modo Deus dará força ao coração de vocês, e vocês serão completamente dedicados a ele e estarão sem culpa na presença do nosso Deus e Pai, quando o nosso Senhor Jesus vier com todos os que são dele. Amém! (1Tessalonicenses 3:13)";
 frase[423] = "Mas o Senhor ficou comigo, me deu força para que eu pudesse anunciar a mensagem completa a todos os não judeus e me livrou de ser condenado à morte. (2Timóteo 4:17)";
 frase[424] = "“Eu sei o que vocês estão fazendo. Sei que têm pouca força. Vocês têm seguido os meus ensinamentos e têm sido fiéis a mim. Eu abri diante de vocês uma porta que ninguém pode fechar. (Apocalipse 3:8)";
 frase[425] = "Mas, depois de sofrerem por um pouco de tempo, o Deus que tem por nós um amor sem limites e que chamou vocês para tomarem parte na sua eterna glória, por estarem unidos com Cristo, ele mesmo os aperfeiçoará e dará firmeza, força e verdadeira segurança. (1Pedro 5:10)";
 frase[426] = "Será que já houve um deus que resolveu ir tirar do meio de outra nação um povo para ser completamente dele, como o Senhor, nosso Deus, fez com vocês? Vocês viram como ele mostrou o seu poder e a sua força; viram como ele, por meio de pragas e milagres maravilhosos, de guerras e feitos espantosos, tirou vocês do Egito. (Deuteronômio 4:34)";
 frase[427] = "Dalila havia deixado alguns homens escondidos, esperando no outro quarto. Então gritou: — Sansão! Os filisteus estão chegando! E ele arrebentou as cordas de arco, como se fossem fios de linha queimada. Assim eles continuaram sem saber qual era o segredo da força de Sansão. (Juízes 16:9)";
 frase[428] = "E acabou lhe contando a verdade: — O meu cabelo nunca foi cortado! — disse ele. — Eu fui dedicado a Deus como nazireu desde que nasci. Se o meu cabelo for cortado, perderei a minha força, ficarei fraco e serei como qualquer um. (Juízes 16:17)";
 frase[429] = "E Sansão orou ao Senhor, dizendo: — Ó Senhor, meu Deus, peço que lembres de mim. Por favor, dá-me força só mais esta vez. Deixa que eu, de uma só vez, me vingue dos filisteus, por terem furado os meus olhos. (Juízes 16:28)";
 frase[430] = "e gritou: — Que eu morra com os filisteus! Em seguida deu um empurrão com toda a força, e o templo caiu sobre os governadores e todas as outras pessoas. E assim Sansão matou mais gente na sua morte do que durante a sua vida. (Juízes 16:30)";
 frase[431] = "— Quem vai comandar o ataque? — perguntou Acabe. O profeta respondeu: — O Senhor diz que os jovens ajudantes dos administradores dos distritos é que devem fazer isso. — Quem vai comandar a força principal? — perguntou o rei. — O senhor, ó rei! — respondeu o profeta. (1Reis 20:14)";
 frase[432] = "Eu tinha dito ao rei que o nosso Deus protege todos os que confiam nele, porém que a sua força e a sua ira vão contra aqueles que o abandonam. Por isso, fiquei com vergonha de pedir ao rei uma tropa de soldados da cavalaria para nos defender dos nossos inimigos durante a viagem. (Esdras 8:22)";
 frase[433] = "Não foi com espadas que os nossos antepassados conquistaram aquela terra; não foi com o seu próprio poder que eles venceram. Eles venceram com o teu poder, com a tua força e com a luz da tua presença. Assim tu mostraste o teu amor por eles. (Salmos 44:3)";
 frase[434] = "Pois o rei diz: “Fiz tudo isso com a minha própria força e com a minha sabedoria, pois sou inteligente. Mudei de lugar as fronteiras dos países e fiquei com todas as suas riquezas; como se fosse um touro, eu pisei os seus moradores. (Isaías 10:13)";
 frase[435] = "Depois, ele mandou que o comandante do seu exército fosse de Laquis a Jerusalém com uma enorme força militar para exigir que o rei Ezequias se entregasse. O comandante ocupou a estrada onde os tintureiros trabalham, perto do canal que traz água do açude de cima. (Isaías 36:2)";
 frase[436] = "Olhem para o céu e vejam as estrelas. Quem foi que as criou? Foi aquele que as faz sair em ordem como um exército; ele sabe quantas são e chama cada uma pelo seu nome. A sua força e o seu poder são tão grandes, que nenhuma delas deixa de responder. (Isaías 40:26)";
 frase[437] = "Quando eu ainda não havia nascido, o Senhor me escolheu para ser o seu servo a fim de que eu reunisse o seu povo e o trouxesse de volta para ele. Sou muito estimado pelo Senhor; o meu Deus é a minha força. (Isaías 49:5)";
 frase[438] = "Eu disse: — Ó Senhor Deus, tu me proteges e me dás força; tu me ajudas na hora do sofrimento. Dos fins da terra, as nações irão a ti e dirão: “Os nossos antepassados só tinham falsos deuses, tinham somente deuses inúteis. (Jeremias 16:19)";
 frase[439] = "— Vocês sentirão toda a força da minha ira e do meu furor, até que eu fique satisfeito. Quando tudo isso acontecer, vocês ficarão convencidos de que eu, o Senhor, lhes disse todas essas coisas porque fui ofendido pela infidelidade de vocês. (Ezequiel 5:13)";
 frase[440] = "— Agora, eu, o Senhor Deus, pergunto: “Será que essa parreira vai crescer? Será que a primeira águia não vai arrancá-la pelas raízes, apanhar as uvas e quebrar os ramos, deixando-os secar? Não será necessária muita força nem uma nação poderosa para arrancá-la. (Ezequiel 17:9)";
 frase[441] = "Mas também no deserto os israelitas se revoltaram contra mim. Desobedeceram às minhas leis e rejeitaram os meus mandamentos, que dão vida a quem os cumprir. Profanaram completamente o sábado. Eu estava pronto para fazê-los sentir a força da minha ira e acabar com eles ali no deserto. (Ezequiel 20:13)";
 frase[442] = "— Mas esses filhos também se revoltaram contra mim. Desobedeceram às minhas leis e não guardaram os meus mandamentos, que dão vida a quem os cumprir. Eles profanaram o sábado. Eu estava pronto para fazê-los sentir a força da minha ira, matando todos ali no deserto. (Ezequiel 20:21)";
 frase[443] = "Quando eu quebrar o poder do Egito e acabar com a força de que tanto se gaba, a escuridão cairá sobre a cidade de Tafnes. Uma nuvem cobrirá o Egito, e os moradores de todas as suas cidades serão levados prisioneiros. (Ezequiel 30:18)";
 frase[444] = "Na estátua que o senhor viu, os pés e os dedos dos pés eram metade de ferro e metade de barro. Isso quer dizer que esse reino será dividido, mas terá alguma coisa da força do ferro; pois, como o senhor viu, o ferro estava misturado com barro. (Daniel 2:41)";
 frase[445] = "Eu vi o bode, furioso, atacar o carneiro e quebrar os dois chifres dele, pois o carneiro não tinha força para se defender. O bode jogou o carneiro no chão e o pisou com as patas; e ninguém podia salvar o carneiro da fúria do bode. (Daniel 8:7)";
 frase[446] = "O rei virá e será o pastor do seu povo, governando-o com a força que o Senhor lhe dará e em nome do Senhor, o seu glorioso Deus. O seu povo viverá em segurança, pois o seu poder alcançará os lugares mais distantes do mundo. (Miqueias 5:4)";
 frase[447] = "Depois disso, o anjo mandou que eu entregasse a Zorobabel a seguinte mensagem de Deus, o Senhor: — Não será por meio de um poderoso exército nem pela sua própria força que você fará o que tem de fazer, mas pelo poder do meu Espírito. Sou eu, o Senhor Todo-Poderoso, quem está falando. (Zacarias 4:6)";
 frase[448] = "Aí disse ao homem que tomava conta da plantação: “Olhe! Já faz três anos seguidos que venho buscar figos nesta figueira e não encontro nenhum. Corte esta figueira! Por que deixá-la continuar tirando a força da terra sem produzir nada?”(Lucas 13:7)";
 frase[449] = "Portanto, não se envergonhe de dar o seu testemunho a favor do nosso Senhor, nem se envergonhe de mim, que estou na cadeia porque sou servo dele. Pelo contrário, com a força que vem de Deus, esteja pronto para sofrer comigo por amor ao evangelho. (2Timóteo 1:8)";
 frase[450] = "Quem prega pregue a palavra de Deus; quem serve sirva com a força que Deus dá. Façam assim para que em tudo Deus seja louvado por meio de Jesus Cristo, a quem pertencem a glória e o poder para todo o sempre! Amém! (1Pedro 4:11)";
 frase[451] = "Por que é que ninguém foi me encontrar quando eu vim salvá-los? Por que ninguém respondeu quando eu chamei? Será que agora não tenho poder para salvá-los? Será que já perdi toda a minha força? Não! É só eu dar uma ordem, e o mar seca. Faço os rios virarem um deserto; assim, por falta de água, os peixes morrem de sede e começam a cheirar mal. (Isaías 50:2)";
 frase[452] = "Onde estão as minhas forças para resistir? Por que viver, se não há esperança?(Jó 6:11)";
 frase[453] = "Sou como aqueles que estão para morrer; já perdi todas as minhas forças. (Salmos 88:4)";
 frase[454] = "É tanta a minha tristeza, que estou me acabando; dá-me forças, como prometeste. (Salmos 119:28)";
 frase[455] = "Quando te chamei, tu me respondeste e, com o teu poder, aumentaste as minhas forças. (Salmos 138:3)";
 frase[456] = "Eu os odeio com todas as minhas forças; eles são meus inimigos. (Salmos 139:22)";
 frase[457] = "“Bildade, eu estou fraco, sem forças; como você me ajuda e me consola!…(Jó 26:2)";
 frase[458] = "juro que, enquanto ele me der forças para respirar,(Jó 27:3)";
 frase[459] = "Ele é o Deus que me dá forças e me protege aonde quer que eu vá. (Salmos 18:32)";
 frase[460] = "Todos eles dirão ao rei: “Você também perdeu as forças! Agora você é igual a nós! (Isaías 14:10)";
 frase[461] = "Aos cansados ele dá novas forças e enche de energia os fracos. (Isaías 40:29)";
 frase[462] = "As mãos de todos perderão as forças, e os seus joelhos tremerão. (Ezequiel 7:17)";
 frase[463] = "Então ele me tocou de novo, e com isso senti as minhas forças voltarem. (Daniel 10:18)";
 frase[464] = "Mas agora acabaram-se as nossas forças. Não há mais nada para comer, e a única coisa que vemos é esse maná! (Números 11:6)";
 frase[465] = "Portanto, amem o Senhor, nosso Deus, com todo o coração, com toda a alma e com todas as forças. (Deuteronômio 6:5)";
 frase[466] = "O rei Salomão convocou em todo o Israel um grupo de trinta mil trabalhadores forçados(1Reis 5:13)";
 frase[467] = "“Tu, ó Deus, me deixaste sem forças e destruíste toda a minha família. (Jó 16:7)";
 frase[468] = "Eles não respeitam os direitos dos pobres e forçam os necessitados a correr e se esconder. (Jó 24:4)";
 frase[469] = "porém não voltam para Deus, o seu Criador, que dá forças nas horas mais escuras. (Jó 35:10)";
 frase[470] = "Impacientes, eles cavoucam o chão com as patas e correm para a batalha com todas as suas forças. (Jó 39:21)";
 frase[471] = "Se você fizer isso, eu serei o primeiro a louvá-lo e a reconhecer que você venceu pelas suas próprias forças. (Jó 40:14)";
 frase[472] = "Dá-nos forças novamente e assim o teu povo se alegrará por causa de ti. (Salmos 85:6)";
 frase[473] = "Ainda sou moço, mas Deus me tirou as forças e encurtou a minha vida. (Salmos 102:23)";
 frase[474] = "Estou derrotado e caído no chão; de acordo com a tua promessa, dá-me novas forças. (Salmos 119:25)";
 frase[475] = "Como é que eu, o seu criado, posso falar com o senhor? Estou completamente sem forças e quase não posso respirar. (Daniel 10:17)";
 frase[476] = "Fui eu que os ensinei e lhes dei forças, mas eles planejam maldades contra mim. (Oseias 7:15)";
 frase[477] = "Darei forças ao meu povo, e pelo meu poder eles viverão. Eu, o Senhor, falei.”(Zacarias 10:12)";
 frase[478] = "Ame o Senhor, seu Deus, com todo o coração, com toda a alma, com toda a mente e com todas as forças.”(Marcos 12:30)";
 frase[479] = "mas os que confiam no Senhor recebem sempre novas forças. Voam nas alturas como águias, correm e não perdem as forças, andam e não se cansam. (Isaías 40:31)";
 frase[480] = "O Senhor renova as minhas forças e me guia por caminhos certos, como ele mesmo prometeu. (Salmos 23:3)";
 frase[481] = "Os feitores forçavam os israelitas a fazer todos os dias a mesma quantidade de tijolos que costumavam fazer quando recebiam palha. (Êxodo 5:13)";
 frase[482] = "Mas, se foi no campo que o homem forçou a moça, então só ele será morto. (Deuteronômio 22:25)";
 frase[483] = "— Se um homem forçar uma virgem que ainda não tenha casamento contratado, e o caso for descoberto,(Deuteronômio 22:28)";
 frase[484] = "Os amorreus forçaram a tribo de Dã a se retirar para as montanhas e não os deixavam descer ao vale. (Juízes 1:34)";
 frase[485] = "Então Davi e os seus homens começaram a chorar e choraram até ficarem sem forças. (1Samuel 30:4)";
 frase[486] = "Mas Amnom não quis ouvir o que Tamar dizia. E, como era mais forte, ele a forçou e teve relações com ela. (2Samuel 13:14)";
 frase[487] = "Encarregado dos servidores do palácio: Aisar. Encarregado dos trabalhadores forçados: Adonirão, filho de Abda. (1Reis 4:6)";
 frase[488] = "e Salomão reconstruiu a cidade.) Usando os seus trabalhadores forçados, Salomão também reconstruiu Bete-Horom-de-Baixo,(1Reis 9:17)";
 frase[489] = "Trabalhei com todas as minhas forças na reconstrução da muralha e não comprei nenhuma propriedade. E todos os meus empregados ajudaram na reconstrução. (Neemias 5:16)";
 frase[490] = "O que eles queriam era nos meter medo para não continuarmos o trabalho. “Agora, ó Deus, aumenta as minhas forças!”(Neemias 6:9)";
 frase[491] = "O rei Xerxes obrigou os moradores do seu reino, tanto os do litoral como os do interior, a fazerem trabalhos forçados. (Ester 10:1)";
 frase[492] = "Você ensinou muita gente e deu forças a muitas pessoas desanimadas. (Jó 4:3)";
 frase[493] = "Ó Senhor, meu Deus, olha para mim e responde-me! Dá-me forças novamente para que eu não morra. (Salmos 13:3)";
 frase[494] = "A lei do Senhor é perfeita e nos dá novas forças. Os seus conselhos merecem confiança e dão sabedoria às pessoas simples. (Salmos 19:7)";
 frase[495] = "Já não tenho mais forças; sou como água derramada no chão. Todos os meus ossos estão fora do lugar; o meu coração é como cera derretida. (Salmos 22:14)";
 frase[496] = "De dia e de noite, tu me castigaste, ó Deus, e as minhas forças se acabaram como o sereno que seca no calor do verão. (Salmos 32:4)";
 frase[497] = "Ó Deus, faze com que eles fiquem cegos! Faze com que percam completamente as forças! (Salmos 69:23)";
 frase[498] = "Tu me tens feito passar por aflições e sofrimentos, mas me darás forças novamente e me livrarás da sepultura. (Salmos 71:20)";
 frase[499] = "Cantarei de alegria quando tocar hinos a ti, cantarei com todas as minhas forças porque tu me salvaste. (Salmos 71:23)";
 frase[500] = "Felizes são aqueles que de ti recebem forças e que desejam andar pelas estradas que levam ao monte Sião! (Salmos 84:5)";
 frase[501] = "Ó Senhor Deus, que todo o meu ser te louve! Que eu louve o Santo Deus com todas as minhas forças! (Salmos 103:1)";
 frase[502] = "Fazes a terra produzir o vinho, que deixa a gente feliz; o azeite, que alegra; e o pão, que dá forças. (Salmos 104:15)";
 frase[503] = "Dá-me forças, como prometeste, e eu continuarei vivo; não permitas que eu fique desiludido com a minha esperança. (Salmos 119:116)";
 frase[504] = "Tragam passas para eu recuperar as minhas forças e maçãs para me refrescar, pois estou desmaiando de amor. (Cântico dos Cânticos 2:5)";
 frase[505] = "Esta é a mensagem contra a Arábia: Os fugitivos da tribo de Dedã são forçados a acampar no deserto. (Isaías 21:13)";
 frase[506] = "Vocês se cansaram de tanto viajar, mas não ficaram desanimados. As suas imagens nojentas lhes deram forças, e por isso vocês não desistiram. (Isaías 57:10)";
 frase[507] = "A beleza de Jerusalém é coisa do passado. As suas autoridades são como corços que estão fracos de fome e fogem, sem forças, dos caçadores. (Lamentações 1:6)";
 frase[508] = "Os nossos moços são forçados a trabalhar pesado nos moinhos; os meninos tropeçam, carregando feixes de lenha. (Lamentações 5:13)";
 frase[509] = "Eu estava ali sozinho enquanto via essa visão impressionante. Fiquei pálido de medo e perdi as forças. (Daniel 10:8)";
 frase[510] = "Daqui a uns dois ou três dias, no máximo, ele nos dará novas forças e nos porá de pé, e nós sempre faremos a sua vontade. (Oseias 6:2)";
 frase[511] = "Todo o trabalho forçado dos povos que você conquistou não vai adiantar nada, e o que eles construíram vai ser destruído pelo fogo. Foi o Senhor Todo-Poderoso quem fez isso. (Habacuque 2:13)";
 frase[512] = "Então todas as famílias pensarão assim: “O Senhor Todo-Poderoso dá forças aos moradores de Jerusalém, que são o seu povo.”(Zacarias 12:5)";
 frase[513] = "Se um dos soldados estrangeiros forçá-lo a carregar uma carga um quilômetro, carregue-a dois quilômetros. (Mateus 5:41)";
 frase[514] = "Como é que vocês podem ter tão pouco juízo? Vocês começaram a sua vida cristã pelo poder do Espírito de Deus e agora querem ir até o fim pelas suas próprias forças?(Gálatas 3:3)";
 frase[515] = "Mas o Senhor Jesus é fiel. Ele lhes dará forças e os livrará do Maligno . (2Tessalonicenses 3:3)";
 frase[516] = "As tentações que vocês têm de enfrentar são as mesmas que os outros enfrentam; mas Deus cumpre a sua promessa e não deixará que vocês sofram tentações que vocês não têm forças para suportar. Quando uma tentação vier, Deus dará forças a vocês para suportá-la, e assim vocês poderão sair dela. (1Coríntios 10:13)";
 frase[517] = "Para esse trabalho forçado, Salomão usou os descendentes do povo de Canaã que os israelitas não haviam matado quando conquistaram o seu país. Entre esses trabalhadores forçados estavam amorreus, heteus, perizeus, heveus e jebuseus. E os descendentes deles continuam escravos até hoje. (1Reis 9:20)";
 frase[518] = "Tudo o que Salomão construiu foi feito com trabalho forçado. Para isso ele usou os descendentes do povo de Canaã que os israelitas não haviam matado quando conquistaram o seu país. Entre esses trabalhadores forçados, estavam heteus, amorreus, perizeus, heveus e jebuseus. E os descendentes deles continuam como escravos até hoje. (2Crônicas 8:7)";
 frase[519] = "Não fiquem com medo, pois estou com vocês; não se apavorem, pois eu sou o seu Deus. Eu lhes dou forças e os ajudo; eu os protejo com a minha forte mão. (Isaías 41:10)";
 frase[520] = "Pois nós não estamos lutando contra seres humanos, mas contra as forças espirituais do mal que vivem nas alturas, isto é, os governos, as autoridades e os poderes que dominam completamente este mundo de escuridão . (Efésios 6:12)";
 frase[521] = "Por isso peguem agora a armadura que Deus lhes dá. Assim, quando chegar o dia de enfrentarem as forças do mal, vocês poderão resistir aos ataques do inimigo e, depois de lutarem até o fim, vocês continuarão firmes, sem recuar. (Efésios 6:13)";
 frase[522] = "Também vou trazer um pouco de comida, e assim terão forças para continuar a viagem. Os senhores me honraram com a sua visita; portanto, deixem que eu os sirva. Eles responderam: — Está bem, nós aceitamos. (Gênesis 18:5)";
 frase[523] = "Hamor, o heveu, que era chefe daquela região, tinha um filho chamado Siquém. Este viu Dina, pegou-a e a forçou a ter relações com ele. (Gênesis 34:2)";
 frase[524] = "Uns cairão em cima dos outros, como se estivessem combatendo, mesmo que não haja inimigos por perto. E, quando os inimigos chegarem, vocês não terão forças para lutar contra eles. (Levítico 26:37)";
 frase[525] = "Se os moradores da cidade aceitarem a proposta e se entregarem a vocês, então eles serão seus escravos e farão trabalhos forçados. (Deuteronômio 20:11)";
 frase[526] = "Porém, se mais tarde você não gostar mais dela, deixe que vá embora livre. Você não poderá vendê-la, nem maltratá-la, pois você a humilhou, forçando-a a casar com você. (Deuteronômio 21:14)";
 frase[527] = "O homem forçou a moça no campo; ela gritou pedindo socorro, mas não havia ninguém para socorrê-la. (Deuteronômio 22:27)";
 frase[528] = "então o homem pagará ao pai da moça cinquenta barras de prata, que é o preço de uma virgem. Ele aforçou, e por isso ela será sua esposa, e ele nunca poderá mandá-la embora. (Deuteronômio 22:29)";
 frase[529] = "Os amorreus ficaram vivendo nas montanhas de Heres, em Aijalom e em Saalabim, mas o povo da tribo de José os dominou e os forçou a trabalhar para eles. (Juízes 1:35)";
 frase[530] = "Mas eles não quiseram ouvi-lo. Então o levita pegou a sua concubina, a pôs para fora e a entregou a eles. E eles a forçaram, e abusaram dela a noite toda, e só a deixaram de manhã. (Juízes 19:25)";
 frase[531] = "figos secos e dois cachos de passas. Ele havia ficado três dias e três noites sem comer, nem beber. Mas, depois de comer, as suas forças voltaram. (1Samuel 30:12)";
 frase[532] = "Mais uma vez Abner disse: — Pare de me perseguir! Você está me forçando a matá-lo! Como é que eu poderia, depois, olhar o seu irmão Joabe nos olhos?(2Samuel 2:22)";
 frase[533] = "Davi e todos os israelitas dançavam e cantavam com todas as suas forças em louvor a Deus, o Senhor. Eles tocavam harpas, liras, tambores, castanholas e pratos. (2Samuel 6:5)";
 frase[534] = "As tropas inimigas saíram da cidade, lutaram contra as forças de Joabe e mataram alguns oficiais de Davi. E Urias também foi morto. (2Samuel 11:17)";
 frase[535] = "O mensageiro disse assim: — Os inimigos eram mais fortes do que nós e saíram para fora da cidade para lutar em campo aberto. Mas nós os forçamos a voltar para o portão da cidade. (2Samuel 11:23)";
 frase[536] = "Absalão não disse nem uma palavra a Amnom, mas ficou com ódio dele porque havia forçado a sua irmã Tamar. (2Samuel 13:22)";
 frase[537] = "Adonirão era responsável pelos homens condenados a trabalhos forçados; Josafá, filho de Ailude, era o conselheiro do rei. (2Samuel 20:24)";
 frase[538] = "Quinhentos e cinquenta oficiais estavam encarregados dos trabalhadores forçados que eram usados nas várias construções de Salomão. (1Reis 9:23)";
 frase[539] = "Jeroboão era um jovem capaz, e Salomão viu que ele trabalhava com vontade. Então o colocou como encarregado de todos os trabalhadores forçados do território das tribos de Manassés e Efraim. (1Reis 11:28)";
 frase[540] = "A mensagem que o rei mandou entregar a Isaías foi esta: “Hoje é um dia de sofrimento; nós estamos sendo castigados e estamos envergonhados. Somos como uma mulher que está para dar à luz, mas não tem forças para isso. (2Reis 19:3)";
 frase[541] = "Havia duzentos e cinquenta oficiais que estavam encarregados dos trabalhadores forçados que eram usados nas várias construções de Salomão. (2Crônicas 8:10)";
 frase[542] = "Deus está sempre vigiando tudo o que acontece no mundo a fim de dar forças a todos os que são fiéis a ele com todo o coração. Desta vez o senhor fez uma loucura e por isso, de agora em diante, o senhor vai estar sempre em guerra. (2Crônicas 16:9)";
 frase[543] = "Então enforcaram Hamã na forca que ele tinha construído para enforcar Mordecai. E assim a raiva do rei se acalmou. (Ester 7:10)";
 frase[544] = "O rei concordou e mandou ler a autorização em público em Susã. E os corpos dos dez filhos de Hamã foram pendurados em forcas. (Ester 9:14)";
 frase[545] = "A tristeza acabou com as minhas forças; as lágrimas encurtam a minha vida. Estou fraco por causa das minhas aflições; até os meus ossos estão se gastando. (Salmos 31:10)";
 frase[546] = "Aqueles que, sem motivo, me odeiam são mais numerosos do que os cabelos da minha cabeça. Os meus inimigos contam mentiras a respeito de mim; eles são fortes e querem me matar. Eles me forçam a devolver o que não roubei. (Salmos 69:4)";
 frase[547] = "Foram levadas todas as coisas que os seus valentes soldados tinham; eles agora estão dormindo o sono da morte, pois não tiveram forças para se defender. (Salmos 76:5)";
 frase[548] = "“Vamos atacar o Reino de Judá, conquistar o seu povo e forçá-lo a aceitar o filho de Tabeal como rei.”(Isaías 7:6)";
 frase[549] = "Por isso, o Senhor, o Deus Todo-Poderoso, enviará contra os fortes soldados assírios uma doença que os deixará sem forças. Mandará uma febre que, como fogo, queimará os corpos deles. (Isaías 10:16)";
 frase[550] = "Povo de Israel, chegará o dia em que o Senhor Deus vai livrá-los da escravidão, e assim vocês ficarão livres dos sofrimentos e dos trabalhos pesados que são forçados a fazer. (Isaías 14:3)";
 frase[551] = "Vocês pensarão no medo que sentiram no passado e perguntarão: “Onde estão aqueles que nos forçavam apagar tributos, aqueles que cobravam os impostos? Onde estão os que controlavam as nossas fortalezas?”(Isaías 33:18)";
 frase[552] = "A mensagem que o rei mandou entregar a Isaías foi esta: “Hoje, é um dia de sofrimento; nós estamos sendo castigados e estamos envergonhados. Somos como uma mulher que está para dar à luz, mas não tem forças para isso. (Isaías 37:3)";
 frase[553] = "O Senhor diz ao seu povo: “Eu, eu mesmo, lhes dou forças. Então, por que vocês têm medo de pessoas, de seres mortais que não duram mais do que a palha?(Isaías 51:12)";
 frase[554] = "Acorde, ó Jerusalém, acorde já e renove as suas forças. Cidade santa, vista os seus vestidos mais caros, pois os pagãos, aquela gente impura, nunca mais morarão com você. (Isaías 52:1)";
 frase[555] = "Pois o Altíssimo, o Santo Deus, o Deus que vive para sempre, diz: “Eu moro num lugar alto e sagrado, mas moro também com os humildes e os aflitos, para dar esperança aos humildes e aos aflitos, novas forças. (Isaías 57:15)";
 frase[556] = "A terra está cheia de adultérios; o povo vive pecando e gasta as suas forças à toa. Por causa da maldição divina, a terra chora, e os pastos estão secos.”(Jeremias 23:10)";
 frase[557] = "O povo de Judá foi levado para longe da sua pátria e sofre como escravo em trabalhos forçados. Eles moram em outros países e não têm descanso. Estão cercados pelos seus perseguidores e não podem escapar. (Lamentações 1:3)";
 frase[558] = "“Ele tomou nota dos meus pecados, amarrou-os todos juntos, pendurou-os no meu pescoço, e o peso deles acabou com as minhas forças. O Senhor me entregou aos meus inimigos, e eu não fui capaz de resistir. (Lamentações 1:14)";
 frase[559] = "Nínive: destruída, deserta, despovoada! Corações cheios de medo, joelhos tremendo, rostos pálidos; todos perdem as forças. (Naum 2:10)";
 frase[560] = "Tu sempre exististe, ó Senhor. Ó meu Santo Deus, tu és imortal. Tu és o nosso protetor. Ó Senhor, tu escolheste os babilônios e lhes deste forças para nos castigar. (Habacuque 1:12)";
 frase[561] = "De repente, vocês, os babilônios, serão os devedores; aí os seus credores os forçarão a pagar as dívidas e com juros. Eles vão atacá-los, e vocês ficarão com medo; eles levarão embora tudo o que é de vocês. (Habacuque 2:7)";
 frase[562] = "O homem respondeu: — “Ame o Senhor, seu Deus, com todo o coração, com toda a alma, com todas as forças e com toda a mente. E ame o seu próximo como você ama a você mesmo.”(Lucas 10:27)";
 frase[563] = "— Aí o administrador pensou: “O patrão está me despedindo. E, agora, o que é que eu vou fazer? Não tenho forças para cavar a terra e tenho vergonha de pedir esmola. (Lucas 16:3)";
 frase[564] = "Foi o poder do nome de Jesus que deu forças a este homem. O que vocês estão vendo e sabendo foi feito pela fé no seu nome, pois foi a fé em Jesus que curou este homem em frente de todos vocês. (Atos 3:16)";
 frase[565] = "Durante muito tempo eu os castiguei em todas as sinagogas e os forcei a negar a sua fé. Tinha tanto ódio deles, que até fui a outras cidades para persegui-los. (Atos 26:11)";
 frase[566] = "Se sofremos, é para que vocês recebam ajuda e salvação. Se somos ajudados, então vocês também são e recebem forças para suportar com paciência os mesmos sofrimentos que nós suportamos. (2Coríntios 1:6)";
 frase[567] = "Os que estão forçando vocês a se circuncidarem são pessoas que querem ficar orgulhosas de coisas de pouca importância. Eles fazem isso somente para não serem perseguidos por causa da cruz de Cristo. (Gálatas 6:12)";
 frase[568] = "Cristo reina sobre todos os governos celestiais, autoridades, forças e poderes . Ele tem um título que está acima de todos os títulos das autoridades que existem neste mundo e no mundo que há de vir. (Efésios 1:21)";
 frase[569] = "Agradeço a Cristo Jesus, o nosso Senhor, que me tem dado forças para cumprir a minha missão. Eu lhe agradeço porque ele achou que eu era merecedor e porque me escolheu para servi-lo. (1Timóteo 1:12)";
 frase[570] = "Agora que vocês já se purificaram pela obediência à verdade e agora que já têm um amor sincero pelos irmãos na fé, amem uns aos outros com todas as forças e com um coração puro. (1Pedro 1:22)";
 frase[571] = "Aí a mulher dele e todos os amigos deram a seguinte sugestão: — Mande fazer uma forca de uns vinte metros de altura e amanhã de manhã peça ao rei que mande enforcar Mordecai. Então você poderá ir feliz com o rei ao banquete. Hamã gostou da ideia e mandou construir a forca. (Ester 5:14)";
 frase[572] = "Jacó respondeu: — Meu patrão, o senhor sabe que as crianças são fracas, e eu tenho de pensar nas ovelhas e vacas com crias. Se forem forçados a andar depressa demais, nem que seja por um dia só, todos os animais poderão morrer. (Gênesis 33:13)";
 frase[573] = "Então o Senhor Deus respondeu a Moisés: — Agora você verá o que vou fazer com o rei do Egito. Eu vou obrigá-lo a deixar que o meu povo vá embora. Sim, eu o forçarei a expulsar os israelitas do seu país. (Êxodo 6:1)";
 frase[574] = "O rei de Moabe percebeu que estava perdendo a batalha. Então, com setecentos soldados armados com espadas, tentou forçar passagem através das linhas inimigas a fim de fugir para perto do rei da Síria. Porém não conseguiu. (2Reis 3:26)";
 frase[575] = "Então Davi e todo o povo começaram a dançar com todas as suas forças em louvor a Deus. Eles cantavam e tocavam instrumentos musicais, isto é, harpas, liras, tambores, pratos e trombetas. (1Crônicas 13:8)";
 frase[576] = "Lutou contra o exército do rei de Amom e o derrotou; aí ele forçou os amonitas a pagarem, todos os anos, durante três anos seguidos, três mil e quatrocentos quilos de prata, mil toneladas de trigo e mil toneladas de cevada. (2Crônicas 27:5)";
 frase[577] = "e disse: — De acordo com as nossas posses, nós temos comprado dos estrangeiros os nossos patrícios judeus que tiveram de se vender a eles como escravos. E agora vocês, que são judeus, estão forçando os seus próprios patrícios a se venderem a vocês! As autoridades ficaram caladas e não acharam nada para responder. (Neemias 5:8)";
 frase[578] = "Ester respondeu: — Se for do agrado do rei, dê autorização aos judeus de Susã para fazerem amanhã o mesmo que tinham ordem para fazer hoje. E peço também que os corpos dos dez filhos de Hamã sejam pendurados em forcas. (Ester 9:13)";
 frase[579] = "O Senhor Deus diz: “Povos das nações distantes, calem-se e escutem! Renovem as suas forças e venham prontos para defender a sua causa. Vamos nos reunir para resolver com quem está a razão. (Isaías 41:1)";
