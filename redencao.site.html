 frase[1895] = "Mas, se houver alguém tão orgulhoso, que não queira obedecer à decisão do sacerdote ou do juiz, esse alguém será morto, e assim vocês tirarão o mal do meio do povo de Israel. (Deuteronômio 17:12)";
 frase[1896] = "De fato, você, Amazias, venceu os edomitas e por isso está todo orgulhoso. Alegre-se com a sua fama e fique em casa. Para que arranjar um problema que trará somente a desgraça para você e para o seu povo?(2Reis 14:10)";
 frase[1897] = "De fato, você, Amazias, venceu os edomitas e por isso está todo orgulhoso. Alegre-se com a sua fama e fique em casa. Para que arranjar um problema que trará somente a desgraça para você e para o seu povo?(2Crônicas 25:19)";
 frase[1898] = "Deus foi bondoso com Ezequias, mas ele não lhe agradeceu, pois era orgulhoso. Por isso, Deus ficou irado com ele, com o povo de Judá e com os moradores de Jerusalém. (2Crônicas 32:25)";
 frase[1899] = "Ó Senhor Deus, eu já não sou orgulhoso; deixei de olhar os outros com arrogância. Não vou atrás das coisas grandes e extraordinárias, que estão fora do meu alcance. (Salmos 131:1)";
 frase[1900] = "Quando o Senhor terminar tudo o que está planejando fazer no monte Sião e em Jerusalém, então ele vai castigar o rei da Assíria, aquele homem orgulhoso e vaidoso. (Isaías 10:12)";
 frase[1901] = "Você ficou orgulhoso por causa da sua beleza, e a sua fama o fez perder o juízo. Então eu o joguei no chão a fim de servir de aviso para outros reis. (Ezequiel 28:17)";
 frase[1902] = "O Senhor diz: — Desde Migdol, que fica no Norte, até Assuã, que fica no Sul, todos os que defendem o Egito serão mortos em batalha. O orgulhoso exército egípcio será destruído. Sou eu, o Senhor Deus, quem está falando. (Ezequiel 30:6)";
 frase[1903] = "Com a sua presença, ele enganará a todos; ficará cada vez mais orgulhoso e matará muitas pessoas à traição. Finalmente, ele desafiará a Deus, o Rei dos reis, mas será destruído sem o uso de força humana. (Daniel 8:25)";
 frase[1904] = "Existem sete coisas que o Senhor Deus detesta e que não pode tolerar: o olhar orgulhoso, a língua mentirosa, mãos que matam gente inocente, a mente que faz planos perversos, pés que se apressam para fazer o mal, a testemunha falsa que diz mentiras e a pessoa que provoca brigas entre amigos. (Provérbios 6:16)";
 frase[1905] = "Quem é que fez você superior aos outros? Por acaso não foi Deus quem lhe deu tudo o que você tem? Então por que é que você fica todo orgulhoso como se o que você tem não fosse dado por Deus?(1Coríntios 4:7)";
 frase[1906] = "Pois aquele que tem a responsabilidade do trabalho de Deus, como bispo, deve ser um homem que não possa ser culpado de nada. Não deve ser orgulhoso, nem ter mau gênio, não deve ser chegado ao vinho, nem violento, nem ganancioso. (Tito 1:7)";
 frase[1907] = "Sim, vocês são o nosso orgulho e a nossa alegria! (1Tessalonicenses 2:20)";
 frase[1908] = "Assim como os avós se orgulham dos netos, os filhos se orgulham dos pais. (Provérbios 17:6)";
 frase[1909] = "— É assim que eu vou destruir o orgulho do povo de Judá e o grande orgulho de Jerusalém. (Jeremias 13:9)";
 frase[1910] = "Como dizem as Escrituras Sagradas: “Quem quiser se orgulhar, que se orgulhe daquilo que o Senhor faz.”(2Coríntios 10:17)";
 frase[1911] = "Porém vocês são orgulhosos e vivem se gabando. Todo esse orgulho é mau. (Tiago 4:16)";
 frase[1912] = "Tu salvas os humildes, mas humilhas os orgulhosos. (2Samuel 22:28)";
 frase[1913] = "Tu salvas os humildes, mas humilhas os orgulhosos. (Salmos 18:27)";
 frase[1914] = "Até quando se mostrarão orgulhosos e se gabarão dos seus crimes?(Salmos 94:4)";
 frase[1915] = "Somos sempre desprezados pelos ricos, e os orgulhosos zombam de nós. (Salmos 123:4)";
 frase[1916] = "Há pessoas que são tão orgulhosas, que olham os outros com desprezo. (Provérbios 30:13)";
 frase[1917] = "No seu orgulho, você zombou de Sodoma,(Ezequiel 16:56)";
 frase[1918] = "Se foi por causa das coisas que ele fez que Deus o aceitou, então ele teria motivo para se orgulhar, mas não para se orgulhar diante de Deus. (Romanos 4:2)";
 frase[1919] = "Portanto, como as Escrituras Sagradas dizem: “Quem quiser se orgulhar, que se orgulhe daquilo que o Senhor faz.”(1Coríntios 1:31)";
 frase[1920] = "Deus rebaixa os orgulhosos, mas salva os humildes. (Jó 22:29)";
 frase[1921] = "Nunca me orgulhei de ter muitas riquezas, nem de ganhar muito dinheiro. (Jó 31:25)";
 frase[1922] = "Tu não suportas a presença dos orgulhosos e detestas os que praticam o mal. (Salmos 5:5)";
 frase[1923] = "Esses perversos confiam nas suas riquezas e se orgulham das suas grandes fortunas. (Salmos 49:6)";
 frase[1924] = "Tu és o juiz de todas as pessoas; levanta-te e dá aos orgulhosos o que eles merecem. (Salmos 94:2)";
 frase[1925] = "Tu repreendes os orgulhosos; os que se desviam dos teus mandamentos são malditos. (Salmos 119:21)";
 frase[1926] = "Os orgulhosos estão sempre zombando de mim, mas eu não tenho me afastado da tua lei. (Salmos 119:51)";
 frase[1927] = "Os maus são dominados pelo orgulho e pela vaidade, e isso é pecado. (Provérbios 21:4)";
 frase[1928] = "Todos ficarão envergonhados, e os orgulhosos serão humilhados. (Isaías 5:15)";
 frase[1929] = "O dia da desgraça está chegando. Por toda parte há violência. O orgulho cresce. (Ezequiel 7:10)";
 frase[1930] = "Ninguém deve se orgulhar daquilo que as pessoas podem fazer. Pois tudo é de vocês,(1Coríntios 3:21)";
 frase[1931] = "Nós não devemos ser orgulhosos, nem provocar ninguém, nem ter inveja uns dos outros. (Gálatas 5:26)";
 frase[1932] = "“Mas os nossos antepassados se tornaram orgulhosos e teimosos e não quiseram obedecer aos teus mandamentos. (Neemias 9:16)";
 frase[1933] = "e, com orgulho, eu a carregarei no ombro e a porei na cabeça como se fosse uma coroa! (Jó 31:36)";
 frase[1934] = "Ele fala com a gente para que deixemos de pecar e para que não nos tornemos orgulhosos. (Jó 33:17)";
 frase[1935] = "Eles gritam por socorro, mas Deus não responde porque são orgulhosos e maus. (Jó 35:12)";
 frase[1936] = "Olhe para todos os orgulhosos; faça explodir a sua raiva contra eles e humilhe-os. (Jó 40:11)";
 frase[1937] = "O Leviatã olha para tudo com desprezo e entre todas as feras orgulhosas ele é rei.”(Jó 41:34)";
 frase[1938] = "Os maus são orgulhosos e perseguem os pobres; que eles caiam nas suas próprias armadilhas! (Salmos 10:2)";
 frase[1939] = "Todos os orgulhosos se curvarão na sua presença, e o adorarão todos os mortais, todos os que um dia vão morrer. (Salmos 22:29)";
 frase[1940] = "Não deixes que os orgulhosos e os maus me pisem e me obriguem a fugir. (Salmos 36:11)";
 frase[1941] = "Ele escolheu para nós a terra onde vivemos, terra que é o orgulho do seu povo, a quem ele ama. (Salmos 47:4)";
 frase[1942] = "Por isso, usam o orgulho como se fosse um colar e a violência, como uma capa. (Salmos 73:6)";
 frase[1943] = "Falam mal de Deus, que está no céu, e com orgulho dão ordens às pessoas aqui na terra. (Salmos 73:9)";
 frase[1944] = "Digo aos maus que não contem grandezas, que não sejam orgulhosos;(Salmos 75:4)";
 frase[1945] = "Destruirei aqueles que falam mal dos outros pelas costas e não suportarei os orgulhosos e os arrogantes. (Salmos 101:5)";
 frase[1946] = "Os orgulhosos dizem mentiras contra mim, mas eu, de todo o coração, obedeço aos teus mandamentos. (Salmos 119:69)";
 frase[1947] = "Os orgulhosos, que não obedecem à tua lei, cavaram covas para me pegar. (Salmos 119:85)";
 frase[1948] = "Tu estás lá nas alturas, mas assim mesmo te interessas pelos humildes, e os orgulhosos não podem se esconder de ti. (Salmos 138:6)";
 frase[1949] = "O orgulho só traz brigas; é mais sábio pedir conselhos. (Provérbios 13:10)";
 frase[1950] = "O Senhor detesta todos os orgulhosos; eles não escaparão do castigo, de jeito nenhum. (Provérbios 16:5)";
 frase[1951] = "O orgulho leva a pessoa à destruição, e a vaidade faz cair na desgraça. (Provérbios 16:18)";
 frase[1952] = "A pessoa orgulhosa está a caminho da desgraça, mas a humilde é respeitada. (Provérbios 18:12)";
 frase[1953] = "Chamamos de zombador o homem vaidoso que trata os outros com orgulho e desprezo. (Provérbios 21:24)";
 frase[1954] = "Mande embora a pessoa orgulhosa, e acabarão os desentendimentos, as discussões e os xingamentos. (Provérbios 22:10)";
 frase[1955] = "Corrija os seus filhos, e eles serão para você motivo de orgulho e não de vergonha. (Provérbios 29:17)";
 frase[1956] = "O fim de uma coisa vale mais do que o seu começo. A pessoa paciente é melhor do que a orgulhosa. (Eclesiastes 7:8)";
 frase[1957] = "Naquele dia, o Senhor Todo-Poderoso vai humilhar todos os orgulhosos e vaidosos, todos os que pensam que são importantes. (Isaías 2:12)";
 frase[1958] = "Todo o povo de Israel e todos os moradores de Samaria sabem o que ele vai fazer. Orgulhosos e vaidosos, eles dizem:(Isaías 9:9)";
 frase[1959] = "Samaria, orgulho e coroa dos bêbados de Israel, será pisada. (Isaías 28:3)";
 frase[1960] = "Nada sobrou daquilo que era o nosso orgulho. Nós pecamos e estamos condenados. (Lamentações 5:16)";
 frase[1961] = "Elas foram orgulhosas e teimosas e fizeram as coisas que eu detesto; por isso, eu as destruí, como você sabe muito bem. (Ezequiel 16:50)";
 frase[1962] = "Você fez bons negócios e continuou aumentando os lucros. E como você tem orgulho da sua riqueza!”(Ezequiel 28:5)";
 frase[1963] = "O que dizer de você? Você diz que é judeu, confia na lei e se orgulha do Deus que você adora. (Romanos 2:17)";
 frase[1964] = "Você se orgulha de ter a lei de Deus, mas você é uma vergonha para Deus porque desobedece à sua lei. (Romanos 2:23)";
 frase[1965] = "Agora estou falando a vocês que não são judeus. Enquanto eu for o apóstolo dos não judeus, terei orgulhodo meu trabalho. (Romanos 11:13)";
 frase[1966] = "Portanto, por estar unido com Cristo Jesus, posso me orgulhar do serviço que faço para Deus. (Romanos 15:17)";
 frase[1967] = "Alguns de vocês ficaram orgulhosos, certos de que eu não iria visitá-los. (1Coríntios 4:18)";
 frase[1968] = "Como é que vocês podem estar tão orgulhosos? Pelo contrário, vocês deviam ficar muito tristes e expulsar do meio de vocês quem está fazendo uma coisa dessas. (1Coríntios 5:2)";
 frase[1969] = "O povo de Judá diz: “Ouvimos falar do orgulho dos moabitas; sabemos que eles são um povo vaidoso e cheio de si, arrogante e convencido. Mas eles não têm nada de que se orgulhar.”(Isaías 16:6)";
 frase[1970] = "Se alguém quiser se orgulhar, que se orgulhe de me conhecer e de me entender; porque eu, o Senhor, sou Deus de amor e faço o que é justo e direito no mundo. Estas são as coisas que me agradam. Eu, o Senhor, estou falando. (Jeremias 9:24)";
 frase[1971] = "Naquele tempo, vocês, o meu povo, não vão sentir mais vergonha por causa das vezes que se revoltaram contra mim. Pois eu farei desaparecer do meio de vocês todos os orgulhosos e vaidosos. Nunca mais vocês vão se sentir orgulhosos no meu monte santo. (Sofonias 3:11)";
 frase[1972] = "É por isso que nas igrejas de Deus falamos com orgulho sobre vocês. Nós temos orgulho de vocês por causa da paciência e da fé que vocês mostram no meio de todas as perseguições e sofrimentos. (2Tessalonicenses 1:4)";
 frase[1973] = "A salvação não é o resultado dos esforços de vocês; portanto, ninguém pode se orgulhar de tê-la. (Efésios 2:9)";
 frase[1974] = "Acabarei com o seu poder, de que vocês se orgulham; não mandarei chuva, e o chão ficará duro como ferro. (Levítico 26:19)";
 frase[1975] = "então Deus lhes mostra que isso é por causa do que fizeram, que é o castigo pelos seus pecados e pelo seu orgulho. (Jó 36:9)";
 frase[1976] = "Os maus falam com orgulho dos seus desejos. As pessoas que exploram os outros desprezam o Senhor e blasfemam contra ele. (Salmos 10:3)";
 frase[1977] = "O homem mau não se importa com Deus; por causa do seu orgulho ele pensa assim: “Para mim, Deus não tem importância.”(Salmos 10:4)";
 frase[1978] = "Que fiquem calados aqueles mentirosos, aqueles orgulhosos e arrogantes, que falam com desprezo contra as pessoas honestas! (Salmos 31:18)";
 frase[1979] = "Amem o Senhor, todos os que lhe são fiéis! Ele protege os que são sinceros, mas os orgulhosos ele castiga como merecem. (Salmos 31:23)";
 frase[1980] = "Pois homens orgulhosos estão chegando para me atacar, homens violentos querem me matar. Eles não se importam com Deus. (Salmos 54:3)";
 frase[1981] = "Todas as vezes que falam, os meus inimigos pecam; que eles sejam apanhados no seu próprio orgulho! Eles amaldiçoam e mentem;(Salmos 59:12)";
 frase[1982] = "Eles gostam de caçoar e só falam de coisas más. São orgulhosos e fazem planos para explorar os outros. (Salmos 73:8)";
 frase[1983] = "Deus humilha os governantes orgulhosos; ele enche de medo os reis da terra. (Salmos 76:12)";
 frase[1984] = "Ele matou o filho mais velho de todas as famílias dos egípcios, matou aqueles que eram o orgulho dessas famílias. (Salmos 105:36)";
 frase[1985] = "Que os orgulhosos fiquem envergonhados, pois me acusam com mentiras! Mas eu meditarei nos teus ensinamentos. (Salmos 119:78)";
 frase[1986] = "Promete que ajudarás a mim, este teu servo. Não deixes que os orgulhosos me façam sofrer. (Salmos 119:122)";
 frase[1987] = "Homens orgulhosos armaram uma armadilha e estenderam uma rede no meu caminho; eles puseram armadilhas para me pegar. (Salmos 140:5)";
 frase[1988] = "A boa esposa é o orgulho do marido, mas a esposa que traz vergonha ao marido é como câncer nos ossos dele. (Provérbios 12:4)";
 frase[1989] = "O Senhor Deus derruba a casa dos orgulhosos, mas protege a propriedade da viúva. (Provérbios 15:25)";
 frase[1990] = "É melhor ter um espírito humilde e estar junto com os pobres do que participar das riquezas dos orgulhosos. (Provérbios 16:19)";
 frase[1991] = "O pai que tem um filho correto e sábio ficará muito feliz e se orgulhará dele. (Provérbios 23:24)";
 frase[1992] = "O filho que ama a sabedoria é o orgulho do seu pai. Quem anda com prostitutas desperdiça tudo o que tem. (Provérbios 29:3)";
 frase[1993] = "Foi o Senhor Todo-Poderoso que fez esses planos a fim de humilhar os orgulhosos e rebaixar os mais poderosos do mundo. (Isaías 23:9)";
 frase[1994] = "Ele rebaixou os vaidosos e humilhou a cidade orgulhosa em que moravam. Ele derrubou e arrasou a cidade deles,(Isaías 26:5)";
 frase[1995] = "Autoridades de Jerusalém, homens orgulhosos que governam esse povo, escutem a mensagem de Deus, o Senhor! (Isaías 28:14)";
 frase[1996] = "O Senhor disse: — O sábio não deve se orgulhar da sua sabedoria, nem o forte, da sua força, nem o rico, da sua riqueza. (Jeremias 9:23)";
 frase[1997] = "Eu, o Senhor, conheço o seu orgulho. Os moabitas se gabam de coisas que não valem nada, coisas que acabam. (Jeremias 48:30)";
 frase[1998] = "— Babilônia, você está muito orgulhosa, e por isso eu, o Senhor, o Deus Todo-Poderoso, estou contra você! Chegou a hora de castigá-la. (Jeremias 50:31)";
 frase[1999] = "O seu orgulho é prova de que são culpados. Por causa dos seus pecados, eles tropeçam e caem, e o povo de Judá cai com eles. (Oseias 5:5)";
 frase[2000] = "De fato, a riqueza engana, e as pessoas orgulhosas nunca têm sossego. A sua ganância não tem fim. Elas nunca estão satisfeitas: como o mundo dos mortos, sempre querem mais. (Habacuque 2:5)";
 frase[2001] = "Os profetas são orgulhosos e enganadores. Os sacerdotes profanam o santuário e desobedecem à lei de Deus. (Sofonias 3:4)";
 frase[2002] = "Mestiços morarão em Asdode. O Senhor diz: — Eu vou humilhar esses filisteus orgulhosos. (Zacarias 9:6)";
 frase[2003] = "Deus levanta a sua mão poderosa e derrota os orgulhosos com todos os planos deles. (Lucas 1:51)";
 frase[2004] = "e falam mal uns dos outros. Têm ódio de Deus e são atrevidos, orgulhosos e vaidosos. Inventam maneiras de fazer o mal, desobedecem aos pais,(Romanos 1:30)";
 frase[2005] = "Não está certo que vocês estejam orgulhosos! Vocês conhecem aquele ditado: “Um pouco de fermento fermenta toda a massa.”(1Coríntios 5:6)";
 frase[2006] = "mas para a mulher o cabelo comprido é motivo de orgulho. O cabelo foi dado a ela para lhe servir de véu. (1Coríntios 11:15)";
 frase[2007] = "Tenho muita confiança em vocês e me orgulho de vocês. No meio de todas as nossas aflições, eu continuo muito animado e cheio de alegria. (2Coríntios 7:4)";
 frase[2008] = "Nós não vamos nos orgulhar além de certos limites. Deus é quem põe os limites no nosso campo de trabalho, e ele nos deixou chegar até vocês em Corinto. (2Coríntios 10:13)";
 frase[2009] = "Assim, quando eu for visitar vocês outra vez, vocês terão muito mais razão ainda para ficarem orgulhosos de mim, na vida que vocês têm em união com Cristo Jesus. (Filipenses 1:26)";
 frase[2010] = "O bispo não deve ser alguém convertido há pouco tempo; se for, ele ficará cheio de orgulho e será condenado como o Diabo foi. (1Timóteo 3:6)";
 frase[2011] = "Serão traidores, atrevidos e cheios de orgulho. Amarão mais os prazeres do que a Deus;(2Timóteo 3:4)";
 frase[2012] = "Não estamos querendo nos elogiar a nós mesmos outra vez para vocês. Pelo contrário, queremos lhes dar motivo para terem orgulho de nós a fim de que tenham o que responder aos que se sentem orgulhosos por causa da aparência de uma pessoa e não por causa do que ela é. (2Coríntios 5:12)";
 frase[2013] = "e também todo orgulho humano que não deixa que as pessoas conheçam a Deus. Dominamos todo pensamento humano e fazemos com que ele obedeça a Cristo. (2Coríntios 10:5)";
 frase[2014] = "Porém vocês não me deram atenção; pelo contrário, ficaram cheios de orgulho, desobedeceram às ordens de Deus, o Senhor, e invadiram a região montanhosa. (Deuteronômio 1:43)";
 frase[2015] = "Então, tomem cuidado para não ficarem orgulhosos e esquecerem o Senhor, nosso Deus, que os tirou do Egito, onde vocês eram escravos. (Deuteronômio 8:14)";
 frase[2016] = "Não fiquem contando vantagens e não digam mais palavras orgulhosas. Pois o Senhor é Deus que conhece e julga tudo o que as pessoas fazem. (1Samuel 2:3)";
 frase[2017] = "A revolta contra o Senhor é tão grave como a feitiçaria, e o orgulho é pecado como é pecado a idolatria. O Senhor o rejeitou como rei porque você rejeitou as ordens dele. (1Samuel 15:23)";
 frase[2018] = "Contra quem você pensa que falou? Para quem você olhou com orgulho? A quem você pensa que ofendeu e insultou? Você fez tudo isso contra mim, o Santo Deus de Israel. (2Reis 19:22)";
 frase[2019] = "Eu soube do seu ódio e do seu orgulho, e agora vou pôr uma argola no seu nariz e um freio na sua boca, e farei você voltar pelo mesmo caminho por onde veio.”(2Reis 19:28)";
 frase[2020] = "Tenham orgulho daquilo que o Santo Deus tem feito. Que fique alegre o coração de todos os que adoram ao Senhor! (1Crônicas 16:10)";
 frase[2021] = "Aí Ezequias se arrependeu do seu orgulho, como também os moradores de Jerusalém, e assim o Senhor só castigou o povo depois da morte de Ezequias. (2Crônicas 32:26)";
 frase[2022] = "Porém, quando vi que tudo ia bem para os orgulhosos e os maus, quase perdi a confiança em Deus porque fiquei com inveja deles. (Salmos 73:2)";
 frase[2023] = "Ó Deus, estou sendo atacado por gente orgulhosa. Um bando de pessoas violentas está querendo me matar, pessoas que não querem saber de ti. (Salmos 86:14)";
 frase[2024] = "Tenham orgulho daquilo que o Santo Deus tem feito. Que fique alegre o coração de todos os que adoram a Deus, o Senhor! (Salmos 105:3)";
 frase[2025] = "Temer o Senhor Deus é odiar o mal. Eu odeio o orgulho e a falta de modéstia, os maus caminhos e as palavras falsas. (Provérbios 8:13)";
 frase[2026] = "Os orgulhosos devem ser castigados para que as pessoas simples aprendam uma lição de humildade; quem é sábio aprende quando é corrigido. (Provérbios 19:25)";
 frase[2027] = "Virá o dia em que os orgulhosos serão humilhados e os vaidosos serão rebaixados; e somente o Senhor receberá os mais altos louvores. (Isaías 2:11)";
 frase[2028] = "Naquele dia, os orgulhosos serão humilhados, e os vaidosos serão rebaixados; somente o Senhor receberá os mais altos louvores,(Isaías 2:17)";
 frase[2029] = "Mas o Senhor, o Deus Todo-Poderoso, derrubará e humilhará os assírios mais orgulhosos como se cortam os galhos altos de uma árvore ou como se derrubam árvores enormes. (Isaías 10:33)";
 frase[2030] = "Babilônia é a glória e o orgulho do seu povo, a mais bela cidade de todos os reinos; mas ela vai ficar como Sodoma e Gomorra quando eu as destruí. (Isaías 13:19)";
 frase[2031] = "Os moabitas estenderão os braços como quem está tentando nadar; mas, apesar de todo o seu esforço, os moabitas orgulhosos serão humilhados por Deus. (Isaías 25:11)";
 frase[2032] = "Eu soube do seu ódio e do seu orgulho, e agora vou pôr uma argola no seu nariz e um freio na sua boca, e farei você voltar pelo mesmo caminho por onde veio.”(Isaías 37:29)";
 frase[2033] = "Olhe para todos os lados e veja o que está acontecendo! Os seus moradores estão voltando; eles estão chegando! Juro pela minha vida que todos eles são como joias que você usará com orgulho, assim como uma noiva se enfeita com as suas joias. (Isaías 49:18)";
 frase[2034] = "E vocês serão conhecidos como sacerdotes do Senhor, como servos do nosso Deus. As riquezas das outras nações serão de vocês, e vocês se orgulharão de serem donos dessa imensa fortuna. (Isaías 61:6)";
 frase[2035] = "Se vocês não prestarem atenção, eu chorarei em segredo por causa do seu orgulho. Chorarei amargamente, derramarei lágrimas porque o povo de Deus foi levado como prisioneiro. (Jeremias 13:17)";
 frase[2036] = "Você, nação orgulhosa, tropeçará e cairá, e ninguém a ajudará a se levantar. Eu porei fogo nas suas cidades, e tudo o que está em volta será destruído. (Jeremias 50:32)";
 frase[2037] = "Os que vão passando zombam de você. Eles sacodem a cabeça, dão risadas e perguntam: “É esta a cidade que era chamada de ‘Beleza Perfeita’? É esta o orgulho do mundo inteiro?”(Lamentações 2:15)";
 frase[2038] = "Eles se orgulhavam das suas lindas joias, porém as usaram para fazer ídolos nojentos. Foi por isso que Deus fez com que eles ficassem com nojo das suas riquezas. (Ezequiel 7:20)";
 frase[2039] = "Sodoma e as suas filhas eram orgulhosas porque tinham muita comida e viviam no conforto, sem fazer nada; porém não cuidaram dos pobres e dos necessitados. (Ezequiel 16:49)";
 frase[2040] = "— Agora, eu, o Senhor Deus, direi a vocês o que vai acontecer. A árvore cresceu tanto, que chegou até as nuvens; mas, conforme crescia, também aumentava o seu orgulho. (Ezequiel 31:10)";
 frase[2041] = "Deixarei que os soldados de nações cruéis peguem a espada e matem milhares de egípcios. Eles arrasarão tudo aquilo de que você tem orgulho e matarão o seu povo. (Ezequiel 32:12)";
 frase[2042] = "Farei com que o país vire um deserto abandonado. O poder de que se orgulhavam acabará. As montanhas de Israel ficarão tão desertas, que ninguém passará por elas. (Ezequiel 33:28)";
 frase[2043] = "Portanto, eu, o rei Nabucodonosor, agradeço ao Rei do céu e lhe dou louvor e glória. Tudo o que ele faz é certo e justo, e ele pode humilhar qualquer pessoa orgulhosa. (Daniel 4:37)";
 frase[2044] = "Eu estava olhando os chifres com atenção e notei outro chifre, menor, que nasceu entre os outros. Três chifres foram arrancados para dar lugar a esse chifre menor, que tinha olhos, como os de gente, e uma boca que falava com muito orgulho. (Daniel 7:8)";
 frase[2045] = "Continuei olhando, pois o chifre pequeno ainda estava dizendo palavras orgulhosas. E vi quando o quarto monstro foi morto; e o seu corpo foi despedaçado e jogado no fogo. (Daniel 7:11)";
 frase[2046] = "Aí ele atacará as cidades do litoral do mar Mediterrâneo e conquistará muitas delas. Mas um chefe militar estrangeiro acabará com o seu orgulho e o deixará envergonhado. (Daniel 11:18)";
 frase[2047] = "O orgulho do povo é testemunha contra si mesmo. Todas essas coisas aconteceram, mas mesmo assim eles não se voltam para mim, nem procuram a ajuda do Senhor, seu Deus. (Oseias 7:10)";
 frase[2048] = "Mas, quando entraram na boa terra, vocês tiveram comida de sobra e ficaram satisfeitos; então os corações de vocês se encheram de orgulho, e vocês esqueceram de mim. (Oseias 13:6)";
 frase[2049] = "Vocês se orgulham de terem derrotado a cidade de Lo-Debar e se gabam, dizendo: “Pela nossa própria força conquistamos Carnaim .”(Amós 6:13)";
 frase[2050] = "O seu orgulho o enganou. Você vive nas cavernas das rochas, lá no alto das montanhas, e por isso pensa assim: ‘Ninguém é capaz de me derrubar daqui.’(Obadias 1:3)";
 frase[2051] = "Por isso, o Senhor diz: — Vou fazer a desgraça cair sobre vocês, e vocês não escaparão. Será um tempo de sofrimento, e vocês não andarão mais tão cheios de orgulho. (Miqueias 2:3)";
 frase[2052] = "Com as tuas flechas, mataste o comandante dos soldados quando avançavam como uma tempestade para nos atacar; eles vinham orgulhosos, querendo nos destruir como quem mata um pobre em segredo. (Habacuque 3:14)";
 frase[2053] = "É assim que eles serão castigados. Pois ficaram orgulhosos, insultaram o povo do Senhor Todo-Poderoso e se gabaram de que iam conquistá-lo. (Sofonias 2:10)";
 frase[2054] = "Atravessarão o mar Vermelho, e eu, o Senhor, baterei nas ondas e secarei as águas do rio Nilo. Destruirei o orgulho da Assíria e acabarei com o poder do Egito. (Zacarias 10:11)";
 frase[2055] = "É fácil notar que os orgulhosos são felizes, e a gente vê que tudo dá certo para os maus; quando põem o Senhor à prova, eles não são castigados.”(Malaquias 3:15)";
 frase[2056] = "O Senhor Todo-Poderoso diz: — Está chegando o dia em que todos os orgulhosos e todos os maus serão queimados como a palha é queimada na fogueira. Naquele dia, eles queimarão e serão completamente destruídos. (Malaquias 4:1)";
 frase[2057] = "os adultérios, a avareza, as maldades, as mentiras, as imoralidades, a inveja, a calúnia, o orgulho e o falar e agir sem pensar nas consequências. (Marcos 7:22)";
 frase[2058] = "Será que temos motivo para ficarmos orgulhosos? De modo nenhum! E por que não? Será que é porque obedecemos à lei? Não; não é. É porque cremos em Cristo. (Romanos 3:27)";
 frase[2059] = "Portanto, vocês não devem desprezar os galhos que foram quebrados. Como é que vocês podem estar orgulhosos? Vocês são somente galhos. Não são vocês que sustentam a raiz — é a raiz que sustenta vocês. (Romanos 11:18)";
 frase[2060] = "Isso é verdade. Mas lembrem que eles foram quebrados porque não creram; no entanto vocês continuam na oliveira porque creem. E não tenham orgulho disso; pelo contrário, tenham medo. (Romanos 11:20)";
 frase[2061] = "Tenham por todos o mesmo cuidado. Não sejam orgulhosos, mas aceitem serviços humildes. Que nenhum de vocês fique pensando que é sábio! (Romanos 12:16)";
 frase[2062] = "Meus irmãos, é para instruir vocês que eu tenho aplicado essas lições a mim mesmo e a Apolo. Usei nós dois como um exemplo, para que vocês aprendam o que quer dizer o ditado: “Obedeça ao que está escrito.” Ninguém deve se orgulhar de uma pessoa e desprezar outra. (1Coríntios 4:6)";
 frase[2063] = "Porém, se o Senhor quiser, eu vou visitá-los logo. Então vou saber o que esses orgulhosos são capazes de fazer e não somente o que eles são capazes de dizer. (1Coríntios 4:19)";
 frase[2064] = "Mas eu não tenho usado nenhum desses direitos, nem estou escrevendo isso agora para exigir esses direitos para mim mesmo. Eu preferiria morrer a fazer isso! E ninguém vai me tirar o orgulho que eu tenho de agir assim! (1Coríntios 9:15)";
 frase[2065] = "Irmãos, eu enfrento a morte todos os dias. Se afirmo isso, é pelo orgulho que tenho de vocês, pois estamos todos unidos com Cristo Jesus, o nosso Senhor. (1Coríntios 15:31)";
 frase[2066] = "É disto que temos orgulho: a nossa consciência nos afirma que a nossa maneira de viver no mundo, e especialmente em relação a vocês, tem sido dirigida pela franqueza e sinceridade que Deus nos dá e também pelo poder da sua graça e não pela sabedoria humana. (2Coríntios 1:12)";
 frase[2067] = "Pois escrevemos a vocês somente o que vocês podem ler e entender. Agora vocês nos entendem só em parte, mas espero que cheguem a nos compreender completamente, para que, no Dia do nosso Senhor Jesus , vocês tenham orgulho de nós, como nós temos de vocês. (2Coríntios 1:13)";
 frase[2068] = "O Senhor Jesus me deu autoridade sobre vocês, não para destruí-los, mas para fazê-los crescer espiritualmente. E, embora eu tenha me orgulhado um pouco demais da minha autoridade, não tenho nada de que me envergonhar. (2Coríntios 10:8)";
 frase[2069] = "Assim não nos orgulhamos do trabalho que outros têm feito em lugares que vão além dos limites que Deus nos deu. Pelo contrário, esperamos que a fé que vocês têm possa crescer e que nós possamos fazer um trabalho ainda maior entre vocês, sempre dentro dos limites que Deus tem posto para nós. (2Coríntios 10:15)";
 frase[2070] = "Então poderemos anunciar o evangelho em outras regiões além daquela onde vocês moram. Isso sem entrar em campos de outras pessoas, para não nos orgulharmos do trabalho feito por elas. (2Coríntios 10:16)";
 frase[2071] = "Pela verdade de Cristo, a qual está em mim, eu garanto que ninguém, em nenhum lugar da Acaia, tirará de mim este orgulho de anunciar o evangelho sem cobrar nada. (2Coríntios 11:10)";
 frase[2072] = "Que cada pessoa examine o seu próprio modo de agir! Se ele for bom, então a pessoa pode se orgulhar do que fez, sem precisar comparar o seu modo de agir com o dos outros. (Gálatas 6:4)";
 frase[2073] = "Os que estão forçando vocês a se circuncidarem são pessoas que querem ficar orgulhosas de coisas de pouca importância. Eles fazem isso somente para não serem perseguidos por causa da cruz de Cristo. (Gálatas 6:12)";
 frase[2074] = "Mas eu me orgulharei somente da cruz do nosso Senhor Jesus Cristo. Pois, por meio da cruz, o mundo está morto para mim, e eu estou morto para o mundo. (Gálatas 6:14)";
 frase[2075] = "entregando a elas a mensagem da vida. Se agirem assim, eu terei motivo de sentir orgulho de vocês no Dia de Cristo , pois isso mostrará que todo o meu esforço e todo o meu trabalho não foram inúteis. (Filipenses 2:16)";
 frase[2076] = "Eles vão para a destruição no inferno porque o deus deles são os desejos do corpo. Eles têm orgulho daquilo que devia ser uma vergonha para eles e pensam somente nas coisas que são deste mundo. (Filipenses 3:19)";
 frase[2077] = "Meus queridos irmãos, sinto muitas saudades de vocês. Vocês me fazem tão feliz, e eu me orgulho muito de vocês! Portanto, continuem todos firmes, vivendo unidos com o Senhor. (Filipenses 4:1)";
 frase[2078] = "essa pessoa está cheia de orgulho e não sabe nada. Discutir e brigar a respeito de palavras é como uma doença nessas pessoas. E daí vêm invejas, brigas, insultos, desconfianças maldosas(1Timóteo 6:4)";
 frase[2079] = "Aos que têm riquezas neste mundo ordene que não sejam orgulhosos e que não ponham a sua esperança nessas riquezas, pois elas não dão segurança nenhuma. Que eles ponham a sua esperança em Deus, que nos dá todas as coisas em grande quantidade, para o nosso prazer! (1Timóteo 6:17)";
 frase[2080] = "Pois muitos serão egoístas, avarentos, orgulhosos, vaidosos, xingadores, ingratos, desobedientes aos seus pais e não terão respeito pela religião. (2Timóteo 3:2)";
 frase[2081] = "Porém a bondade que Deus mostra é ainda mais forte, pois as Escrituras Sagradas dizem: “Deus é contra os orgulhosos, mas é bondoso com os humildes.”(Tiago 4:6)";
 frase[2082] = "E vocês, jovens, sejam obedientes aos mais velhos. Que todos prestem serviços uns aos outros com humildade, pois as Escrituras Sagradas dizem: “Deus é contra os orgulhosos, mas é bondoso com os humildes!”(1Pedro 5:5)";
 frase[2083] = "Eles dizem coisas orgulhosas e loucas e com os seus desejos impuros e imorais enganam as pessoas que estão quase escapando daqueles que vivem no erro. (2Pedro 2:18)";
 frase[2084] = "Nada que é deste mundo vem do Pai. Os maus desejos da natureza humana, a vontade de ter o que agrada aos olhos e o orgulho pelas coisas da vida, tudo isso não vem do Pai, mas do mundo. (1João 2:16)";
 frase[2085] = "Porém, quando se tornou assim poderoso, Uzias ficou cheio de orgulho, e essa foi a sua desgraça. Ele pecou contra o Senhor, seu Deus, pois entrou no Templo para queimar incenso no altar do incenso. (2Crônicas 26:16)";
 frase[2086] = "Tu os avisaste que deviam obedecer aos teus ensinos; mas no seu orgulho eles rejeitaram os teus mandamentos, pecaram contra a tua lei, embora cumprir a tua lei seja o caminho para a vida. Rebeldes e teimosos, eles se recusaram a obedecer. (Neemias 9:29)";
 frase[2087] = "Naquele dia, o “Ramo Novo” que o Senhor Deus plantar crescerá forte e bonito, e os moradores de Israel que continuarem vivos ficarão alegres e orgulhosos por causa das ricas bênçãos que vão receber. (Isaías 4:2)";
 frase[2088] = "O Senhor Deus diz: “Eu vou castigar o mundo por causa das suas maldades; vou castigar as pessoas perversas por causa dos seus pecados. Acabarei com o orgulho dos vaidosos e humilharei as pessoas violentas. (Isaías 13:11)";
 frase[2089] = "Ele vai pegá-lo como quem pega uma bola e vai jogá-lo longe, num país enorme. Ali você morrerá perto dos seus carros de guerra, que o enchiam de tanto orgulho. Pois você é uma vergonha para o seu patrão, o rei de Judá. (Isaías 22:18)";
 frase[2090] = "Ai de Samaria, orgulho e coroa dos bêbados de Israel! Ai dessa bela cidade que fica acima de terras boas! Os seus moradores estão embriagados, e a beleza da cidade desaparece como uma flor que murcha. (Isaías 28:1)";
 frase[2091] = "Jerusalém será para mim um motivo de alegria, de honra e de orgulho. E todas as nações do mundo vão tremer de medo quando ouvirem falar das boas coisas que estou fazendo para o povo de Jerusalém e do progresso que estou trazendo para esta cidade. (Jeremias 33:9)";
 frase[2092] = "Azarias, filho de Hosaías, e Joanã, filho de Careá, e todos os homens orgulhosos me disseram: — Você está mentindo, Jeremias. O Senhor, nosso Deus, não mandou você dizer que não devíamos ir morar no Egito. (Jeremias 43:2)";
 frase[2093] = "O seu orgulho o enganou. Não pense que alguém tem medo de você. Você vive nas cavernas das rochas, lá no alto da montanha; mas, embora more tão alto como uma águia, o Senhor o derrubará. Eu, o Senhor, estou falando. (Jeremias 49:16)";
 frase[2094] = "Quando ficou irado, o Senhor cobriu Jerusalém de escuridão. Ele transformou num monte de ruínas a cidade de Jerusalém, que parecia um céu e que era o orgulho do povo de Israel. No dia da sua ira, Deus abandonou até o seu próprio Templo. (Lamentações 2:1)";
 frase[2095] = "O Senhor disse: — Agora, homem mortal, vou tirar deles o Templo, que é firme, que era o orgulho e a alegria deles, e que gostavam tanto de admirar e de visitar. E também vou tirar os seus filhos e as suas filhas. (Ezequiel 24:25)";
 frase[2096] = "Pedi também que me explicasse os dez chifres que esse monstro tinha na cabeça e o outro chifre que havia crescido, derrubando três chifres; esse chifre, que parecia mais forte do que os outros, tinha olhos e uma boca que falava com muito orgulho. (Daniel 7:20)";
 frase[2097] = "O Senhor, o Todo-Poderoso, jurou assim: — Eu vou entregar a cidade de Samaria nas mãos do inimigo, que levará embora tudo o que encontrar. Pois eu odeio o orgulho do povo de Israel, detesto os seus palácios. (Amós 6:8)";
 frase[2098] = "Tudo isso vai acontecer com Nínive, a cidade orgulhosa que se gabava do seu poder, dizendo: “Não há outra cidade tão poderosa como eu!” E ela vai virar um deserto, um lugar onde moram animais. Quem passar por perto vai ficar espantado e horrorizado ao ver tamanha destruição. (Sofonias 2:15)";
 frase[2099] = "Agora vou tratar do problema dos alimentos oferecidos aos ídolos. Na verdade, como se diz, “todos nós temos conhecimento.” Porém esse tipo de conhecimento enche a pessoa de orgulho; mas o amor nos faz progredir na fé. (1Coríntios 8:1)";
 frase[2100] = "Tenho medo de que, quando chegar aí, eu os encontre diferentes do que eu gostaria que fossem e que vocês me achem diferente do que gostariam que eu fosse. Tenho medo também de encontrar brigas e ciumeiras, ódio e egoísmo, insultos, falatório, orgulho e desordens. (2Coríntios 12:20)";
 frase[2101] = "Ele castigará especialmente os que seguem os seus próprios desejos imorais e desprezam a autoridade dele. Esses falsos mestres são atrevidos e orgulhosos. Eles não têm nenhum respeito pelos gloriosos seres celestiais e os insultam. (2Pedro 2:10)";
 frase[2102] = "Eles se recusaram a obedecer. Esqueceram tudo o que fizeste; esqueceram os milagres que havias feito. Em seu orgulho, eles escolheram um chefe que os levaria de volta ao Egito para serem escravos de novo. Mas tu és Deus que perdoa; tu és bondoso e amoroso e demoras a ficar irado. A tua misericórdia é grande, e por isso não os abandonaste. (Neemias 9:17)";
 frase[2103] = "— Digam aos flecheiros que ataquem Babilônia. Mandem para lá todos os que sabem usar o arco e a flecha. Cerquem a cidade e não deixem ninguém escapar. Que a Babilônia pague por tudo o que fez! Façam com ela o que ela fez com os outros, pois me tratou com orgulho a mim, o Santo Deus de Israel. (Jeremias 50:29)";
 frase[2104] = "para dar a vocês, israelitas, esta mensagem: Vocês estão orgulhosos porque o Templo é tão firme. Vocês gostam de olhar para ele e de visitá-lo, porém o Senhor Deus o tornará impuro. Os seus filhos e filhas que ficaram em Jerusalém serão mortos na guerra. (Ezequiel 24:21)";
 frase[2105] = "— Homem mortal, diga ao rei da cidade de Tiro que eu, o Senhor Deus, digo isto a ele: “Cheio de orgulho, você diz que é um deus. E diz que, como deus, você está sentado num trono, cercado pelos mares. Você quer ser um deus, porém é mortal e não divino. (Ezequiel 28:2)";
 frase[2106] = "Como uma flecha atirada por um arco defeituoso não atinge o alvo, assim também o meu povo se desviou de mim e começou a adorar ídolos. Os seus chefes falam com orgulho e por isso serão mortos à espada. Aí o povo do Egito zombará deles. (Oseias 7:16)";
 frase[2107] = "Josué saiu de Gilgal e marchou a noite toda, subindo sempre. Ele atacou de surpresa. (Josué 10:9)";
 frase[2108] = "Assim Josué e todos os seus soldados atacaram de surpresa perto do riacho de Merom,(Josué 11:7)";
 frase[2109] = "Persigo esses inimigos e os pego de surpresa; não paro até acabar com eles. (Salmos 18:37)";
 frase[2110] = "Eles não temeram a Deus e, quando vocês estavam cansados e desanimados, eles os atacaram de surpresa e mataram os mais fracos, que estavam vindo atrás dos outros. (Deuteronômio 25:18)";
 frase[2111] = "Por que é que tens de ser como um homem apanhado de surpresa, como um soldado que não tem força para defender os outros? Mas tu, ó Senhor, estás entre nós, e nós somos o teu povo. Não nos abandones!”(Jeremias 14:9)";
 frase[2112] = "Os nossos perseguidores foram mais rápidos do que as águias do céu; eles nos perseguiram nas montanhas e nos atacaram de surpresa no deserto. (Lamentações 4:19)";
 frase[2113] = "Mas vocês, irmãos, não estão na escuridão, e o Dia do Senhor não deverá pegá-los como um ladrão, que ataca de surpresa. (1Tessalonicenses 5:4)";
 frase[2114] = "Vocês vão fazer com essa cidade o que fizeram com Jericó, mas desta vez todos os objetos e o gado vão ficar para vocês. Preparem-se para atacar a cidade de surpresa e por trás. (Josué 8:2)";
 frase[2115] = "Gideão foi pelo caminho que rodeava o deserto, a leste de Noba e Jogbeá, e atacou de surpresa o exército inimigo. (Juízes 8:11)";
 frase[2116] = "Amanhã levantem-se ao nascer do sol e ataquem de surpresa a cidade. E, quando Gaal e os seus homens saírem para lutar, ataquem com tudo o que vocês tiverem! (Juízes 9:33)";
 frase[2117] = "Abimeleque e o seu grupo atacaram de surpresa e tomaram conta do portão da cidade. Os outros dois grupos atacaram o povo que estava nos campos e mataram todos. (Juízes 9:44)";
 frase[2118] = "Manda que uma quadrilha ataque de surpresa as suas casas e que eles gritem de medo. Pois cavaram um buraco para eu cair nele e armaram armadilhas para me pegar. (Jeremias 18:22)";
 frase[2119] = "E Jesus terminou, dizendo: — Fiquem alertas! Não deixem que as festas, ou as bebedeiras, ou os problemas desta vida façam vocês ficarem tão ocupados, que aquele dia pegue vocês de surpresa,(Lucas 21:34)";
 frase[2120] = "Portanto, lembrem do que aprenderam e ouviram. Obedeçam e se arrependam. Se não acordarem, eu os atacarei de surpresa, como um ladrão, e vocês não ficarão sabendo nem mesmo a hora da minha vinda. (Apocalipse 3:3)";
 frase[2121] = "Atacará de surpresa as províncias mais ricas do país e nelas fará coisas terríveis, que os seus antepassados nunca fizeram. Repartirá com os seus soldados as riquezas, os bens e os objetos de valor que caírem nas suas mãos. E por um pouco de tempo ele fará planos para atacar as fortalezas do país. (Daniel 11:24)";
 frase[2122] = "Abraão ficou muito preocupado com isso, pois Ismael também era seu filho. (Gênesis 21:11)";
 frase[2123] = "Deus viu a escravidão dos israelitas e ficou preocupado com eles. (Êxodo 2:25)";
 frase[2124] = "Deus não me deixa dormir. Estou tão preocupado, que não posso falar. (Salmos 77:4)";
 frase[2125] = "Quando estou aflito e preocupado, tu me consolas e me alegras. (Salmos 94:19)";
 frase[2126] = "As visões me espantaram, e eu fiquei preocupado com o que tinha visto. (Daniel 7:15)";
 frase[2127] = "Ele não fica preocupado, nem tem medo; ele tem certeza de que os seus inimigos serão derrotados. (Salmos 112:8)";
 frase[2128] = "Você não ficará preocupado com os desastres que caem de repente como uma tempestade sobre os maus. (Provérbios 3:25)";
 frase[2129] = "Mas certa noite tive um sonho que me deixou preocupado. Enquanto dormia, ideias e visões horrorosas tomaram conta de mim. (Daniel 4:5)";
 frase[2130] = "Quando o rei Herodes soube disso, ficou muito preocupado, e todo o povo de Jerusalém também ficou. (Mateus 2:3)";
 frase[2131] = "Estou muito preocupado com vocês! Será que todo o trabalho que tive com vocês não valeu nada?(Gálatas 4:11)";
 frase[2132] = "Como eu gostaria de estar aí agora para poder falar com vocês de modo diferente! Estou muito preocupadocom vocês. (Gálatas 4:20)";
 frase[2133] = "No segundo ano de Nabucodonosor como rei da Babilônia, ele teve uns sonhos que o deixaram tão preocupado, que não podia dormir. (Daniel 2:1)";
 frase[2134] = "ele lhes disse: — Tive um sonho que me deixou muito preocupado e não vou ficar sossegado enquanto não souber o que ele quer dizer. (Daniel 2:3)";
 frase[2135] = "Aqui termina a explicação. Eu continuei muito preocupado com os meus pensamentos, e o meu rosto ficou pálido. Mas eu não disse nada a ninguém. (Daniel 7:28)";
 frase[2136] = "Mas eu estava muito preocupado porque não tinha conseguido encontrar o nosso irmão Tito. Por isso me despedi dos irmãos dali e fui para a província da Macedônia. (2Coríntios 2:13)";
 frase[2137] = "Ele tem tido muitas saudades de todos vocês e tem andado muito preocupado por vocês terem sabido que ele estava doente. (Filipenses 2:26)";
 frase[2138] = "Quando Jacó ouviu isso, teve muito medo e ficou preocupado. Então dividiu em dois grupos a gente que estava com ele e também as ovelhas, as cabras, o gado e os camelos. (Gênesis 32:7)";
 frase[2139] = "De manhã ele estava muito preocupado e por isso mandou chamar todos os adivinhos e todos os sábios do Egito. O rei contou os seus sonhos, mas nenhum dos sábios foi capaz de dar a explicação. (Gênesis 41:8)";
 frase[2140] = "Moisés respondeu: — Por que você está preocupado com os meus direitos, quando eu é que deveria estar? Eu gostaria que o Senhor desse o seu Espírito a todo o seu povo e fizesse com que todos fossem profetas! (Números 11:29)";
 frase[2141] = "Eli estava sentado numa cadeira, perto da estrada, esperando. Ele estava muito preocupado com a arca da aliança. Quando o homem deu a notícia, toda a gente da cidade ficou apavorada e começou a chorar alto. (1Samuel 4:13)";
 frase[2142] = "Davi respondeu ao mensageiro: — Anime Joabe e diga-lhe que não fique preocupado, pois numa batalha nunca se sabe quem vai morrer. Diga-lhe que ataque com mais força, até conquistar a cidade. (2Samuel 11:25)";
 frase[2143] = "O profeta Eliseu soube do que havia acontecido e mandou dizer ao rei: — Por que o senhor está tão preocupado? Mande que esse homem venha falar comigo, e eu mostrarei a ele que há um profeta em Israel! (2Reis 5:8)";
 frase[2144] = "Eu, Daniel, passei vários dias abatido e doente. Depois, fiquei bom e comecei a tratar dos negócios do governo. Mas continuei muito preocupado com a visão, pois não conseguia entendê-la. (Daniel 8:27)";
 frase[2145] = "Eu escrevi aquela carta muito preocupado e triste e derramando muitas lágrimas. Porém não escrevi para fazer com que vocês ficassem tristes, mas para que soubessem do grande amor que tenho por todos vocês. (2Coríntios 2:4)";
 frase[2146] = "Por isso vou mandá-lo de volta a vocês o mais depressa possível para que vocês sintam a alegria de vê-lo novamente e para que eu não fique preocupado. (Filipenses 2:28)";
 frase[2147] = "Hoje, quando você for embora, encontrará dois homens perto do túmulo de Raquel, em Zelza, no território da tribo de Benjamim. Eles vão contar a você que já foram achadas as jumentas que estavam perdidas. Contarão também que agora o seu pai não está mais preocupado com elas e sim com você; e que ele está dizendo: “Que posso fazer para encontrar meu filho?”(1Samuel 10:2)";
 frase[2148] = "Eu vi que o povo estava preocupado e por isso disse a eles, e às suas autoridades, e aos seus oficiais: — Não tenham medo dos nossos inimigos. Lembrem como Deus, o Senhor, é grande e terrível e lutem pelos seus patrícios, pelos seus filhos, suas esposas e seus lares. (Neemias 4:14)";
 frase[2149] = "“O que somos nós, para que nos dês tanta importância e te preocupes com a gente?(Jó 7:17)";
 frase[2150] = "e grita aos que passam preocupados com os seus negócios:(Provérbios 9:15)";
 frase[2151] = "Nós trabalhamos e nos preocupamos a vida toda e o que é que ganhamos com isso?(Eclesiastes 2:22)";
 frase[2152] = "E nenhum de vocês pode encompridar a sua vida, por mais que se preocupe com isso. (Mateus 6:27)";
 frase[2153] = "Qual de vocês pode encompridar a sua vida, por mais que se preocupe com isso?(Lucas 12:25)";
 frase[2154] = "Portanto, se vocês não podem conseguir uma coisa assim tão pequena, por que se preocupam com as outras?(Lucas 12:26)";
 frase[2155] = "Por isso, não fiquem preocupados com o dia de amanhã, pois o dia de amanhã trará as suas próprias preocupações. Para cada dia bastam as suas próprias dificuldades. (Mateus 6:34)";
 frase[2156] = "Pois Timóteo é o único que se preocupa com vocês como eu me preocupo e é o único que, de fato, se interessa pelo bem-estar de vocês. (Filipenses 2:20)";
 frase[2157] = "Entreguem todas as suas preocupações a Deus, pois ele cuida de vocês. (1Pedro 5:7)";
 frase[2158] = "Quando faz muito frio, ela não se preocupa, porque a sua família tem agasalhos para vestir. (Provérbios 31:21)";
 frase[2159] = "Resolvam desde já que não vão ficar preocupados, antes da hora, com o que dirão para se defender. (Lucas 21:14)";
 frase[2160] = "Pois todos os outros se preocupam com os seus próprios interesses e não com os de Jesus Cristo. (Filipenses 2:21)";
 frase[2161] = "Pelo contrário, ele voltou para o seu palácio, sem se preocupar com o que havia acontecido. (Êxodo 7:23)";
 frase[2162] = "O sacerdote respondeu: — Não se preocupem. O Senhor Deus estará com vocês nesta viagem. (Juízes 18:6)";
 frase[2163] = "que é um simples ser humano para que penses nele? Que é um ser mortal para que te preocupes com ele?(Salmos 8:4)";
 frase[2164] = "Não se preocupem quando alguém fica rico, e a sua riqueza aumenta cada vez mais. (Salmos 49:16)";
 frase[2165] = "As preocupações roubam a felicidade da gente, mas as palavras amáveis nos alegram. (Provérbios 12:25)";
 frase[2166] = "Tudo o que fazemos na vida não nos traz nada, a não ser preocupações e desgostos. Não podemos descansar, nem de noite. É tudo ilusão. (Eclesiastes 2:23)";
 frase[2167] = "Quanto mais você se preocupar, mais pesadelos terá; e, quanto mais você falar, mais tolices dirá. (Eclesiastes 5:3)";
 frase[2168] = "Não deixe que nada o preocupe ou faça sofrer, pois a mocidade dura pouco. (Eclesiastes 11:10)";
 frase[2169] = "Aí eu me preocupei com o meu santo nome porque os israelitas o profanaram em todos os lugares aonde foram. (Ezequiel 36:21)";
 frase[2170] = "Além dessas e de outras coisas, ainda pesa diariamente sobre mim a preocupação que tenho por todas as igrejas. (2Coríntios 11:28)";
 frase[2171] = "Quando entraram na terra de Zufe, Saul disse ao empregado: — Vamos voltar para casa; se não, em vez de se preocupar com as jumentas, o meu pai vai acabar se preocupando com a gente. (1Samuel 9:5)";
 frase[2172] = "Não se preocupem com nada, mas em todas as orações peçam a Deus o que vocês precisam e orem sempre com o coração agradecido. (Filipenses 4:6)";
 frase[2173] = "Ele recusou, dizendo assim: — Escute! O meu dono não precisa se preocupar com nada nesta casa, pois eu estou aqui. Ele me pôs como responsável por tudo o que tem. (Gênesis 39:8)";
 frase[2174] = "Quando José veio vê-los de manhã, notou que estavam preocupados. (Gênesis 40:6)";
 frase[2175] = "E não se preocupem por deixarem para trás as coisas que têm, pois o melhor que há na terra do Egito será deles. (Gênesis 45:20)";
 frase[2176] = "Ó Senhor, que é o ser humano, para que penses nele? Que é um simples mortal, para que te preocupes com ele?(Salmos 144:3)";
 frase[2177] = "O trabalhador pode ter pouco ou muito para comer, mas pelo menos dorme bem à noite. Porém o rico se preocupa tanto com as coisas que possui, que nem consegue dormir. (Eclesiastes 5:12)";
 frase[2178] = "O que ganhamos é passar a vida na escuridão e na tristeza, preocupados, doentes e amargurados. (Eclesiastes 5:17)";
 frase[2179] = "Mulheres desocupadas, escutem o que eu vou dizer; prestem atenção, mulheres que não se preocupam com nada! (Isaías 32:9)";
 frase[2180] = "Deus diz: “Quem terá dó de vocês, moradores de Jerusalém? Quem vai se preocupar com vocês? Quem vai parar um pouco para perguntar como vocês estão passando?(Jeremias 15:5)";
 frase[2181] = "— E por que vocês se preocupam com roupas? Vejam como crescem as flores do campo: elas não trabalham, nem fazem roupas para si mesmas. (Mateus 6:28)";
 frase[2182] = "Não se preocupem com os fariseus. São guias cegos. E, quando um cego guia outro, os dois acabam caindo num buraco. (Mateus 15:14)";
 frase[2183] = "Aí o Senhor respondeu: — Marta, Marta, você está agitada e preocupada com muitas coisas,(Lucas 10:41)";
 frase[2184] = "— Quando levarem vocês para serem julgados nas sinagogas ou diante dos governadores e autoridades, não fiquem preocupados, pensando como vão se defender ou o que vão dizer. (Lucas 12:11)";
 frase[2185] = "Você era escravo quando Deus o chamou? Não se preocupe com isso. Mas, se você pode se tornar livre, então aproveite a oportunidade. (1Coríntios 7:21)";
 frase[2186] = "Eu quero livrá-los de preocupações. O solteiro se interessa pelas coisas do Senhor porque quer agradá-lo. (1Coríntios 7:32)";
 frase[2187] = "Mas Deus disse: — Abraão, não se preocupe com o menino, nem com a sua escrava. Faça tudo o que Sara disser, pois você terá descendentes por meio de Isaque. (Gênesis 21:12)";
 frase[2188] = "E não se preocupe com as jumentas que se perderam há três dias, pois elas já foram encontradas. Afinal, quem é que o povo de Israel está querendo? Eles querem é você — você e a família do seu pai. (1Samuel 9:20)";
 frase[2189] = "Então Davi aceitou o que ela havia trazido e disse: — Volte para casa e não se preocupe. Eu farei o que você quiser. (1Samuel 25:35)";
 frase[2190] = "— Não se preocupe! — disse Elias. — Vá preparar a sua comida. Mas primeiro faça um pãozinho com a farinha que você tem e traga-o para mim. Depois prepare o resto para você e para o seu filho. (1Reis 17:13)";
 frase[2191] = "As suas autoridades são pessoas revoltadas e têm amizade com ladrões. Estão sempre aceitando dinheiro e presentes para torcer a justiça. Não defendem os direitos dos órfãos e não se preocupam com as causas das viúvas. (Isaías 1:23)";
 frase[2192] = "Vocês têm tido uma vida sem preocupações, mas agora tremam e fiquem aflitas. Tirem as suas roupas e vistam roupas feitas de pano grosseiro. (Isaías 32:11)";
 frase[2193] = "Portanto, não fiquem preocupados, perguntando: “Onde é que vamos arranjar comida?” ou “Onde é que vamos arranjar bebida?” ou “Onde é que vamos arranjar roupas?”(Mateus 6:31)";
 frase[2194] = "Quando levarem vocês para serem julgados, não fiquem preocupados com o que deverão dizer ou como irão falar. Quando chegar o momento, Deus dará a vocês o que devem falar. (Mateus 10:19)";
 frase[2195] = "Outras pessoas são parecidas com as sementes que foram semeadas no meio dos espinhos. Elas ouvem a mensagem, mas as preocupações deste mundo e a ilusão das riquezas sufocam a mensagem, e essas pessoas não produzem frutos. (Mateus 13:22)";
 frase[2196] = "mas, quando aparecem as preocupações deste mundo, a ilusão das riquezas e outras ambições, estas coisas sufocam a mensagem, e ela não produz frutos. (Marcos 4:19)";
 frase[2197] = "Então Jesus disse aos seus discípulos: — É por isso que eu digo a vocês: não se preocupem com a comida que precisam para viver nem com a roupa que precisam para se vestir. (Lucas 12:22)";
 frase[2198] = "Pelo contrário, em alguma parte das Escrituras Sagradas alguém afirma: “Que é um simples ser humano, ó Deus, para que penses nele? Que é o ser mortal para que te preocupes com ele?(Hebreus 2:6)";
 frase[2199] = "Como vocês serão felizes se tiverem de sofrer por fazerem o que é certo! Não tenham medo de ninguém, nem fiquem preocupados. (1Pedro 3:14)";
 frase[2200] = "— Por isso eu digo a vocês: não se preocupem com a comida e com a bebida que precisam para viver nem com a roupa que precisam para se vestir. Afinal, será que a vida não é mais importante do que a comida? E será que o corpo não é mais importante do que as roupas?(Mateus 6:25)";
 frase[2201] = "Deus ouviu o choro do menino; e, lá do céu, o Anjo de Deus chamou Agar e disse: — Por que é que você está preocupada, Agar? Não tenha medo, pois Deus ouviu o choro do menino aí onde ele está. (Gênesis 21:17)";
 frase[2202] = "Ele é como a árvore plantada perto da água, que espalha as suas raízes até o ribeirão. Quando vem o calor, ela não tem medo, pois as suas folhas ficam sempre verdes. Quando não chove, ela não se preocupa; continua dando frutas. (Jeremias 17:8)";
 frase[2203] = "O Senhor Deus disse o seguinte a respeito de Damasco: — Os moradores das cidades de Hamate e Arpade estão preocupados e assustados porque ouviram más notícias. O medo rola em cima deles como o mar, e eles não têm descanso. (Jeremias 49:23)";
 frase[2204] = "Quando prenderem e entregarem vocês às autoridades, não fiquem preocupados, antes da hora, com o que irão dizer. Quando chegar o momento, digam o que Deus lhes der para dizer. Porque as palavras que disserem não serão de vocês mesmos, mas virão do Espírito Santo. (Marcos 13:11)";
 frase[2205] = "As sementes que caíram no meio dos espinhos são as pessoas que ouvem a mensagem. Porém as preocupações, as riquezas e os prazeres desta vida aumentam e sufocam essas pessoas. Por isso os frutos que elas produzem nunca amadurecem. (Lucas 8:14)";
 frase[2206] = "É por isso que vocês estão fazendo planos contra mim? Nenhum de vocês me contou que o meu próprio filho fez um acordo com Davi. Ninguém se preocupa comigo. Ninguém me diz que Davi, um dos meus próprios homens, está agora mesmo procurando uma oportunidade para me matar e que foi o meu próprio filho quem o pôs contra mim! (1Samuel 22:8)";
 frase[2207] = "Ao ouvir isso, Daniel, também conhecido como Beltessazar, ficou espantado e por alguns instantes não sabia o que pensar. O rei lhe disse: — Beltessazar, não se preocupe com o sonho nem com o que ele quer dizer. Mas Daniel respondeu: — Ó rei, quem dera que o sonho e a sua mensagem não fossem a respeito do senhor, mas a respeito dos seus inimigos! (Daniel 4:19)";
 frase[2208] = "Pois vou pôr um pastor para cuidar do meu rebanho, mas ele não vai se preocupar com as ovelhas que estiverem em perigo, não vai procurar as que se perderem, não vai tratar das que se machucarem, nem vai cuidar das que estiverem cansadas. Pelo contrário, ele comerá a carne das mais gordas e não deixará nem mesmo os cascos! (Zacarias 11:16)";
 frase[2209] = "Não se preocupem com nada, mas em todas as orações peçam a Deus o que vocês precisam e orem sempre com o coração agradecido. (Filipenses 4:6)";
 frase[2210] = "E a paz de Deus, que ninguém consegue entender, guardará o coração e a mente de vocês, pois vocês estão unidos com Cristo Jesus. (Filipenses 4:7)";
 frase[2211] = "Pois o Espírito que Deus nos deu não nos torna medrosos; pelo contrário, o Espírito nos enche de poder e de amor e nos torna prudentes. (2Timóteo 1:7)";
 frase[2212] = "Quando estou com medo, eu confio em ti, ó Deus Todo-Poderoso. (Salmos 56:3)";
 frase[2213] = "Entreguem todas as suas preocupações a Deus, pois ele cuida de vocês. (1Pedro 5:7)";
 frase[2214] = "Sejam fortes e corajosos; não se assustem, nem tenham medo deles, pois é o Senhor, nosso Deus, quem irá com vocês. Ele não os deixará, nem abandonará. (Deuteronômio 31:6)";
 frase[2215] = "No amor não há medo; o amor que é totalmente verdadeiro afasta o medo. Portanto, aquele que sente medo não tem no seu coração o amor totalmente verdadeiro, porque o medo mostra que existe castigo. (1João 4:18)";
 frase[2216] = "Ainda que eu ande por um vale escuro como a morte, não terei medo de nada. Pois tu, ó Senhor Deus, estás comigo; tu me proteges e me diriges. (Salmos 23:4)";
 frase[2217] = "Por isso, não fiquem preocupados com o dia de amanhã, pois o dia de amanhã trará as suas próprias preocupações. Para cada dia bastam as suas próprias dificuldades. (Mateus 6:34)";
 frase[2218] = "O Senhor está comigo, e eu não tenho medo; que mal pode alguém me fazer?(Salmos 118:6)";
 frase[2219] = "Diante de tudo isso, o que mais podemos dizer? Se Deus está do nosso lado, quem poderá nos vencer? Ninguém! (Romanos 8:31)";
 frase[2220] = "— Então respondi: “Não se assustem, nem tenham medo dessa gente. (Deuteronômio 1:29)";
 frase[2221] = "Isbosete tinha medo de Abner; por isso, não disse nada. (2Samuel 3:11)";
 frase[2222] = "“Os mortos tremem de medo nas águas debaixo da terra. (Jó 26:5)";
 frase[2223] = "É forte, respeitada e não tem medo do futuro. (Provérbios 31:25)";
 frase[2224] = "Nesse instante Jesus disse: — Coragem! Sou eu! Não tenham medo! (Mateus 14:27)";
 frase[2225] = "Mas Jesus disse: — Não tenham medo, sou eu! (João 6:20)";
 frase[2226] = "Quando Pilatos ouviu isso, ficou com mais medo ainda. (João 19:8)";
 frase[2227] = "Quando visitei vocês, eu estava fraco e tremia de medo. (1Coríntios 2:3)";
 frase[2228] = "Vou mostrar a vocês de quem devem ter medo: tenham medo de Deus, que, depois de matar o corpo, tem poder para jogar a pessoa no inferno. Sim, repito: tenham medo de Deus. (Lucas 12:5)";
 frase[2229] = "Aí ficou com medo e disse: “Este lugar dá medo na gente. Aqui é a casa de Deus, aqui fica a porta do céu!”(Gênesis 28:17)";
 frase[2230] = "— Portanto, não tenham medo deles, pois com vocês está o Senhor, nosso Deus, o Deus que é forte e causa medo. (Deuteronômio 7:21)";
 frase[2231] = "O Senhor Deus é a minha luz e a minha salvação; de quem terei medo? O Senhor me livra de todo perigo; não ficarei com medo de ninguém. (Salmos 27:1)";
 frase[2232] = "— Não pensem que tudo o que o povo chama de revolução seja revolução mesmo. Não fiquem assustados, nem tenham medo daquilo de que o povo tem medo. (Isaías 8:12)";
 frase[2233] = "Pelo contrário, resta apenas o medo do que acontecerá: medo do Julgamento e do fogo violento que destruirá os que são contra Deus. (Hebreus 10:27)";
 frase[2234] = "Mas José respondeu: — Não tenham medo; eu não posso me colocar no lugar de Deus. (Gênesis 50:19)";
 frase[2235] = "Os povos ouviram falar do que fizeste e estão tremendo de medo. Os filisteus ficaram apavorados. (Êxodo 15:14)";
 frase[2236] = "Não tenham medo deles, pois o Senhor, seu Deus, combaterá por vocês.”(Deuteronômio 3:22)";
 frase[2237] = "Quando souberem do que aconteceu, todos ficarão com medo, e ninguém mais fará a mesma coisa. (Deuteronômio 17:13)";
 frase[2238] = "Mas o Senhor respondeu: — Não fique com medo. Tudo está bem. Você não morrerá. (Juízes 6:23)";
 frase[2239] = "Aí Jotão fugiu e foi viver em Beer porque estava com medo do seu irmão Abimeleque. (Juízes 9:21)";
 frase[2240] = "O Senhor estava com Davi e havia abandonado Saul; por isso, Saul tinha medo de Davi. (1Samuel 18:12)";
 frase[2241] = "Saul viu o sucesso de Davi e ficou ainda com mais medo dele. (1Samuel 18:15)";
 frase[2242] = "Davi assustou-se com as palavras deles e ficou com muito medo de Aquis. (1Samuel 21:12)";
 frase[2243] = "Ele o protegerá das más línguas, e você não terá medo quando houver destruição. (Jó 5:21)";
 frase[2244] = "Você se rirá quando houver violência e faltarem alimentos e não terá medo dos animais selvagens. (Jó 5:22)";
 frase[2245] = "Vocês são como esses ribeirões; vocês veem a minha miséria e ficam com medo. (Jó 6:21)";
 frase[2246] = "então me espantas com sonhos e com pesadelos me enches de medo. (Jó 7:14)";
 frase[2247] = "Ó Deus, para de me castigar! Não me enchas de medo com os teus terrores! (Jó 9:34)";
 frase[2248] = "Então eu falarei e não terei medo, pois a minha consciência não me acusa. (Jó 9:35)";
 frase[2249] = "Então você andará de cabeça erguida, puro, firme e sem medo. (Jó 11:15)";
 frase[2250] = "a sua grandeza os encherá de medo, e os seus terrores cairão sobre vocês. (Jó 13:11)";
 frase[2251] = "não me castigues mais e não me faças sentir tanto medo. (Jó 13:21)";
 frase[2252] = "Em toda parte, os que ouvirem falar do seu fim tremerão de medo e pavor. (Jó 18:20)";
 frase[2253] = "Eles têm medo da luz do dia, mas a escuridão não os deixa apavorados.”(Jó 24:17)";
 frase[2254] = "Quando ele ameaça as colunas que sustentam o céu, elas se assustam e tremem de medo. (Jó 26:11)";
 frase[2255] = "Por isso, não tenha medo de mim; a minha intenção não é esmagar você. (Jó 33:7)";
 frase[2256] = "Deus fala aos nossos ouvidos, e os seus avisos nos enchem de medo. (Jó 33:16)";
 frase[2257] = "Eles não têm medo. Nada os assusta, e a espada não os faz recuar. (Jó 39:22)";
 frase[2258] = "A sua força está no pescoço, e a cara dele mete medo em todo mundo. (Jó 41:22)";
 frase[2259] = "O seu coração cruel não tem medo; é duro como uma pedra de moinho. (Jó 41:24)";
 frase[2260] = "Quando ele se levanta, até os mais fortes ficam apavorados; o medo os impede de agir. (Jó 41:25)";
 frase[2261] = "Não tenho medo dos milhares de inimigos que me ameaçam de todos os lados. (Salmos 3:6)";
 frase[2262] = "Mas eles vão tremer de medo porque Deus está do lado daqueles que lhe obedecem. (Salmos 14:5)";
 frase[2263] = "Não teremos medo, ainda que os mares se agitem e rujam, e os montes tremam violentamente. (Salmos 46:3)";
 frase[2264] = "Porém, quando viram a cidade, ficaram espantados e fugiram com medo. (Salmos 48:5)";
 frase[2265] = "Eu não sinto medo nas horas de perigo, quando os meus inimigos me cercam. (Salmos 49:5)";
 frase[2266] = "O meu coração está cheio de medo, e o pavor da morte cai sobre mim. (Salmos 55:4)";
 frase[2267] = "Sinto um medo terrível e estou tremendo; o pavor tomou conta de mim. (Salmos 55:5)";
 frase[2268] = "Confio nele e não terei medo de nada. O que podem me fazer simples seres humanos?(Salmos 56:11)";
 frase[2269] = "Todas as pessoas têm medo de ti. Quem pode permanecer na tua presença quando estás irado?(Salmos 76:7)";
 frase[2270] = "Deus humilha os governantes orgulhosos; ele enche de medo os reis da terra. (Salmos 76:12)";
 frase[2271] = "Ó Deus, quando as águas te viram, ficaram com medo, as águas profundas do mar tremeram. (Salmos 77:16)";
 frase[2272] = "assim persegue-os com a tua tempestade e faze com que sintam medo do teu furacão. (Salmos 83:15)";
 frase[2273] = "Você não terá medo dos perigos da noite nem de assaltos durante o dia. (Salmos 91:5)";
 frase[2274] = "Os egípcios ficaram contentes quando os israelitas foram embora, pois estavam com medo deles. (Salmos 105:38)";
 frase[2275] = "Livra-me dos insultos, que me causam medo; os teus julgamentos são bons. (Salmos 119:39)";
 frase[2276] = "Eu tremo diante de ti e tenho medo dos teus julgamentos. (Salmos 119:120)";
 frase[2277] = "Quando se deitar, não terá medo, e o seu sono será tranquilo a noite inteira. (Provérbios 3:24)";
 frase[2278] = "É perigoso ter medo dos outros, mas confiar no Senhor dá segurança. (Provérbios 29:25)";
 frase[2279] = "o leão, o mais forte de todos os animais, que não tem medo de nada;(Provérbios 30:30)";
 frase[2280] = "Os braços de todos ficarão sem força, e de medo os corações deles baterão mais rápido,(Isaías 13:7)";
 frase[2281] = "“Ouvi um grito de terror, grito de medo e não de paz. (Jeremias 30:5)";
 frase[2282] = "Medo, covas e armadilhas esperam pelos moradores de Moabe. Sou eu, o Senhor, quem está falando. (Jeremias 48:43)";
 frase[2283] = "No dia em que te chamei, chegaste perto de mim e disseste: “Não tenha medo!”(Lamentações 3:57)";
 frase[2284] = "Vocês têm medo de espadas? Pois trarei homens com espadas para atacá-los. (Ezequiel 11:8)";
 frase[2285] = "— Homem mortal, trema de medo quando você comer e estremeça quando beber. (Ezequiel 12:18)";
 frase[2286] = "Eles vão avançando, e todo mundo treme, todos ficam pálidos de medo. (Joel 2:6)";
 frase[2287] = "“Alegrem-se, ó campos, e não tenham medo, pois eu, o Senhor, fiz grandes coisas! (Joel 2:21)";
 frase[2288] = "Os soldados de Temã tremerão de medo; todos os guerreiros de Edom serão mortos.”(Obadias 1:9)";
 frase[2289] = "Eles ficaram com tanto medo do Senhor, que lhe ofereceram um sacrifício e lhe fizeram promessas. (Jonas 1:16)";
 frase[2290] = "Nínive: destruída, deserta, despovoada! Corações cheios de medo, joelhos tremendo, rostos pálidos; todos perdem as forças. (Naum 2:10)";
 frase[2291] = "“Eles espalham o medo e o terror e fazem valer as suas próprias ordens e leis. (Habacuque 1:7)";
 frase[2292] = "Portanto, não tenham medo, pois vocês valem mais do que muitos passarinhos. (Mateus 10:31)";
 frase[2293] = "Herodes queria matá-lo, mas tinha medo do povo, pois eles achavam que João era profeta. (Mateus 14:5)";
 frase[2294] = "Jesus veio, tocou neles e disse: — Levantem-se e não tenham medo! (Mateus 17:7)";
 frase[2295] = "Os guardas tremeram de medo do anjo e ficaram como mortos. (Mateus 28:4)";
 frase[2296] = "Eles não entendiam o que Jesus dizia, mas tinham medo de perguntar. (Marcos 9:32)";
 frase[2297] = "Quando Zacarias o viu, ficou com medo e não sabia o que fazer. (Lucas 1:12)";
 frase[2298] = "Então o anjo continuou: — Não tenha medo, Maria! Deus está contente com você. (Lucas 1:30)";
 frase[2299] = "Jesus ouviu isso e disse a Jairo: — Não tenha medo; tenha fé, e ela ficará boa. (Lucas 8:50)";
 frase[2300] = "Eles ficaram assustados e com muito medo e pensaram que estavam vendo um fantasma. (Lucas 24:37)";
 frase[2301] = "Mas ninguém falava abertamente sobre ele porque todos tinham medo dos líderes judeus. (João 7:13)";
 frase[2302] = "“Povo de Jerusalém, não tenha medo! Veja! Aí vem o seu Rei, montado num jumentinho!”(João 12:15)";
 frase[2303] = "Repreenda publicamente os presbíteros que cometem pecados, para que os outros fiquem com medo. (1Timóteo 5:20)";
 frase[2304] = "O que estavam vendo era tão terrível, que Moisés disse: “Estou tremendo de medo!”(Hebreus 12:21)";
 frase[2305] = "Você crê que há somente um Deus? Ótimo! Os demônios também creem e tremem de medo. (Tiago 2:19)";
 frase[2306] = "Porém não sejam rebeldes contra o Senhor e não tenham medo do povo daquela terra. Nós os venceremos com facilidade. O Senhor está com a gente e derrotou os deuses que os protegiam. Portanto, não tenham medo. (Números 14:9)";
 frase[2307] = "E Deus me disse: “De hoje em diante eu vou fazer com que todos os povos do mundo tenham medo de você. Você será famoso, e, quando ouvirem falar a seu respeito, todos ficarão tão assustados, que tremerão de medo.”(Deuteronômio 2:25)";
 frase[2308] = "Jeremias, prepare-se para ir. Vá dizer a eles tudo o que eu mandar. Não tenha medo deles agora, pois, do contrário, eu farei com que você fique com mais medo ainda quando estiver no meio deles. (Jeremias 1:17)";
 frase[2309] = "Não tenham medo daqueles que matam o corpo, mas não podem matar a alma. Porém tenham medo de Deus, que pode destruir no inferno tanto a alma como o corpo. (Mateus 10:28)";
 frase[2310] = "Somente os que fazem o mal devem ter medo dos governantes, e não os que fazem o bem. Se você não quiser ter medo das autoridades, então faça o que é bom, e elas o elogiarão. (Romanos 13:3)";
 frase[2311] = "Quando começou a anoitecer, Abrão caiu num sono profundo. De repente, ficou com medo, e o pavor tomou conta dele. (Gênesis 15:12)";
 frase[2312] = "Jacó respondeu: — Eu fiquei com medo, pois pensei que o senhor ia me tirar as suas filhas à força. (Gênesis 31:31)";
 frase[2313] = "Quando as dores estavam no ponto mais forte, a parteira disse: — Não tenha medo; você vai ter outro filho homem. (Gênesis 35:17)";
 frase[2314] = "Porém quanto mais os egípcios maltratavam os israelitas, tanto mais eles aumentavam. Os egípcios ficaram com medo deles(Êxodo 1:12)";
 frase[2315] = "Arão e todo o povo ficaram com medo de chegar perto de Moisés quando viram o seu rosto brilhando. (Êxodo 34:30)";
 frase[2316] = "Todos os outros povos do mundo verão que vocês pertencem a Deus, o Senhor, e terão medo de vocês. (Deuteronômio 28:10)";
 frase[2317] = "Os homens que foram comigo espalharam o medo no meio do povo, mas eu obedeci fielmente ao Senhor, meu Deus. (Josué 14:8)";
 frase[2318] = "Mas, se você estiver com medo de atacar, desça até o acampamento deles. Leve junto Purá, o seu ajudante. (Juízes 7:10)";
 frase[2319] = "As árvores estavam cheias de mel, mas ninguém comeu nada porque eles estavam com medo do juramento de Saul. (1Samuel 14:26)";
 frase[2320] = "Davi chegou e disse a Saul: — Meu senhor, ninguém deve ficar com medo desse filisteu! Eu vou lutar contra ele. (1Samuel 17:32)";
 frase[2321] = "Por isso, ficou com mais medo ainda de Davi e pelo resto da sua vida foi seu inimigo. (1Samuel 18:29)";
 frase[2322] = "Fique comigo e não tenha medo. Saul quer matar a nós dois, mas comigo você estará livre de perigo. (1Samuel 22:23)";
 frase[2323] = "Então os convidados de Adonias ficaram com medo, e se levantaram, e foram embora, cada um pelo seu caminho. (1Reis 1:49)";
 frase[2324] = "Eliseu disse: — Não tenha medo, pois aqueles que estão conosco são mais numerosos do que os que estão com eles. (2Reis 6:16)";
 frase[2325] = "Então Davi ficou com medo de Deus e disse: — E agora como poderei levar comigo a arca da aliança?(1Crônicas 13:12)";
 frase[2326] = "Quando os outros povos souberam que o Senhor havia derrotado os inimigos de Israel, ficaram todos com medo. (2Crônicas 20:29)";
 frase[2327] = "O que eles queriam era nos meter medo para não continuarmos o trabalho. “Agora, ó Deus, aumenta as minhas forças!”(Neemias 6:9)";
 frase[2328] = "Aquilo que eu temia foi o que aconteceu, e o que mais me dava medo me atingiu. (Jó 3:25)";
 frase[2329] = "Tirarão a flecha das suas costas, e ela sairá brilhando com o seu sangue. E o medo tomará conta dele. (Jó 20:25)";
 frase[2330] = "Por isso, agora você está cercado de perigos, e, de repente, o medo toma conta de você. (Jó 22:10)";
 frase[2331] = "A escuridão me deixou cego; mas é o Deus Todo-Poderoso quem me põe medo, e não a escuridão. (Jó 23:16)";
 frase[2332] = "Só de olhar para o monstro Leviatã as pessoas perdem toda a coragem e desmaiam de medo. (Jó 41:9)";
 frase[2333] = "Não há nada neste mundo que se compare com ele, pois foi feito para não ter medo. (Jó 41:33)";
 frase[2334] = "Tremam de medo e parem de pecar. Sozinhos e quietos nos seus quartos, examinem a sua própria consciência. (Salmos 4:4)";
 frase[2335] = "Faze, ó Senhor Deus, com que sintam medo! Que eles fiquem sabendo que são simples criaturas mortais! (Salmos 9:20)";
 frase[2336] = "Por isso, não teremos medo, ainda que a terra seja abalada, e as montanhas caiam nas profundezas do oceano. (Salmos 46:2)";
 frase[2337] = "Os que obedecem a Deus verão isso e ficarão com medo; eles vão rir de você e dizer:(Salmos 52:6)";
 frase[2338] = "Ó Deus, escuta a minha oração, pois estou em dificuldades! Salva a minha vida, pois tenho medo dos meus inimigos. (Salmos 64:1)";
 frase[2339] = "Então todas as pessoas ficarão com medo; pensarão no que Deus fez e falarão sobre os seus atos poderosos. (Salmos 64:9)";
 frase[2340] = "Lá do céu fizeste conhecida a tua sentença de condenação. A terra teve medo e ficou quieta(Salmos 76:8)";
 frase[2341] = "Ele os guiou com segurança, e eles não tiveram medo; mas os seus inimigos foram cobertos pelo mar. (Salmos 78:53)";
 frase[2342] = "Quem já sentiu o grande poder da tua ira? Quem conhece o medo que o teu furor produz?(Salmos 90:11)";
 frase[2343] = "Não terá medo da peste que se espalha na escuridão nem dos males que matam ao meio-dia. (Salmos 91:6)";
 frase[2344] = "Ele não tem medo de receber más notícias; a sua fé é forte, pois ele confia no Senhor. (Salmos 112:7)";
 frase[2345] = "Ele não fica preocupado, nem tem medo; ele tem certeza de que os seus inimigos serão derrotados. (Salmos 112:8)";
 frase[2346] = "Mas quem me ouvir terá segurança, viverá tranquilo e não terá motivo para ter medo de nada. (Provérbios 1:33)";
 frase[2347] = "Pelo contrário, fiquem assustados por minha causa e tenham medo de mim, pois eu, o Senhor Todo-Poderoso, sou santo. (Isaías 8:13)";
 frase[2348] = "As nações distantes viram o que aconteceu, e todos os povos tremeram de medo. Então se juntaram e vieram. (Isaías 41:5)";
 frase[2349] = "Não tenha medo de ninguém, pois eu estarei com você para protegê-lo. Sou eu, o Senhor, quem está falando. (Jeremias 1:8)";
 frase[2350] = "Mas eu, o Senhor, o protegerei, e você não será entregue nas mãos daqueles de quem está com medo. (Jeremias 39:17)";
 frase[2351] = "Destruiu fortalezas e arrasou cidades. Cada vez que ele rugia, o povo da sua terra tremia de medo. (Ezequiel 19:7)";
 frase[2352] = "O copo da sua irmã Samaria, cheio de medo e desgraça, vai trazer para você embriaguez e dor. (Ezequiel 23:33)";
 frase[2353] = "não sabia o que pensar; ficou pálido de medo e começou a tremer da cabeça aos pés. (Daniel 5:6)";
 frase[2354] = "Eu estava ali sozinho enquanto via essa visão impressionante. Fiquei pálido de medo e perdi as forças. (Daniel 10:8)";
 frase[2355] = "Quando o leão ruge, quem não fica com medo? Quando o Senhor Deus fala, quem não anuncia a sua mensagem?(Amós 3:8)";
 frase[2356] = "Vi que os povos de Cuchã estão aflitos e que os moradores de Midiã estão com medo. (Habacuque 3:7)";
 frase[2357] = "Chegará o dia em que dirão a Jerusalém: “Não tenha medo, povo de Sião, não desanime, nem perca a coragem. (Sofonias 3:16)";
 frase[2358] = "Quando o povo viu isso, ficou com medo e louvou a Deus por dar esse poder a seres humanos. (Mateus 9:8)";
 frase[2359] = "Porém, quando sentiu a força do vento, ficou com medo e começou a afundar. Então gritou: — Socorro, Senhor! (Mateus 14:30)";
 frase[2360] = "Quando os discípulos ouviram a voz, ficaram com tanto medo, que se ajoelharam e encostaram o rosto no chão. (Mateus 17:6)";
 frase[2361] = "Por isso queriam prendê-lo, mas tinham medo da multidão porque o povo achava que Jesus era profeta. (Mateus 21:46)";
 frase[2362] = "Fiquei com medo e por isso escondi o seu dinheiro na terra. Veja! Aqui está o seu dinheiro.”(Mateus 25:25)";
 frase[2363] = "Então o anjo disse para as mulheres: — Não tenham medo! Sei que vocês estão procurando Jesus, que foi crucificado,(Mateus 28:5)";
 frase[2364] = "Elas foram embora depressa do túmulo, pois estavam com medo, mas muito alegres. E correram para contar tudo aos discípulos. (Mateus 28:8)";
 frase[2365] = "Então Jesus disse: — Não tenham medo! Vão dizer aos meus irmãos para irem à Galileia, e eles me verão ali. (Mateus 28:10)";
 frase[2366] = "Então a mulher, sabendo o que lhe havia acontecido, atirou-se aos pés dele, tremendo de medo, e contou tudo. (Marcos 5:33)";
 frase[2367] = "Mas Jesus não se importou com a notícia e disse a Jairo: — Não tenha medo; tenha fé! (Marcos 5:36)";
 frase[2368] = "Todos ficaram apavorados com o que viram. Mas logo Jesus falou com eles, dizendo: — Coragem, sou eu! Não tenham medo! (Marcos 6:50)";
 frase[2369] = "Os vizinhos ficaram com muito medo, e as notícias dessas coisas se espalharam por toda a região montanhosa da Judeia. (Lucas 1:65)";
 frase[2370] = "Todos ficaram muito admirados; e, cheios de medo, louvaram a Deus, dizendo: — Que coisa maravilhosa nós vimos hoje! (Lucas 5:26)";
 frase[2371] = "Jesus continuou: — Meu pequeno rebanho, não tenha medo! Pois o Pai tem prazer em dar o Reino a vocês. (Lucas 12:32)";
 frase[2372] = "Assim que ouviu isso, Ananias caiu morto; e todos os que souberam do que havia acontecido ficaram com muito medo. (Atos 5:5)";
 frase[2373] = "Certa noite Paulo teve uma visão, e nela o Senhor disse: — Não tenha medo, continue falando e não se cale,(Atos 18:9)";
 frase[2374] = "E também para libertar os que foram escravos toda a sua vida por causa do medo da morte. (Hebreus 2:15)";
 frase[2375] = "O homem respondeu: — Eu ouvi a tua voz, quando estavas passeando pelo jardim, e fiquei com medoporque estava nu. Por isso me escondi. (Gênesis 3:10)";
 frase[2376] = "Depois disso Abrão teve uma visão, e nela o Senhor lhe disse: — Abrão, não tenha medo. Eu o protegerei de todo perigo e lhe darei uma grande recompensa. (Gênesis 15:1)";
 frase[2377] = "Ao escutar isso, Sara ficou com medo e quis negar. — Eu não estava rindo — disse ela. Mas o Senhor respondeu: — Não é verdade; você riu mesmo. (Gênesis 18:15)";
 frase[2378] = "Ló teve medo de ficar morando em Zoar e por isso foi para as montanhas, junto com as duas filhas. Ali os três viviam numa caverna. (Gênesis 19:30)";
 frase[2379] = "No dia seguinte Abimeleque levantou-se bem cedo, chamou todos os seus servidores e lhes contou o que havia acontecido. E eles ficaram com muito medo. (Gênesis 20:8)";
 frase[2380] = "Ó Senhor, eu te peço que me salves do meu irmão Esaú. Tenho medo de que ele venha e me mate e também as mulheres e as crianças. (Gênesis 32:11)";
 frase[2381] = "Quando eles foram embora, Deus fez com que os moradores das cidades vizinhas ficassem com um medoterrível, e por isso eles não perseguiram Jacó. (Gênesis 35:5)";
 frase[2382] = "Não tenham medo. Eu cuidarei de vocês e dos seus filhos. Assim, ele os acalmou com palavras carinhosas, que tocaram o coração deles. (Gênesis 50:21)";
 frase[2383] = "Alguns funcionários do rei ficaram com medo daquilo que o Senhor tinha dito e levaram os seus escravos e os seus animais para os abrigos. (Êxodo 9:20)";
 frase[2384] = "Porém Moisés respondeu: — Não tenham medo. Fiquem firmes e vocês verão que o Senhor vai salvá-los hoje. Nunca mais vocês vão ver esses egípcios. (Êxodo 14:13)";
 frase[2385] = "Então Moisés respondeu: — Não tenham medo, pois Deus só quer pôr vocês à prova. Ele quer que vocês continuem a temê-lo a fim de que não pequem. (Êxodo 20:20)";
 frase[2386] = "ficou apavorado com os israelitas porque eles eram muitos. De fato, o povo de Moabe ficou com muito medodos israelitas. (Números 22:3)";
 frase[2387] = "Portanto, vão e tomem posse dessa terra que está diante de vocês, como o Senhor, o Deus dos nossos antepassados, mandou. Não tenham medo, nem se assustem.”(Deuteronômio 1:21)";
