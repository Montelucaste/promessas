 frase[2388] = "Vocês ficaram com medo do fogo e não subiram o monte; por isso eu me coloquei entre o Senhor Deus e vocês. E ele disse:(Deuteronômio 5:5)";
 frase[2389] = "Não tenham medo deles; lembrem daquilo que o Senhor, nosso Deus, fez com o rei do Egito e com todo o seu povo. (Deuteronômio 7:18)";
 frase[2390] = "Todo o povo de Israel saberá do que aconteceu; todos ficarão com medo, e ninguém vai querer fazer uma coisa tão má como essa no meio do povo. (Deuteronômio 13:11)";
 frase[2391] = "Todo o povo de Israel saberá do que aconteceu; todos ficarão com medo, e ninguém se atreverá a praticar uma ação tão má no meio do povo. (Deuteronômio 19:20)";
 frase[2392] = "“Israelitas, escutem o que estou dizendo! Vocês estão aqui para lutar contra os inimigos. Não se assustem, não se apavorem, não fiquem com medo,(Deuteronômio 20:3)";
 frase[2393] = "Ele os castigará com as mesmas doenças com que castigou os egípcios, doenças que não têm cura e que deixam vocês com tanto medo. (Deuteronômio 28:60)";
 frase[2394] = "E também nesses países vocês não terão sossego nem paz; o Senhor fará com que fiquem cheios de aflição, desespero e medo. (Deuteronômio 28:65)";
 frase[2395] = "A vida de vocês estará sempre em perigo; dia e noite o medo os acompanhará, e vocês ficarão desesperados da vida. (Deuteronômio 28:66)";
 frase[2396] = "O Senhor Deus irá na sua frente; ele mesmo estará com você e não o deixará, não o abandonará. Não se assuste, nem tenha medo. (Deuteronômio 31:8)";
 frase[2397] = "Fora de casa morrerão na guerra e dentro de casa morrerão de medo. Serão mortos os moços e as moças, as crianças e os velhos também. (Deuteronômio 32:25)";
 frase[2398] = "— Eu sei que o Senhor deu esta terra a vocês, os israelitas. Para dizer a verdade, todos nós estamos morrendo de medo. (Josué 2:9)";
 frase[2399] = "e terminaram assim: — Estamos certos de que o Senhor nos deu toda esta terra. Todo mundo aqui está morrendo de medo de nós. (Josué 2:24)";
 frase[2400] = "E o Senhor Deus lhe disse: — Não fique com medo desses reis, pois eu já lhe dei a vitória. Nenhum deles será capaz de resistir. (Josué 10:8)";
 frase[2401] = "Aí Josué disse: — Não tenham medo; não percam a coragem. Sejam fortes e corajosos porque o Senhor fará isso com todos os inimigos que vocês enfrentarem. (Josué 10:25)";
 frase[2402] = "Agora, minha filha, não tenha medo. Na cidade toda gente sabe que você é uma mulher direita. Vou fazer tudo o que me pede. (Rute 3:11)";
 frase[2403] = "os filisteus ficaram com medo e disseram: — Um deus chegou ao acampamento dos israelitas! Ai de nós! Nunca aconteceu uma coisa assim! (1Samuel 4:7)";
 frase[2404] = "Aí Samuel orou, e no mesmo dia o Senhor mandou trovões e chuva. Então todo o povo ficou com medo do Senhor e de Samuel. (1Samuel 12:18)";
 frase[2405] = "Todos os filisteus que estavam no acampamento ficaram apavorados. Os patrulheiros e os soldados do acampamento tremeram de medo. A terra também tremeu, e houve uma grande confusão. (1Samuel 14:15)";
 frase[2406] = "— Eu pequei! — respondeu Saul. — Desobedeci às ordens de Deus, o Senhor, e às instruções que você deu. Fiquei com medo do povo e fiz o que eles queriam. (1Samuel 15:24)";
 frase[2407] = "E Samuel ordenou: — Tragam aqui o rei Agague. Tremendo de medo, Agague foi até o lugar onde Saul estava e disse: — Como é amargo morrer! (1Samuel 15:32)";
 frase[2408] = "Mas os homens de Davi disseram: — Nós já estamos com medo de ficar aqui em Judá. Quanto mais de ir a Queila para atacar o exército dos filisteus! (1Samuel 23:3)";
 frase[2409] = "E Davi estava com medo porque Saul tinha saído para matá-lo. Davi passou a viver em Horesa, no deserto que fica perto de Zife. (1Samuel 23:15)";
 frase[2410] = "— Não tenha medo! — respondeu o rei. — O que é que você está vendo? — Estou vendo um espírito subindo da terra! — disse ela. (1Samuel 28:13)";
 frase[2411] = "Quando Isbosete, filho de Saul, soube que Abner havia sido assassinado na cidade de Hebrom, perdeu a coragem, e todo o povo de Israel ficou com medo. (2Samuel 4:1)";
 frase[2412] = "Então Davi ficou com medo de Deus, o Senhor, e disse: — E agora como é que poderei levar comigo a arca da aliança?(2Samuel 6:9)";
 frase[2413] = "Eu o atacarei enquanto ele está cansado e desanimado. Ele ficará com medo, e todos os seus homens fugirão. Então matarei somente o rei(2Samuel 17:2)";
 frase[2414] = "Adonias ficou com muito medo de Salomão e por isso foi para a Tenda da Presença de Deus e ficou segurando nas pontas do altar . (1Reis 1:50)";
 frase[2415] = "O anjo do Senhor disse a Elias: — Desça com ele e não tenha medo. Então Elias foi junto com o oficial falar com o rei(2Reis 1:15)";
 frase[2416] = "A fama de Davi se espalhou por toda parte, e o Senhor fez com que todas as nações ficassem com medodele. (1Crônicas 14:17)";
 frase[2417] = "Mas Davi não podia ir até lá para adorar a Deus porque estava com medo da espada do anjo do Senhor. (1Crônicas 21:30)";
 frase[2418] = "O Senhor Deus fez com que todos os povos vizinhos de Judá ficassem com medo de Josafá, e por isso eles não fizeram guerra contra ele. (2Crônicas 17:10)";
 frase[2419] = "Josafá ficou com medo e orou a Deus, o Senhor, pedindo socorro. Depois deu ordem para que todo o povo de Judá jejuasse. (2Crônicas 20:3)";
 frase[2420] = "Então a gente daquela região fez tudo para desanimar os israelitas e para pôr medo neles a fim de parar a construção. (Esdras 4:4)";
 frase[2421] = "e por isso perguntou: — Por que você está triste? Você não está doente; portanto, deve estar se sentindo infeliz. Então eu fiquei com muito medo(Neemias 2:2)";
 frase[2422] = "Eles lhe deram dinheiro para me fazer ficar com medo e assim pecar . Aí eles poderiam acabar com o meu bom nome e me humilhar. (Neemias 6:13)";
 frase[2423] = "— O nosso inimigo e perseguidor é Hamã, este homem perverso! — respondeu Ester. Cheio de medo, Hamã ficou olhando para o rei e para a rainha. (Ester 7:6)";
 frase[2424] = "Mas tenham medo da espada, a espada com que Deus castiga a maldade. Fiquem sabendo que há alguém que nos julga.”(Jó 19:29)";
 frase[2425] = "Nunca tive medo daquilo que os outros poderiam dizer; não fiquei dentro de casa, calado, com receio de que zombassem de mim. (Jó 31:34)";
 frase[2426] = "Ainda que um exército inteiro me cerque, não terei medo; ainda que os meus inimigos me ataquem, continuarei confiando em Deus. (Salmos 27:3)";
 frase[2427] = "Ó Senhor Deus, tu foste bom para mim e me protegeste como uma fortaleza nas montanhas. Depois tu te escondeste de mim, e eu fiquei com medo. (Salmos 30:7)";
 frase[2428] = "Os meus inimigos zombam de mim, e os meus vizinhos também caçoam. Os meus conhecidos têm medo de mim e fogem quando me veem na rua. (Salmos 31:11)";
 frase[2429] = "Fiquei com medo e pensei que ele havia me expulsado da sua presença. Mas ele ouviu o meu grito quando o chamei pedindo ajuda. (Salmos 31:22)";
 frase[2430] = "Confio em Deus e o louvo pelo que ele tem prometido; confio nele e não terei medo de nada. O que podem me fazer simples seres humanos?(Salmos 56:4)";
 frase[2431] = "Quando escondes o rosto, ficam com medo; se cortas a respiração que lhes dás, eles morrem e voltam ao pó de onde saíram. (Salmos 104:29)";
 frase[2432] = "Quando o mau tem medo de alguma coisa, é isso mesmo o que lhe acontece, mas a pessoa direita consegue o que deseja. (Provérbios 10:24)";
 frase[2433] = "Quando os bons alcançam o poder, todos festejam; mas, quando o poder cai nas mãos dos maus, o povo se esconde de medo. (Provérbios 28:12)";
 frase[2434] = "Quando os maus sobem ao poder, o povo se esconde de medo; quando eles caem do poder, o número das pessoas honestas aumenta. (Provérbios 28:28)";
 frase[2435] = "Mas, mesmo antes desse tempo, ó rei Acaz, as terras daqueles dois reis que lhe causaram tanto medoficarão completamente abandonadas. (Isaías 7:16)";
 frase[2436] = "— Esse povo não quis as águas calmas do riacho de Siloé e está tremendo de medo do rei Rezim e do rei Peca. (Isaías 8:6)";
 frase[2437] = "Deus é o meu Salvador; eu confiarei nele e não terei medo. Pois o Senhor me dá força e poder, ele é o meu Salvador. (Isaías 12:2)";
 frase[2438] = "Os mortos vão olhar espantados para você e vão perguntar: “Será este o homem que fazia os reinos tremerem, que fazia o mundo inteiro tremer de medo?(Isaías 14:16)";
 frase[2439] = "Naquele dia, os egípcios parecerão mulheres: ficarão todos tremendo de medo quando o Senhor Todo-Poderoso levantar a mão para castigá-los. (Isaías 19:16)";
 frase[2440] = "Estou cheio de confusão e tremo de medo; esperava que a noite me trouxesse alívio, mas ela só me trouxe pavor. (Isaías 21:4)";
 frase[2441] = "Em Sião, os pecadores tremem de medo; cheios de pavor, eles perguntam: “Quem poderá viver perto desse fogo devorador, perto dessas chamas que não param de queimar?”(Isaías 33:14)";
 frase[2442] = "Digam aos desanimados: “Não tenham medo; animem-se, pois o nosso Deus está aqui. Ele vem para nos salvar, ele vem para castigar os nossos inimigos.”(Isaías 35:4)";
 frase[2443] = "Eu sou o Senhor, o Deus de vocês; eu os seguro pela mão e lhes digo: ‘Não fiquem com medo, pois eu os ajudo.’ ”(Isaías 41:13)";
 frase[2444] = "Não tenha medo, pois eu estou com você. “Do Leste e do Oeste levarei o meu povo de volta para o seu país. (Isaías 43:5)";
 frase[2445] = "Elas seriam como a água que ferve em cima de um fogo forte. Os teus inimigos reconheceriam a tua fama e tremeriam de medo diante de ti. (Isaías 64:2)";
 frase[2446] = "Vou entregá-lo às pessoas que o querem matar, e das quais você tem medo: ao rei Nabucodonosor, da Babilônia, e aos seus soldados. (Jeremias 22:25)";
 frase[2447] = "Eu lhes darei líderes que cuidarão deles. Não ficarão mais com medo, nem apavorados, e nenhum deles se perderá. Eu, o Senhor, estou falando. (Jeremias 23:4)";
 frase[2448] = "Mas nem o rei nem nenhuma das autoridades que ouviram todas aquelas coisas ficaram com medo ou mostraram qualquer sinal de arrependimento. (Jeremias 36:24)";
 frase[2449] = "para fugir dos babilônios. Estavam com medo deles porque Ismael tinha matado Gedalias, aquele que havia sido posto como governador do país pelo rei da Babilônia. (Jeremias 41:18)";
 frase[2450] = "Não tenham mais medo do rei da Babilônia, pois estou com vocês. Eu os salvarei e os livrarei do poder dele. Sou eu, o Senhor, quem está falando. (Jeremias 42:11)";
 frase[2451] = "então vão ter de enfrentar a guerra, de que vocês têm medo. A fome que vocês temem vai segui-los, e vocês morrerão no Egito. (Jeremias 42:16)";
 frase[2452] = "“Mas o que estou vendo?” — pergunta Deus. “Os egípcios estão fugindo de medo. Eles correm apavorados e fogem tão depressa, que nem olham para trás. (Jeremias 46:5)";
 frase[2453] = "As suas cidades e fortalezas serão tomadas. Naquele dia, os soldados de Moabe terão tanto medo como a mulher que está com dores de parto. (Jeremias 48:41)";
 frase[2454] = "Os que fugirem de medo cairão nas covas, e os que conseguirem sair das covas ficarão presos nas armadilhas, pois eu marquei o dia da destruição de Moabe. (Jeremias 48:44)";
 frase[2455] = "Não deixem que plantem, nem que façam colheitas na Babilônia. Todos os estrangeiros que vivem lá ficarão com medo do exército inimigo e voltarão para as suas pátrias. (Jeremias 50:16)";
 frase[2456] = "Farei com que você fique tão forte como uma rocha e tão duro como um diamante. Por isso, não tenha medo, nem se assuste com esses rebeldes. (Ezequiel 3:9)";
 frase[2457] = "O que o Senhor Deus diz é isto: — Tragam uma multidão para pôr medo nelas e roubar o que elas têm. (Ezequiel 23:46)";
 frase[2458] = "— Todos os moradores do litoral estão apavorados com o que lhe aconteceu. Até os reis estão apavorados, e o medo está escrito na cara deles. (Ezequiel 27:35)";
 frase[2459] = "Você se acabou para sempre, e os comerciantes no mundo inteiro estão apavorados, com medo que aconteça com eles o mesmo que aconteceu com você. (Ezequiel 27:36)";
 frase[2460] = "Você está acabado para sempre, e todas as nações que o conheceram estão apavoradas, com medo que aconteça a mesma coisa com elas.”(Ezequiel 28:19)";
 frase[2461] = "— O senhor teve uma visão na qual viu uma estátua enorme, de pé, bem na sua frente. A estátua era brilhante, mas metia medo. (Daniel 2:31)";
 frase[2462] = "Mas chegarão notícias do Leste e do Norte, que o encherão de medo. Furioso, ele sairá com os seus soldados, resolvido a matar muita gente. (Daniel 11:44)";
 frase[2463] = "Toquem as cornetas no monte Sião, deem um grito de alarme no monte de Deus! Trema de medo, povo de Judá, pois está chegando o Dia do Senhor. (Joel 2:1)";
 frase[2464] = "Animais selvagens, não fiquem com medo, pois o capim vai ficar verde, as árvores darão frutas, e haverá muito figo e muita uva. (Joel 2:22)";
 frase[2465] = "Nações poderosas verão isso e, apesar de todo o seu poder, ficarão envergonhadas. Os outros povos ficarão com medo, fecharão a boca e taparão os ouvidos. (Miqueias 7:16)";
 frase[2466] = "O grande Dia do Senhor está perto e vem chegando depressa! Será um dia terrível, em que até os soldados mais valentes gritarão de medo. (Sofonias 1:14)";
 frase[2467] = "Conforme a aliança que fiz com o meu povo quando o tirei do Egito, o meu Espírito sempre está com vocês. Portanto, não fiquem com medo. (Ageu 2:5)";
 frase[2468] = "E agora resolvi abençoar o povo de Jerusalém e de Judá e não vou mudar de ideia. Portanto, não fiquem com medo. (Zacarias 8:15)";
 frase[2469] = "— Portanto, não tenham medo de ninguém. Tudo o que está coberto vai ser descoberto; e tudo o que está escondido será conhecido. (Mateus 10:26)";
 frase[2470] = "Quando os discípulos viram Jesus andando em cima da água, ficaram apavorados e exclamaram: — É um fantasma! E gritaram de medo. (Mateus 14:26)";
 frase[2471] = "Mas, se dissermos que foram pessoas, temos medo do que o povo pode fazer, pois todos acham que João era profeta. (Mateus 21:26)";
 frase[2472] = "Não tenham medo quando ouvirem o barulho de batalhas ou notícias de guerras. Tudo isso vai acontecer, mas ainda não será o fim. (Mateus 24:6)";
 frase[2473] = "E os discípulos, cheios de medo, diziam uns aos outros: — Que homem é este que manda até no vento e nas ondas?! (Marcos 4:41)";
 frase[2474] = "Mas, se dissermos que foram pessoas, ai de nós! Eles estavam com medo do povo, pois todos achavam que, de fato, João era profeta. (Marcos 11:32)";
 frase[2475] = "Os líderes judeus sabiam que a parábola era contra eles e quiseram prender Jesus, mas tinham medo do povo. Por isso deixaram Jesus em paz e foram embora. (Marcos 12:12)";
 frase[2476] = "Não tenham medo quando ouvirem o barulho de batalhas ou notícias de guerras. Tudo isso vai acontecer, mas ainda não será o fim. (Marcos 13:7)";
 frase[2477] = "Então elas saíram e fugiram do túmulo, apavoradas e tremendo. E não contaram nada a ninguém porque estavam com muito medo. (Marcos 16:8)";
 frase[2478] = "Ele fez um juramento ao nosso antepassado Abraão; prometeu que nos livraria dos nossos inimigos e que ia nos deixar servi-lo sem medo,(Lucas 1:73)";
 frase[2479] = "Então um anjo do Senhor apareceu, e a luz gloriosa do Senhor brilhou por cima dos pastores. Eles ficaram com muito medo,(Lucas 2:9)";
 frase[2480] = "Todos ficaram com muito medo e louvavam a Deus, dizendo: — Que grande profeta apareceu entre nós! Deus veio salvar o seu povo! (Lucas 7:16)";
 frase[2481] = "Aí toda a gente da região de Gerasa ficou com muito medo e pediu que Jesus saísse da terra deles. Então Jesus subiu no barco e foi embora. (Lucas 8:37)";
 frase[2482] = "Ele ainda estava falando, quando apareceu uma nuvem e os cobriu. Os discípulos ficaram com medo quando a nuvem desceu sobre eles. (Lucas 9:34)";
 frase[2483] = "Jesus continuou: — Eu afirmo a vocês, meus amigos: não tenham medo daqueles que matam o corpo, mas depois não podem fazer mais nada. (Lucas 12:4)";
 frase[2484] = "Até os fios dos cabelos de vocês estão todos contados. Não tenham medo, pois vocês valem mais do que muitos passarinhos! (Lucas 12:7)";
 frase[2485] = "Tive medo do senhor, porque sei que é um homem duro, que tira dos outros o que não é seu e colhe o que não plantou.”(Lucas 19:21)";
 frase[2486] = "Os chefes dos sacerdotes e os mestres da Lei procuravam um jeito para matar Jesus em segredo porque tinham medo do povo. (Lucas 22:2)";
 frase[2487] = "Os discípulos já tinham remado uns cinco ou seis quilômetros, quando viram Jesus andando em cima da água e chegando perto do barco. E ficaram com muito medo. (João 6:19)";
 frase[2488] = "Os pais disseram isso porque estavam com medo, pois os líderes judeus tinham combinado expulsar da sinagoga quem afirmasse que Jesus era o Messias. (João 9:22)";
 frase[2489] = "Então o chefe da guarda do Templo e os seus homens saíram e trouxeram os apóstolos. Mas não os maltrataram porque tinham medo de serem apedrejados pelo povo. (Atos 5:26)";
 frase[2490] = "“Eu sou o Deus dos seus antepassados, o Deus de Abraão, de Isaque e de Jacó.” Moisés tremia de medo e não tinha coragem de olhar. (Atos 7:32)";
 frase[2491] = "Saulo foi para Jerusalém e tentou juntar-se aos seguidores de Jesus. Porém todos tinham medo dele porque não acreditavam que ele também era seguidor de Jesus. (Atos 9:26)";
 frase[2492] = "Os policiais foram contar às autoridades romanas o que Paulo tinha dito. Quando as autoridades souberam que Paulo e Silas eram cidadãos romanos, ficaram com medo(Atos 16:38)";
 frase[2493] = "Imediatamente os homens que iam chicoteá-lo recuaram. E o próprio comandante ficou com medo ao saber que Paulo era cidadão romano e ele tinha mandado amarrá-lo. (Atos 22:29)";
 frase[2494] = "Mesmo depois de termos chegado à província da Macedônia, não descansamos nada. Em todos os lugares houve problemas, lutas com os de fora e medo no nosso coração. (2Coríntios 7:5)";
 frase[2495] = "Escravos, obedeçam com medo e respeito àqueles que são seus donos aqui na terra. E façam isso com sinceridade, como se estivessem servindo a Cristo. (Efésios 6:5)";
 frase[2496] = "Foi pela fé que Moisés saiu do Egito, sem ter medo da raiva do rei, e continuou firme, como se estivesse vendo o Deus invisível. (Hebreus 11:27)";
 frase[2497] = "Portanto, sejamos corajosos e afirmemos: “O Senhor é quem me ajuda, e eu não tenho medo. Que mal pode alguém me fazer?”(Hebreus 13:6)";
 frase[2498] = "Sara foi assim; ela obedecia a Abraão e o chamava de “meu senhor”. Você será agora sua filha se praticar o bem e não tiver medo de nada. (1Pedro 3:6)";
 frase[2499] = "Como vocês serão felizes se tiverem de sofrer por fazerem o que é certo! Não tenham medo de ninguém, nem fiquem preocupados. (1Pedro 3:14)";
 frase[2500] = "salvem outros, tirando-os do fogo; e para com outros mostrem misericórdia com medo, odiando até as roupas deles, manchadas pelos seus desejos pecaminosos. (Judas 1:23)";
 frase[2501] = "E os comerciantes, que se tornaram ricos negociando naquela cidade, ficarão de longe, com medo de serem castigados junto com ela. Eles vão gritar e lamentar assim:(Apocalipse 18:15)";
 frase[2502] = "Eles responderam: — Fizemos isso porque ficamos sabendo que o Senhor, seu Deus, havia ordenado ao seu servo Moisés que entregasse toda esta terra aos israelitas. E também ordenou a vocês que, conforme fossem avançando, matassem todos os seus moradores. Fizemos isso porque ficamos com muito medo de vocês, medo de sermos mortos. (Josué 9:24)";
 frase[2503] = "“Descendentes do meu servo Jacó, não tenham medo! Povo de Israel, não fique assustado! Eu os libertarei dessa terra distante, da terra onde vocês são prisioneiros. Os descendentes de Jacó voltarão e viverão em paz; viverão em segurança, e ninguém fará com que fiquem com medo. Sou eu, o Senhor, quem está falando. (Jeremias 30:10)";
 frase[2504] = "“Descendentes do meu servo Jacó, não tenham medo! Povo de Israel, não fique assustado! Eu os livrarei dessa terra distante, da terra onde vocês são prisioneiros. Vocês voltarão e viverão em paz; viverão em segurança, e ninguém fará com que fiquem com medo. (Jeremias 46:27)";
 frase[2505] = "— Mas você, homem mortal, não precisa ficar com medo deles, nem do que eles disserem. Eles o desafiarão e desprezarão; viver no meio deles será como viver no meio de escorpiões. Mesmo assim, não tenha medodaqueles rebeldes, nem de qualquer coisa que eles disserem. (Ezequiel 2:6)";
 frase[2506] = "Tenho medo de que, quando chegar aí, eu os encontre diferentes do que eu gostaria que fossem e que vocês me achem diferente do que gostariam que eu fosse. Tenho medo também de encontrar brigas e ciumeiras, ódio e egoísmo, insultos, falatório, orgulho e desordens. (2Coríntios 12:20)";
 frase[2507] = "Não fiquem com medo, pois estou com vocês; não se apavorem, pois eu sou o seu Deus. Eu lhes dou forças e os ajudo; eu os protejo com a minha forte mão. (Isaías 41:10)";
 frase[2508] = "Lembre da minha ordem: “Seja forte e corajoso! Não fique desanimado, nem tenha medo, porque eu, o Senhor, seu Deus, estarei com você em qualquer lugar para onde você for!”(Josué 1:9)";
 frase[2509] = "— Deixo com vocês a paz. É a minha paz que eu lhes dou; não lhes dou a paz como o mundo a dá. Não fiquem aflitos, nem tenham medo. (João 14:27)";
 frase[2510] = "Todos os animais selvagens, todas as aves, todos os animais que se arrastam pelo chão e todos os peixes terão medo e pavor de vocês. Todos eles serão dominados por vocês. (Gênesis 9:2)";
 frase[2511] = "Deus ouviu o choro do menino; e, lá do céu, o Anjo de Deus chamou Agar e disse: — Por que é que você está preocupada, Agar? Não tenha medo, pois Deus ouviu o choro do menino aí onde ele está. (Gênesis 21:17)";
 frase[2512] = "Quando Jacó ouviu isso, teve muito medo e ficou preocupado. Então dividiu em dois grupos a gente que estava com ele e também as ovelhas, as cabras, o gado e os camelos. (Gênesis 32:7)";
 frase[2513] = "Mas Jacó não deixou que Benjamim, o irmão de José por parte de pai e de mãe, fosse com eles; ele tinha medo de que lhe acontecesse alguma desgraça. (Gênesis 42:4)";
 frase[2514] = "Ele disse aos irmãos: — Vejam só! O meu dinheiro está aqui no meu saco de mantimentos! Eles devolveram! Todos ficaram muito assustados e, tremendo de medo, perguntavam uns aos outros: — O que será isso que Deus fez com a gente?(Gênesis 42:28)";
 frase[2515] = "Aconteceu que, quando despejaram os mantimentos, cada um achou na boca do saco um saquinho com o seu dinheiro. Quando eles e o seu pai viram o dinheiro, ficaram com medo. (Gênesis 42:35)";
 frase[2516] = "Deus disse: — Eu sou Deus, o Deus do seu pai. Não tenha medo de ir para o Egito, pois ali eu farei com que os seus descendentes se tornem uma grande nação. (Gênesis 46:3)";
 frase[2517] = "O homem respondeu: — Quem pôs você como nosso chefe ou nosso juiz? Você está querendo me matar como matou o egípcio? Então Moisés ficou com medo e pensou: “Já descobriram o que eu fiz.”(Êxodo 2:14)";
 frase[2518] = "— Eu sou o Deus dos seus antepassados, o Deus de Abraão, o Deus de Isaque e o Deus de Jacó. Aí Moisés cobriu o rosto porque ficou com medo de olhar para Deus. (Êxodo 3:6)";
 frase[2519] = "O medo e o terror caíram sobre eles. Eles viram o teu grande poder e ficaram parados como se fossem pedras até que tivesse passado o teu povo, o povo que livraste da escravidão. (Êxodo 15:16)";
 frase[2520] = "Na manhã do terceiro dia houve trovoadas e relâmpagos, uma nuvem escura apareceu no monte, e ouviu-se um som muito forte de trombeta. E todo o povo que estava no acampamento tremeu de medo. (Êxodo 19:16)";
 frase[2521] = "O povo ouviu os trovões e o som da trombeta e viu os relâmpagos e a fumaça que saía do monte. Então eles tremeram de medo e ficaram de longe. (Êxodo 20:18)";
 frase[2522] = "— Farei com que os povos que são contra vocês tenham medo de mim. Farei com que haja confusão entre os povos contra quem vocês vão lutar e farei com que os inimigos fujam de vocês. (Êxodo 23:27)";
 frase[2523] = "E Deus ordenou que eu lhes dissesse: “Vocês vão passar pelo país de Edom, que é dos seus parentes , os descendentes de Esaú. Eles ficarão com medo de vocês, mas tomem cuidado(Deuteronômio 2:4)";
 frase[2524] = "Eu estava com medo da ira e do furor de Deus; ele estava tão irado, que pensava em destruí-los. Porém mais uma vez Deus atendeu o meu pedido. (Deuteronômio 9:19)";
 frase[2525] = "Pois o Senhor, nosso Deus, está acima de todos os deuses e autoridades. Ele é grande, poderoso e causa medo. Ele trata a todos igualmente e não aceita presentes para torcer a justiça. (Deuteronômio 10:17)";
 frase[2526] = "Fiquem sabendo que, se um profeta falar em nome de Deus, mas se o que disser não acontecer, então o que disse não foi mensagem de Deus. Esse profeta foi atrevido, e vocês não precisam ter medo dele. (Deuteronômio 18:22)";
 frase[2527] = "— E os oficiais dirão também: “Se houver aqui um homem tímido e medroso, então que volte para casa. Se não, pode acontecer que os outros soldados fiquem com medo também.”(Deuteronômio 20:8)";
 frase[2528] = "Aí todos os homens daquela cidade o matarão a pedradas, e assim vocês tirarão o mal do meio do povo. Todos saberão do que aconteceu e ficarão com medo. (Deuteronômio 21:21)";
 frase[2529] = "— Se vocês não cumprirem todas as leis que estão escritas neste livro e se não respeitarem o nome do Senhor, nosso Deus, esse nome que é glorioso e causa medo,(Deuteronômio 28:58)";
 frase[2530] = "Vocês terão tanto medo e verão coisas tão terríveis, que de manhã dirão: “Tomara que já fosse noite!” E ao cair a noite dirão: “Quem dera que já fosse dia!”(Deuteronômio 28:67)";
 frase[2531] = "Quando ouvimos essas coisas, perdemos a coragem e todos nós ficamos com muito medo por causa de vocês. O Deus de vocês, o Senhor, é Deus lá em cima no céu e aqui em baixo na terra. (Josué 2:11)";
 frase[2532] = "Os moradores de Jerusalém ficaram com muito medo, pois a cidade de Gibeão era tão grande como qualquer outra governada por um rei. E era maior ainda do que Ai, e os seus homens eram soldados corajosos. (Josué 10:2)";
 frase[2533] = "O Senhor Deus disse a Josué: — Não fique com medo deles. Amanhã, a esta mesma hora, eu matarei toda essa gente para Israel. Você aleijará os cavalos deles e queimará os seus carros. (Josué 11:6)";
 frase[2534] = "Pelo contrário, fizemos isso porque ficamos com medo de que um dia os descendentes de vocês venham a dizer aos nossos: “Que ligação vocês têm com o Senhor, o Deus de Israel?(Josué 22:24)";
 frase[2535] = "Jael saiu da barraca para encontrar Sísera e lhe disse: — Entre, meu senhor. Entre na minha barraca. Não tenha medo. Então ele entrou, e Jael o cobriu com um tapete. (Juízes 4:18)";
 frase[2536] = "Gideão levou dez dos seus empregados e fez o que o Senhor tinha dito. Porém, como estava com medo da sua família e do povo da cidade, em vez de fazer isso de dia, fez de noite. (Juízes 6:27)";
 frase[2537] = "Anuncie ao povo o seguinte: “Quem estiver com medo, que saia do monte Gilboa e volte para casa.” Gideão anunciou, e vinte e dois mil homens voltaram. Mas dez mil ficaram. (Juízes 7:3)";
 frase[2538] = "E disse a Jéter, o seu filho mais velho: — Levante-se e mate-os. Mas o rapaz não tirou a sua espada. Ele estava com medo, pois ainda era muito novo. (Juízes 8:20)";
 frase[2539] = "Samuel ficou na cama até de manhã. Aí se levantou e abriu os portões da área da Tenda Sagrada. Ele estava com medo de falar com Eli sobre a visão que havia tido. (1Samuel 3:15)";
 frase[2540] = "Mas, depois que a arca chegou ali, o Senhor Deus castigou a cidade e pôs medo nos seus moradores. Apareceram tumores em todas as pessoas da cidade, tanto nas mais importantes como nas mais humildes. (1Samuel 5:9)";
 frase[2541] = "Quando os filisteus souberam que os israelitas haviam se reunido em Mispa, os cinco governadores filisteus saíram com os seus homens para atacá-los. Os israelitas souberam disso e ficaram com medo. (1Samuel 7:7)";
 frase[2542] = "— Não fiquem com medo! — respondeu Samuel. — Embora vocês tenham feito uma coisa tão má, não deixem de adorar o Senhor, nosso Deus, mas sirvam a ele com todo o coração. (1Samuel 12:20)";
 frase[2543] = "Jônatas disse: — Não tenha medo. Saul, o meu pai, não conseguirá causar-lhe nenhum mal. Você será o rei de Israel, e eu ocuparei o segundo lugar no seu governo. E o meu pai sabe muito bem disso. (1Samuel 23:17)";
 frase[2544] = "Quando os reis que eram chefiados por Hadadezer viram que tinham sido vencidos pelos israelitas, fizeram paz com eles, ficando debaixo do seu poder. E os sírios ficaram com medo de ajudar de novo os amonitas. (2Samuel 10:19)";
 frase[2545] = "e deu as seguintes instruções aos seus empregados: — Prestem atenção em Amnom. Quando ele estiver bêbado, eu darei uma ordem, e vocês o matarão. Não tenham medo, pois a responsabilidade será minha. Sejam corajosos e decididos! (2Samuel 13:28)";
 frase[2546] = "Então até os soldados mais corajosos, mesmo aqueles que são ferozes como leões, ficarão com medo. Pois todos em Israel sabem que o seu pai é um grande soldado e que os homens que estão com ele são lutadores valentes. (2Samuel 17:10)";
 frase[2547] = "Contaram ao rei Salomão que Adonias estava com medo dele e que tinha ido pegar nas pontas do altar e tinha dito: — Eu quero que o rei Salomão jure hoje que não mandará me matar à espada. (1Reis 1:51)";
 frase[2548] = "Elias ficou com medo e, para salvar a vida, fugiu com o seu ajudante para a cidade de Berseba, que ficava na região de Judá. Deixou ali o seu ajudante(1Reis 19:3)";
 frase[2549] = "Gedalias disse a eles: — Eu dou a minha palavra que vocês não precisam ter medo dos oficiais babilônios. Fiquem morando nesta terra, trabalhem para o rei da Babilônia, e tudo correrá bem para vocês. (2Reis 25:24)";
 frase[2550] = "Então todos os israelitas, tanto os mais importantes como os mais humildes, junto com os oficiais do exército, saíram e foram para o Egito, pois estavam com medo dos babilônios. (2Reis 25:26)";
 frase[2551] = "Se você obedecer a todas as leis que o Senhor deu a Moisés para o povo de Israel, tudo irá bem para você. Seja forte e corajoso; não desanime, nem tenha medo. (1Crônicas 22:13)";
 frase[2552] = "Depois atacaram e invadiram as cidades que ficavam perto de Gerar, pois todos os moradores estavam com medo de Deus. E os soldados de Asa pegaram todas as riquezas que havia nessas cidades. (2Crônicas 14:14)";
 frase[2553] = "Jaaziel disse: — Povo de Judá, moradores de Jerusalém e rei Josafá, prestem atenção! Escutem isto que o Senhor Deus diz: “Não se assustem, não fiquem com medo deste enorme exército, pois a batalha não é contra vocês, mas contra mim. (2Crônicas 20:15)";
 frase[2554] = "— Sejam fortes e corajosos! Não fiquem assustados, nem tenham medo do rei da Assíria e do seu enorme exército. Pois aquele que está do nosso lado é mais poderoso do que o que está do lado dele. (2Crônicas 32:7)";
 frase[2555] = "Mesmo tendo medo da gente daquela região, eles construíram de novo o altar no lugar em que ele estava antes. Então começaram a oferecer sacrifícios sobre ele todas as manhãs e todas as tardes. (Esdras 3:3)";
 frase[2556] = "“Ó meu Deus, lembra do que Tobias e Sambalate fizeram e castiga-os. Lembra também da profetisa Noadias e dos outros profetas que tentaram me fazer ficar com medo.”(Neemias 6:14)";
 frase[2557] = "Na minha frente, falavam das boas coisas que Tobias havia feito e contavam a ele tudo o que eu dizia. E Tobias continuou a me mandar cartas para ver se conseguia me fazer ficar com medo. (Neemias 6:19)";
 frase[2558] = "Em todas as cidades do reino onde havia judeus, eles se reuniram para atacar os que queriam matá-los. Ninguém podia resistir aos seus ataques, pois todos estavam com medo deles. (Ester 9:2)";
 frase[2559] = "Todos os oficiais das províncias, isto é, os chefes dos vários povos, os representantes do rei e os governadores das províncias, ajudaram os judeus, pois tinham medo de Mordecai. (Ester 9:3)";
 frase[2560] = "Mas eles vão tremer de medo como nunca tremeram antes, pois Deus espalha os ossos dos inimigos dele. Deus os rejeitou, e por isso o povo de Israel os derrotará completamente. (Salmos 53:5)";
 frase[2561] = "Digam isto a Deus: “Como são espantosas as coisas que fazes! O teu poder é tão grande, que os teus inimigos ficam com medo e se curvam diante de ti. (Salmos 66:3)";
 frase[2562] = "Quando o rei Acaz soube que os sírios haviam feito um acordo com os israelitas, ele e todo o seu povo ficaram com tanto medo, que tremiam como varas verdes. (Isaías 7:2)";
 frase[2563] = "Reúnam-se, povos, mas fiquem com medo! Escutem, todos os países distantes! Preparem-se para a guerra, mas vocês serão derrotados! Sim, preparem-se para a guerra, mas vocês serão derrotados! (Isaías 8:9)";
 frase[2564] = "Portanto, o Senhor, o Deus Todo-Poderoso, diz ao seu povo, que mora em Sião: — Meu povo, não fique com medo dos assírios quando eles castigarem e maltratarem vocês como os egípcios fizeram. (Isaías 10:24)";
 frase[2565] = "Atravessaram a passagem entre as montanhas e à noite estão acampando em Geba. Os moradores de Ramá estão tremendo de medo, e os de Gibeá, a cidade do rei Saul, já fugiram. (Isaías 10:29)";
 frase[2566] = "Os moradores de Hesbom e de Eleal gritam de dor, e os seus gritos são ouvidos em Jasa. Os soldados de Moabe perdem a coragem e ficam tremendo de medo. (Isaías 15:4)";
 frase[2567] = "Ao pôr do sol, metem medo, mas de manhã já não existem mais. É isso o que vai acontecer com os nossos inimigos, que arrasam a nossa terra e levam embora todos os nossos bens. (Isaías 17:14)";
 frase[2568] = "Esta é a mensagem contra o Egito: O Senhor, montado numa nuvem, vai indo depressa para o Egito. Os ídolos daquele país tremerão diante dele, e todos os egípcios ficarão com medo. (Isaías 19:1)";
 frase[2569] = "Eles terão medo da terra de Judá; e, todas as vezes que ouvirem falar dessa terra, eles ficarão apavorados pensando naquilo que o Senhor Todo-Poderoso já planejou fazer contra eles. (Isaías 19:17)";
 frase[2570] = "A lua terá vergonha de brilhar, e o sol ficará pálido de medo porque o Senhor Todo-Poderoso reinará no monte Sião, em Jerusalém. E, na presença dos líderes do seu povo, ele mostrará a sua glória. (Isaías 24:23)";
 frase[2571] = "Por isso, o Senhor Deus diz: “Estou colocando em Sião uma pedra, uma pedra preciosa que eu escolhi, para ser a pedra principal do alicerce. Nela está escrito isto: ‘Quem tem fé não tem medo.’(Isaías 28:16)";
 frase[2572] = "O rei fugirá apavorado, e os oficiais, cheios de medo, abandonarão as suas bandeiras.” Assim fala o Senhor, que em Jerusalém tem o seu altar, onde sacrifícios são queimados. (Isaías 31:9)";
 frase[2573] = "Vocês pensarão no medo que sentiram no passado e perguntarão: “Onde estão aqueles que nos forçavam a pagar tributos, aqueles que cobravam os impostos? Onde estão os que controlavam as nossas fortalezas?”(Isaías 33:18)";
 frase[2574] = "O Senhor diz ao seu povo: “Você é pequeno e fraquinho, mas não tenha medo, pois eu, o Santo Deus de Israel, sou o seu Salvador e o protegerei. (Isaías 41:14)";
 frase[2575] = "Anunciem as coisas que vão acontecer daqui em diante a fim de provar que vocês são deuses de fato. Façam o que quiserem, seja bom ou seja mau, para que fiquemos com medo e cheios de pavor. (Isaías 41:23)";
 frase[2576] = "Mas agora, povo de Israel, o Senhor Deus, que o criou, diz: “Não tenha medo, pois eu o salvarei; eu o chamei pelo seu nome, e você é meu. (Isaías 43:1)";
 frase[2577] = "Eu, o Senhor, sou o seu Criador e o tenho ajudado desde o dia em que você nasceu. Israel, meu servo, não fique com medo, pois eu o amo e o escolhi para ser meu. (Isaías 44:2)";
 frase[2578] = "“Escutem, vocês que sabem o que é direito, que têm a minha lei no seu coração! Não fiquem com medoquando forem ofendidos, não se aborreçam quando os outros zombarem de vocês. (Isaías 51:7)";
 frase[2579] = "O Senhor diz ao seu povo: “Eu, eu mesmo, lhes dou forças. Então, por que vocês têm medo de pessoas, de seres mortais que não duram mais do que a palha?(Isaías 51:12)";
 frase[2580] = "Não tenha medo, pois você não ficará envergonhada; não se assuste, pois você não será humilhada. Você esquecerá como foi humilhada quando era jovem , não lembrará mais da desgraça da sua viuvez . (Isaías 54:4)";
 frase[2581] = "“Vocês têm tanto medo desses deuses! Mas quem são eles para que vocês me contem mentiras e me esqueçam completamente? Será que é porque eu fiquei calado tanto tempo, que vocês não me temem?(Isaías 57:11)";
 frase[2582] = "Judá também sabe que eu me divorciei de Israel e que a mandei embora porque ela me abandonou e virou prostituta. Mas Judá, a sua irmã infiel, não ficou com medo. Ela também virou prostituta(Jeremias 3:8)";
 frase[2583] = "Esses ídolos não podem falar: são como um espantalho numa plantação de pepinos. Eles têm de ser carregados porque não podem andar. Não tenham medo deles: não podem fazer mal, nem podem fazer bem.”(Jeremias 10:5)";
 frase[2584] = "Manda que uma quadrilha ataque de surpresa as suas casas e que eles gritem de medo. Pois cavaram um buraco para eu cair nele e armaram armadilhas para me pegar. (Jeremias 18:22)";
 frase[2585] = "Quando o rei Jeoaquim, e os seus soldados, e os seus oficiais souberam do que Urias tinha dito, o rei mandou que o matassem. Mas Urias, sabendo disso, ficou com medo e fugiu para o Egito. (Jeremias 26:21)";
 frase[2586] = "O rei Zedequias respondeu: — Mas eu tenho medo dos judeus que passaram para o lado dos babilônios. Pode acontecer que os babilônios me entreguem a esses judeus, e eles me torturem. (Jeremias 38:19)";
 frase[2587] = "E Gedalias lhes disse: — Eu dou a minha palavra que vocês não precisam ter medo de serem dominados pelos babilônios. Fiquem morando nesta terra, trabalhem para o rei da Babilônia, e tudo correrá bem para vocês. (Jeremias 40:9)";
 frase[2588] = "O Senhor Deus disse o seguinte a respeito de Damasco: — Os moradores das cidades de Hamate e Arpade estão preocupados e assustados porque ouviram más notícias. O medo rola em cima deles como o mar, e eles não têm descanso. (Jeremias 49:23)";
 frase[2589] = "Peguem as suas barracas, os seus rebanhos, as cortinas das suas barracas e tudo o que encontrarem nelas. Tomem os seus camelos e digam: “Em toda parte, o povo está com medo!”(Jeremias 49:29)";
 frase[2590] = "Não percam a coragem, nem fiquem com medo das notícias que ouvirem. Cada ano, se espalha uma notícia diferente; são notícias de violência na terra e de um rei lutando contra outro. (Jeremias 51:46)";
 frase[2591] = "O rei chorará, o príncipe perderá as esperanças, e o povo tremerá de medo. Eu castigarei vocês por tudo o que fizeram e os julgarei do modo como vocês julgaram os outros. Isso mostrará que eu sou o Senhor. (Ezequiel 7:27)";
 frase[2592] = "Deixei que se tornassem impuros, trazendo as suas próprias ofertas; deixei que matassem os seus filhos mais velhos, oferecendo-os em sacrifício. Isso aconteceu para que ficassem cheios de medo e para mostrar que eu sou o Senhor. (Ezequiel 20:26)";
 frase[2593] = "Eles cantarão para você este cântico fúnebre: “A cidade famosa está destruída! Os seus navios foram varridos dos mares. O povo desta cidade dominava os mares e metia medo em todos os que viviam no litoral. (Ezequiel 26:17)";
 frase[2594] = "— Quando aquele dia chegar, e o Egito for destruído, mandarei mensageiros em navios para porem medo no povo descuidado da Etiópia, e esse povo ficará apavorado. E aquele dia está chegando! (Ezequiel 30:9)";
 frase[2595] = "e espantadas com o que eu vou fazer com você. Quando eu agitar a minha espada, os seus reis ficarão apavorados. No dia em que você cair, todos eles tremerão de medo de perder a vida.”(Ezequiel 32:10)";
 frase[2596] = "Os pagãos não roubarão o que eles têm, e os animais ferozes não vão matá-los, nem comê-los. Eles viverão em segurança, e ninguém mais fará com que fiquem com medo. (Ezequiel 34:28)";
 frase[2597] = "Todos os peixes e aves, todos os animais grandes e pequenos e todos os seres humanos do mundo inteiro tremerão de medo de mim. As montanhas serão arrasadas, as grandes pedras ficarão em pedaços, e todas as muralhas cairão. (Ezequiel 38:20)";
 frase[2598] = "Farei cair sobre Gogue todo tipo de desgraças, que o encherão de medo. Sou eu, o Senhor Deus, quem está falando. Os soldados de Gogue ferirão uns aos outros com as suas espadas. (Ezequiel 38:21)";
 frase[2599] = "O poder que Deus lhe deu era tão grande, que todos os povos do mundo tremiam de medo na presença dele. Se ele queria, matava uma pessoa; ou, se queria, deixava que vivesse. Elevava uns e rebaixava outros. (Daniel 5:19)";
 frase[2600] = "Aí ele disse: — Não fique com medo, Daniel, pois Deus ouviu a sua oração desde a primeira vez que você se humilhou na presença dele a fim de ganhar sabedoria. Eu vim em resposta à sua oração. (Daniel 10:12)";
 frase[2601] = "Ele disse: — Deus o ama. Portanto, não fique com medo. Que a paz de Deus esteja com você. Anime-se! Tenha coragem! Então eu me senti bem mais forte e respondi: — Fale, pois o senhor me deu novas forças. (Daniel 10:19)";
 frase[2602] = "O povo que mora em Samaria ficará com medo e chorará quando o bezerro de ouro de Bete-Avém for levado embora. Os sacerdotes pagãos ficarão desesperados ao perderem esse ídolo que era a sua glória,(Oseias 10:5)";
 frase[2603] = "Antigamente, quando a gente da tribo de Efraim falava, as outras tribos ficavam com medo, pois todos respeitavam os efraimitas. Mas eles começaram a adorar o deus Baal e por isso vão morrer. (Oseias 13:1)";
 frase[2604] = "Quando tocam a corneta de alarme, será que o povo não fica com medo? Por acaso, cai alguma desgraça sobre uma cidade, sem que o Senhor Deus a tenha feito acontecer?(Amós 3:6)";
 frase[2605] = "Eles se arrastarão no pó como cobras, como animais que se arrastam pelo chão. Tremendo de medo, eles sairão das suas fortalezas e, cheios de temor, voltarão para o Senhor, nosso Deus. (Miqueias 7:17)";
 frase[2606] = "De repente, vocês, os babilônios, serão os devedores; aí os seus credores os forçarão a pagar as dívidas e com juros. Eles vão atacá-los, e vocês ficarão com medo; eles levarão embora tudo o que é de vocês. (Habacuque 2:7)";
 frase[2607] = "Ele para, e a terra treme; ele olha para as nações, e elas ficam com medo. Os montes antigos se abalam, caem as velhas montanhas por onde ele tem andado desde a eternidade. (Habacuque 3:6)";
 frase[2608] = "Quando ouvi tudo isso, fiquei assustado, e os meus lábios tremeram de medo. Perdi todas as forças e não pude ficar de pé. Portanto, vou esperar, tranquilo, o dia em que Deus castigará aqueles que nos atacam. (Habacuque 3:16)";
 frase[2609] = "Os que sobrarem do povo de Israel nunca mais farão maldades, não mentirão, nem procurarão enganar ninguém. Terão comida à vontade, estarão seguros e não ficarão com medo de ninguém. (Sofonias 3:13)";
 frase[2610] = "O Senhor Deus anulou a sentença que havia contra vocês e afastou todos os inimigos do seu povo. O Senhor, o Rei de Israel, está com vocês, e vocês não precisam mais ter medo da desgraça. (Sofonias 3:15)";
 frase[2611] = "Quando os moradores da cidade de Asquelom souberem disso, ficarão com medo. O povo de Gaza também vai sofrer muito, e o povo de Ecrom perderá toda a esperança. O rei de Gaza morrerá, e Asquelom ficará sem moradores. (Zacarias 9:5)";
 frase[2612] = "Enquanto José estava pensando nisso, um anjo do Senhor apareceu a ele num sonho e disse: — José, descendente de Davi, não tenha medo de receber Maria como sua esposa, pois ela está grávida pelo Espírito Santo. (Mateus 1:20)";
 frase[2613] = "Mas, quando ficou sabendo que Arquelau, filho do rei Herodes, estava governando a Judeia no lugar do seu pai, teve medo de ir morar lá. Depois de receber num sonho mais instruções, José foi para a região da Galileia(Mateus 2:22)";
 frase[2614] = "O oficial do exército romano e os seus soldados, que estavam guardando Jesus, viram o terremoto e tudo o que aconteceu. Então ficaram com muito medo e disseram: — De fato, este homem era o Filho de Deus! (Mateus 27:54)";
 frase[2615] = "porque Herodes tinha medo dele, pois sabia que ele era um homem bom e dedicado a Deus. Por isso Herodes protegia João. E, quando o ouvia falar, ficava sem saber o que fazer, mas mesmo assim gostava de escutá-lo. (Marcos 6:20)";
 frase[2616] = "Os chefes dos sacerdotes e os mestres da Lei ouviram isso e começaram a procurar um jeito de matar Jesus. Mas tinham medo dele porque o povo admirava os seus ensinamentos. (Marcos 11:18)";
 frase[2617] = "Mas o anjo lhe disse: — Não tenha medo, Zacarias, pois Deus ouviu a sua oração! A sua esposa vai ter um filho, e você porá nele o nome de João. (Lucas 1:13)";
 frase[2618] = "mas o anjo disse: — Não tenham medo! Estou aqui a fim de trazer uma boa notícia para vocês, e ela será motivo de grande alegria também para todo o povo! (Lucas 2:10)";
 frase[2619] = "Tiago e João, filhos de Zebedeu, que eram companheiros de Simão, também ficaram muito admirados. Então Jesus disse a Simão: — Não tenha medo! De agora em diante você vai pescar gente. (Lucas 5:10)";
 frase[2620] = "Então ele disse aos discípulos: — Por acaso vocês não têm fé? Mas eles estavam admirados e com medo e diziam uns aos outros: — Que homem é este? Ele manda até no vento e nas ondas, e eles obedecem! (Lucas 8:25)";
 frase[2621] = "Mas eles não entenderam isso, pois o que essas palavras queriam dizer tinha sido escondido deles para que não as entendessem. E eles estavam com medo de fazer perguntas a Jesus sobre o assunto. (Lucas 9:45)";
 frase[2622] = "Os mestres da Lei e os chefes dos sacerdotes sabiam que era contra eles que Jesus havia contado essa parábola e queriam prendê-lo ali mesmo, porém tinham medo do povo. (Lucas 20:19)";
 frase[2623] = "Não tenham medo quando ouvirem falar de guerras e de revoluções. Pois é preciso que essas coisas aconteçam primeiro. Mas isso não quer dizer que o fim esteja perto. (Lucas 21:9)";
 frase[2624] = "E Jesus continuou: — Haverá sinais no sol, na lua e nas estrelas. E, na terra, todas as nações ficarão desesperadas, com medo do terrível barulho do mar e das ondas. (Lucas 21:25)";
 frase[2625] = "E elas ficaram com medo, e se ajoelharam, e encostaram o rosto no chão. Então os homens disseram a elas: — Por que é que vocês estão procurando entre os mortos quem está vivo?(Lucas 24:5)";
 frase[2626] = "Naquele mesmo domingo, à tarde, os discípulos de Jesus estavam reunidos de portas trancadas, com medodos líderes judeus. Então Jesus chegou, ficou no meio deles e disse: — Que a paz esteja com vocês! (João 20:19)";
 frase[2627] = "Ele ficou olhando para o anjo e, com muito medo, perguntou: — O que é, senhor? O anjo respondeu: — Deus aceitou as suas orações e a ajuda que você tem dado aos pobres e ele não esqueceu você. (Atos 10:4)";
 frase[2628] = "E todos os que moravam em Éfeso, judeus e não judeus, souberam disso. Eles ficaram com muito medo, e o nome do Senhor Jesus se tornou mais respeitado ainda. (Atos 19:17)";
 frase[2629] = "A briga chegou a tal ponto, que o comandante ficou com medo de que Paulo fosse despedaçado por eles. Por isso mandou os guardas descerem para tirar Paulo do meio deles e o levar de volta para a fortaleza. (Atos 23:10)";
 frase[2630] = "Mas, quando Paulo começou a falar sobre uma vida correta, o domínio próprio e o Dia do Juízo Final, Félix ficou com medo e disse: — Agora pode ir. Quando eu puder, chamarei você de novo. (Atos 24:25)";
 frase[2631] = "e disse: “Paulo, não tenha medo! Você precisa ir até a presença do Imperador. E Deus, na sua bondade, já lhe deu a vida de todos os que estão viajando com você.”(Atos 27:24)";
 frase[2632] = "Eles ficaram com muito medo de que o navio fosse bater contra as rochas. Por isso jogaram quatro âncoras da parte de trás do navio e oraram para que amanhecesse logo. (Atos 27:29)";
 frase[2633] = "Isso é verdade. Mas lembrem que eles foram quebrados porque não creram; no entanto vocês continuam na oliveira porque creem. E não tenham orgulho disso; pelo contrário, tenham medo. (Romanos 11:20)";
 frase[2634] = "Pois, assim como Eva foi enganada pelas mentiras da cobra, eu tenho medo de que a mente de vocês seja corrompida e vocês abandonem a devoção sincera e pura a Cristo. (2Coríntios 11:3)";
 frase[2635] = "Não tenham medo dos seus inimigos. Sejam sempre corajosos, pois isso será uma prova para eles de que serão derrotados e de que vocês serão vencedores. Porque é Deus quem dá a vitória a vocês. (Filipenses 1:28)";
 frase[2636] = "Foi pela fé que os pais de Moisés, quando ele nasceu, o esconderam durante três meses. Eles viram que o menino era bonito e não tiveram medo de desobedecer à ordem do rei. (Hebreus 11:23)";
 frase[2637] = "Quando eu o vi, caí aos seus pés, como morto. Porém ele pôs a mão direita sobre mim e disse: — Não tenha medo. Eu sou o Primeiro e o Último. (Apocalipse 1:17)";
 frase[2638] = "Mas depois desses três dias e meio um sopro de vida veio de Deus e entrou neles, e eles se levantaram. E todas as pessoas que os viram ficaram com um medo terrível. (Apocalipse 11:11)";
 frase[2639] = "Naquele momento houve um violento terremoto. A décima parte da cidade foi destruída, e morreram sete mil pessoas. As outras ficaram com muito medo e louvaram a grandeza do Deus do céu. (Apocalipse 11:13)";
 frase[2640] = "Quem não terá medo de ti, Senhor? Quem não vai querer anunciar a tua glória? Pois só tu és santo. Todas as nações virão e te adorarão porque as tuas obras justas são vistas por todos.”(Apocalipse 15:4)";
 frase[2641] = "Eles ficam de longe porque têm medo de tomar parte no castigo que ela vai sofrer e dizem: — Ai de você! Ai de você, Babilônia, grande e poderosa cidade! Em apenas uma hora você já foi castigada! (Apocalipse 18:10)";
 frase[2642] = "Quando os homens do lugar lhe fizeram perguntas sobre a sua mulher, ele disse que ela era sua irmã. Rebeca era muito bonita, e Isaque tinha medo de dizer que ela era a sua mulher, pois pensava que os homens do lugar o matariam para ficarem com ela. (Gênesis 26:7)";
 frase[2643] = "Naquela noite o Senhor apareceu a ele e disse: — Eu sou o Deus de Abraão, o seu pai. Não tenha medo, pois eu estou com você. Por causa do meu servo Abraão, eu abençoarei você e farei com que os seus descendentes sejam muitos. (Gênesis 26:24)";
 frase[2644] = "Então Judá disse a Tamar, a sua nora: — Volte para a casa do seu pai e continue viúva até que o meu filho Selá fique adulto. Ele disse isso porque tinha medo que Selá fosse morto, como havia acontecido com os seus irmãos. Assim, Tamar foi morar na casa do pai dela. (Gênesis 38:11)";
 frase[2645] = "Quando chegaram lá, eles ficaram com medo e disseram uns aos outros: — Trouxeram a gente para cá por causa do dinheiro que da outra vez foi colocado de volta nos sacos de mantimentos. Com certeza eles vão nos atacar, vão tomar de nós os nossos jumentos e obrigar a gente a trabalhar como escravos. (Gênesis 43:18)";
 frase[2646] = "Aí o administrador respondeu: — Fiquem tranquilos, não tenham medo. O Deus de vocês e do seu pai deve ter posto o dinheiro nos sacos de mantimentos para vocês, pois eu recebi o dinheiro que pagaram. O administrador trouxe Simeão ao lugar onde eles estavam. (Gênesis 43:23)";
 frase[2647] = "— Quanto aos que continuarem vivos em terras estrangeiras, eu farei com que eles fiquem com tanto medo, que até mesmo o som de folhas caindo no chão os fará fugir; fugirão como se viessem inimigos atrás deles e cairão sem que ninguém os persiga. (Levítico 26:36)";
 frase[2648] = "O Senhor Deus disse a Moisés: — Não tenha medo dele, pois vou entregar nas suas mãos o rei, o seu povo e a sua terra. E você deverá fazer com ele o mesmo que fez com Seom, o rei dos amorreus, que morava em Hesbom. (Números 21:34)";
 frase[2649] = "Sejam honestos e justos nas suas decisões. Tratem todos de modo igual, tanto os humildes como os poderosos. Não tenham medo de ninguém, pois a sentença que vocês derem virá de Deus. Se algum caso for muito difícil para vocês, tragam para mim, que eu o julgarei.”(Deuteronômio 1:17)";
 frase[2650] = "Que terra é essa que temos de conquistar? Nós ficamos com medo quando os nossos espiões disseram que o povo dessa terra é mais numeroso e mais forte do que nós, e que as suas cidades são enormes e protegidas por muralhas que chegam até o céu! E disseram também que viram gigantes lá!”(Deuteronômio 1:28)";
 frase[2651] = "Mas o Senhor Deus me disse: “Não tenha medo, pois eu farei com que você derrote Ogue e o seu exército, e você vai tomar posse da terra dele. Você será vitorioso, como foi contra Seom, o rei dos amorreus, que morava em Hesbom.”(Deuteronômio 3:2)";
 frase[2652] = "Lembrem das pragas, dos milagres e das coisas espantosas que vocês viram e não esqueçam o grande poder com que o Senhor os tirou do Egito. Pois o Senhor, nosso Deus, fará com esses povos, de quem vocês estão com medo, a mesma coisa que fez com os egípcios. (Deuteronômio 7:19)";
 frase[2653] = "Moisés disse ao povo: — Quando vocês saírem para combater os inimigos e virem que eles têm mais soldados do que vocês e que têm muitos cavalos e carros de guerra, não fiquem com medo deles. Pois o Senhor, nosso Deus, que os livrou do Egito, está com vocês. (Deuteronômio 20:1)";
 frase[2654] = "Todos os reis amorreus do lado oeste do rio Jordão e todos os reis cananeus que viviam no litoral do mar Mediterrâneo ficaram sabendo que o Senhor havia secado o Jordão para o povo de Israel passar. E, como o povo de Israel estava chegando, eles ficaram com medo e perderam toda a coragem. (Josué 5:1)";
 frase[2655] = "O Senhor Deus disse a Josué: — Não tenha medo! Seja corajoso! Marche com todos os seus soldados contra a cidade de Ai. Eu farei com que derrotem o rei de lá. O povo de Ai, a sua cidade e as suas terras serão de vocês. (Josué 8:1)";
 frase[2656] = "— Não fique com medo! — disse Davi. — Eu serei bondoso com você por causa de Jônatas, o seu pai. Eu lhe darei de volta todas as terras que pertenciam ao seu avô Saul, e você será sempre bem-vindo à minha mesa. (2Samuel 9:7)";
 frase[2657] = "Uma semana depois, a criança morreu, e os funcionários ficaram com medo de dar a notícia a Davi. Eles disseram: — Enquanto a criança estava viva, Davi não respondia quando falávamos com ele. Como vamos dizer a ele que a criança morreu? Ele poderá fazer alguma loucura! (2Samuel 12:18)";
 frase[2658] = "Contaram ao rei Salomão que Joabe havia fugido para a Tenda e estava ao lado do altar. Aí ele mandou um mensageiro perguntar a Joabe por que havia fugido para o altar. Joabe respondeu que havia fugido para o Senhor Deus porque estava com medo de Salomão. Então Salomão mandou que Benaías fosse matar Joabe. (1Reis 2:29)";
 frase[2659] = "Estou sempre humilhado e coberto de vergonha,(Salmos 44:15)";
 frase[2660] = "Passará vergonha, levará uma surra e ficará desmoralizado para sempre. (Provérbios 6:33)";
 frase[2661] = "Os que fazem imagens serão humilhados, todos eles passarão vergonha. (Isaías 45:16)";
 frase[2662] = "Pense bem e tome juízo, povo sem-vergonha,(Sofonias 2:1)";
 frase[2663] = "Mas eles só sentirão vergonha, pois os egípcios não os ajudarão em nada; pelo contrário, serão motivo de vergonha e humilhação.”(Isaías 30:5)";
 frase[2664] = "Tanto o homem como a sua mulher estavam nus, mas não sentiam vergonha. (Gênesis 2:25)";
 frase[2665] = "Não tenha relações com a sua neta; isso seria uma vergonha para você. (Levítico 18:10)";
 frase[2666] = "Não tenha relações com a sua cunhada; isso seria uma vergonha para o seu irmão. (Levítico 18:16)";
 frase[2667] = "Protege-me e salva-me; livra-me da vergonha da derrota, pois em ti encontro segurança. (Salmos 25:20)";
 frase[2668] = "Se eu der atenção a todos os teus mandamentos, não passarei vergonha. (Salmos 119:6)";
 frase[2669] = "Ó Senhor Deus, tenho seguido os teus ensinamentos; não me deixes passar pela vergonha do fracasso. (Salmos 119:31)";
 frase[2670] = "Que eu obedeça completamente aos teus mandamentos e não sofra a vergonha do fracasso! (Salmos 119:80)";
 frase[2671] = "Os sábios ganharão prestígio, mas os que não têm juízo passarão cada vez mais vergonha. (Provérbios 3:35)";
 frase[2672] = "Ela era espalhafatosa e sem-vergonha e estava sempre andando pelas ruas. (Provérbios 7:11)";
 frase[2673] = "A falta de juízo é como uma mulher espalhafatosa, tola e sem-vergonha. (Provérbios 9:13)";
 frase[2674] = "Quem tem juízo colhe no tempo certo, mas quem dorme na época da colheita passa vergonha. (Provérbios 10:5)";
 frase[2675] = "Os maus são desprezados, e quem suja o seu próprio nome passa vergonha. (Provérbios 18:3)";
 frase[2676] = "Quem responde antes de ouvir mostra que é tolo e passa vergonha. (Provérbios 18:13)";
 frase[2677] = "Porque assim você o fará queimar de remorso e vergonha, e o Senhor Deus recompensará você. (Provérbios 25:22)";
 frase[2678] = "Corrija os seus filhos, e eles serão para você motivo de orgulho e não de vergonha. (Provérbios 29:17)";
 frase[2679] = "Deus mesmo arrancará as roupas de vocês e os fará passar vergonha. (Jeremias 13:26)";
 frase[2680] = "Farei cair sobre eles vergonha eterna e desgraça eterna, que nunca serão esquecidas. (Jeremias 23:40)";
 frase[2681] = "O Senhor Deus diz o seguinte: — Você fez tudo isso como uma prostituta sem-vergonha. (Ezequiel 16:30)";
 frase[2682] = "Um vento os carregará para longe, e ficarão com vergonha da sua idolatria. (Oseias 4:19)";
 frase[2683] = "Ó Senhor Deus, eu estou te chamando. Livra-me da vergonha de ser derrotado. Que os maus sofram essa vergonha e que desçam em silêncio para o mundo dos mortos! (Salmos 31:17)";
 frase[2684] = "Portanto, se nesta época de incredulidade e maldade alguém tiver vergonha de mim e dos meus ensinamentos, então o Filho do Homem, quando vier na glória do seu Pai com os santos anjos, também terá vergonha dessa pessoa. (Marcos 8:38)";
 frase[2685] = "Pois, se alguém tiver vergonha de mim e do meu ensinamento, então o Filho do Homem também terá vergonha dessa pessoa, quando ele vier na sua glória e na glória do Pai e dos santos anjos. (Lucas 9:26)";
 frase[2686] = "Porém, se alguns irmãos da Macedônia forem comigo e não os encontrarem preparados, isso vai ser uma vergonha para nós, que tivemos tanta confiança em vocês. E sem falar na vergonha que vocês mesmos vão sentir. (2Coríntios 9:4)";
 frase[2687] = "— Nenhum homem terá relações com nenhuma das mulheres do seu pai, pois isso seria uma vergonha para o pai. (Deuteronômio 22:30)";
 frase[2688] = "Pois é por causa do meu amor por ti que tenho suportado insultos e tenho passado vergonha. (Salmos 69:7)";
 frase[2689] = "Ó Senhor Deus, tu és a minha segurança; nunca deixes que eu sofra a vergonha da derrota. (Salmos 71:1)";
 frase[2690] = "Quem maltrata o seu pai ou toca a sua mãe de casa não tem vergonha e não presta. (Provérbios 19:26)";
 frase[2691] = "Do contrário todos ficarão sabendo que você não consegue guardar segredos, e você nunca mais se livrará desta vergonha. (Provérbios 25:10)";
 frase[2692] = "Ninguém dirá que um sem-vergonha é uma pessoa de valor, nem que o malandro merece respeito. (Isaías 32:5)";
 frase[2693] = "— Apesar de ter visto isso, Oolibá se tornou uma prostituta ainda mais sem-vergonha e imoral do que a irmã. (Ezequiel 23:11)";
 frase[2694] = "Que vergonha! Será que entre vocês não existe alguém com bastante sabedoria para resolver uma questão entre irmãos?(1Coríntios 6:5)";
 frase[2695] = "Eles disseram assim: — Não podemos deixar que a nossa irmã case com um homem que não tenha sido circuncidado, pois isso seria uma vergonha para nós. (Gênesis 34:14)";
 frase[2696] = "Não tenha relações com a sua mãe; isso seria uma vergonha para o seu pai e também para a sua mãe. (Levítico 18:7)";
 frase[2697] = "— “Maldito seja aquele que tiver relações com uma das mulheres do pai, pois isso é uma vergonha para o pai!” E o povo responderá: “Amém!”(Deuteronômio 27:20)";
 frase[2698] = "Meu Deus, eu confio em ti. Salva-me da vergonha da derrota; não deixes que os meus inimigos se alegrem com a minha desgraça. (Salmos 25:2)";
 frase[2699] = "Os que confiam em ti não sofrerão a vergonha da derrota, mas serão derrotados os que sem motivo se revoltam contra ti. (Salmos 25:3)";
 frase[2700] = "Ó Senhor Deus, em ti eu busco proteção; livra-me da vergonha de ser derrotado. Tu és justo; eu te peço que me ajudes. (Salmos 31:1)";
 frase[2701] = "Tu vês todos os meus inimigos; tu sabes como eles me insultam e conheces a vergonha e as humilhações que tenho sofrido. (Salmos 69:19)";
 frase[2702] = "Os que adoram imagens ficam envergonhados; passam vergonha os que se gabam dos seus ídolos. Diante de Deus, o Senhor, todos os deuses se curvam. (Salmos 97:7)";
 frase[2703] = "Farei com que os seus inimigos fiquem cobertos de vergonha, mas ele usará uma coroa que vai brilhar cada vez mais.”(Salmos 132:18)";
 frase[2704] = "A mulher bondosa é estimada, mas a imoral é uma vergonha. O preguiçoso nunca terá dinheiro, mas quem tem iniciativa acaba ficando rico. (Provérbios 11:16)";
 frase[2705] = "A boa esposa é o orgulho do marido, mas a esposa que traz vergonha ao marido é como câncer nos ossos dele. (Provérbios 12:4)";
 frase[2706] = "O moço que obedece à lei de Deus é inteligente, porém o que anda em más companhias é uma vergonhapara o seu pai. (Provérbios 28:7)";
 frase[2707] = "É bom corrigir e disciplinar a criança. Quando todas as suas vontades são feitas, ela acaba fazendo a sua mãe passar vergonha. (Provérbios 29:15)";
 frase[2708] = "Vocês vão ficar com vergonha das árvores sagradas de que vocês tanto gostavam; vão ficar desiludidos com os jardins sagrados que lhes davam tanto prazer. (Isaías 1:29)";
 frase[2709] = "Mas o povo de Israel foi salvo pelo Senhor; ele os salvou para sempre, e eles nunca serão humilhados, nem passarão vergonha. (Isaías 45:17)";
 frase[2710] = "É por isso que não tem chovido, e as chuvas da primavera deixaram de cair. Mas você tem até jeito de prostituta e mostrou que não tem vergonha. (Jeremias 3:3)";
 frase[2711] = "Mas será que é a mim que eles estão ferindo? Eu afirmo que não! Eles estão ferindo a si mesmos e vão passar vergonha. (Jeremias 7:19)";
 frase[2712] = "As nações ouviram falar da vergonha da sua derrota; a terra inteira escutou os seus gritos. Um soldado tropeçou no outro, e os dois caíram no chão. (Jeremias 46:12)";
 frase[2713] = "Em sinal de tristeza, eles vestirão roupa feita de pano grosseiro e tremerão como varas verdes. As cabeças deles serão rapadas, e todos passarão vergonha. (Ezequiel 7:18)";
 frase[2714] = "Você terá vergonha de você mesma, e a sua desgraça mostrará às suas irmãs que elas estão em muito boas condições. (Ezequiel 16:54)";
 frase[2715] = "pois será levado para a Assíria como presente para o grande imperador. E o povo de Israel ficará com vergonha dos conselhos que seguiu. (Oseias 10:6)";
 frase[2716] = "Os adivinhos e os que dizem o que vai acontecer no futuro passarão vergonha. Não receberão resposta de Deus e por isso ficarão desmoralizados. (Miqueias 3:7)";
 frase[2717] = "Mas os seus planos trouxeram vergonha para a sua família, e, ao destruir muitos povos, você pôs a sua própria vida em perigo. (Habacuque 2:10)";
 frase[2718] = "Naquele dia, qualquer um que profetizar terá vergonha da sua visão. Ninguém vestirá uma capa de peles de animais para fingir que é profeta. (Zacarias 13:4)";
 frase[2719] = "Você se orgulha de ter a lei de Deus, mas você é uma vergonha para Deus porque desobedece à sua lei. (Romanos 2:23)";
 frase[2720] = "Porém o que é que vocês receberam de bom quando faziam aquelas coisas de que agora têm vergonha? Pois o resultado de tudo aquilo é a morte. (Romanos 6:21)";
 frase[2721] = "Eles perderam toda a vergonha e se entregaram totalmente aos vícios; eles não têm nenhum controle e fazem todo tipo de coisas indecentes. (Efésios 4:19)";
 frase[2722] = "Que o Senhor seja bondoso com a família de Onesíforo, pois muitas vezes ele me animou e não teve vergonha de mim por eu estar na cadeia! (2Timóteo 1:16)";
 frase[2723] = "E o Senhor disse a Josué: — Hoje eu tirei de vocês a vergonha de terem sido escravos no Egito. Foi por isso que chamaram aquele lugar de Gilgal . E este nome continua até hoje. (Josué 5:9)";
 frase[2724] = "Então Davi perguntou aos soldados que estavam perto dele: — O que ganhará o homem que matar esse filisteu e livrar Israel desta vergonha? Afinal de contas, quem é esse filisteu pagão para desafiar o exército do Deus vivo?(1Samuel 17:26)";
 frase[2725] = "No dia catorze do segundo mês, mataram os carneiros para a Festa da Páscoa. Os sacerdotes e os levitas ficaram com vergonha e por isso se purificaram e levaram ao Templo sacrifícios para serem completamente queimados. (2Crônicas 30:15)";
 frase[2726] = "Mas aí eu lhes disse: — Vejam como é difícil a nossa situação! A cidade de Jerusalém está em ruínas, e os seus portões foram destruídos. Vamos construir de novo as muralhas da cidade e acabar com essa vergonha. (Neemias 2:17)";
 frase[2727] = "Que sejam completamente derrotados e envergonhados aqueles que se alegram com o meu sofrimento! Que fiquem cobertos de vergonha e de desgraça os que dizem que são melhores do que eu! (Salmos 35:26)";
 frase[2728] = "Ó Senhor, Deus Todo-Poderoso, não deixes que aqueles que confiam em ti passem vergonha por causa de mim! Ó Deus de Israel, não permitas que eu traga desgraça para aqueles que te adoram! (Salmos 69:6)";
 frase[2729] = "Naquele dia, sete mulheres agarrarão um homem e dirão: “Nós pagaremos a nossa própria comida e a nossa roupa. Mas deixe-nos dizer que você é o nosso marido, para que fiquemos livres da vergonha de sermos solteiras.”(Isaías 4:1)";
 frase[2730] = "O rei da Assíria levará como prisioneiros os egípcios e os etíopes, tanto os moços como os velhos. Eles irão meio nus e descalços, com as nádegas descobertas, trazendo assim vergonha para o Egito. (Isaías 20:4)";
 frase[2731] = "A lua terá vergonha de brilhar, e o sol ficará pálido de medo porque o Senhor Todo-Poderoso reinará no monte Sião, em Jerusalém. E, na presença dos líderes do seu povo, ele mostrará a sua glória. (Isaías 24:23)";
 frase[2732] = "O Senhor Deus acabará para sempre com a morte. Ele enxugará as lágrimas dos olhos de todos e fará desaparecer do mundo inteiro a vergonha que o seu povo está passando. O Senhor falou. (Isaías 25:8)";
 frase[2733] = "Portanto, o Senhor, que livrou Abraão de perigos, diz o seguinte a respeito do povo de Israel: “O meu povo não ficará desiludido outra vez, eles nunca mais sentirão vergonha. (Isaías 29:22)";
 frase[2734] = "A vergonha e a desgraça que vocês passaram eram duas vezes mais do que mereciam; mas agora vocês viverão no seu país, onde receberão o dobro de riquezas e serão felizes para sempre. (Isaías 61:7)";
 frase[2735] = "O Senhor Deus diz: — Como o ladrão fica envergonhado quando é pego, assim o povo de Israel passará vergonha: todos vocês, os seus reis e príncipes, os seus sacerdotes e profetas. (Jeremias 2:26)";
 frase[2736] = "Por termos adorado Baal, o deus da vergonha, perdemos tudo o que os nossos pais conseguiram desde que éramos crianças, isto é, as ovelhas, o gado, os filhos e as filhas. (Jeremias 3:24)";
 frase[2737] = "Vamos nos humilhar; vamos ficar cheios de vergonha. Desde o tempo em que o Senhor nos tirou do Egito, nós e os nossos antepassados temos pecado contra ele e não lhe temos obedecido. (Jeremias 3:25)";
 frase[2738] = "E assim está chegando a hora em que vou castigar os ídolos da Babilônia. Os moradores da sua terra ficarão com vergonha por causa da derrota, e todos serão mortos. (Jeremias 51:47)";
 frase[2739] = "Aumentarei a produção de frutas e das plantações de cereais, de modo que não haverá mais épocas de fome que façam vocês passarem vergonha no meio das outras nações. (Ezequiel 36:30)";
 frase[2740] = "Ela se entregou à prostituição e mostrou que havia perdido toda a vergonha quando disse: “Vou buscar os meus amantes , pois eles me darão comida e bebida, roupas de lã e de linho, azeite e vinho.”(Oseias 2:5)";
 frase[2741] = "Saiam daqui! Vão embora! Pois não é este o lugar onde vocês vão descansar em paz. Aqui há tanta gente desonesta e sem-vergonha, que a destruição vai ser total. (Miqueias 2:10)";
 frase[2742] = "É você que vai perder a sua honra e ficar coberto de vergonha. Pois o Senhor vai fazer você beber do copo da sua ira, e você também ficará bêbado. Em vez de receber homenagens, você será humilhado. (Habacuque 2:16)";
 frase[2743] = "— Aí o administrador pensou: “O patrão está me despedindo. E, agora, o que é que eu vou fazer? Não tenho forças para cavar a terra e tenho vergonha de pedir esmola. (Lucas 16:3)";
 frase[2744] = "Mas façam como dizem as Escrituras: “Se o seu inimigo estiver com fome, dê comida a ele; se estiver com sede, dê água. Porque assim você o fará queimar de remorso e vergonha.”(Romanos 12:20)";
 frase[2745] = "Eles vão para a destruição no inferno porque o deus deles são os desejos do corpo. Eles têm orgulho daquilo que devia ser uma vergonha para eles e pensam somente nas coisas que são deste mundo. (Filipenses 3:19)";
 frase[2746] = "Sim, meus filhinhos , continuem unidos com Cristo, para que possamos estar cheios de coragem no dia em que ele vier. Assim não precisaremos ficar com vergonha e nos esconder dele naquele dia. (1João 2:28)";
 frase[2747] = "— Se um homem casar com a irmã, seja por parte só de pai ou por parte de pai e mãe, os dois deverão ser expulsos publicamente do meio do povo. É uma vergonha um homem casar com a irmã; ele merece castigo. (Levítico 20:17)";
 frase[2748] = "Davi voltou para casa a fim de estar com a sua família, e Mical, filha de Saul, saiu para encontrá-lo. Ela disse: — Que bela figura fez hoje o rei de Israel! Parecia um sem-vergonha, mostrando o corpo para as empregadas dos seus funcionários! (2Samuel 6:20)";
 frase[2749] = "Por isso, os seus moradores ficaram fracos e andavam cheios de medo e de vergonha. Eles ficaram como o capim do campo e a erva verde e como a erva que cresce nos telhados, quando o vento quente do leste sopra e os faz secar. (2Reis 19:26)";
 frase[2750] = "Eu tinha dito ao rei que o nosso Deus protege todos os que confiam nele, porém que a sua força e a sua ira vão contra aqueles que o abandonam. Por isso, fiquei com vergonha de pedir ao rei uma tropa de soldados da cavalaria para nos defender dos nossos inimigos durante a viagem. (Esdras 8:22)";
 frase[2751] = "Em vez de andarem perfumadas, elas vão cheirar mal; em vez de cintos finos, usarão cordas grosseiras. Não farão penteados bonitos, mas ficarão carecas. Não usarão roupas finas, mas roupas feitas de pano grosseiro. A beleza delas vai virar uma feiura de dar vergonha! (Isaías 3:24)";
 frase[2752] = "pois o pavor tomará conta deles. Sofrerão e chorarão como uma mulher com dores de parto, se torcerão como uma mulher que está dando à luz. Olharão uns para os outros, cheios de medo, e os rostos deles ficarão vermelhos de vergonha. (Isaías 13:8)";
 frase[2753] = "Ele vai pegá-lo como quem pega uma bola e vai jogá-lo longe, num país enorme. Ali você morrerá perto dos seus carros de guerra, que o enchiam de tanto orgulho. Pois você é uma vergonha para o seu patrão, o rei de Judá. (Isaías 22:18)";
 frase[2754] = "Pois o sem-vergonha diz mentiras e está sempre planejando fazer maldades. O que ele diz a respeito do Senhor é falso; ele faz estas coisas que Deus detesta: nega comida aos que têm fome e água aos que estão com sede. (Isaías 32:6)";
 frase[2755] = "Por isso, os seus moradores ficaram fracos e andaram cheios de medo e de vergonha. Eles ficaram como o capim do campo e a erva verde e como a erva que cresce nos telhados e que seca quando o vento quente do leste sopra nele. (Isaías 37:27)";
 frase[2756] = "Passarão vergonha todos aqueles que dizem a um pedaço de madeira: “Você é o meu pai”, e a uma pedra: “Você é a minha mãe”. Isso vai acontecer porque vocês me viraram as costas, em vez de virarem o rosto para o meu lado. No entanto, quando estão em dificuldades, vocês vêm me pedir que os salve. (Jeremias 2:27)";
 frase[2757] = "Será que ficaram envergonhados por terem feito essas coisas que eu detesto? Não! Não ficaram envergonhados de jeito nenhum. Eles nem sabem o que é sentir vergonha e por isso vão cair como outros têm caído. Quando eu os castigar, eles vão ficar arrasados. Eu, o Senhor, falei. (Jeremias 6:15)";
 frase[2758] = "Será que ficaram envergonhados por terem feito essas coisas que eu detesto? Não! Não ficaram envergonhados de jeito nenhum; eles nem sabem o que é sentir vergonha. Por isso, vão cair como outros têm caído; quando eu os castigar, eles vão ficar arrasados. Sou eu, o Senhor, quem está falando. (Jeremias 8:12)";
 frase[2759] = "“Deem a notícia às nações! Avisem a todos! Deem o sinal e espalhem a novidade! Não deixem que ela fique em segredo! ‘A Babilônia caiu! O seu deus Bel-Marduque está desesperado! Os ídolos da Babilônia estão cobertos de vergonha, e as suas imagens nojentas estão cheias de medo!’ ”(Jeremias 50:2)";
 frase[2760] = "— O país de Elão está ali, e em volta estão os túmulos dos seus soldados. Todos eles foram mortos em combate e, sem terem sido circuncidados, desceram ao mundo dos mortos. Quando estavam vivos, eles espalhavam o terror, mas agora estão mortos e cobertos de vergonha. (Ezequiel 32:24)";
 frase[2761] = "Elão está deitado no meio dos que foram mortos em combate, e os túmulos dos seus soldados estão em volta dele. Nenhum deles foi circuncidado; todos eles foram mortos em combate. Quando estavam vivos, eles espalhavam o terror, mas agora estão mortos e cobertos de vergonha, fazendo companhia aos que foram mortos em combate. (Ezequiel 32:25)";
 frase[2762] = "Se eles ficarem com vergonha do que têm feito, explique a planta do Templo para eles, isto é, o seu modelo, as entradas e saídas, as formas, o modo como tudo está arrumado e todas as leis e regulamentos. Escreva todas essas coisas para que eles possam ver como tudo está arrumado e para que cumpram todos os regulamentos. (Ezequiel 43:11)";
 frase[2763] = "Tu, ó Senhor, és sempre justo; mas agora sentimos vergonha, nós, o teu povo, tanto os que vivem na Judeia e em Jerusalém como os que tu espalhaste pelos países de perto e de longe. Tu fizeste isso porque eles se revoltaram contra ti. (Daniel 9:7)";
 frase[2764] = "Naquele tempo, vocês, o meu povo, não vão sentir mais vergonha por causa das vezes que se revoltaram contra mim. Pois eu farei desaparecer do meio de vocês todos os orgulhosos e vaidosos. Nunca mais vocês vão se sentir orgulhosos no meu monte santo. (Sofonias 3:11)";
 frase[2765] = "Tenho até vergonha de confessar que nós fomos tímidos demais e não fomos capazes de fazer coisas como essas. Mas, se os outros se atrevem a se gabar de alguma coisa, eu também vou me atrever, embora isso seja uma loucura. (2Coríntios 11:21)";
 frase[2766] = "e pagarão com sofrimento o sofrimento que causaram aos outros. Eles têm prazer em satisfazer em pleno dia os seus desejos imorais. Quando se reúnem com vocês, são uma vergonha e um escândalo, divertindo-se o tempo todo com os seus modos enganosos. (2Pedro 2:13)";
 frase[2767] = "Pois é vergonhoso até falar sobre o que essas pessoas fazem em segredo. (Efésios 5:12)";
 frase[2768] = "Então ele me disse: — Entre e veja as coisas imorais e vergonhosas que estão fazendo aí dentro. (Ezequiel 8:9)";
 frase[2769] = "Você precisa sofrer pelas coisas imorais e vergonhosas que fez. Eu, o Senhor, falei. (Ezequiel 16:58)";
 frase[2770] = "Eles agem depressa para espalhar as suas mentiras vergonhosas e destroem os bons com calúnias covardes. (Salmos 64:4)";
 frase[2771] = "Os homens honestos odeiam a mentira, porém os maus dizem coisas indecentes e vergonhosas. (Provérbios 13:5)";
 frase[2772] = "Depois, Deus me disse o seguinte: — Você verá esses líderes fazendo coisas ainda mais vergonhosas do que isso. (Ezequiel 8:13)";
 frase[2773] = "O Senhor Deus perguntou: — Homem mortal, você está vendo isso? Pois verá coisas ainda mais vergonhosas. (Ezequiel 8:15)";
 frase[2774] = "— Diga a esses israelitas rebeldes que eu, o Senhor Deus, não vou tolerar mais as coisas vergonhosas que eles estão fazendo. (Ezequiel 44:6)";
 frase[2775] = "O dono mandou mais um empregado, mas eles bateram na cabeça dele e o trataram de um modo vergonhoso. (Marcos 12:4)";
 frase[2776] = "O dono mandou outro empregado, mas eles também bateram nele, depois o trataram de modo vergonhoso e o mandaram de volta sem nada. (Lucas 20:11)";
 frase[2777] = "Isso acontecerá com Zedequias e Acabe porque a sua conduta foi vergonhosa — cometeram adultério e, contra a vontade de Deus, contaram mentiras em seu nome. Deus sabe o que fizeram e é testemunha contra eles. O Senhor falou.”(Jeremias 29:23)";
 frase[2778] = "— Vá por toda a cidade de Jerusalém e faça um sinal na testa de todas as pessoas que sofrem e se aborrecem por causa de todas as coisas vergonhosas que estão sendo feitas na cidade. (Ezequiel 9:4)";
 frase[2779] = "Deixarei alguns escaparem da guerra, da fome e das doenças, de modo que, lá no meio das nações, eles compreenderão o quanto as suas ações foram vergonhosas e reconhecerão que eu sou o Senhor. (Ezequiel 12:16)";
 frase[2780] = "E o que ele diz é isto: — Você tirou a roupa, e como prostituta se entregou aos seus amantes e a todos os seus ídolos vergonhosos, e matou os seus filhos em sacrifício aos ídolos. (Ezequiel 16:36)";
 frase[2781] = "e empresta dinheiro a juros altos. Será que ele vai viver? Não! Não vai! Ele fez todas essas coisas vergonhosas e morrerá por causa delas. Esse filho será culpado da sua própria morte. (Ezequiel 18:13)";
 frase[2782] = "— Homem mortal, você está pronto para julgar essa gente? Então julgue. Faça com que eles lembrem das coisas vergonhosas que os antepassados deles fizeram. (Ezequiel 20:4)";
 frase[2783] = "Então vocês lembrarão de todas as coisas vergonhosas que fizeram e de como se tornaram impuros. Ficarão com nojo de vocês mesmos, por causa de todas as coisas más que fizeram. (Ezequiel 20:43)";
 frase[2784] = "— Homem mortal, você está pronto para julgar a cidade que está cheia de assassinos? Mostre a ela todas as coisas vergonhosas que tem feito. (Ezequiel 22:2)";
 frase[2785] = "O Senhor me disse: — Homem mortal, você está pronto para julgar Oolá e Oolibá? Então acuse-as das coisas vergonhosas que têm feito. (Ezequiel 23:36)";
 frase[2786] = "Povo de Israel, quero que saibam que eu não estou fazendo tudo isso por amor de vocês. Quero que vocês sintam como é vergonhoso e desonroso aquilo que estão fazendo. Eu, o Senhor Deus, estou falando.”(Ezequiel 36:32)";
 frase[2787] = "Eles não me servirão como sacerdotes, nem chegarão perto de nada que seja santo para mim, nem entrarão no Lugar Santíssimo. O castigo pelas coisas vergonhosas que eles fizeram é este:(Ezequiel 44:13)";
 frase[2788] = "Por isso Deus entregou os seres humanos aos desejos do coração deles para fazerem coisas sujas e para terem relações vergonhosas uns com os outros. (Romanos 1:24)";
 frase[2789] = "Por causa das coisas que essas pessoas fazem, Deus as entregou a paixões vergonhosas. Pois até as mulheres trocam as relações naturais pelas que são contra a natureza. (Romanos 1:26)";
 frase[2790] = "Se a mulher não cobre a cabeça, então é melhor que ela corte o cabelo de uma vez. Já que é vergonhoso para a mulher rapar a cabeça ou cortar o cabelo, então ela deve cobrir a cabeça. (1Coríntios 11:6)";
 frase[2791] = "Se quiserem saber alguma coisa, que perguntem em casa ao marido. É vergonhoso que uma mulher fale nas reuniões da igreja. (1Coríntios 14:35)";
 frase[2792] = "É preciso fazer com que eles parem de falar, pois estão atrapalhando famílias inteiras por ensinarem o que não devem, com a intenção vergonhosa de ganhar dinheiro. (Tito 1:11)";
 frase[2793] = "Eles são como as ondas bravas do mar, jogando para cima a espuma das suas ações vergonhosas; são como estrelas sem rumo, para as quais Deus reservou, para sempre, um lugar na mais profunda escuridão. (Judas 1:13)";
